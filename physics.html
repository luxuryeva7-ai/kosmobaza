<title>Физика — КосмоБаза</title>
<style>
@import url('https://fonts.bunny.net/css?family=fredoka-one:400|nunito:500,700,800');
:root {
  --ak-bg:#FFF3E2; --ak-bg-2:#FFE8CC; --ak-surface:#FFFDF7;
  --ak-ink:#2D1B45; --ak-ink-2:#6B5680; --ak-ink-3:#A797B8;
  --ak-phys-1:#E5DCFF; --ak-phys-2:#B5A1FF; --ak-phys-3:#7C5FE0;
  --ak-cta-1:#FFEDA8; --ak-cta-2:#FFD262; --ak-cta-3:#D4A22B;
  --ak-ok-1:#C8F2DD; --ak-ok-2:#5DD9A0; --ak-ok-3:#2BA873;
  --ak-warn-1:#FFD2C8; --ak-warn-2:#FF8B7A; --ak-warn-3:#D9523F;
  --ak-star-1:#FFE49E; --ak-star-2:#FFC857; --ak-star-3:#D4972B;
  --ak-r-sm:10px; --ak-r-md:18px; --ak-r-lg:28px; --ak-r-xl:36px;
  --ak-display:'Fredoka One','Nunito',system-ui,sans-serif;
  --ak-body:'Nunito',system-ui,sans-serif;
}
html,body{background:#FFF3E2;margin:0;}
#root{min-height:100vh;}
body{margin:0;font-family:var(--ak-body);color:var(--ak-ink);}
.ak{font-family:var(--ak-body);color:var(--ak-ink);-webkit-font-smoothing:antialiased;}
.ak-clay{background:var(--ak-surface);border-radius:var(--ak-r-lg);box-shadow:0 10px 22px -8px rgba(45,27,69,.22),0 4px 10px -4px rgba(45,27,69,.10),inset 0 2px 0 rgba(255,255,255,.9),inset 0 -3px 0 rgba(45,27,69,.06);}
.ak-btn{font-family:var(--ak-display);font-weight:600;font-size:17px;border:none;cursor:pointer;position:relative;transition:transform .08s ease,box-shadow .08s ease,filter .15s ease;user-select:none;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;padding:16px 26px;border-radius:999px;color:var(--ak-ink);}
.ak-btn:disabled{cursor:not-allowed;filter:grayscale(.25) opacity(.6);}
.ak-btn--phys{color:#fff;background:linear-gradient(180deg,#C4B5FF 0%,#B5A1FF 55%,#9C83FF 100%);box-shadow:0 6px 0 var(--ak-phys-3),0 12px 24px -6px rgba(124,95,224,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(124,95,224,.25);text-shadow:0 1px 0 rgba(124,95,224,.4);}
.ak-btn--phys:active{transform:translateY(4px);}
.ak-btn--cta{color:var(--ak-ink);background:linear-gradient(180deg,#FFEDA8 0%,#FFD262 55%,#FFC03A 100%);box-shadow:0 6px 0 var(--ak-cta-3),0 12px 24px -6px rgba(212,162,43,.55),inset 0 2px 0 rgba(255,255,255,.85),inset 0 -2px 0 rgba(212,162,43,.25);}
.ak-btn--cta:active{transform:translateY(4px);}
.ak-btn--ok{color:#fff;background:linear-gradient(180deg,#7CECB5 0%,#5DD9A0 55%,#3FC685 100%);box-shadow:0 6px 0 var(--ak-ok-3),0 12px 24px -6px rgba(43,168,115,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(43,168,115,.25);text-shadow:0 1px 0 rgba(43,168,115,.4);}
.ak-btn--ok:active{transform:translateY(4px);}
.ak-btn--warn{color:#fff;background:linear-gradient(180deg,#FF9F8F 0%,#FF8B7A 55%,#E06A5A 100%);box-shadow:0 6px 0 var(--ak-warn-3),0 12px 24px -6px rgba(217,82,63,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(217,82,63,.25);}
.ak-btn--warn:active{transform:translateY(4px);}
.ak-btn--soft{color:var(--ak-ink);background:linear-gradient(180deg,#FFFFFF 0%,#FFF7E8 100%);box-shadow:0 4px 0 rgba(45,27,69,.10),0 8px 18px -6px rgba(45,27,69,.12),inset 0 2px 0 rgba(255,255,255,.95),inset 0 -2px 0 rgba(45,27,69,.05),inset 0 0 0 1px rgba(45,27,69,.06);}
.ak-btn--soft:active{transform:translateY(3px);}
.ak-btn--sm{padding:11px 18px;font-size:14px;}
.ak-btn--lg{padding:20px 32px;font-size:19px;}
.ak-btn--icon{width:56px;height:56px;padding:0;border-radius:50%;}
.ak-btn--icon.ak-btn--sm{width:42px;height:42px;}
@keyframes ak-bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-4px) rotate(1deg);}}
@keyframes ak-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
@keyframes ak-shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px) rotate(-1deg);}40%{transform:translateX(7px) rotate(1deg);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
@keyframes ak-pop{0%{transform:scale(.7);opacity:0;}60%{transform:scale(1.06);opacity:1;}100%{transform:scale(1);}}
@keyframes ak-twinkle{0%,100%{opacity:.35;transform:scale(.85);}50%{opacity:1;transform:scale(1.05);}}
.ak-bob{animation:ak-bob 3.2s ease-in-out infinite;}
.ak-pulse{animation:ak-pulse 2.4s ease-in-out infinite;}
.ak-shake{animation:ak-shake .45s ease-in-out;}
.ak-pop{animation:ak-pop .42s cubic-bezier(.2,.7,.3,1) forwards;}
.ak-twinkle{animation:ak-twinkle 2.4s ease-in-out infinite;}
.ak-num{font-variant-numeric:tabular-nums;font-family:var(--ak-display);}
.ak-tap{cursor:pointer;transition:transform .12s cubic-bezier(.2,.7,.3,1),filter .12s;}
.ak-tap:hover{transform:translateY(-3px);filter:brightness(1.03);}
.ak-tap:active{transform:translateY(0);}
.ak ::-webkit-scrollbar{display:none;}
.ak{scrollbar-width:none;}
input[type=range]{-webkit-appearance:none;width:100%;height:18px;border-radius:999px;outline:none;cursor:pointer;background:transparent;}
input[type=range]::-webkit-slider-runnable-track{height:18px;border-radius:999px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:36px;height:36px;border-radius:50%;background:linear-gradient(180deg,#fff 0%,#FFF7E8 100%);box-shadow:0 4px 0 rgba(45,27,69,.15),0 8px 18px -6px rgba(45,27,69,.2),inset 0 2px 0 rgba(255,255,255,.95);margin-top:-9px;cursor:pointer;}

/* ============================================================
   AK DESIGN TOKENS
   ============================================================ */
const AK_TONES = {
  phys: ['#E5DCFF','#B5A1FF','#7C5FE0'],
  ok:   ['#C8F2DD','#5DD9A0','#2BA873'],
  cta:  ['#FFEDA8','#FFD262','#D4A22B'],
  star: ['#FFE49E','#FFC857','#D4972B'],
  warn: ['#FFD2C8','#FF8B7A','#D9523F'],
  ink:  ['#E5DCEE','#6B5680','#2D1B45'],
};

/* ============================================================
   AK ICONS / SVG COMPONENTS
   ============================================================ */
function AKAtom({ size=60, tone='phys' }) {
  const [l,m,d] = AK_TONES[tone];
  const id = React.useId().replace(/:/g,'_');
  return (
    <svg width={size} height={size} viewBox="0 0 60 60" style={{display:'block'}}>
      <defs>
        <radialGradient id={'atom_'+id} cx="40%" cy="30%" r="70%">
          <stop offset="0%" stopColor="#fff"/>
          <stop offset="40%" stopColor={l}/>
          <stop offset="100%" stopColor={d}/>
        </radialGradient>
      </defs>
      <ellipse cx="30" cy="30" rx="26" ry="10" fill="none" stroke={m} strokeWidth="2.5" opacity=".7"/>
      <ellipse cx="30" cy="30" rx="26" ry="10" fill="none" stroke={m} strokeWidth="2.5" opacity=".7" transform="rotate(60 30 30)"/>
      <ellipse cx="30" cy="30" rx="26" ry="10" fill="none" stroke={m} strokeWidth="2.5" opacity=".7" transform="rotate(120 30 30)"/>
      <circle cx="30" cy="30" r="7" fill={'url(#atom_'+id+')'} stroke={d} strokeWidth="1.5"/>
      <circle cx="27" cy="27" r="2.5" fill="#fff" opacity=".8"/>
    </svg>
  );
}

function AKStarSmall({ filled=true }) {
  const id = React.useId().replace(/:/g,'_');
  return (
    <svg width="14" height="14" viewBox="0 0 14 14">
      <defs><linearGradient id={'ss_'+id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#FFE49E"/><stop offset="100%" stopColor="#FFC857"/></linearGradient></defs>
      <path d="M7 1.2 L8.7 5 L13 5.4 L9.7 8.2 L10.7 12.3 L7 10.2 L3.3 12.3 L4.3 8.2 L1 5.4 L5.3 5 Z"
        fill={filled ? 'url(#ss_'+id+')' : '#E8DCEE'} stroke={filled?'#D4972B':'#B0A0C2'} strokeWidth="1.2" strokeLinejoin="round"/>
    </svg>
  );
}

function AKStar({ size=56, filled=true }) {
  const id = React.useId().replace(/:/g,'_');
  return (
    <svg width={size} height={size} viewBox="0 0 56 56">
      <defs><radialGradient id={'st_'+id} cx="40%" cy="32%" r="70%"><stop offset="0%" stopColor="#fff"/><stop offset="35%" stopColor="#FFE49E"/><stop offset="100%" stopColor="#D4972B"/></radialGradient></defs>
      <ellipse cx="28" cy="52" rx="14" ry="2.5" fill="rgba(45,27,69,.18)"/>
      <path d="M28 5 L34.5 19 L50 21 L38.5 31.5 L42 47 L28 39.5 L14 47 L17.5 31.5 L6 21 L21.5 19 Z"
        fill={filled ? 'url(#st_'+id+')' : '#E8DCEE'} stroke={filled?'#C99B3B':'#B0A0C2'} strokeWidth="2.2" strokeLinejoin="round"/>
      {filled&&<><ellipse cx="20" cy="18" rx="3.5" ry="5" fill="#fff" opacity=".7" transform="rotate(-30 20 18)"/><circle cx="36" cy="14" r="1.6" fill="#fff" opacity=".7"/></>}
    </svg>
  );
}

/* ============================================================
   AK UI COMPONENTS
   ============================================================ */
function AKProgress({ value=0.5, tone='phys', height=18, label }) {
  const [l,m,d] = AK_TONES[tone];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {label&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
        <span style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:13,color:'var(--ak-ink-2)'}}>{label}</span>
        <span className="ak-num" style={{fontWeight:700,fontSize:14,color:'var(--ak-ink)'}}>{Math.round(value*100)}%</span>
      </div>}
      <div style={{height,borderRadius:999,background:'rgba(45,27,69,.08)',boxShadow:'inset 0 2px 4px rgba(45,27,69,.18)',overflow:'hidden',position:'relative'}}>
        <div style={{width:`${Math.max(0,Math.min(1,value))*100}%`,height:'100%',background:`linear-gradient(180deg,${l} 0%,${m} 50%,${d} 100%)`,boxShadow:`inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 ${d}`,borderRadius:999,transition:'width .4s cubic-bezier(.2,.7,.3,1)',position:'relative'}}>
          <div style={{position:'absolute',top:3,left:8,right:8,height:3,background:'rgba(255,255,255,.55)',borderRadius:999}}/>
        </div>
      </div>
    </div>
  );
}

function AKStatChip({ icon, value, tone='phys' }) {
  const [l,m,d] = AK_TONES[tone];
  return (
    <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'6px 14px 6px 6px',borderRadius:999,background:'#fff',boxShadow:'0 3px 0 rgba(45,27,69,.08),0 6px 14px -4px rgba(45,27,69,.12),inset 0 1px 0 rgba(255,255,255,1)',fontFamily:'var(--ak-display)',fontWeight:700,fontSize:15,color:'var(--ak-ink)'}}>
      <div style={{width:28,height:28,borderRadius:'50%',background:`radial-gradient(circle at 35% 30%,#fff,${l} 25%,${m} 75%,${d} 100%)`,boxShadow:`inset 0 -2px 0 ${d}`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14}}>{icon}</div>
      <span className="ak-num">{value}</span>
    </div>
  );
}

function AKTaskBadge({ children, tone='phys' }) {
  const [l,m,d] = AK_TONES[tone];
  return (
    <div className="ak-pulse" style={{display:'inline-flex',alignItems:'center',gap:10,padding:'12px 20px 12px 14px',borderRadius:999,background:'#fff',boxShadow:'0 4px 0 rgba(45,27,69,.08),0 10px 22px -6px rgba(45,27,69,.14),inset 0 1px 0 rgba(255,255,255,1)',fontFamily:'var(--ak-display)',fontWeight:600,fontSize:14.5,color:'var(--ak-ink)'}}>
      <div style={{width:10,height:10,borderRadius:'50%',background:m,boxShadow:`0 0 0 4px ${m}33,inset 0 -1px 0 ${d}`}}/>
      <span>{children}</span>
    </div>
  );
}

function AKLessonHeader({ progress=0, stars=0, onClose }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:'#fff',borderRadius:18,boxShadow:'0 4px 0 rgba(45,27,69,.06)',marginBottom:16}}>
      <div style={{flex:1}}><AKProgress value={progress} tone="phys" height={14}/></div>
      <div style={{display:'flex',gap:3}}>
        {[0,1,2].map(i=><AKStarSmall key={i} filled={i<stars}/>)}
      </div>
      <button onClick={onClose} style={{width:36,height:36,fontSize:18,borderRadius:'50%',padding:0,flexShrink:0,border:'none',cursor:'pointer',background:'linear-gradient(180deg,#FFFFFF 0%,#FFF7E8 100%)',boxShadow:'0 4px 0 rgba(45,27,69,.10),inset 0 2px 0 rgba(255,255,255,.95)',color:'var(--ak-ink)',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
    </div>
  );
}

function AKSuccessCard({ stars=3, title='Отлично!', fact, onNext, ctaLabel='Дальше' }) {
  return (
    <div className="ak-pop" style={{width:320,background:'#fff',borderRadius:32,padding:'28px 24px 24px',textAlign:'center',boxShadow:'0 12px 0 rgba(43,168,115,.18),0 24px 48px -12px rgba(45,27,69,.25),inset 0 2px 0 rgba(255,255,255,1)',fontFamily:'var(--ak-body)',position:'relative',margin:'0 auto'}}>
      <div aria-hidden style={{position:'absolute',top:-10,left:-10,right:-10,height:30,pointerEvents:'none'}}>
        {[{l:8,c:'#FFC857',s:8},{l:60,c:'#5DD9A0',s:6},{l:120,c:'#B5A1FF',s:7},{l:200,c:'#FFA17A',s:6},{l:260,c:'#8FCAF0',s:8},{l:310,c:'#FFC857',s:6}].map((p,i)=>(
          <div key={i} className="ak-twinkle" style={{position:'absolute',left:p.l,top:4+(i%2)*8,width:p.s,height:p.s,borderRadius:2,background:p.c,transform:`rotate(${i*25}deg)`,animationDelay:`${i*.15}s`}}/>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:16}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{animationDelay:`${i*.12}s`}} className="ak-pop">
            <AKStar size={44} filled={i<stars}/>
          </div>
        ))}
      </div>
      <div style={{fontFamily:'var(--ak-display)',fontSize:26,color:'var(--ak-ink)',marginBottom:8}}>{title}</div>
      {fact&&<div style={{fontSize:14,color:'var(--ak-ink-2)',lineHeight:1.55,marginBottom:22,padding:'0 4px'}}>{fact}</div>}
      <button className="ak-btn ak-btn--ok ak-btn--lg" onClick={onNext} style={{width:'100%'}}>
        {ctaLabel} →
      </button>
    </div>
  );
}

/* ============================================================
   LEVEL 1 — CANNON (Пушка Галилея)
   ============================================================ */
function Level1Cannon({ onDone }) {
  const isMobile = window.innerWidth < 600;
  const CW = isMobile ? 300 : 340;
  const CH = 190;
  const GROUND_Y = CH - 30;
  const V0 = 13, G = 0.42;

  const [missionIdx, setMissionIdx] = React.useState(0);
  const [displayAngle, setDisplayAngle] = React.useState(45);
  const [phase, setPhase] = React.useState('aim'); // aim|flying|hit|miss|complete

  const angleRef = React.useRef(45);
  const rafAngleRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const flyRef = React.useRef({ active:false, x:28, y:GROUND_Y-16, vx:0, vy:0, trail:[] });
  const animFrameRef = React.useRef(null);
  const phaseRef = React.useRef('aim');
  const triesRef = React.useRef([0,0,0,0,0]);

  const mission = L1_MISSIONS[missionIdx];

  function drawCloud(ctx, x, y, r) {
    ctx.save(); ctx.globalAlpha = 0.32;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+r*0.7, y+4, r*0.75, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x-r*0.7, y+4, r*0.65, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawTarget(ctx, tx, ty) {
    ctx.save();
    ctx.fillStyle = '#78350F';
    ctx.fillRect(tx-2, ty, 4, GROUND_Y-ty);
    [[14,'#EF4444'],[10,'#fff'],[6,'#EF4444'],[3,'#FFD262']].forEach(([r,c])=>{
      ctx.beginPath(); ctx.arc(tx, ty, r, 0, Math.PI*2); ctx.fillStyle=c; ctx.fill();
    });
    ctx.restore();
  }

  function drawScene(ctx, fly, ang) {
    ctx.clearRect(0, 0, CW, CH);
    const sky = ctx.createLinearGradient(0, 0, 0, CH);
    sky.addColorStop(0, '#EDE0FF'); sky.addColorStop(1, '#FFF3E2');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = '#86EFAC'; ctx.fillRect(0, GROUND_Y, CW, CH-GROUND_Y);
    ctx.fillStyle = '#4ADE80'; ctx.fillRect(0, GROUND_Y, CW, 4);
    drawCloud(ctx, 80, 28, 28);
    drawCloud(ctx, 200, 18, 20);
    if (CW > 310) drawCloud(ctx, 290, 35, 18);
    drawTarget(ctx, mission.targetX, mission.targetY);
    // cannon shadow
    ctx.save(); ctx.globalAlpha = 0.10;
    ctx.beginPath(); ctx.ellipse(32, GROUND_Y+2, 24, 5, 0, 0, Math.PI*2); ctx.fillStyle='#2D1B45'; ctx.fill();
    ctx.restore();
    // cannon body
    ctx.fillStyle = '#7C5FE0';
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(6, GROUND_Y-28, 42, 26, 8); ctx.fill(); }
    else { ctx.fillRect(6, GROUND_Y-28, 42, 26); }
    ctx.fillStyle = '#9C83FF'; ctx.fillRect(10, GROUND_Y-25, 34, 6);
    // wheels
    [[16,'#5A3FA0','#B5A1FF'],[38,'#5A3FA0','#B5A1FF']].forEach(([wx,dc,lc])=>{
      ctx.beginPath(); ctx.arc(wx, GROUND_Y-3, 9, 0, Math.PI*2); ctx.fillStyle=dc; ctx.fill();
      ctx.beginPath(); ctx.arc(wx, GROUND_Y-3, 4, 0, Math.PI*2); ctx.fillStyle=lc; ctx.fill();
    });
    // barrel
    const bx=28, by=GROUND_Y-16;
    const a = ang * Math.PI / 180;
    ctx.strokeStyle='#5A3FA0'; ctx.lineWidth=11; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx+Math.cos(a)*40, by-Math.sin(a)*40); ctx.stroke();
    ctx.strokeStyle='#9C83FF'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(bx+2, by-2); ctx.lineTo(bx+Math.cos(a)*36, by-Math.sin(a)*36); ctx.stroke();
    // trail
    if (fly.trail.length > 1) {
      ctx.save(); ctx.globalAlpha=0.25; ctx.setLineDash([4,7]);
      ctx.strokeStyle='#7C5FE0'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(fly.trail[0].x, fly.trail[0].y);
      for (let i=1;i<fly.trail.length;i++) ctx.lineTo(fly.trail[i].x, fly.trail[i].y);
      ctx.stroke(); ctx.setLineDash([]); ctx.restore();
    }
    // ball
    const showBall = fly.active || fly.trail.length > 0;
    if (showBall) {
      const bxPos = fly.active ? fly.x : (fly.trail.length ? fly.trail[fly.trail.length-1].x : bx);
      const byPos = fly.active ? fly.y : (fly.trail.length ? fly.trail[fly.trail.length-1].y : by);
      const bg2 = ctx.createRadialGradient(bxPos-3, byPos-3, 2, bxPos, byPos, 9);
      bg2.addColorStop(0,'#fff'); bg2.addColorStop(0.4,'#C4B5FF'); bg2.addColorStop(1,'#7C5FE0');
      ctx.beginPath(); ctx.arc(bxPos, byPos, 8, 0, Math.PI*2);
      ctx.fillStyle=bg2; ctx.fill();
      ctx.strokeStyle='#5A3FA0'; ctx.lineWidth=1.5; ctx.stroke();
    }
  }

  React.useEffect(()=>{
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let alive = true;
    flyRef.current = { active:false, x:28, y:GROUND_Y-16, vx:0, vy:0, trail:[] };
    phaseRef.current = 'aim';

    function loop() {
      if (!alive) return;
      const fly = flyRef.current;
      const ang = angleRef.current;
      if (fly.active) {
        fly.vy += G; fly.x += fly.vx; fly.y += fly.vy;
        fly.trail.push({x:fly.x, y:fly.y});
        if (fly.trail.length > 55) fly.trail.shift();
        const d = Math.hypot(fly.x - mission.targetX, fly.y - mission.targetY);
        if (d < 22) {
          fly.active = false;
          drawScene(ctx, fly, ang);
          phaseRef.current = 'hit';
          setPhase('hit');
          return;
        }
        if (fly.x > CW+20 || fly.y > CH+20 || fly.x < -20) {
          fly.active = false;
          drawScene(ctx, fly, ang);
          phaseRef.current = 'miss';
          setPhase('miss');
          return;
        }
      }
      drawScene(ctx, fly, ang);
      animFrameRef.current = requestAnimationFrame(loop);
    }
    loop();
    return ()=>{ alive=false; cancelAnimationFrame(animFrameRef.current); };
  }, [missionIdx]);

  function fire() {
    if (phaseRef.current==='flying'||phaseRef.current==='hit'||phaseRef.current==='miss') return;
    const a = angleRef.current * Math.PI / 180;
    const by = GROUND_Y-16;
    flyRef.current = { active:true, x:28+Math.cos(a)*10, y:by-Math.sin(a)*10, vx:V0*Math.cos(a), vy:-V0*Math.sin(a), trail:[] };
    triesRef.current[missionIdx] = (triesRef.current[missionIdx]||0)+1;
    phaseRef.current = 'flying';
    setPhase('flying');
  }

  function handleHit() {
    if (missionIdx >= L1_MISSIONS.length-1) {
      setPhase('complete');
    } else {
      flyRef.current = { active:false, x:28, y:GROUND_Y-16, vx:0, vy:0, trail:[] };
      phaseRef.current = 'aim';
      setPhase('aim');
      setMissionIdx(i=>i+1);
    }
  }

  function handleMiss() {
    flyRef.current = { active:false, x:28, y:GROUND_Y-16, vx:0, vy:0, trail:[] };
    phaseRef.current = 'aim';
    setPhase('aim');
  }

  if (phase === 'complete') {
    const total = triesRef.current.reduce((a,b)=>a+b,0);
    const stars = total <= L1_MISSIONS.length+1 ? 3 : total <= L1_MISSIONS.length+4 ? 2 : 1;
    return (
      <div className="ak" style={{minHeight:'100vh',background:'var(--ak-bg)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
        <AKSuccessCard stars={stars} title="Пушка освоена!" fact={L1_FACTS[4]} onNext={onDone} ctaLabel="К уровням"/>
      </div>
    );
  }

  return (
    <div className="ak" style={{minHeight:'100vh',background:'var(--ak-bg)',display:'flex',flexDirection:'column',alignItems:'center',padding:'16px 16px 32px'}}>
      <div style={{width:'100%',maxWidth:390}}>
        <AKLessonHeader progress={missionIdx/L1_MISSIONS.length} stars={0} onClose={onDone}/>
        <div style={{fontFamily:'var(--ak-display)',fontSize:21,color:'var(--ak-ink)',textAlign:'center',marginBottom:8}}>{mission.goal}</div>
        <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:14}}>
          <AKStatChip icon="🎯" value={`${missionIdx+1} / ${L1_MISSIONS.length}`} tone="phys"/>
        </div>
        {/* Canvas */}
        <div className="ak-clay" style={{padding:10,marginBottom:16,position:'relative',overflow:'hidden'}}>
          <canvas ref={canvasRef} width={CW} height={CH}
            style={{display:'block',width:'100%',borderRadius:14}}/>
          {phase==='hit'&&(
            <div className="ak-pop" style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(200,242,221,.88)',borderRadius:16}}>
              <div style={{textAlign:'center',padding:'0 20px'}}>
                <div style={{fontSize:52,marginBottom:6}}>🎯</div>
                <div style={{fontFamily:'var(--ak-display)',fontSize:22,color:'#2BA873',marginBottom:6}}>Попал!</div>
                <div style={{fontSize:13,color:'var(--ak-ink-2)',marginBottom:16,lineHeight:1.5}}>{L1_FACTS[missionIdx]}</div>
                <button className="ak-btn ak-btn--ok" onClick={handleHit}>
                  {missionIdx>=L1_MISSIONS.length-1 ? 'Финиш! 🏆' : 'Дальше →'}
                </button>
              </div>
            </div>
          )}
          {phase==='miss'&&(
            <div className="ak-pop" style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(255,210,200,.88)',borderRadius:16}}>
              <div style={{textAlign:'center',padding:'0 20px'}}>
                <div style={{fontSize:44,marginBottom:6}}>💨</div>
                <div style={{fontFamily:'var(--ak-display)',fontSize:20,color:'#D9523F',marginBottom:4}}>Мимо! 😅</div>
                <div style={{fontSize:13,color:'var(--ak-ink-2)',marginBottom:14}}>{mission.hint}</div>
                <button className="ak-btn ak-btn--cta" onClick={handleMiss}>Ещё раз</button>
              </div>
            </div>
          )}
        </div>
        {/* Slider */}
        <div className="ak-clay" style={{padding:'16px 20px',marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontFamily:'var(--ak-display)',fontSize:15,color:'var(--ak-ink-2)'}}>Угол пушки</span>
            <span className="ak-num" style={{fontFamily:'var(--ak-display)',fontSize:26,color:'var(--ak-ink)',fontWeight:700}}>{displayAngle}°</span>
          </div>
          <div style={{position:'relative',height:18}}>
            <div style={{position:'absolute',inset:0,borderRadius:999,background:'linear-gradient(90deg,#8FCAF0 0%,#B5A1FF 50%,#FFA17A 100%)',boxShadow:'inset 0 2px 4px rgba(45,27,69,.18)',pointerEvents:'none'}}/>
            <input type="range" min={10} max={80} defaultValue={45}
              style={{position:'absolute',inset:0,opacity:0,cursor:'pointer',zIndex:2,width:'100%'}}
              onInput={e=>{
                const v=Number(e.target.value);
                angleRef.current=v;
                if(!rafAngleRef.current) rafAngleRef.current=requestAnimationFrame(()=>{setDisplayAngle(angleRef.current);rafAngleRef.current=null;});
              }}
            />
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:12,color:'var(--ak-ink-3)'}}>
            <span>10° — низко</span><span>45° — далеко</span><span>80° — высоко</span>
          </div>
        </div>
        <button className="ak-btn ak-btn--cta ak-btn--lg"
          onClick={fire}
          disabled={phase==='flying'||phase==='hit'||phase==='miss'}
          style={{width:'100%'}}>
          {phase==='flying' ? '💨 Летит...' : 'ОГОНЬ! 💥'}
        </button>
        <div style={{textAlign:'center',marginTop:12,fontSize:13,color:'var(--ak-ink-3)'}}>
          Выбери угол и нажми «ОГОНЬ»
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   LEVEL 2 — PENDULUM (Маятник-машина)
   ============================================================ */
function Level2Pendulum({ onDone }) {
  const isMobile = window.innerWidth < 600;
  const CW = isMobile ? 280 : 320;
  const CH = 220;
  const PIVOT_X = CW/2, PIVOT_Y = 28;
  const G_PEND = 0.0028;

  const [missionIdx, setMissionIdx] = React.useState(0);
  const [displayLength, setDisplayLength] = React.useState(80);
  const [accepted, setAccepted] = React.useState(false);
  const [successFact, setSuccessFact] = React.useState('');
  const [complete, setComplete] = React.useState(false);
  const [completedStars, setCompletedStars] = React.useState(3);

  const lengthRef = React.useRef(80);
  const rafLenRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const pendRef = React.useRef({ angle: Math.PI/7, omega: 0.0 });
  const trailRef = React.useRef([]);
  const animRef = React.useRef(null);
  const firstTryRef = React.useRef(true);
  const wrongCountRef = React.useRef(0);

  const mission = L2_MISSIONS[missionIdx];

  React.useEffect(()=>{
    pendRef.current = { angle: Math.PI/7, omega: 0.0 };
    trailRef.current = [];
    firstTryRef.current = true;
  }, [missionIdx]);

  React.useEffect(()=>{
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let alive = true;

    function loop() {
      if (!alive) return;
      const len = lengthRef.current;
      const p = pendRef.current;
      const alpha = -G_PEND/len * Math.sin(p.angle);
      p.omega += alpha; p.omega *= 0.9993; p.angle += p.omega;
      const px = PIVOT_X + Math.sin(p.angle)*len;
      const py = PIVOT_Y + Math.cos(p.angle)*len;
      trailRef.current.push({x:px,y:py});
      if (trailRef.current.length>14) trailRef.current.shift();

      ctx.clearRect(0,0,CW,CH);
      const bg = ctx.createLinearGradient(0,0,0,CH);
      bg.addColorStop(0,'#EDE0FF'); bg.addColorStop(1,'#FFF3E2');
      ctx.fillStyle=bg; ctx.fillRect(0,0,CW,CH);
      // ceiling
      ctx.fillStyle='#7C5FE0'; ctx.fillRect(0,0,CW,10);
      ctx.fillStyle='#B5A1FF'; ctx.fillRect(0,8,CW,4);
      // trail
      trailRef.current.forEach((pt,i)=>{
        ctx.globalAlpha=0.04+i/trailRef.current.length*0.18;
        ctx.beginPath(); ctx.arc(pt.x,pt.y,10,0,Math.PI*2);
        ctx.fillStyle='#B5A1FF'; ctx.fill();
      });
      ctx.globalAlpha=1;
      // pivot
      ctx.beginPath(); ctx.arc(PIVOT_X,PIVOT_Y,6,0,Math.PI*2);
      ctx.fillStyle='#5A3FA0'; ctx.fill();
      ctx.strokeStyle='#9C83FF'; ctx.lineWidth=2; ctx.stroke();
      // string
      ctx.strokeStyle='#9CA3AF'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(PIVOT_X,PIVOT_Y); ctx.lineTo(px,py); ctx.stroke();
      // ball shadow
      ctx.save(); ctx.globalAlpha=0.12;
      ctx.beginPath(); ctx.ellipse(px,CH-18,10,3,0,0,Math.PI*2); ctx.fillStyle='#2D1B45'; ctx.fill();
      ctx.restore();
      // ball
      const bg2 = ctx.createRadialGradient(px-4,py-4,2,px,py,14);
      bg2.addColorStop(0,'#fff'); bg2.addColorStop(0.4,'#B5A1FF'); bg2.addColorStop(1,'#7C5FE0');
      ctx.beginPath(); ctx.arc(px,py,14,0,Math.PI*2); ctx.fillStyle=bg2; ctx.fill();
      ctx.strokeStyle='#5A3FA0'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.beginPath(); ctx.ellipse(px-4,py-4,4,6,-Math.PI/5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.72)'; ctx.fill();
      // period HUD
      const realL = len/100;
      const T = (2*Math.PI*Math.sqrt(realL/9.8)).toFixed(1);
      ctx.fillStyle='rgba(45,27,69,.5)';
      ctx.font='bold 13px "Fredoka One",sans-serif';
      ctx.textAlign='right';
      ctx.fillText('T ≈ '+T+'с', CW-10, 28);
      animRef.current=requestAnimationFrame(loop);
    }
    loop();
    return ()=>{ alive=false; cancelAnimationFrame(animRef.current); };
  }, [missionIdx]);

  function accept() {
    const len=lengthRef.current;
    if (len>=mission.targetMin&&len<=mission.targetMax) {
      setSuccessFact(mission.fact);
      setAccepted(true);
      if (!firstTryRef.current) wrongCountRef.current++;
    } else {
      firstTryRef.current=false;
    }
  }

  function next() {
    setAccepted(false);
    if (missionIdx>=L2_MISSIONS.length-1) {
      const s = wrongCountRef.current===0 ? 3 : wrongCountRef.current<=2 ? 2 : 1;
      setCompletedStars(s);
      setComplete(true);
    } else {
      setMissionIdx(i=>i+1);
    }
  }

  const inRange = displayLength>=mission.targetMin && displayLength<=mission.targetMax;
  const realL = displayLength/100;
  const T = (2*Math.PI*Math.sqrt(realL/9.8)).toFixed(1);

  if (complete) {
    return (
      <div className="ak" style={{minHeight:'100vh',background:'var(--ak-bg)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
        <AKSuccessCard stars={completedStars} title="Маятник освоен!" fact="Ты открыл тайну часов — их ритм задаёт длина маятника, а не масса!" onNext={onDone} ctaLabel="К уровням"/>
      </div>
    );
  }

  return (
    <div className="ak" style={{minHeight:'100vh',background:'var(--ak-bg)',display:'flex',flexDirection:'column',alignItems:'center',padding:'16px 16px 32px'}}>
      <div style={{width:'100%',maxWidth:390}}>
        <AKLessonHeader progress={missionIdx/L2_MISSIONS.length} stars={0} onClose={onDone}/>
        <div style={{fontFamily:'var(--ak-display)',fontSize:19,color:'var(--ak-ink)',textAlign:'center',marginBottom:8}}>{mission.goal}</div>
        <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
          <AKStatChip icon="⏱" value={`${missionIdx+1} / ${L2_MISSIONS.length}`} tone="phys"/>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'6px 14px',borderRadius:999,background:'var(--ak-phys-1)',fontFamily:'var(--ak-display)',fontSize:14,color:'var(--ak-ink)',boxShadow:'0 3px 0 rgba(45,27,69,.06)'}}>
            Период: ~{T} сек
          </div>
        </div>
        {/* Canvas */}
        <div className="ak-clay" style={{padding:10,marginBottom:16,position:'relative',overflow:'hidden',display:'flex',justifyContent:'center'}}>
          <canvas ref={canvasRef} width={CW} height={CH}
            style={{display:'block',width:'100%',maxWidth:CW,borderRadius:14}}/>
          {accepted&&(
            <div className="ak-pop" style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(200,242,221,.9)',borderRadius:16}}>
              <div style={{textAlign:'center',padding:'0 20px'}}>
                <div style={{fontSize:48,marginBottom:6}}>⏱️</div>
                <div style={{fontFamily:'var(--ak-display)',fontSize:22,color:'#2BA873',marginBottom:6}}>{mission.label}!</div>
                <div style={{fontSize:13,color:'var(--ak-ink-2)',marginBottom:16,lineHeight:1.55}}>{successFact}</div>
                <button className="ak-btn ak-btn--ok" onClick={next}>
                  {missionIdx>=L2_MISSIONS.length-1 ? 'Финиш! 🏆' : 'Дальше →'}
                </button>
              </div>
            </div>
          )}
        </div>
        {/* Length slider */}
        <div className="ak-clay" style={{padding:'16px 20px',marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontFamily:'var(--ak-display)',fontSize:15,color:'var(--ak-ink-2)'}}>Длина нити</span>
            <span className="ak-num" style={{fontFamily:'var(--ak-display)',fontSize:26,color:inRange?'#2BA873':'var(--ak-ink)',fontWeight:700,transition:'color .3s'}}>{displayLength}</span>
          </div>
          <div style={{position:'relative',height:18}}>
            <div style={{position:'absolute',inset:0,borderRadius:999,background:'linear-gradient(90deg,#8FCAF0 0%,#B5A1FF 100%)',boxShadow:'inset 0 2px 4px rgba(45,27,69,.18)',pointerEvents:'none'}}/>
            <input type="range" min={30} max={130} defaultValue={80}
              style={{position:'absolute',inset:0,opacity:0,cursor:'pointer',zIndex:2,width:'100%'}}
              onInput={e=>{
                const v=Number(e.target.value);
                lengthRef.current=v;
                if(!rafLenRef.current) rafLenRef.current=requestAnimationFrame(()=>{setDisplayLength(lengthRef.current);rafLenRef.current=null;});
              }}
            />
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:12,color:'var(--ak-ink-3)'}}>
            <span>30 — быстро</span><span>80 — средне</span><span>130 — медленно</span>
          </div>
          {inRange&&(
            <div style={{marginTop:10,padding:'8px 14px',borderRadius:12,background:'var(--ak-ok-1)',color:'var(--ak-ok-3)',fontFamily:'var(--ak-display)',fontSize:13,textAlign:'center'}}>
              ✓ Попал в диапазон {mission.targetMin}–{mission.targetMax}!
            </div>
          )}
        </div>
        <button className="ak-btn ak-btn--cta ak-btn--lg" onClick={accept} disabled={!inRange||accepted} style={{width:'100%'}}>
          {inRange ? 'Принять! ✓' : `Нужно: ${mission.targetMin}–${mission.targetMax}`}
        </button>
        <div style={{textAlign:'center',marginTop:12,fontSize:13,color:'var(--ak-ink-3)'}}>{mission.hint}</div>
      </div>
    </div>
  );
}

/* ============================================================
   LEVEL 3 — FORCES LAB (Лаборатория сил)
   ============================================================ */
function Level3Forces({ onDone }) {
  const [expIdx, setExpIdx] = React.useState(0);
  const [effectPhase, setEffectPhase] = React.useState('idle'); // idle|playing|done
  const [offsetA, setOffsetA] = React.useState({x:0,y:0});
  const [offsetB, setOffsetB] = React.useState({x:0,y:0});
  const [answered, setAnswered] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [complete, setComplete] = React.useState(false);
  const [showFact, setShowFact] = React.useState(false);
  const [showZzz, setShowZzz] = React.useState(false);

  const exp = L3_EXPERIMENTS[expIdx];

  function playEffect() {
    if (effectPhase!=='idle') return;
    setEffectPhase('playing');
    setShowZzz(false);

    const apply = (oA, oB, delay=60) => {
      setTimeout(()=>{ setOffsetA(oA); setOffsetB(oB); }, delay);
    };

    switch(exp.effect) {
      case 'fast_move': apply({x:150,y:0}, {x:-15,y:0}); break;
      case 'rocket_launch': apply({x:0,y:-80}, {x:0,y:48}); break;
      case 'slow_stop':
        apply({x:55,y:0}, {x:0,y:0});
        setTimeout(()=>setOffsetA({x:58,y:0}), 750);
        break;
      case 'stays_still':
        setTimeout(()=>setShowZzz(true), 200);
        break;
      case 'both_fall':
        apply({x:0,y:68}, {x:0,y:68});
        break;
      case 'attract':
        apply({x:0,y:0}, {x:-68,y:0});
        break;
    }
    setTimeout(()=>setEffectPhase('done'), 1400);
  }

  function answer(idx) {
    if (answered!==null) return;
    const correct = idx===exp.answer;
    setAnswered(idx);
    if (correct) setScore(s=>s+1);
    setShowFact(true);
  }

  function next() {
    setAnswered(null); setShowFact(false);
    setEffectPhase('idle'); setOffsetA({x:0,y:0}); setOffsetB({x:0,y:0}); setShowZzz(false);
    if (expIdx>=L3_EXPERIMENTS.length-1) { setComplete(true); }
    else { setExpIdx(i=>i+1); }
  }

  if (complete) {
    const stars = score>=5 ? 3 : score>=4 ? 2 : 1;
    return (
      <div className="ak" style={{minHeight:'100vh',background:'var(--ak-bg)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
        <AKSuccessCard stars={stars} title="Лаборатория пройдена!" fact={`Правильных ответов: ${score} из 6! Законы Ньютона — основа всей механики.`} onNext={onDone} ctaLabel="К уровням"/>
      </div>
    );
  }

  const transStyle = {transition:'transform 0.85s cubic-bezier(.2,.7,.3,1)'};

  return (
    <div className="ak" style={{minHeight:'100vh',background:'var(--ak-bg)',display:'flex',flexDirection:'column',alignItems:'center',padding:'16px 16px 32px'}}>
      <div style={{width:'100%',maxWidth:390}}>
        <AKLessonHeader progress={expIdx/L3_EXPERIMENTS.length} stars={0} onClose={onDone}/>
        <div style={{textAlign:'center',marginBottom:14}}>
          <AKStatChip icon="⚡" value={`${expIdx+1} / ${L3_EXPERIMENTS.length}`} tone="phys"/>
        </div>
        {/* Ingredient cards */}
        <div style={{display:'flex',gap:12,marginBottom:18,justifyContent:'center'}}>
          <div className="ak-clay" style={{flex:1,padding:'20px 10px',display:'flex',flexDirection:'column',alignItems:'center',gap:8,minHeight:120,position:'relative',overflow:'hidden'}}>
            <div style={{fontSize:46,...transStyle,transform:`translate(${offsetA.x}px,${offsetA.y}px)`}}>
              {exp.a.emoji}
            </div>
            <div style={{fontFamily:'var(--ak-display)',fontSize:13,color:'var(--ak-ink-2)',textAlign:'center',lineHeight:1.2}}>{exp.a.label}</div>
            {showZzz&&(
              <div style={{position:'absolute',top:12,right:14,fontSize:22,transition:'opacity .5s',opacity:1}}>💤</div>
            )}
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,flexShrink:0}}>⚡</div>
          <div className="ak-clay" style={{flex:1,padding:'20px 10px',display:'flex',flexDirection:'column',alignItems:'center',gap:8,minHeight:120,overflow:'hidden'}}>
            <div style={{fontSize:46,...transStyle,transform:`translate(${offsetB.x}px,${offsetB.y}px)`}}>
              {exp.b.emoji}
            </div>
            <div style={{fontFamily:'var(--ak-display)',fontSize:13,color:'var(--ak-ink-2)',textAlign:'center',lineHeight:1.2}}>{exp.b.label}</div>
          </div>
        </div>

        {/* Apply button */}
        {effectPhase==='idle'&&(
          <button className="ak-btn ak-btn--cta ak-btn--lg" onClick={playEffect} style={{width:'100%',marginBottom:18}}>
            ПРИМЕНИТЬ СИЛУ! 💪
          </button>
        )}
        {effectPhase==='playing'&&(
          <div style={{textAlign:'center',padding:'16px 0',fontFamily:'var(--ak-display)',fontSize:18,color:'var(--ak-ink-2)',marginBottom:18}}>
            ⏳ Наблюдай что происходит...
          </div>
        )}

        {/* Question */}
        {effectPhase==='done'&&!showFact&&(
          <div className="ak-pop ak-clay" style={{padding:'20px 18px'}}>
            <div style={{fontFamily:'var(--ak-display)',fontSize:17,color:'var(--ak-ink)',marginBottom:14,textAlign:'center',lineHeight:1.3}}>{exp.question}</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {exp.options.map((opt,i)=>{
                const isCorrect = i===exp.answer;
                const isChosen = answered===i;
                let extra = {};
                if (answered!==null) {
                  if (isCorrect) extra={background:'var(--ak-ok-1)',boxShadow:'0 4px 0 var(--ak-ok-3)',color:'#2BA873'};
                  else if (isChosen) extra={background:'var(--ak-warn-1)',boxShadow:'0 4px 0 var(--ak-warn-3)',color:'#D9523F'};
                }
                return (
                  <button key={i} className="ak-btn ak-btn--soft"
                    onClick={()=>answer(i)}
                    style={{width:'100%',textAlign:'left',justifyContent:'flex-start',fontSize:14,padding:'13px 18px',borderRadius:14,...extra}}>
                    <span style={{marginRight:10,fontSize:15}}>
                      {answered===null ? '○' : isCorrect ? '✅' : isChosen ? '❌' : '○'}
                    </span>
                    {opt}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Fact */}
        {showFact&&(
          <div className="ak-pop ak-clay" style={{padding:'22px 20px',textAlign:'center'}}>
            <div style={{fontSize:44,marginBottom:8}}>{answered===exp.answer ? '🎉' : '💡'}</div>
            <div style={{fontFamily:'var(--ak-display)',fontSize:20,marginBottom:8,color:answered===exp.answer?'#2BA873':'#D9523F'}}>
              {answered===exp.answer ? 'Верно!' : 'Не совсем...'}
            </div>
            <div style={{fontSize:14,color:'var(--ak-ink-2)',lineHeight:1.6,marginBottom:20}}>{exp.fact}</div>
            <button className="ak-btn ak-btn--ok" onClick={next} style={{width:'100%'}}>
              {expIdx>=L3_EXPERIMENTS.length-1 ? 'Финиш! 🏆' : 'Дальше →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   LEVEL SELECT
   ============================================================ */
const LEVELS = [
  { n:1, title:'Пушка Галилея', sub:'Угол · Траектория · Попади!', emoji:'💥', desc:'Открой законы баллистики на собственном опыте' },
  { n:2, title:'Маятник-машина', sub:'Длина · Период · Ритм', emoji:'⏱', desc:'Управляй маятником и открой закон Галилея' },
  { n:3, title:'Лаборатория сил', sub:'Наблюдай · Думай · Объясни', emoji:'⚡', desc:'Три закона Ньютона через живые эксперименты' },
];

function LevelCard({ level, locked, done, onStart }) {
  const doneBg = 'linear-gradient(180deg,#7CECB5 0%,#5DD9A0 100%)';
  const physBg = 'linear-gradient(180deg,var(--ak-phys-1) 0%,var(--ak-phys-2) 100%)';
  return (
    <button onClick={locked?undefined:onStart} style={{
        width:'100%',border:'none',padding:0,textAlign:'left',
        cursor:locked?'not-allowed':'pointer',opacity:locked?.55:1,
        borderRadius:28,marginBottom:14,background:'none',display:'block',
      }}>
      <div className="ak-clay ak-tap" style={{
          borderRadius:28,
          boxShadow: done
            ? '0 10px 22px -8px rgba(43,168,115,.28),0 4px 10px -4px rgba(43,168,115,.12),inset 0 2px 0 rgba(255,255,255,.9),inset 0 -3px 0 rgba(43,168,115,.08)'
            : undefined,
          filter:locked?'grayscale(.3)':'none',
        }}>
        <div style={{padding:'20px 20px',display:'flex',gap:16,alignItems:'center'}}>
          <div style={{
              width:62,height:62,borderRadius:20,flexShrink:0,
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:32,
              background: done ? doneBg : physBg,
              boxShadow: done
                ? '0 6px 0 var(--ak-ok-3),inset 0 2px 0 rgba(255,255,255,.6)'
                : '0 6px 0 var(--ak-phys-3),inset 0 2px 0 rgba(255,255,255,.6)',
            }}>
            {locked ? '🔒' : done ? '✅' : level.emoji}
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:'var(--ak-display)',fontSize:18,color:'var(--ak-ink)',marginBottom:2}}>{level.title}</div>
            <div style={{fontSize:11,color:'var(--ak-ink-3)',fontWeight:700,letterSpacing:.7,textTransform:'uppercase',marginBottom:4}}>{level.sub}</div>
            <div style={{fontSize:13,color:'var(--ak-ink-2)',lineHeight:1.4}}>{level.desc}</div>
          </div>
          <div style={{fontSize:22,flexShrink:0,color:'var(--ak-phys-3)'}}>
            {!locked&&!done&&'›'}
            {done&&'🏆'}
          </div>
        </div>
      </div>
    </button>
  );
}

function LevelSelect({ onStart, completed }) {
  return (
    <div className="ak" style={{minHeight:'100vh',background:'var(--ak-bg)',display:'flex',flexDirection:'column',alignItems:'center',padding:'28px 20px 48px'}}>
      <div style={{width:'100%',maxWidth:390}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div className="ak-bob" style={{display:'inline-block',marginBottom:10}}>
            <AKAtom size={72} tone="phys"/>
          </div>
          <div style={{fontFamily:'var(--ak-display)',fontSize:32,color:'var(--ak-ink)',lineHeight:1.1,marginBottom:6}}>Физика</div>
          <div style={{fontSize:15,color:'var(--ak-ink-2)',lineHeight:1.5,marginBottom:16}}>
            Открой законы природы через игровые эксперименты
          </div>
          <div style={{display:'flex',justifyContent:'center',gap:10,flexWrap:'wrap'}}>
            <AKStatChip icon="🎯" value={`${completed.size} / ${LEVELS.length}`} tone="phys"/>
            <AKStatChip icon="⚡" value="Физика" tone="phys"/>
          </div>
        </div>
        {LEVELS.map((lv,i)=>(
          <LevelCard
            key={lv.n}
            level={lv}
            locked={i>0 && !completed.has(i)}
            done={completed.has(lv.n)}
            onStart={()=>onStart(lv.n)}
          />
        ))}
        <div style={{textAlign:'center',marginTop:10,fontSize:13,color:'var(--ak-ink-3)',lineHeight:1.6}}>
          🏫 КосмоБаза · Физика · 6–12 лет<br/>
          Выполни все уровни и стань физиком!
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   APP ROOT
   ============================================================ */
function App() {
  const [screen, setScreen] = React.useState('select');
  const [completed, setCompleted] = React.useState(new Set());

  function done(n) {
    setCompleted(s => new Set([...s, n]));
    setScreen('select');
  }

  if (screen==='select') return <LevelSelect onStart={n=>setScreen('l'+n)} completed={completed}/>;
  if (screen==='l1') return <Level1Cannon onDone={()=>done(1)}/>;
  if (screen==='l2') return <Level2Pendulum onDone={()=>done(2)}/>;
  if (screen==='l3') return <Level3Forces onDone={()=>done(3)}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
