<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>КвантУм — КосмоБаза</title>
<style>
@import url('https://fonts.bunny.net/css?family=fredoka-one:400|nunito:500,700,800');

:root {
  --ak-bg:        #FFF3E2;
  --ak-bg-2:      #FFE8CC;
  --ak-surface:   #FFFDF7;
  --ak-ink:       #2D1B45;
  --ak-ink-2:     #6B5680;
  --ak-ink-3:     #A797B8;
  --ak-line:      rgba(45,27,69,.08);

  --ak-chem-1:    #DCF7E7;
  --ak-chem-2:    #7BD9A8;
  --ak-chem-3:    #3CA876;

  --ak-phys-1:    #E5DCFF;
  --ak-phys-2:    #B5A1FF;
  --ak-phys-3:    #7C5FE0;

  --ak-bio-1:     #FFE0CB;
  --ak-bio-2:     #FFA17A;
  --ak-bio-3:     #D96D49;

  --ak-geo-1:     #D6ECFA;
  --ak-geo-2:     #8FCAF0;
  --ak-geo-3:     #4A93C9;

  --ak-cta-1:     #FFEDA8;
  --ak-cta-2:     #FFD262;
  --ak-cta-3:     #D4A22B;

  --ak-ok-1:      #C8F2DD;
  --ak-ok-2:      #5DD9A0;
  --ak-ok-3:      #2BA873;

  --ak-warn-1:    #FFD2C8;
  --ak-warn-2:    #FF8B7A;
  --ak-warn-3:    #D9523F;

  --ak-star-1:    #FFE49E;
  --ak-star-2:    #FFC857;
  --ak-star-3:    #D4972B;

  --ak-r-sm:  10px;
  --ak-r-md:  18px;
  --ak-r-lg:  28px;
  --ak-r-xl:  36px;

  --ak-display: 'Fredoka One', 'Nunito', system-ui, sans-serif;
  --ak-body:    'Nunito', system-ui, sans-serif;
}

html, body { background: #FFF3E2; margin: 0; }
#root { min-height: 100vh; }

body { margin: 0; font-family: var(--ak-body); color: var(--ak-ink); }

.ak {
  font-family: var(--ak-body);
  color: var(--ak-ink);
  -webkit-font-smoothing: antialiased;
}

.ak-clay {
  background: var(--ak-surface);
  border-radius: var(--ak-r-lg);
  box-shadow:
    0 10px 22px -8px rgba(45,27,69,.22),
    0 4px 10px -4px rgba(45,27,69,.10),
    inset 0 2px 0 rgba(255,255,255,.9),
    inset 0 -3px 0 rgba(45,27,69,.06);
}

.ak-clay--inset {
  background: linear-gradient(180deg, rgba(45,27,69,.04), rgba(45,27,69,0) 40%);
  box-shadow:
    inset 0 3px 6px rgba(45,27,69,.10),
    inset 0 1px 0 rgba(45,27,69,.05),
    0 1px 0 rgba(255,255,255,.7);
  border-radius: var(--ak-r-lg);
}

.ak-btn {
  font-family: var(--ak-display);
  font-weight: 600;
  font-size: 17px;
  letter-spacing: 0.1px;
  border: none;
  cursor: pointer;
  position: relative;
  transition: transform .08s ease, box-shadow .08s ease, filter .15s ease;
  user-select: none;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  line-height: 1;
  padding: 16px 26px;
  border-radius: 999px;
  color: var(--ak-ink);
}
.ak-btn:disabled { cursor: not-allowed; filter: grayscale(.25) opacity(.6); }

.ak-btn--cta {
  color: var(--ak-ink);
  background: linear-gradient(180deg, #FFEDA8 0%, #FFD262 55%, #FFC03A 100%);
  box-shadow:
    0 6px 0 var(--ak-cta-3),
    0 12px 24px -6px rgba(212,162,43,.55),
    inset 0 2px 0 rgba(255,255,255,.85),
    inset 0 -2px 0 rgba(212,162,43,.25);
}
.ak-btn--cta:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--ak-cta-3), 0 6px 14px -6px rgba(212,162,43,.45), inset 0 2px 0 rgba(255,255,255,.7); }

.ak-btn--ok {
  color: #fff;
  background: linear-gradient(180deg, #7CECB5 0%, #5DD9A0 55%, #3FC685 100%);
  box-shadow:
    0 6px 0 var(--ak-ok-3),
    0 12px 24px -6px rgba(43,168,115,.5),
    inset 0 2px 0 rgba(255,255,255,.55),
    inset 0 -2px 0 rgba(43,168,115,.25);
  text-shadow: 0 1px 0 rgba(43,168,115,.4);
}
.ak-btn--ok:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--ak-ok-3), 0 6px 14px -6px rgba(43,168,115,.4), inset 0 2px 0 rgba(255,255,255,.4); }

.ak-btn--phys {
  color: #fff;
  background: linear-gradient(180deg, #C4B5FF 0%, #B5A1FF 55%, #9881F0 100%);
  box-shadow:
    0 6px 0 var(--ak-phys-3),
    0 12px 24px -6px rgba(124,95,224,.5),
    inset 0 2px 0 rgba(255,255,255,.55),
    inset 0 -2px 0 rgba(124,95,224,.25);
  text-shadow: 0 1px 0 rgba(124,95,224,.4);
}
.ak-btn--phys:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--ak-phys-3), 0 6px 14px -6px rgba(124,95,224,.4), inset 0 2px 0 rgba(255,255,255,.4); }

.ak-btn--warn {
  color: #fff;
  background: linear-gradient(180deg, #FF9F8F 0%, #FF8B7A 55%, #E06A5A 100%);
  box-shadow:
    0 6px 0 var(--ak-warn-3),
    0 12px 24px -6px rgba(217,82,63,.5),
    inset 0 2px 0 rgba(255,255,255,.55),
    inset 0 -2px 0 rgba(217,82,63,.25);
  text-shadow: 0 1px 0 rgba(217,82,63,.4);
}
.ak-btn--warn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--ak-warn-3), inset 0 2px 0 rgba(255,255,255,.4); }

.ak-btn--soft {
  color: var(--ak-ink);
  background: linear-gradient(180deg, #FFFFFF 0%, #FFF7E8 100%);
  box-shadow:
    0 4px 0 rgba(45,27,69,.10),
    0 8px 18px -6px rgba(45,27,69,.12),
    inset 0 2px 0 rgba(255,255,255,.95),
    inset 0 -2px 0 rgba(45,27,69,.05),
    inset 0 0 0 1px rgba(45,27,69,.06);
}
.ak-btn--soft:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(45,27,69,.10), inset 0 2px 0 rgba(255,255,255,.95), inset 0 0 0 1px rgba(45,27,69,.06); }

.ak-btn--sm { padding: 11px 18px; font-size: 14px; }
.ak-btn--lg { padding: 20px 32px; font-size: 19px; }
.ak-btn--icon { width: 56px; height: 56px; padding: 0; border-radius: 50%; }
.ak-btn--icon.ak-btn--sm { width: 42px; height: 42px; }

.ak-chip {
  font-family: var(--ak-display);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: .2px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 13px 7px 11px;
  border-radius: 999px;
  background: rgba(255,255,255,.85);
  color: var(--ak-ink);
  box-shadow:
    0 2px 0 rgba(45,27,69,.06),
    0 6px 14px -4px rgba(45,27,69,.08),
    inset 0 1px 0 rgba(255,255,255,.9);
}

@keyframes ak-bob { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-4px) rotate(1deg); } }
@keyframes ak-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
@keyframes ak-shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-7px) rotate(-1deg); } 40% { transform: translateX(7px) rotate(1deg); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
@keyframes ak-pop { 0% { transform: scale(.7); opacity: 0; } 60% { transform: scale(1.06); opacity: 1; } 100% { transform: scale(1); } }
@keyframes ak-pour { 0% { transform: scaleY(0); opacity: 0; } 100% { transform: scaleY(1); opacity: 1; } }
@keyframes ak-spin { to { transform: rotate(360deg); } }
@keyframes ak-twinkle { 0%,100% { opacity: .35; transform: scale(.85); } 50% { opacity: 1; transform: scale(1.05); } }
@keyframes ak-slot-pop { 0% { transform: translate(-50%,-50%) scale(0.5); opacity:0; } 60% { transform: translate(-50%,-50%) scale(1.15); } 100% { transform: translate(-50%,-50%) scale(1); opacity:1; } }

.ak-bob { animation: ak-bob 3.2s ease-in-out infinite; }
.ak-pulse { animation: ak-pulse 2.4s ease-in-out infinite; }
.ak-shake { animation: ak-shake .45s ease-in-out; }
.ak-pop { animation: ak-pop .42s cubic-bezier(.2,.7,.3,1) forwards; }
.ak-pour { transform-origin: bottom; animation: ak-pour .55s cubic-bezier(.2,.7,.3,1) forwards; }
.ak-spin { animation: ak-spin 30s linear infinite; }
.ak-twinkle { animation: ak-twinkle 2.4s ease-in-out infinite; }

.ak-num { font-variant-numeric: tabular-nums; font-family: var(--ak-display); }

.ak-tap {
  cursor: pointer;
  transition: transform .12s cubic-bezier(.2,.7,.3,1), filter .12s;
}
.ak-tap:hover { transform: translateY(-3px); filter: brightness(1.03); }
.ak-tap:active { transform: translateY(0); }

.ak-subject {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px 8px 8px;
  border-radius: 999px;
  font-family: var(--ak-display);
  font-weight: 600;
  font-size: 13px;
  color: var(--ak-ink);
  background: #fff;
  box-shadow:
    0 4px 12px -4px rgba(45,27,69,.15),
    inset 0 1px 0 rgba(255,255,255,1);
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script type="text/babel">

/* ===== AK_TONES ===== */
const AK_TONES = {
  chem: ['#DCF7E7', '#7BD9A8', '#3CA876'],
  phys: ['#E5DCFF', '#B5A1FF', '#7C5FE0'],
  bio:  ['#FFE0CB', '#FFA17A', '#D96D49'],
  geo:  ['#D6ECFA', '#8FCAF0', '#4A93C9'],
  ok:   ['#C8F2DD', '#5DD9A0', '#2BA873'],
  cta:  ['#FFEDA8', '#FFD262', '#D4A22B'],
  star: ['#FFE49E', '#FFC857', '#D4972B'],
  warn: ['#FFD2C8', '#FF8B7A', '#D9523F'],
  ink:  ['#E5DCEE', '#6B5680', '#2D1B45'],
};

/* ===== AKAtom ===== */
function AKAtom({ size = 120, tone = 'phys' }) {
  const [l, m, d] = AK_TONES[tone];
  const id = React.useId().replace(/:/g, '');
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" style={{ display: 'block' }}>
      <defs>
        <radialGradient id={`nuc-${id}`} cx="40%" cy="35%" r="65%">
          <stop offset="0%" stopColor="#fff" />
          <stop offset="40%" stopColor={l} />
          <stop offset="100%" stopColor={d} />
        </radialGradient>
        <radialGradient id={`elec-${id}`} cx="35%" cy="30%" r="70%">
          <stop offset="0%" stopColor="#fff" />
          <stop offset="60%" stopColor={m} />
          <stop offset="100%" stopColor={d} />
        </radialGradient>
      </defs>
      <ellipse cx="60" cy="112" rx="30" ry="3.5" fill="rgba(45,27,69,.18)" />
      <g fill="none" stroke={d} strokeWidth="3" opacity=".55" strokeLinecap="round">
        <ellipse cx="60" cy="60" rx="44" ry="16" />
        <ellipse cx="60" cy="60" rx="44" ry="16" transform="rotate(60 60 60)" />
        <ellipse cx="60" cy="60" rx="44" ry="16" transform="rotate(-60 60 60)" />
      </g>
      <g fill="none" stroke="#fff" strokeWidth="1.5" opacity=".7" strokeLinecap="round">
        <path d="M24 56 Q34 50 50 50" />
        <path d="M30 38 Q44 38 58 44" transform="rotate(-60 60 60)" />
      </g>
      <circle cx="98" cy="50" r="7" fill={`url(#elec-${id})`} stroke={d} strokeWidth="1.5" />
      <circle cx="96" cy="48" r="2.4" fill="#fff" opacity=".8" />
      <circle cx="24" cy="78" r="6" fill={`url(#elec-${id})`} stroke={d} strokeWidth="1.5" />
      <circle cx="22" cy="76" r="2" fill="#fff" opacity=".8" />
      <circle cx="76" cy="28" r="5" fill={`url(#elec-${id})`} stroke={d} strokeWidth="1.5" />
      <circle cx="60" cy="60" r="18" fill={`url(#nuc-${id})`} stroke={d} strokeWidth="2" />
      <ellipse cx="55" cy="53" rx="6" ry="3.5" fill="#fff" opacity=".7" />
    </svg>
  );
}

/* ===== AKBlob ===== */
function AKBlob({ size = 80, kind = 'sphere', tone = 'cta' }) {
  const [l, m, d] = AK_TONES[tone];
  const id = React.useId().replace(/:/g, '');
  const grad = (
    <defs>
      <radialGradient id={`g-${id}`} cx="40%" cy="32%" r="75%">
        <stop offset="0%" stopColor="#fff" />
        <stop offset="28%" stopColor={l} />
        <stop offset="100%" stopColor={d} />
      </radialGradient>
    </defs>
  );
  const shadow = <ellipse cx="40" cy="74" rx="22" ry="3" fill="rgba(45,27,69,.2)" />;
  const shine  = <ellipse cx="30" cy="26" rx="6" ry="10" fill="#fff" opacity=".6" transform="rotate(-20 30 26)" />;
  let shape;
  switch (kind) {
    case 'sphere':
      shape = <circle cx="40" cy="40" r="28" fill={`url(#g-${id})`} stroke={d} strokeWidth="2" />;
      break;
    case 'gear':
      shape = (
        <g>
          <g fill={`url(#g-${id})`} stroke={d} strokeWidth="2" strokeLinejoin="round">
            {[0,45,90,135,180,225,270,315].map(a => (
              <rect key={a} x="34" y="6" width="12" height="14" rx="3" transform={`rotate(${a} 40 40)`} />
            ))}
            <circle cx="40" cy="40" r="22" />
          </g>
          <circle cx="40" cy="40" r="8" fill={d} />
        </g>
      );
      break;
    default:
      shape = <circle cx="40" cy="40" r="28" fill={`url(#g-${id})`} stroke={d} strokeWidth="2" />;
  }
  return (
    <svg width={size} height={size} viewBox="0 0 80 80" style={{ display: 'block' }}>
      {grad}
      {shadow}
      {shape}
      {kind !== 'gear' && shine}
    </svg>
  );
}

/* ===== AKStar ===== */
function AKStar({ size = 56, filled = true }) {
  const id = React.useId().replace(/:/g, '');
  return (
    <svg width={size} height={size} viewBox="0 0 56 56">
      <defs>
        <radialGradient id={`star-${id}`} cx="40%" cy="32%" r="70%">
          <stop offset="0%" stopColor="#fff" />
          <stop offset="35%" stopColor="#FFE49E" />
          <stop offset="100%" stopColor="#D4972B" />
        </radialGradient>
      </defs>
      <ellipse cx="28" cy="52" rx="14" ry="2.5" fill="rgba(45,27,69,.18)" />
      <path
        d="M28 5 L34.5 19 L50 21 L38.5 31.5 L42 47 L28 39.5 L14 47 L17.5 31.5 L6 21 L21.5 19 Z"
        fill={filled ? `url(#star-${id})` : '#E8DCEE'}
        stroke={filled ? '#C99B3B' : '#B0A0C2'}
        strokeWidth="2.2"
        strokeLinejoin="round"
      />
      {filled && (
        <>
          <ellipse cx="20" cy="18" rx="3.5" ry="5" fill="#fff" opacity=".7" transform="rotate(-30 20 18)" />
          <circle cx="36" cy="14" r="1.6" fill="#fff" opacity=".7" />
        </>
      )}
    </svg>
  );
}

/* ===== AKPlanet ===== */
function AKPlanet({ size = 80, tone = 'phys', ring = true }) {
  const [l, m, d] = AK_TONES[tone];
  const id = React.useId().replace(/:/g, '');
  return (
    <svg width={size} height={size * 0.78} viewBox="0 0 100 78">
      <defs>
        <radialGradient id={`pl-${id}`} cx="38%" cy="32%" r="70%">
          <stop offset="0%" stopColor="#fff" />
          <stop offset="30%" stopColor={l} />
          <stop offset="100%" stopColor={d} />
        </radialGradient>
      </defs>
      {ring && <ellipse cx="50" cy="40" rx="48" ry="11" fill="none" stroke={d} strokeWidth="3" opacity=".4" />}
      <circle cx="50" cy="38" r="26" fill={`url(#pl-${id})`} stroke={d} strokeWidth="2" />
      <ellipse cx="42" cy="28" rx="6" ry="9" fill="#fff" opacity=".55" transform="rotate(-22 42 28)" />
      {ring && <path d="M 16 47 Q 50 60 84 47" fill="none" stroke={d} strokeWidth="3" opacity=".7" strokeLinecap="round" />}
    </svg>
  );
}

/* ===== AKProgress ===== */
function AKProgress({ value = 0.5, tone = 'cta', height = 18, label }) {
  const [l, m, d] = AK_TONES[tone];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      {label && (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <span style={{ fontFamily: 'var(--ak-display)', fontWeight: 600, fontSize: 13, color: 'var(--ak-ink-2)' }}>{label}</span>
          <span className="ak-num" style={{ fontWeight: 700, fontSize: 14, color: 'var(--ak-ink)' }}>{Math.round(value * 100)}%</span>
        </div>
      )}
      <div style={{
        height, borderRadius: 999,
        background: 'rgba(45,27,69,.08)',
        boxShadow: 'inset 0 2px 4px rgba(45,27,69,.18), inset 0 -1px 0 rgba(255,255,255,.6)',
        overflow: 'hidden', position: 'relative',
      }}>
        <div style={{
          width: `${Math.max(0, Math.min(1, value)) * 100}%`,
          height: '100%',
          background: `linear-gradient(180deg, ${l} 0%, ${m} 50%, ${d} 100%)`,
          boxShadow: `inset 0 2px 0 rgba(255,255,255,.55), inset 0 -2px 0 ${d}`,
          borderRadius: 999,
          transition: 'width .4s cubic-bezier(.2,.7,.3,1)',
          position: 'relative',
        }}>
          <div style={{
            position: 'absolute', top: 3, left: 8, right: 8, height: 3,
            background: 'rgba(255,255,255,.55)', borderRadius: 999,
          }} />
        </div>
      </div>
    </div>
  );
}

/* ===== AKStatChip ===== */
function AKStatChip({ icon, value, tone = 'cta' }) {
  const [l, m, d] = AK_TONES[tone];
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 8,
      padding: '6px 14px 6px 6px', borderRadius: 999, background: '#fff',
      boxShadow: '0 3px 0 rgba(45,27,69,.08), 0 6px 14px -4px rgba(45,27,69,.12), inset 0 1px 0 rgba(255,255,255,1)',
      fontFamily: 'var(--ak-display)', fontWeight: 700, fontSize: 15, color: 'var(--ak-ink)',
    }}>
      <div style={{
        width: 28, height: 28, borderRadius: '50%',
        background: `radial-gradient(circle at 35% 30%, #fff, ${l} 25%, ${m} 75%, ${d} 100%)`,
        boxShadow: `inset 0 -2px 0 ${d}`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: '#fff', fontSize: 14,
      }}>{icon}</div>
      <span className="ak-num">{value}</span>
    </div>
  );
}

/* ===== AKTaskBadge ===== */
function AKTaskBadge({ children, tone = 'phys' }) {
  const [l, m, d] = AK_TONES[tone];
  return (
    <div className="ak-pulse" style={{
      display: 'inline-flex', alignItems: 'center', gap: 10,
      padding: '12px 20px 12px 14px', borderRadius: 999, background: '#fff',
      boxShadow: '0 4px 0 rgba(45,27,69,.08), 0 10px 22px -6px rgba(45,27,69,.14), inset 0 1px 0 rgba(255,255,255,1)',
      fontFamily: 'var(--ak-display)', fontWeight: 600, fontSize: 14.5, color: 'var(--ak-ink)',
    }}>
      <div style={{
        width: 10, height: 10, borderRadius: '50%',
        background: m, boxShadow: `0 0 0 4px ${m}33, inset 0 -1px 0 ${d}`,
      }} />
      <span>{children}</span>
    </div>
  );
}

/* ===== AKSuccessCard ===== */
function AKSuccessCard({ stars = 3, title = 'Отлично!', fact, onNext, ctaLabel = 'Дальше' }) {
  return (
    <div className="ak-pop" style={{
      width: 320, background: '#fff', borderRadius: 32,
      padding: '28px 24px 24px', textAlign: 'center',
      boxShadow: `0 12px 0 rgba(43,168,115,.18), 0 24px 48px -12px rgba(45,27,69,.25), inset 0 2px 0 rgba(255,255,255,1), inset 0 -3px 0 rgba(45,27,69,.05)`,
      fontFamily: 'var(--ak-body)', position: 'relative',
    }}>
      <div aria-hidden style={{ position: 'absolute', top: -10, left: -10, right: -10, height: 30, pointerEvents: 'none' }}>
        {[{l:8,c:'#FFC857',s:8},{l:60,c:'#5DD9A0',s:6},{l:120,c:'#B5A1FF',s:7},{l:200,c:'#FFA17A',s:6},{l:260,c:'#8FCAF0',s:8},{l:310,c:'#FFC857',s:6}].map((p,i) => (
          <div key={i} className="ak-twinkle" style={{
            position:'absolute', left:p.l, top:4+(i%2)*8,
            width:p.s, height:p.s, borderRadius:2,
            background:p.c, transform:`rotate(${i*25}deg)`,
            animationDelay:`${i*0.15}s`,
          }}/>
        ))}
      </div>
      <div style={{ display:'flex', justifyContent:'center', gap:8, marginBottom:14, marginTop:8 }}>
        {[0,1,2].map(i => (
          <div key={i} style={{ transform:`translateY(${i===1?-6:0}px) rotate(${(i-1)*12}deg)` }}>
            <AKStar size={i===1?70:56} filled={i<stars}/>
          </div>
        ))}
      </div>
      <div style={{ fontFamily:'var(--ak-display)', fontWeight:700, fontSize:26, letterSpacing:-.4, color:'var(--ak-ink)', marginBottom:8 }}>{title}</div>
      {fact && <div style={{ fontSize:14, lineHeight:1.5, color:'var(--ak-ink-2)', marginBottom:20, fontWeight:500 }}>{fact}</div>}
      {onNext && <button className="ak-btn ak-btn--ok" style={{ width:'100%' }} onClick={onNext}>{ctaLabel}</button>}
    </div>
  );
}

/* ===== AKLessonHeader ===== */

/* =========================================================
   LEVEL 1 — ЧТО УПАДЁТ БЫСТРЕЕ?
   ========================================================= */
const L1_TASKS = [
  {left:{e:'🪨',label:'Камень',mass:10}, right:{e:'🪶',label:'Перо',mass:.01}, answer:'same', fact:'Галилей: в вакууме всё падает одинаково! В воздухе перо тормозит из-за сопротивления.'},
  {left:{e:'⚽',label:'Мяч',mass:.4},    right:{e:'🎈',label:'Шарик',mass:.003}, answer:'left', fact:'Воздушный шарик очень лёгкий — воздух сильно тормозит его полёт.'},
  {left:{e:'🍎',label:'Яблоко',mass:.18},right:{e:'📚',label:'Книга',mass:.5},  answer:'same', fact:'Галилей бросал шары с Пизанской башни — они падали вместе!'},
  {left:{e:'🔨',label:'Молоток',mass:.5},right:{e:'🏓',label:'Мячик',mass:.03}, answer:'left', fact:'Молоток компактный — меньше площадь и меньше сопротивление воздуха.'},
  {left:{e:'🪨',label:'Камень 1кг',mass:1},right:{e:'🪨',label:'Камень 2кг',mass:2}, answer:'same', fact:'Масса не важна! Земля сильнее тянет тяжёлый, но и двигать его тяжелее — итог одинаковый.'},
];

function Level1Falling({ onDone }) {
  const [taskIdx, setTaskIdx] = React.useState(0);
  const [falling, setFalling] = React.useState(false);
  const [chosen, setChosen] = React.useState(null);
  const [correct, setCorrect] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [showFact, setShowFact] = React.useState(false);
  const [finished, setFinished] = React.useState(false);
  const [leftFall, setLeftFall] = React.useState(false);
  const [rightFall, setRightFall] = React.useState(false);
  const [shakeBtn, setShakeBtn] = React.useState(null);

  const task = L1_TASKS[taskIdx];

  const choose = (side) => {
    if (falling) return;
    setChosen(side);
    const isCorrect = side === task.answer;
    setCorrect(isCorrect);
    if (isCorrect) setScore(s => s + 1);
    else setShakeBtn(side);

    setFalling(true);

    if (task.answer === 'left') {
      setLeftFall(true);
      setTimeout(() => setRightFall(true), 300);
    } else if (task.answer === 'right') {
      setRightFall(true);
      setTimeout(() => setLeftFall(true), 300);
    } else {
      setLeftFall(true);
      setRightFall(true);
    }

    setTimeout(() => {
      setShowFact(true);
      setShakeBtn(null);
    }, 1600);
  };

  const next = () => {
    if (taskIdx >= L1_TASKS.length - 1) {
      setFinished(true);
    } else {
      setTaskIdx(i => i + 1);
      setFalling(false); setChosen(null); setCorrect(null);
      setShowFact(false); setLeftFall(false); setRightFall(false);
    }
  };

  if (finished) {
    return (
      <div className="ak" style={{ minHeight:'100vh', background:'linear-gradient(180deg,#BAE6FD,#E0F2FE)', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
        <AKSuccessCard
          stars={score >= 4 ? 3 : score >= 2 ? 2 : 1}
          title={score === 5 ? 'Гениально! 🎉' : score >= 3 ? 'Молодец!' : 'Попробуй ещё!'}
          fact={`Ты ответил правильно ${score} из ${L1_TASKS.length}! ${score === 5 ? 'Галилей гордился бы тобой!' : 'Повтори тему гравитации.'}`}
          onNext={onDone}
          ctaLabel="В меню уровней"
        />
      </div>
    );
  }

  return (
    <div className="ak" style={{ minHeight:'100vh', display:'flex', flexDirection:'column', background:'linear-gradient(180deg,#BAE6FD 0%,#E0F2FE 70%)', position:'relative', overflow:'hidden' }}>
      <div style={{ padding:'16px 16px 0', flexShrink:0 }}>
        <AKLessonHeader progress={taskIdx/L1_TASKS.length} stars={score*50} onClose={onDone}/>
      </div>

      <div style={{ textAlign:'center', padding:'16px 16px 0' }}>
        <AKTaskBadge tone="phys">Что упадёт первым?</AKTaskBadge>
      </div>

      <div style={{ display:'flex', justifyContent:'center', gap:8, padding:'12px 0 0' }}>
        {L1_TASKS.map((_, i) => (
          <div key={i} style={{
            width: i===taskIdx ? 24 : 10, height:10, borderRadius:999,
            background: i<taskIdx ? '#7C5FE0' : i===taskIdx ? '#B5A1FF' : 'rgba(45,27,69,.15)',
            transition:'all .3s',
          }}/>
        ))}
      </div>

      <div style={{ flex:1, position:'relative', minHeight:300, overflow:'hidden' }}>
        <div style={{ position:'absolute', top:10, left:'8%', opacity:.6, fontSize:32, pointerEvents:'none' }}>☁️</div>
        <div style={{ position:'absolute', top:25, right:'12%', opacity:.45, fontSize:24, pointerEvents:'none' }}>☁️</div>
        <div style={{ position:'absolute', top:8, left:'45%', opacity:.35, fontSize:20, pointerEvents:'none' }}>☁️</div>

        {/* Left object */}
        <div style={{
          position:'absolute',
          left:'18%',
          top: leftFall ? 'calc(100% - 110px)' : 50,
          fontSize:52,
          textAlign:'center',
          transition: leftFall ? 'top 1.4s cubic-bezier(.3,0,.8,1)' : 'none',
          userSelect:'none',
        }}>
          {task.left.e}
          <div style={{ fontSize:11, fontFamily:'var(--ak-display)', color:'rgba(45,27,69,.7)', marginTop:2 }}>{task.left.label}</div>
        </div>

        {/* Right object */}
        <div style={{
          position:'absolute',
          right:'18%',
          top: rightFall ? 'calc(100% - 110px)' : 50,
          fontSize:52,
          textAlign:'center',
          transition: rightFall ? 'top 1.4s cubic-bezier(.3,0,.8,1)' : 'none',
          userSelect:'none',
        }}>
          {task.right.e}
          <div style={{ fontSize:11, fontFamily:'var(--ak-display)', color:'rgba(45,27,69,.7)', marginTop:2 }}>{task.right.label}</div>
        </div>

        {!falling && (
          <div style={{
            position:'absolute', top:65, left:'50%', transform:'translateX(-50%)',
            fontFamily:'var(--ak-display)', fontWeight:700, fontSize:20, color:'rgba(45,27,69,.45)',
          }}>VS</div>
        )}

        {/* Grass */}
        <div style={{
          position:'absolute', bottom:0, left:0, right:0, height:70,
          background:'linear-gradient(180deg,#86EFAC,#4ADE80)',
          borderRadius:'50% 50% 0 0 / 20% 20% 0 0',
        }}>
          <div style={{ textAlign:'center', paddingTop:18, fontSize:24, pointerEvents:'none' }}>🌱🌿🌱</div>
        </div>
      </div>

      {showFact && (
        <div style={{
          position:'absolute', inset:0, background:'rgba(45,27,69,.55)', backdropFilter:'blur(4px)',
          display:'flex', alignItems:'center', justifyContent:'center', padding:24, zIndex:10,
        }}>
          <div style={{
            background:'#fff', borderRadius:28, padding:'28px 24px', maxWidth:340, textAlign:'center',
            boxShadow:'0 12px 40px rgba(45,27,69,.3)', animation:'ak-pop .4s cubic-bezier(.2,.7,.3,1) forwards',
          }}>
            <div style={{ fontSize:48, marginBottom:12 }}>{correct ? '✅' : '❌'}</div>
            <div style={{ fontFamily:'var(--ak-display)', fontSize:20, fontWeight:700, color:'var(--ak-ink)', marginBottom:8 }}>
              {correct ? 'Правильно!' : 'Не совсем!'}
            </div>
            <div style={{ fontSize:14, color:'var(--ak-ink-2)', lineHeight:1.6, marginBottom:20 }}>
              🔬 {task.fact}
            </div>
            <button className="ak-btn ak-btn--phys" style={{ width:'100%' }} onClick={next}>
              {taskIdx >= L1_TASKS.length - 1 ? 'Результаты 🎉' : 'Следующий →'}
            </button>
          </div>
        </div>
      )}

      {!falling && (
        <div style={{ padding:'0 12px 28px', display:'flex', gap:8, flexShrink:0 }}>
          <button
            className={`ak-btn ak-btn--phys ak-btn--sm${shakeBtn==='left' ? ' ak-shake':''}`}
            style={{ flex:1, fontSize:13 }}
            onClick={() => choose('left')}
            disabled={!!chosen}
          >← {task.left.label}</button>
          <button
            className="ak-btn ak-btn--soft ak-btn--sm"
            style={{ flex:1, fontSize:13 }}
            onClick={() => choose('same')}
            disabled={!!chosen}
          >🤝 Вместе!</button>
          <button
            className={`ak-btn ak-btn--phys ak-btn--sm${shakeBtn==='right' ? ' ak-shake':''}`}
            style={{ flex:1, fontSize:13 }}
            onClick={() => choose('right')}
            disabled={!!chosen}
          >{task.right.label} →</button>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   LEVEL 2 — МАШИНА ГОЛДБЕРГА
   ========================================================= */
const L2_ELEMENTS = [
  {id:'ramp',   emoji:'📐', label:'Горка',     color:'#FFA17A', colorD:'#D96D49'},
  {id:'spring', emoji:'🌀', label:'Пружина',   color:'#B5A1FF', colorD:'#7C5FE0'},
  {id:'bounce', emoji:'🎯', label:'Отбойник',  color:'#7BD9A8', colorD:'#3CA876'},
  {id:'fan',    emoji:'💨', label:'Вентилятор',color:'#8FCAF0', colorD:'#4A93C9'},
];

const L2_SCENARIOS = [
  {
    goal:'Помоги ⚽ добраться до ⭐',
    hint:'Используй горку и отбойник!',
    solution:['ramp','bounce'],
    fact:'Горка превращает падение в движение вперёд! Закон Ньютона в действии.',
  },
  {
    goal:'Ускорь ⚽ с помощью ветра',
    hint:'Вентилятор + горка = скорость!',
    solution:['fan','ramp'],
    fact:'Сила + наклон = ускорение. Это второй закон Ньютона: F = ma!',
  },
  {
    goal:'Подпрыгни к ⭐ с пружиной',
    hint:'Пружина + отбойник = прыжок!',
    solution:['spring','bounce'],
    fact:'Пружина накапливает энергию и отдаёт её одним мощным толчком!',
  },
];

function Level2Goldberg({ onDone }) {
  const [scenarioIdx, setScenarioIdx] = React.useState(0);
  const [slotA, setSlotA] = React.useState(null);
  const [slotB, setSlotB] = React.useState(null);
  const [selected, setSelected] = React.useState(null);
  const [launched, setLaunched] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [finished, setFinished] = React.useState(false);
  const [ballPct, setBallPct] = React.useState(5);
  const [ballTopPct, setBallTopPct] = React.useState(50);
  const [ballVisible, setBallVisible] = React.useState(true);
  const [shake, setShake] = React.useState(false);
  const rafRef = React.useRef(null);

  const sc = L2_SCENARIOS[scenarioIdx];

  const getEl = (id) => L2_ELEMENTS.find(e => e.id === id);

  const selectEl = (id) => {
    if (launched) return;
    setSelected(id === selected ? null : id);
  };

  const fillSlot = (slot) => {
    if (!selected || launched) return;
    if (slot === 'A') setSlotA(selected);
    else setSlotB(selected);
    setSelected(null);
  };

  const launch = () => {
    if (!slotA || !slotB || launched) return;
    setLaunched(true);
    const correct = sc.solution.includes(slotA) && sc.solution.includes(slotB);
    setBallPct(5); setBallTopPct(50); setBallVisible(true);

    let frame = 0;
    const tick = () => {
      frame++;
      if (correct) {
        setBallPct(p => Math.min(p + 2.8, 88));
        setBallTopPct(50 + Math.sin(frame * 0.28) * 10);
        if (frame > 30) {
          setResult('ok');
          setScore(s => s + 1);
          return;
        }
      } else {
        if (frame < 16) {
          setBallPct(p => p + 2);
          setBallTopPct(p => p + 1.5);
        } else {
          setBallTopPct(p => p + 5);
          if (frame % 2 === 0) setBallVisible(v => !v);
          if (frame > 24) {
            setBallVisible(false);
            setResult('fail');
            setShake(true);
            setTimeout(() => setShake(false), 500);
            return;
          }
        }
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
  };

  React.useEffect(() => () => rafRef.current && cancelAnimationFrame(rafRef.current), []);

  const retry = () => {
    setSlotA(null); setSlotB(null); setSelected(null);
    setLaunched(false); setResult(null);
    setBallPct(5); setBallTopPct(50); setBallVisible(true);
  };

  const nextScenario = () => {
    if (scenarioIdx >= L2_SCENARIOS.length - 1) { setFinished(true); return; }
    setScenarioIdx(i => i + 1);
    setSlotA(null); setSlotB(null); setSelected(null);
    setLaunched(false); setResult(null);
    setBallPct(5); setBallTopPct(50); setBallVisible(true);
  };

  if (finished) {
    return (
      <div className="ak" style={{ minHeight:'100vh', background:'linear-gradient(180deg,#E5DCFF,#FFF3E2)', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
        <AKSuccessCard
          stars={score >= 3 ? 3 : score >= 2 ? 2 : 1}
          title="Инженер!"
          fact={`Ты собрал ${score} из ${L2_SCENARIOS.length} машин Голдберга. Настоящий физик!`}
          onNext={onDone}
          ctaLabel="В меню уровней"
        />
      </div>
    );
  }

  return (
    <div className="ak" style={{ minHeight:'100vh', background:'linear-gradient(180deg,#E5DCFF 0%,#FFF3E2 100%)', display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'16px 16px 0', flexShrink:0 }}>
        <AKLessonHeader progress={scenarioIdx/L2_SCENARIOS.length} stars={score*80} onClose={onDone}/>
      </div>

      <div style={{ textAlign:'center', padding:'12px 16px 4px' }}>
        <AKTaskBadge tone="phys">{sc.goal}</AKTaskBadge>
        <div style={{ marginTop:8, fontSize:13, color:'var(--ak-ink-2)', fontFamily:'var(--ak-body)', fontWeight:500 }}>
          💡 {sc.hint}
        </div>
      </div>

      {/* Game field */}
      <div
        className={shake ? 'ak-shake' : ''}
        style={{
          margin:'12px 16px 0', background:'#fff', borderRadius:24, padding:16,
          boxShadow:'0 8px 20px -6px rgba(45,27,69,.18), inset 0 2px 0 rgba(255,255,255,.9)',
          position:'relative', height:180, overflow:'hidden',
        }}
      >
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(180deg,#F0EBFF,#E8E0FF)', borderRadius:24 }}/>

        <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', pointerEvents:'none' }} viewBox="0 0 300 180" preserveAspectRatio="none">
          <path d="M20 90 Q75 60 150 90 Q225 120 280 90" fill="none" stroke="#B5A1FF" strokeWidth="3" strokeDasharray="8 8" opacity=".6"/>
        </svg>

        {ballVisible && (
          <div style={{
            position:'absolute',
            left:`${ballPct}%`,
            top:`${ballTopPct}%`,
            transform:'translate(-50%,-50%)',
            fontSize:28,
            zIndex:3,
            transition: launched ? 'left .05s linear, top .05s linear' : 'none',
            filter: launched ? 'drop-shadow(0 4px 8px rgba(124,95,224,.5))' : 'none',
          }}>⚽</div>
        )}

        <div style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', fontSize:9, color:'#7C5FE0', fontFamily:'var(--ak-display)', fontWeight:600, opacity:.7 }}>START</div>
        <div style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', fontSize:32 }}>⭐</div>

        {/* Slot A */}
        <div
          onClick={() => fillSlot('A')}
          style={{
            position:'absolute', left:'30%', top:'50%',
            transform:'translate(-50%,-50%)',
            width:54, height:54, borderRadius:16, zIndex:2,
            background: slotA ? getEl(slotA)?.color : 'rgba(124,95,224,.12)',
            border:`2.5px dashed ${slotA ? getEl(slotA)?.colorD : '#B5A1FF'}`,
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize: slotA ? 26 : 18,
            cursor: launched ? 'default' : 'pointer',
            transition:'all .2s',
          }}
        >{slotA ? getEl(slotA)?.emoji : '?'}</div>

        {/* Slot B */}
        <div
          onClick={() => fillSlot('B')}
          style={{
            position:'absolute', left:'65%', top:'50%',
            transform:'translate(-50%,-50%)',
            width:54, height:54, borderRadius:16, zIndex:2,
            background: slotB ? getEl(slotB)?.color : 'rgba(124,95,224,.12)',
            border:`2.5px dashed ${slotB ? getEl(slotB)?.colorD : '#B5A1FF'}`,
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize: slotB ? 26 : 18,
            cursor: launched ? 'default' : 'pointer',
            transition:'all .2s',
          }}
        >{slotB ? getEl(slotB)?.emoji : '?'}</div>
      </div>

      {/* Toolbar */}
      <div style={{ padding:'12px 16px 0', display:'flex', gap:8, justifyContent:'center' }}>
        {L2_ELEMENTS.map(el => (
          <button
            key={el.id}
            onClick={() => selectEl(el.id)}
            disabled={launched}
            style={{
              width:66, height:66, borderRadius:18, border:'none', cursor:'pointer',
              background: selected === el.id ? el.color : `${el.color}88`,
              boxShadow: selected === el.id
                ? `0 6px 0 ${el.colorD}, 0 10px 20px -6px ${el.color}`
                : `0 3px 0 ${el.colorD}44`,
              transform: selected === el.id ? 'translateY(-4px) scale(1.06)' : 'none',
              transition:'all .15s',
              display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2,
            }}
          >
            <span style={{ fontSize:26 }}>{el.emoji}</span>
            <span style={{ fontSize:9, fontFamily:'var(--ak-display)', fontWeight:600, color:'var(--ak-ink)', opacity:.8 }}>{el.label}</span>
          </button>
        ))}
      </div>

      <div style={{ padding:'10px 16px 28px', display:'flex', gap:10 }}>
        {result === 'fail' ? (
          <button className="ak-btn ak-btn--warn" style={{ flex:1 }} onClick={retry}>🔄 Ещё раз</button>
        ) : result === 'ok' ? (
          <button className="ak-btn ak-btn--ok" style={{ width:'100%' }} onClick={nextScenario}>
            {scenarioIdx >= L2_SCENARIOS.length - 1 ? 'Результаты 🎉' : 'Следующая машина →'}
          </button>
        ) : (
          <button
            className="ak-btn ak-btn--phys"
            style={{ width:'100%' }}
            onClick={launch}
            disabled={!slotA || !slotB || launched}
          >
            {!slotA || !slotB ? '← Поставь элементы в слоты' : '▶ Запустить!'}
          </button>
        )}
      </div>

      {result === 'ok' && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(45,27,69,.55)', backdropFilter:'blur(4px)',
          display:'flex', alignItems:'center', justifyContent:'center', padding:24, zIndex:20,
        }}>
          <div className="ak-pop" style={{ background:'#fff', borderRadius:28, padding:'28px 24px', maxWidth:340, textAlign:'center', boxShadow:'0 12px 40px rgba(45,27,69,.3)' }}>
            <div style={{ fontSize:52, marginBottom:12 }}>⭐</div>
            <div style={{ fontFamily:'var(--ak-display)', fontSize:22, fontWeight:700, color:'var(--ak-ink)', marginBottom:8 }}>Машина работает!</div>
            <div style={{ fontSize:14, color:'var(--ak-ink-2)', lineHeight:1.6, marginBottom:20 }}>🔬 {sc.fact}</div>
            <button className="ak-btn ak-btn--phys" style={{ width:'100%' }} onClick={nextScenario}>
              {scenarioIdx >= L2_SCENARIOS.length - 1 ? 'Результаты 🎉' : 'Следующая →'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   LEVEL 3 — МАЯТНИК (Canvas)

const L3_TASKS = [
  { emoji:'🎯',   text:'Сбей правую мишень',      tip:'Нажми Вправо чтобы раскачаться', checkFn: s => s.hitRight },
  { emoji:'🎯🎯', text:'Сбей обе мишени',          tip:'Сначала влево, потом вправо!',    checkFn: s => s.hitLeft && s.hitRight },
  { emoji:'⚖️',  text:'5 качаний подряд',          tip:'Просто качайся туда-сюда',        checkFn: s => s.swingCount >= 5 },
  { emoji:'🎯',   text:'Сбей ТОЛЬКО левую',         tip:'Один толчок влево, не качайся!', checkFn: s => s.hitLeft && !s.hitRight },
  { emoji:'📏',   text:'Открытие: длина верёвки',   tip:'Подвигай ползунок — смотри на период', checkFn: s => s.discovery, isDiscovery: true },
];

function Level3Pendulum({ onDone }) {
  const canvasRef = React.useRef(null);
  const physRef   = React.useRef({ angle:0.35, vel:0, hitLeft:false, hitRight:false, swingCount:0, discovery:false });
  const rafRef    = React.useRef(null);
  const lastCrossRef = React.useRef(0);
  const prevAngleRef = React.useRef(0.35);

  const [taskIdx,  setTaskIdx]  = React.useState(0);
  const [taskDone, setTaskDone] = React.useState(false);
  const [score,    setScore]    = React.useState(0);
  const [finished, setFinished] = React.useState(false);
  const [ropeLen,  setRopeLen]  = React.useState(130);
  const [periodMs, setPeriodMs] = React.useState(null);
  const [swingDisplay, setSwingDisplay] = React.useState(0);

  const task = L3_TASKS[taskIdx];
  const ropeLenRef = React.useRef(ropeLen);
  ropeLenRef.current = ropeLen;
  const taskDoneRef = React.useRef(taskDone);
  taskDoneRef.current = taskDone;
  const taskRef = React.useRef(task);
  taskRef.current = task;
  const setTaskDoneRef = React.useRef(setTaskDone);
  setTaskDoneRef.current = setTaskDone;

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const draw = () => {
      const s = physRef.current;
      const len = ropeLenRef.current;
      const W = canvas.width;
      const H = canvas.height;
      const pivot = { x: W/2, y: 42 };
      const bx = pivot.x + Math.sin(s.angle) * len;
      const by = pivot.y + Math.cos(s.angle) * len;
      const targetR = 20;
      const lT = { x: W*0.14, y: pivot.y + len + 12 };
      const rT = { x: W*0.86, y: pivot.y + len + 12 };

      const prevA = prevAngleRef.current;
      s.vel += -0.0038 * Math.sin(s.angle);
      s.vel *= 0.996;
      s.angle += s.vel;

      // swing count — crosses zero
      if ((prevA < 0 && s.angle >= 0) || (prevA > 0 && s.angle <= 0)) {
        s.swingCount++;
        setSwingDisplay(s.swingCount);
        const now = Date.now();
        if (lastCrossRef.current) setPeriodMs(Math.round((now - lastCrossRef.current)*2));
        lastCrossRef.current = now;
      }
      prevAngleRef.current = s.angle;

      // hit detection
      const leftHit  = Math.hypot(bx - lT.x, by - lT.y) < targetR + 12;
      const rightHit = Math.hypot(bx - rT.x, by - rT.y) < targetR + 12;
      if (leftHit  && !s.hitLeft)  s.hitLeft  = true;
      if (rightHit && !s.hitRight) s.hitRight = true;
      if (taskRef.current.isDiscovery && s.swingCount >= 3) s.discovery = true;

      if (!taskDoneRef.current && taskRef.current.checkFn(s)) {
        setTaskDoneRef.current(true);
      }

      // Draw
      ctx.clearRect(0, 0, W, H);
      const bg = ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0,'#EDE8FF'); bg.addColorStop(1,'#F8F5FF');
      ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

      // Draw target
      const drawTgt = (tx, ty, hit, col, colD) => {
        if (hit) {
          // burst
          ctx.fillStyle = '#FFD262';
          for (let i=0;i<8;i++) {
            const a=(Math.PI*2/8)*i;
            ctx.beginPath(); ctx.arc(tx+Math.cos(a)*30, ty+Math.sin(a)*30, 4, 0, Math.PI*2); ctx.fill();
          }
          ctx.fillStyle = colD; ctx.font='22px serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('💥', tx, ty);
        } else {
          ctx.beginPath(); ctx.arc(tx,ty,targetR,0,Math.PI*2);
          ctx.fillStyle = col; ctx.fill();
          ctx.beginPath(); ctx.arc(tx,ty,targetR*.65,0,Math.PI*2);
          ctx.fillStyle = colD; ctx.fill();
          ctx.beginPath(); ctx.arc(tx,ty,targetR*.28,0,Math.PI*2);
          ctx.fillStyle = '#fff'; ctx.fill();
          ctx.strokeStyle = 'rgba(45,27,69,.2)'; ctx.lineWidth = 2;
          ctx.stroke();
        }
      };
      drawTgt(lT.x, lT.y, s.hitLeft,  '#7BD9A8','#3CA876');
      drawTgt(rT.x, rT.y, s.hitRight, '#FFA17A','#D96D49');

      // rope
      ctx.beginPath(); ctx.moveTo(pivot.x,pivot.y); ctx.lineTo(bx,by);
      ctx.strokeStyle='#6B5680'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();

      // pivot pin
      ctx.beginPath(); ctx.arc(pivot.x,pivot.y,7,0,Math.PI*2);
      ctx.fillStyle='#2D1B45'; ctx.fill();
      ctx.beginPath(); ctx.arc(pivot.x-2,pivot.y-2,2.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.55)'; ctx.fill();

      // ball
      const grd = ctx.createRadialGradient(bx-7,by-7,2,bx,by,16);
      grd.addColorStop(0,'#fff'); grd.addColorStop(0.3,'#C4B5FF'); grd.addColorStop(1,'#7C5FE0');
      ctx.beginPath(); ctx.arc(bx,by,16,0,Math.PI*2);
      ctx.fillStyle=grd; ctx.fill();
      ctx.strokeStyle='#5B3EC8'; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.arc(bx-5,by-5,5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.65)'; ctx.fill();

      rafRef.current = requestAnimationFrame(draw);
    };

    rafRef.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(rafRef.current);
  }, [taskIdx]);

  const push = (dir, power) => { physRef.current.vel += dir * power; };

  const resetPhys = () => {
    physRef.current = { angle:0.35, vel:0, hitLeft:false, hitRight:false, swingCount:0, discovery:false };
    prevAngleRef.current = 0.35;
    lastCrossRef.current = 0;
    setSwingDisplay(0);
    setPeriodMs(null);
    setTaskDone(false);
  };

  const nextTask = () => {
    setScore(s => s + 1);
    if (taskIdx >= L3_TASKS.length - 1) { setFinished(true); return; }
    setTaskIdx(i => i + 1);
    resetPhys();
  };

  if (finished) {
    return (
      <div className="ak" style={{ minHeight:'100vh', background:'linear-gradient(180deg,#E5DCFF,#FFF3E2)', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
        <AKSuccessCard
          stars={score >= 4 ? 3 : score >= 2 ? 2 : 1}
          title="Физик-мастер!"
          fact={`Ты выполнил ${score} из ${L3_TASKS.length} задач маятника. Галилей изобрёл маятниковые часы в 1602!`}
          onNext={onDone}
          ctaLabel="В меню уровней"
        />
      </div>
    );
  }

  return (
    <div className="ak" style={{ minHeight:'100vh', background:'linear-gradient(180deg,#EDE8FF 0%,#F8F5FF 100%)', display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'16px 16px 0', flexShrink:0 }}>
        <AKLessonHeader progress={taskIdx/L3_TASKS.length} stars={score*60} onClose={onDone}/>
      </div>

      <div style={{ textAlign:'center', padding:'12px 16px 0' }}>
        <AKTaskBadge tone="phys">{task.emoji} {task.text}</AKTaskBadge>
        <div style={{ marginTop:6, fontSize:13, color:'var(--ak-ink-2)', fontWeight:500 }}>💡 {task.tip}</div>
      </div>

      <canvas
        ref={canvasRef}
        width={340} height={260}
        style={{
          display:'block', margin:'12px auto 0', borderRadius:20,
          boxShadow:'0 8px 20px -6px rgba(45,27,69,.2)',
          width:'calc(100% - 32px)', maxWidth:380, height:'auto',
        }}
      />

      {/* Stats */}
      <div style={{ display:'flex', justifyContent:'center', gap:12, padding:'8px 0 4px' }}>
        {!task.isDiscovery && (
          <span style={{ fontFamily:'var(--ak-display)', fontSize:14, color:'var(--ak-ink-2)' }}>
            Качаний: <strong style={{ color:'#7C5FE0' }}>{swingDisplay}</strong>
          </span>
        )}
        {task.isDiscovery && periodMs && (
          <span style={{ fontFamily:'var(--ak-display)', fontSize:14, color:'var(--ak-ink-2)' }}>
            Период: <strong style={{ color:'#7C5FE0' }}>~{(periodMs/1000).toFixed(1)}с</strong>
          </span>
        )}
      </div>

      {/* Discovery rope slider */}
      {task.isDiscovery && (
        <div style={{ padding:'0 24px 4px', textAlign:'center' }}>
          <div style={{ fontFamily:'var(--ak-display)', fontSize:13, color:'var(--ak-ink-2)', marginBottom:6 }}>
            📏 Длина верёвки: <strong style={{ color:'#7C5FE0' }}>{ropeLen}</strong>
          </div>
          <input
            type="range" min={60} max={200} value={ropeLen}
            onChange={e => { setRopeLen(+e.target.value); resetPhys(); }}
            style={{ width:'80%', accentColor:'#7C5FE0' }}
          />
          <div style={{ fontSize:12, color:'var(--ak-ink-3)', marginTop:4 }}>
            Длиннее верёвка → медленнее качается → больший период!
          </div>
        </div>
      )}

      {/* Controls */}
      <div style={{ padding:'4px 12px 4px', display:'flex', gap:6, justifyContent:'center', flexWrap:'wrap' }}>
        <button className="ak-btn ak-btn--cta ak-btn--sm" onClick={() => push(-1, 0.14)}>💥 ←</button>
        <button className="ak-btn ak-btn--phys ak-btn--sm" onClick={() => push(-1, 0.07)}>← Влево</button>
        <button className="ak-btn ak-btn--soft ak-btn--sm" onClick={resetPhys}>🔄</button>
        <button className="ak-btn ak-btn--phys ak-btn--sm" onClick={() => push(1, 0.07)}>Вправо →</button>
        <button className="ak-btn ak-btn--cta ak-btn--sm" onClick={() => push(1, 0.14)}>→ 💥</button>
      </div>

      {taskDone && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(45,27,69,.55)', backdropFilter:'blur(4px)',
          display:'flex', alignItems:'center', justifyContent:'center', padding:24, zIndex:20,
        }}>
          <div className="ak-pop" style={{ background:'#fff', borderRadius:28, padding:'28px 24px', maxWidth:320, textAlign:'center', boxShadow:'0 12px 40px rgba(45,27,69,.3)' }}>
            <div style={{ fontSize:52, marginBottom:12 }}>🎉</div>
            <div style={{ fontFamily:'var(--ak-display)', fontSize:22, fontWeight:700, color:'var(--ak-ink)', marginBottom:8 }}>Задача выполнена!</div>
            <div style={{ fontSize:14, color:'var(--ak-ink-2)', lineHeight:1.6, marginBottom:20 }}>
              {task.isDiscovery
                ? 'Ты открыл закон маятника! Чем длиннее верёвка, тем медленнее качается — именно это открыл Галилей в 1602!'
                : 'Отличное управление! Ты чувствуешь физику как настоящий учёный!'
              }
            </div>
            <button className="ak-btn ak-btn--phys" style={{ width:'100%' }} onClick={nextTask}>
              {taskIdx >= L3_TASKS.length - 1 ? 'Результаты 🎉' : 'Следующая задача →'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   LEVEL SELECT
   ========================================================= */
function LevelSelect({ onSelect }) {
  return (
    <div className="ak" style={{
      minHeight: '100vh',
      background: 'radial-gradient(80% 50% at 50% 0%, #E5DCFF 0%, transparent 60%), linear-gradient(180deg,#FFF8EA,#FFF3E2)',
      padding: '60px 18px 40px',
      boxSizing: 'border-box',
    }}>
      <div style={{ textAlign:'center', marginBottom:32, position:'relative' }}>
        <div style={{ position:'absolute', top:-20, right:0, opacity:.6 }}>
          <AKPlanet size={80} tone="phys" ring/>
        </div>
        <div className="ak-bob" style={{ display:'inline-block' }}>
          <AKAtom size={100} tone="phys"/>
        </div>
        <div style={{ fontFamily:'var(--ak-display)', fontSize:32, fontWeight:700, color:'var(--ak-ink)', marginTop:12 }}>КвантУм</div>
        <div style={{ fontSize:15, color:'var(--ak-ink-2)', fontFamily:'var(--ak-body)', fontWeight:600 }}>Физика · КосмоБаза</div>
        <div style={{ display:'flex', justifyContent:'center', gap:12, marginTop:12 }}>
          <AKStatChip icon="⚡" value="Физика" tone="phys"/>
          <AKStatChip icon="🏆" value="3 уровня" tone="star"/>
        </div>
      </div>

      <AKSubjectCard
        tone="phys"
        title="Что упадёт быстрее?"
        subtitle="Физика · Уровень 1"
        progress={0}
        icon={<AKBlob kind="sphere" tone="phys" size={64}/>}
        onClick={() => onSelect('level1')}
      />
      <AKSubjectCard
        tone="phys"
        title="Машина Голдберга"
        subtitle="Физика · Уровень 2"
        progress={0}
        icon={<AKBlob kind="gear" tone="phys" size={64}/>}
        onClick={() => onSelect('level2')}
      />
      <AKSubjectCard
        tone="phys"
        title="Маятник"
        subtitle="Физика · Уровень 3"
        progress={0}
        icon={<AKBlob kind="sphere" tone="phys" size={64}/>}
        onClick={() => onSelect('level3')}
      />

      <div style={{ textAlign:'center', marginTop:20, fontSize:12, color:'var(--ak-ink-3)' }}>
        КосмоБаза · Образовательная платформа
      </div>
    </div>
  );
}

/* =========================================================
   APP
   ========================================================= */
function App() {
  const [screen, setScreen] = React.useState('menu');
  const goMenu = () => setScreen('menu');
  if (screen === 'level1') return <Level1Falling onDone={goMenu}/>;
  if (screen === 'level2') return <Level2Goldberg onDone={goMenu}/>;
  if (screen === 'level3') return <Level3Pendulum onDone={goMenu}/>;
  return <LevelSelect onSelect={setScreen}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
