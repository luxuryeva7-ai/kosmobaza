<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Физика — КосмоБаза</title>
<style>
@import url('https://fonts.bunny.net/css?family=fredoka-one:400|nunito:500,700,800');
:root {
  --ak-bg:#FFF3E2; --ak-bg-2:#FFE8CC; --ak-surface:#FFFDF7;
  --ak-ink:#2D1B45; --ak-ink-2:#6B5680; --ak-ink-3:#A797B8;
  --ak-phys-1:#E5DCFF; --ak-phys-2:#B5A1FF; --ak-phys-3:#7C5FE0;
  --ak-cta-1:#FFEDA8; --ak-cta-2:#FFD262; --ak-cta-3:#D4A22B;
  --ak-ok-1:#C8F2DD; --ak-ok-2:#5DD9A0; --ak-ok-3:#2BA873;
  --ak-warn-1:#FFD2C8; --ak-warn-2:#FF8B7A; --ak-warn-3:#D9523F;
  --ak-star-1:#FFE49E; --ak-star-2:#FFC857; --ak-star-3:#D4972B;
  --ak-r-sm:10px; --ak-r-md:18px; --ak-r-lg:28px; --ak-r-xl:36px;
  --ak-display:'Fredoka One','Nunito',system-ui,sans-serif;
  --ak-body:'Nunito',system-ui,sans-serif;
}
html,body{background:#FFF3E2;margin:0;}
#root{min-height:100vh;}
body{margin:0;font-family:var(--ak-body);color:var(--ak-ink);}
.ak{font-family:var(--ak-body);color:var(--ak-ink);-webkit-font-smoothing:antialiased;}
.ak-clay{background:var(--ak-surface);border-radius:var(--ak-r-lg);box-shadow:0 10px 22px -8px rgba(45,27,69,.22),0 4px 10px -4px rgba(45,27,69,.10),inset 0 2px 0 rgba(255,255,255,.9),inset 0 -3px 0 rgba(45,27,69,.06);}
.ak-btn{font-family:var(--ak-display);font-weight:600;font-size:17px;border:none;cursor:pointer;position:relative;transition:transform .08s ease,box-shadow .08s ease,filter .15s ease;user-select:none;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;padding:16px 26px;border-radius:999px;color:var(--ak-ink);}
.ak-btn:disabled{cursor:not-allowed;filter:grayscale(.25) opacity(.6);}
.ak-btn--phys{color:#fff;background:linear-gradient(180deg,#C4B5FF 0%,#B5A1FF 55%,#9C83FF 100%);box-shadow:0 6px 0 var(--ak-phys-3),0 12px 24px -6px rgba(124,95,224,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(124,95,224,.25);text-shadow:0 1px 0 rgba(124,95,224,.4);}
.ak-btn--phys:active{transform:translateY(4px);}
.ak-btn--cta{color:var(--ak-ink);background:linear-gradient(180deg,#FFEDA8 0%,#FFD262 55%,#FFC03A 100%);box-shadow:0 6px 0 var(--ak-cta-3),0 12px 24px -6px rgba(212,162,43,.55),inset 0 2px 0 rgba(255,255,255,.85),inset 0 -2px 0 rgba(212,162,43,.25);}
.ak-btn--cta:active{transform:translateY(4px);}
.ak-btn--ok{color:#fff;background:linear-gradient(180deg,#7CECB5 0%,#5DD9A0 55%,#3FC685 100%);box-shadow:0 6px 0 var(--ak-ok-3),0 12px 24px -6px rgba(43,168,115,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(43,168,115,.25);}
.ak-btn--ok:active{transform:translateY(4px);}
.ak-btn--soft{color:var(--ak-ink);background:linear-gradient(180deg,#FFFFFF 0%,#FFF7E8 100%);box-shadow:0 4px 0 rgba(45,27,69,.10),0 8px 18px -6px rgba(45,27,69,.12),inset 0 2px 0 rgba(255,255,255,.95),inset 0 -2px 0 rgba(45,27,69,.05),inset 0 0 0 1px rgba(45,27,69,.06);}
.ak-btn--soft:active{transform:translateY(3px);}

@keyframes ak-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
@keyframes ak-shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px) rotate(-1deg);}40%{transform:translateX(7px) rotate(1deg);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
@keyframes ak-pop{0%{transform:scale(.7);opacity:0;}60%{transform:scale(1.06);opacity:1;}100%{transform:scale(1);}}
@keyframes ak-twinkle{0%,100%{opacity:.35;transform:scale(.85);}50%{opacity:1;transform:scale(1.05);}}
@keyframes ak-glow{0%,100%{box-shadow:0 0 8px #FFD26088;}50%{box-shadow:0 0 24px #FFD260cc,0 0 48px #FFD26044;}}
@keyframes ak-spark{0%{transform:scale(0) rotate(0deg);opacity:1;}100%{transform:scale(1.5) rotate(180deg);opacity:0;}}
@keyframes ak-rise-up{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-44px);opacity:0;}}
@keyframes ak-radiate{0%{transform:scale(0);opacity:.9;}100%{transform:scale(2.2);opacity:0;}}
@keyframes ak-circuit-glow{0%,100%{opacity:.5;}50%{opacity:1;}}

.ak-bob{animation:ak-bob 3.2s ease-in-out infinite;}

/* ============================================================
   AK DESIGN TOKENS
   ============================================================ */
const AK_TONES = {
  phys: ['#E5DCFF','#B5A1FF','#7C5FE0'],
  ok:   ['#C8F2DD','#5DD9A0','#2BA873'],
  cta:  ['#FFEDA8','#FFD262','#D4A22B'],
  star: ['#FFE49E','#FFC857','#D4972B'],
  warn: ['#FFD2C8','#FF8B7A','#D9523F'],
  ink:  ['#E5DCEE','#6B5680','#2D1B45'],
};

/* ============================================================
   AK COMPONENTS
   ============================================================ */

      <defs>
        <linearGradient id={`ss-${id}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#FFE49E"/>
          <stop offset="100%" stopColor="#FFC857"/>

      </defs>
      <path d="M7 1.2 L8.7 5 L13 5.4 L9.7 8.2 L10.7 12.3 L7 10.2 L3.3 12.3 L4.3 8.2 L1 5.4 L5.3 5 Z"
        fill={filled?`url(#ss-${id})`:'#E8DCEE'} stroke={filled?'#D4972B':'#B0A0C2'} strokeWidth="1.2" strokeLinejoin="round"/>
    </svg>

}

function AKStar({ size=56, filled=true }) {
  const id = React.useId().replace(/:/g,'');
  return (
    <svg width={size} height={size} viewBox="0 0 56 56">
      <defs>
        <radialGradient id={`st-${id}`} cx="40%" cy="32%" r="70%">
          <stop offset="0%" stopColor="#fff"/>
          <stop offset="35%" stopColor="#FFE49E"/>
          <stop offset="100%" stopColor="#D4972B"/>
        </radialGradient>
      </defs>
      <ellipse cx="28" cy="52" rx="14" ry="2.5" fill="rgba(45,27,69,.18)"/>
      <path d="M28 5 L34.5 19 L50 21 L38.5 31.5 L42 47 L28 39.5 L14 47 L17.5 31.5 L6 21 L21.5 19 Z"
        fill={filled?`url(#st-${id})`:'#E8DCEE'} stroke={filled?'#C99B3B':'#B0A0C2'} strokeWidth="2.2" strokeLinejoin="round"/>
      {filled&&<>
        <ellipse cx="20" cy="18" rx="3.5" ry="5" fill="#fff" opacity=".7" transform="rotate(-30 20 18)"/>
        <circle cx="36" cy="14" r="1.6" fill="#fff" opacity=".7"/>

}

function AKProgress({ value=0.5, tone='cta', height=18 }) {
  const [l,m,d] = AK_TONES[tone];

    <div style={{height,borderRadius:999,background:'rgba(45,27,69,.08)',boxShadow:'inset 0 2px 4px rgba(45,27,69,.18)',overflow:'hidden',position:'relative'}}>
      <div style={{
        width:`${Math.max(0,Math.min(1,value))*100}%`,height:'100%',
        background:`linear-gradient(180deg,${l} 0%,${m} 50%,${d} 100%)`,
        boxShadow:`inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 ${d}`,
        borderRadius:999,transition:'width .4s cubic-bezier(.2,.7,.3,1)',position:'relative'

        <div style={{position:'absolute',top:3,left:8,right:8,height:3,background:'rgba(255,255,255,.55)',borderRadius:999}}/>
      </div>

}

function AKStatChip({ icon, value, tone='cta' }) {
  const [l,m,d] = AK_TONES[tone];
  return (
    <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'6px 14px 6px 6px',borderRadius:999,background:'#fff',boxShadow:'0 3px 0 rgba(45,27,69,.08),0 6px 14px -4px rgba(45,27,69,.12),inset 0 1px 0 rgba(255,255,255,1)',fontFamily:'var(--ak-display)',fontWeight:700,fontSize:15,color:'var(--ak-ink)'}}>
      <div style={{width:28,height:28,borderRadius:'50%',background:`radial-gradient(circle at 35% 30%,#fff,${l} 25%,${m} 75%,${d} 100%)`,boxShadow:`inset 0 -2px 0 ${d}`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14}}>{icon}</div>

}

function AKLessonHeader({ progress=0.4, stars=0, onClose }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <button onClick={onClose} className="ak-btn ak-btn--soft ak-btn--icon ak-btn--sm" aria-label="Закрыть">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <path d="M2 2 L12 12 M12 2 L2 12" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/>

}

function AKTaskBadge({ children, tone='phys' }) {
  const [l,m,d] = AK_TONES[tone];
  return (
    <div className="ak-pulse" style={{display:'inline-flex',alignItems:'center',gap:10,padding:'12px 20px 12px 14px',borderRadius:999,background:'#fff',boxShadow:'0 4px 0 rgba(45,27,69,.08),0 10px 22px -6px rgba(45,27,69,.14),inset 0 1px 0 rgba(255,255,255,1)',fontFamily:'var(--ak-display)',fontWeight:600,fontSize:14.5,color:'var(--ak-ink)'}}>
      <div style={{width:10,height:10,borderRadius:'50%',background:m,boxShadow:`0 0 0 4px ${m}33,inset 0 -1px 0 ${d}`}}/>
      <span>{children}</span>
    </div>

}

function AKSuccessCard({ stars=3, title='Отлично!', fact, onNext, ctaLabel='Дальше' }) {
  return (
    <div className="ak-pop" style={{width:320,background:'#fff',borderRadius:32,padding:'28px 24px 24px',textAlign:'center',boxShadow:'0 12px 0 rgba(43,168,115,.18),0 24px 48px -12px rgba(45,27,69,.25),inset 0 2px 0 rgba(255,255,255,1)',fontFamily:'var(--ak-body)',position:'relative',margin:'0 auto'}}>
      <div aria-hidden style={{position:'absolute',top:-10,left:-10,right:-10,height:30,pointerEvents:'none'}}>
        {[{l:8,c:'#FFC857',s:8},{l:60,c:'#5DD9A0',s:6},{l:120,c:'#B5A1FF',s:7},{l:200,c:'#FFA17A',s:6},{l:260,c:'#8FCAF0',s:8},{l:310,c:'#FFC857',s:6}].map((p,i)=>(
          <div key={i} className="ak-twinkle" style={{position:'absolute',left:p.l,top:4+(i%2)*8,width:p.s,height:p.s,borderRadius:2,background:p.c,transform:`rotate(${i*25}deg)`,animationDelay:`${i*.15}s`}}/>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:14,marginTop:8}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{transform:`translateY(${i===1?-6:0}px) rotate(${(i-1)*12}deg)`}}>
            <AKStar size={i===1?70:56} filled={i<stars}/>
          </div>
        ))}
      </div>
      <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:26,letterSpacing:'-.4px',color:'var(--ak-ink)',marginBottom:8}}>{title}</div>
      {fact&&<div style={{fontSize:14,lineHeight:1.5,color:'var(--ak-ink-2)',marginBottom:20,fontWeight:500}}>{fact}</div>}
      {onNext&&<button className="ak-btn ak-btn--ok" style={{width:'100%'}} onClick={onNext}>{ctaLabel}</button>}
    </div>
  );
}

/* ============================================================
   LEVEL 1 — "Поймай луч!" (Light & Mirrors)
   ============================================================ */
const L1_PUZZLES = [
  { mirror:{cx:204,cy:152,len:74}, target:{x:300,y:59},  startAngle:45,  hint:'Поверни зеркало — луч отразится в цель!' },
  { mirror:{cx:170,cy:94, len:79}, target:{x:306,y:235}, startAngle:135, hint:'Направь луч вниз-вправо к цели' },
  { mirror:{cx:227,cy:176,len:68}, target:{x:57, y:59},  startAngle:30,  hint:'Отправь луч назад!' },
  { mirror:{cx:181,cy:117,len:91}, target:{x:306,y:152}, startAngle:90,  hint:'Почти прямо — совсем чуть-чуть поверни' },
  { mirror:{cx:204,cy:141,len:79}, target:{x:300,y:258}, startAngle:60,  hint:'Последний! Ты знаешь закон отражения!' },
];

const L1_FACTS = [
  'Угол падения = угол отражения! Это главный закон оптики.',
  'Зеркала используются в телескопах — они собирают свет звёзд.',
  'Перископ в подводной лодке работает на двух зеркалах!',
  'Луч лазера в магазинах использует тот же закон отражения.',
  'Кошки видят в темноте благодаря зеркальному слою за сетчаткой!',
];

function traceRay(startX, startY, dirX, dirY, mirror, W, H, maxBounces) {
  const points = [{x:startX, y:startY}];
  let x=startX, y=startY, dx=dirX, dy=dirY;
  const len0=Math.sqrt(dx*dx+dy*dy);
  dx/=len0; dy/=len0;

  for(let b=0; b<maxBounces; b++){
    const ang = mirror.angle * Math.PI / 180;
    const ml = mirror.len / 2;
    const mx1 = mirror.cx - Math.cos(ang)*ml;
    const my1 = mirror.cy - Math.sin(ang)*ml;
    const mx2 = mirror.cx + Math.cos(ang)*ml;
    const my2 = mirror.cy + Math.sin(ang)*ml;
    const mdx = mx2-mx1, mdy = my2-my1;
    const denom = dx*mdy - dy*mdx;

    let tMirror = Infinity, hx=0, hy=0, hitMirror=false;
    if(Math.abs(denom) > 0.001){
      const t = ((mx1-x)*mdy - (my1-y)*mdx)/denom;
      const u = ((mx1-x)*dy  - (my1-y)*dx )/denom;
      if(t > 1.0 && u >= 0 && u <= 1){
        tMirror = t;
        hx = x+dx*t; hy = y+dy*t;
        hitMirror = true;
      }
    }

    // Wall intersections
    const walls=[
      {nx:1,  ny:0,  d:0},
      {nx:-1, ny:0,  d:-W},
      {nx:0,  ny:1,  d:0},
      {nx:0,  ny:-1, d:-H},
    ];
    let tWall=Infinity, wnx=0, wny=0;
    for(const w of walls){
      const d2=dx*w.nx+dy*w.ny;
      if(Math.abs(d2)<0.001) continue;
      const t=(-(x*w.nx+y*w.ny+w.d))/d2;
      if(t>0.5 && t<tWall){ tWall=t; wnx=w.nx; wny=w.ny; }
    }

    if(hitMirror && tMirror < tWall){
      points.push({x:hx, y:hy});
      const nRawX = -mdy, nRawY = mdx;
      const nLen = Math.sqrt(nRawX*nRawX+nRawY*nRawY);
      const nx = nRawX/nLen, ny = nRawY/nLen;
      const dot = dx*nx + dy*ny;
      dx = dx - 2*dot*nx;
      dy = dy - 2*dot*ny;
      x=hx; y=hy;
    } else {
      points.push({x: x+dx*tWall, y: y+dy*tWall});
      break;
    }
  }
  return points;
}

function Level1Light({ onDone }) {
  const [missionIdx, setMissionIdx] = React.useState(0);
  const [starsEarned, setStarsEarned] = React.useState(0);
  const [celebrating, setCelebrating] = React.useState(false);
  const [done, setDone] = React.useState(false);

  const mirrorAngleRef = React.useRef(L1_PUZZLES[0].startAngle);
  const [displayAngle, setDisplayAngle] = React.useState(L1_PUZZLES[0].startAngle);
  const pendingRef = React.useRef(false);
  const canvasRef = React.useRef(null);
  const animRef = React.useRef(null);
  const hitRef = React.useRef(false);
  const celebRef = React.useRef(false);

  const W=340, H=310;

  React.useEffect(()=>{
    mirrorAngleRef.current = L1_PUZZLES[missionIdx].startAngle;
    setDisplayAngle(L1_PUZZLES[missionIdx].startAngle);
    hitRef.current = false;
    celebRef.current = false;

    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const puz = L1_PUZZLES[missionIdx];

    const draw = ()=>{
      const ang = mirrorAngleRef.current;
      const mirror = {cx:puz.mirror.cx, cy:puz.mirror.cy, len:puz.mirror.len, angle:ang};

      ctx.clearRect(0,0,W,H);

      // Dark room background
      const bg = ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0,'#1A1040');
      bg.addColorStop(1,'#0D0A2A');
      ctx.fillStyle = bg;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(0,0,W,H,14);
      else { ctx.rect(0,0,W,H); }
      ctx.fill();

      // Subtle floor line
      ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,H-35); ctx.lineTo(W,H-35); ctx.stroke();

      // Flashlight body
      const srcX=14, srcY=H/2;
      ctx.save();
      ctx.shadowColor='#FFD262'; ctx.shadowBlur=20;
      ctx.fillStyle='#D4A22B';
      ctx.fillRect(2, srcY-11, 10, 22);
      ctx.fillStyle='#FFD262';
      ctx.fillRect(4, srcY-9, 6, 18);
      ctx.restore();

      // Beam cone
      const cone=ctx.createLinearGradient(srcX,srcY,srcX+60,srcY);
      cone.addColorStop(0,'rgba(255,210,98,.25)');
      cone.addColorStop(1,'rgba(255,210,98,0)');
      ctx.fillStyle=cone;
      ctx.beginPath();
      ctx.moveTo(srcX+6,srcY);
      ctx.lineTo(srcX+60,srcY-24);
      ctx.lineTo(srcX+60,srcY+24);
      ctx.closePath();
      ctx.fill();

      // Trace ray
      const pts = traceRay(srcX+6, srcY, 1, 0, mirror, W, H, 5);
      const last = pts[pts.length-1];

      // Hit check (radius 32)
      const ddx=last.x-puz.target.x, ddy=last.y-puz.target.y;
      const dist=Math.sqrt(ddx*ddx+ddy*ddy);
      const hit = dist < 32;

      // Draw ray
      ctx.save();
      ctx.shadowColor='#FFD262'; ctx.shadowBlur=14;
      ctx.strokeStyle='#FFD262'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath();
      pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
      ctx.stroke();
      ctx.restore();

      // Mirror line — 6px white gradient with glow
      const mAng = ang*Math.PI/180;
      const ml = puz.mirror.len/2;
      const mx1=puz.mirror.cx-Math.cos(mAng)*ml, my1=puz.mirror.cy-Math.sin(mAng)*ml;
      const mx2=puz.mirror.cx+Math.cos(mAng)*ml, my2=puz.mirror.cy+Math.sin(mAng)*ml;
      ctx.save();
      ctx.shadowColor='rgba(255,255,255,.6)'; ctx.shadowBlur=10;
      const mGrad=ctx.createLinearGradient(mx1,my1,mx2,my2);
      mGrad.addColorStop(0,'rgba(255,255,255,.45)');
      mGrad.addColorStop(0.5,'#ffffff');
      mGrad.addColorStop(1,'rgba(255,255,255,.45)');
      ctx.strokeStyle=mGrad; ctx.lineWidth=6; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(mx1,my1); ctx.lineTo(mx2,my2); ctx.stroke();
      // Purple pivot dot
      ctx.shadowColor='#B5A1FF'; ctx.shadowBlur=12;
      ctx.fillStyle='#B5A1FF';
      ctx.beginPath(); ctx.arc(puz.mirror.cx,puz.mirror.cy,7,0,Math.PI*2); ctx.fill();
      ctx.restore();

      // Target — 3 concentric rings
      const tx=puz.target.x, ty=puz.target.y;
      const ts=Date.now()*0.002;
      ctx.save();
      if(hit){ ctx.shadowColor='#FFD262'; ctx.shadowBlur=32; }
      ctx.translate(tx,ty);
      // outer ring r=22 red/orange
      ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2);
      ctx.fillStyle=hit?'#FFD262':'rgba(220,60,40,0.85)'; ctx.fill();
      // mid ring r=14 white
      ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2);
      ctx.fillStyle=hit?'rgba(255,255,180,.9)':'rgba(255,255,255,0.9)'; ctx.fill();
      // inner ring r=8 orange
      ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2);
      ctx.fillStyle=hit?'#FFD262':'#FF8020'; ctx.fill();
      if(hit){
        ctx.shadowColor='#FFD262'; ctx.shadowBlur=40;
        ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2);
        ctx.strokeStyle='#FFD262'; ctx.lineWidth=3; ctx.stroke();
      }
      ctx.restore();

      if(hit && !hitRef.current){ hitRef.current=true; }
      animRef.current=requestAnimationFrame(draw);
    };

    draw();
    return ()=>cancelAnimationFrame(animRef.current);
  },[missionIdx]);

  // Poll for hit
  React.useEffect(()=>{
    if(celebrating||done) return;
    const iv=setInterval(()=>{
      if(hitRef.current && !celebRef.current){
        celebRef.current=true;
        setCelebrating(true);
      }
    },150);
    return()=>clearInterval(iv);
  },[celebrating,done]);

  const handleSlider=React.useCallback((e)=>{
    mirrorAngleRef.current=Number(e.target.value);
    hitRef.current=false;
    if(!pendingRef.current){
      pendingRef.current=true;
      requestAnimationFrame(()=>{
        setDisplayAngle(mirrorAngleRef.current);
        pendingRef.current=false;
      });
    }
  },[]);

  const handleNext=()=>{
    setCelebrating(false);
    celebRef.current=false;
    hitRef.current=false;
    if(missionIdx>=L1_PUZZLES.length-1){
      setDone(true);
    } else {
      setStarsEarned(s=>s+1);
      setMissionIdx(m=>m+1);
    }
  };

  if(done){
    return(
      <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
        <AKSuccessCard stars={3} title="Закон отражения!" fact="Угол падения всегда равен углу отражения. Это открыл Евклид более 2000 лет назад!" onNext={onDone} ctaLabel="На главную 🏠"/>
      </div>
    );
  }

  const puz=L1_PUZZLES[missionIdx];

  return(
    <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'16px 16px 32px',maxWidth:390,margin:'0 auto',boxSizing:'border-box',position:'relative'}}>
      <AKLessonHeader progress={missionIdx/L1_PUZZLES.length} stars={starsEarned} onClose={onDone}/>
      <div style={{height:18}}/>
      <AKTaskBadge tone="phys">{puz.hint}</AKTaskBadge>
      <div style={{height:16}}/>

      <div style={{borderRadius:18,overflow:'hidden',boxShadow:'0 8px 0 rgba(45,27,69,.12),0 18px 36px -12px rgba(45,27,69,.22)'}}>
        <canvas ref={canvasRef} width={W} height={H} style={{display:'block',width:'100%',height:'auto'}}/>
      </div>

      <div style={{height:22}}/>

      <div style={{background:'#fff',borderRadius:20,padding:'18px 20px',boxShadow:'0 4px 0 rgba(45,27,69,.08),0 10px 22px -8px rgba(45,27,69,.14)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:14,color:'var(--ak-ink-2)'}}>Угол зеркала</span>
          <span className="ak-num" style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:20,color:'var(--ak-phys-3)'}}>{Math.round(displayAngle)}°</span>
        </div>
        <div style={{position:'relative',height:18}}>
          <div style={{position:'absolute',inset:0,borderRadius:999,background:'linear-gradient(90deg,#E5DCFF,#B5A1FF,#7C5FE0)',boxShadow:'inset 0 2px 4px rgba(45,27,69,.18)'}}/>
          <input type="range" min={0} max={180} step={1}
            value={Math.round(displayAngle)}
            onChange={handleSlider}
            style={{position:'absolute',inset:0,opacity:0,cursor:'pointer',zIndex:3,margin:0,width:'100%',height:'100%'}}
          />
          <div style={{
            position:'absolute',top:'50%',
            left:`calc(${(displayAngle/180)*100}% - 18px)`,
            transform:'translateY(-50%)',
            width:36,height:36,borderRadius:'50%',
            background:'linear-gradient(180deg,#fff 0%,#FFF7E8 100%)',
            boxShadow:'0 4px 0 rgba(45,27,69,.15),0 8px 18px -6px rgba(45,27,69,.2),inset 0 2px 0 rgba(255,255,255,.95)',
            pointerEvents:'none',zIndex:1,
          }}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:12,color:'var(--ak-ink-3)',fontWeight:600}}>
          <span>0°</span><span>90°</span><span>180°</span>
        </div>
      </div>

      <div style={{height:12}}/>
      <div style={{textAlign:'center',fontSize:13,color:'var(--ak-ink-3)',fontWeight:600}}>
        Задача {missionIdx+1} из {L1_PUZZLES.length}
      </div>

      {celebrating&&(
        <div style={{position:'fixed',inset:0,background:'rgba(26,16,64,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:24}}>
          <div className="ak-pop" style={{background:'#fff',borderRadius:28,padding:'28px 24px',textAlign:'center',maxWidth:320,width:'100%',boxShadow:'0 16px 0 rgba(45,27,69,.12),0 32px 64px -16px rgba(45,27,69,.3)'}}>
            <div style={{fontSize:52,marginBottom:10}}>🎯</div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:24,color:'var(--ak-ink)',marginBottom:10}}>Попал!</div>
            <div style={{fontSize:14,lineHeight:1.5,color:'var(--ak-ink-2)',marginBottom:20,fontWeight:500}}>{L1_FACTS[missionIdx]}</div>
            <button className="ak-btn ak-btn--phys" style={{width:'100%'}} onClick={handleNext}>
              {missionIdx>=L1_PUZZLES.length-1?'Завершить! 🎉':'Дальше →'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function Level2Circuit({ onDone }) {
  const [challIdx, setChallIdx] = React.useState(0);
  const [placed, setPlaced] = React.useState({A:null,B:null,C:null,D:null});
  const [selected, setSelected] = React.useState(null);
  const [circuitOn, setCircuitOn] = React.useState(false);
  const [shaking, setShaking] = React.useState(null);
  const [popup, setPopup] = React.useState(false);
  const [starsEarned, setStarsEarned] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [sparks, setSparks] = React.useState(false);

  const chall = L2_CHALLENGES[challIdx];

  const checkCircuit=(p)=>{
    const req=chall.required;
    if(chall.anyOk) return p.A===req.A && p.C===req.C;
    return Object.keys(req).every(k=>p[k]===req[k]);
  };

  const handleSlotTap=(slotId)=>{
    if(circuitOn||popup) return;
    if(placed[slotId]){
      setPlaced(p=>({...p,[slotId]:null}));
      return;
    }
    if(!selected) return;
    const newPlaced={...placed,[slotId]:selected};
    setPlaced(newPlaced);
    setSelected(null);
    if(checkCircuit(newPlaced)){
      setTimeout(()=>{
        setCircuitOn(true);
        setSparks(true);
        setTimeout(()=>{ setSparks(false); setPopup(true); },1800);
      },300);
    } else {
      const req=chall.required;
      if(!chall.anyOk && req[slotId] && selected!==req[slotId]){
        setShaking(slotId);
        setTimeout(()=>{ setShaking(null); setPlaced(p=>({...p,[slotId]:null})); },500);
      }
    }
  };

  const handleCompTap=(id)=>{
    if(circuitOn||popup) return;
    setSelected(s=>s===id?null:id);
  };

  const handleNext=()=>{
    setPopup(false);
    setCircuitOn(false);
    setPlaced({A:null,B:null,C:null,D:null});
    setSelected(null);
    if(challIdx>=L2_CHALLENGES.length-1){
      setDone(true);
    } else {
      setStarsEarned(s=>s+1);
      setChallIdx(c=>c+1);
    }
  };

  if(done){
    return(
      <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
        <AKSuccessCard stars={3} title="Цепь замкнута!" fact="Электрическая цепь — основа всех гаджетов. В твоём смартфоне миллиарды таких цепей!" onNext={onDone} ctaLabel="На главную 🏠"/>
      </div>
    );
  }

  const strokeColor = circuitOn ? '#FFD262' : '#3D2D7A';
  const strokeW = circuitOn ? 4 : 2.5;

  return(
    <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'16px 16px 32px',maxWidth:390,margin:'0 auto',boxSizing:'border-box'}}>
      <AKLessonHeader progress={challIdx/L2_CHALLENGES.length} stars={starsEarned} onClose={onDone}/>
      <div style={{height:18}}/>
      <AKTaskBadge tone="phys">{chall.goal}</AKTaskBadge>
      <div style={{height:16}}/>

      {/* Circuit board */}
      <div style={{background:'#130E38',borderRadius:22,padding:'16px',boxShadow:'0 8px 0 rgba(45,27,69,.15),0 18px 36px -12px rgba(45,27,69,.25)',position:'relative',overflow:'hidden',minHeight:280}}>
        {/* SVG circuit */}
        <svg width="100%" height="210" viewBox="0 0 280 210" style={{display:'block',position:'absolute',inset:'20px'}}>
          <defs>
            <filter id="circglow">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect x="40" y="25" width="200" height="160" rx="10"
            fill="none"
            stroke={strokeColor}
            strokeWidth={strokeW}
            style={{transition:'stroke .6s,stroke-width .3s'}}
            filter={circuitOn?'url(#circglow)':undefined}
          />
          {[{cx:40,cy:105},{cx:140,cy:25},{cx:240,cy:105},{cx:140,cy:185}].map((n,i)=>(
            <circle key={i} cx={n.cx} cy={n.cy} r="6"
              fill={circuitOn?'#FFD262':'#4A3A8A'}
              style={{transition:'fill .5s'}}/>
          ))}
          {circuitOn&&[
            {x:90,y:25,r:0},{x:190,y:25,r:0},
            {x:240,y:65,r:90},{x:240,y:145,r:90},
            {x:190,y:185,r:180},{x:90,y:185,r:180},
            {x:40,y:145,r:270},{x:40,y:65,r:270},
          ].map((a,i)=>(
            <polygon key={i} points="0,-5 4,5 -4,5" fill="#FFD262"
              transform={`translate(${a.x},${a.y}) rotate(${a.r})`}
              opacity={0.85}
              style={{animation:`ak-circuit-glow 1s ease-in-out ${i*0.1}s infinite`}}/>
          ))}
        </svg>

        {/* Slots */}
        <div style={{position:'absolute',left:4,top:'50%',transform:'translateY(-50%)',width:72}}>
          <SlotCard id="A" placed={placed.A} label={SLOT_LABELS.A} shaking={shaking==='A'}
            circuitOn={circuitOn} onClick={()=>handleSlotTap('A')} selected={selected}/>
        </div>
        <div style={{position:'absolute',left:'50%',top:4,transform:'translateX(-50%)',width:82}}>
          <SlotCard id="B" placed={placed.B} label={SLOT_LABELS.B} shaking={shaking==='B'}
            circuitOn={circuitOn} onClick={()=>handleSlotTap('B')} selected={selected}/>
        </div>
        <div style={{position:'absolute',right:4,top:'50%',transform:'translateY(-50%)',width:72}}>
          <SlotCard id="C" placed={placed.C} label={SLOT_LABELS.C} shaking={shaking==='C'}
            circuitOn={circuitOn} onClick={()=>handleSlotTap('C')} selected={selected}/>
        </div>
        <div style={{position:'absolute',left:'50%',bottom:4,transform:'translateX(-50%)',width:82}}>
          <SlotCard id="D" placed={placed.D} label={SLOT_LABELS.D} shaking={shaking==='D'}
            circuitOn={circuitOn} onClick={()=>handleSlotTap('D')} selected={selected}/>
        </div>

        {sparks&&[...Array(6)].map((_,i)=>(
          <div key={i} style={{
            position:'absolute',
            left:`${20+i*13}%`,top:`${25+((i%3)*22)}%`,
            width:12,height:12,borderRadius:'50%',
            background:i%2?'#FFD262':'#5DD9A0',
            animation:`ak-spark .9s ease-out ${i*0.12}s both`,
          }}/>
        ))}
      </div>

      <div style={{height:16}}/>

      {/* Component tray */}
      <div style={{background:'#fff',borderRadius:20,padding:'14px 12px',boxShadow:'0 4px 0 rgba(45,27,69,.08),0 10px 22px -8px rgba(45,27,69,.14)'}}>
        <div style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:13,color:'var(--ak-ink-2)',marginBottom:10,textAlign:'center'}}>
          {selected
            ? `Выбрано: ${COMPONENTS.find(c=>c.id===selected)?.label} → нажми на слот`
            : 'Нажми компонент, потом слот на схеме'}
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
          {COMPONENTS.map(c=>{
            const inUse=Object.values(placed).includes(c.id);
            const isSel=selected===c.id;
            return(
              <button key={c.id} onClick={()=>handleCompTap(c.id)} disabled={inUse}
                style={{
                  background:isSel?`linear-gradient(180deg,${c.color}77,${c.color}cc)`:inUse?'#F5F2FC':'#fff',
                  border:isSel?`2px solid ${c.color}`:'2px solid rgba(45,27,69,.06)',
                  borderRadius:14,padding:'10px 8px',cursor:inUse?'not-allowed':'pointer',
                  fontFamily:'var(--ak-body)',fontSize:10,fontWeight:700,color:'var(--ak-ink)',
                  display:'flex',flexDirection:'column',alignItems:'center',gap:4,
                  boxShadow:isSel?`0 0 0 4px ${c.color}33,0 4px 0 rgba(45,27,69,.08)`:'0 2px 0 rgba(45,27,69,.06)',
                  opacity:inUse?.3:1,
                  transform:isSel?'scale(1.1)':'scale(1)',
                  transition:'transform .12s,box-shadow .12s,background .12s',
                  minWidth:54,
                }}>
                <c.SvgComp color={c.color} size={0.6} glowing={false}/>
                <span style={{lineHeight:1.1,textAlign:'center'}}>{c.label}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div style={{height:10}}/>
      <div style={{textAlign:'center',fontSize:13,color:'var(--ak-ink-3)',fontWeight:600}}>
        Задача {challIdx+1} из {L2_CHALLENGES.length}
      </div>

      {popup&&(
        <div style={{position:'fixed',inset:0,background:'rgba(26,16,64,.78)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:24}}>
          <div className="ak-pop" style={{background:'#fff',borderRadius:28,padding:'28px 24px',textAlign:'center',maxWidth:320,width:'100%',boxShadow:'0 16px 0 rgba(45,27,69,.12),0 32px 64px -16px rgba(45,27,69,.3)'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:10}}>
              <SvgBulb color="#FFE083" glowing={true} size={1.2}/>
            </div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:24,color:'var(--ak-ink)',marginBottom:10}}>Цепь замкнута!</div>
            <div style={{fontSize:14,lineHeight:1.5,color:'var(--ak-ink-2)',marginBottom:20,fontWeight:500}}>{chall.fact}</div>
            <button className="ak-btn ak-btn--phys" style={{width:'100%'}} onClick={handleNext}>
              {challIdx>=L2_CHALLENGES.length-1?'Завершить! 🎉':'Дальше →'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   LEVEL 3 — "Проведи тепло!" — path selection gameplay
   ============================================================ */
const L3_SCENARIOS = [
  { srcEmoji:'☕', srcLabel:'Горячая кружка', tgtEmoji:'🖐', tgtLabel:'Рука', type:'conduction', fact:'Теплопроводность: атомы кружки передают движение атомам руки через прямой контакт!' },
  { srcEmoji:'☀️', srcLabel:'Солнце', tgtEmoji:'🪨', tgtLabel:'Нагретый камень', type:'radiation', fact:'Излучение проходит через вакуум. Именно так тепло Солнца летит 150 млн км до Земли!' },
  { srcEmoji:'🔥', srcLabel:'Горячий воздух', tgtEmoji:'💨', tgtLabel:'Поток вверх', type:'convection', fact:'Конвекция: тёплый воздух легче и поднимается вверх. Так образуются облака и ветер!' },
  { srcEmoji:'🍳', srcLabel:'Раскалённая сковорода', tgtEmoji:'🥄', tgtLabel:'Металлическая ложка', type:'conduction', fact:'Металл — лучший проводник тепла. Деревянная ложка нагреется в 400 раз медленнее!' },
  { srcEmoji:'🔥', srcLabel:'Костёр', tgtEmoji:'🧍', tgtLabel:'Человек рядом', type:'radiation', fact:'Костёр греет инфракрасными волнами — ты чувствуешь жар лицом даже без прикосновения!' },
  { srcEmoji:'🫖', srcLabel:'Кипящий чайник', tgtEmoji:'🌀', tgtLabel:'Потоки воды', type:'convection', fact:'В кипящей воде горячие слои снизу поднимаются, холодные опускаются — это конвекция!' },
];

function SvgIconConduction() {
  return (
    <svg width="54" height="36" viewBox="0 0 54 36">
      {/* Left square */}
      <rect x="1" y="8" width="16" height="20" rx="3" fill="#FF8B7A" stroke="#FF6060" strokeWidth="1.5"/>
      {/* Right square */}
      <rect x="37" y="8" width="16" height="20" rx="3" fill="#FFD2C8" stroke="#FFA090" strokeWidth="1.5"/>
      {/* Glowing bridge */}
      <rect x="17" y="15" width="20" height="6" rx="3" fill="url(#condGrad)"/>
      <defs>
        <linearGradient id="condGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#FF6B3D"/>
          <stop offset="50%" stopColor="#FFD262"/>
          <stop offset="100%" stopColor="#FF8B7A"/>
        </linearGradient>
      </defs>
      {/* Arrow */}
      <polygon points="41,18 37,14 37,22" fill="#FF6B3D" opacity="0.85"/>
    </svg>
  );
}

function SvgIconConvection() {
  return (
    <svg width="54" height="36" viewBox="0 0 54 36">
      {/* Three upward curved arrows */}
      {[10, 26, 42].map((x, i) => (
        <g key={i}>
          <path d={`M${x},32 Q${x-4},22 ${x},14`}
            fill="none" stroke="#60B8E8" strokeWidth="2.5" strokeLinecap="round"/>
          <polygon points={`${x},10 ${x-3},17 ${x+3},17`} fill="#60B8E8"/>
        </g>
      ))}
    </svg>
  );
}

function SvgIconRadiation() {
  return (
    <svg width="54" height="36" viewBox="0 0 54 36">
      {/* Center sun circle */}
      <circle cx="27" cy="18" r="7" fill="#FFD262" stroke="#D4A22B" strokeWidth="1.5"/>
      {/* Radiating lines */}
      {[0,45,90,135,180,225,270,315].map((a, i) => {
        const rad = a * Math.PI / 180;
        const x1 = 27 + Math.cos(rad) * 10;
        const y1 = 18 + Math.sin(rad) * 10;
        const x2 = 27 + Math.cos(rad) * 16;
        const y2 = 18 + Math.sin(rad) * 16;
        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#FFD262" strokeWidth="2" strokeLinecap="round"/>;
      })}
    </svg>
  );
}

const L3_PATH_BUTTONS = [
  { type:'conduction', label:'Касание', sublabel:'Теплопроводность', color:'#FF8B7A', bg:'#FFD2C8', Icon: SvgIconConduction },
  { type:'convection', label:'Поток',   sublabel:'Конвекция',        color:'#60B8E8', bg:'#DCF0FF', Icon: SvgIconConvection },
  { type:'radiation',  label:'Волны',   sublabel:'Излучение',         color:'#FFD262', bg:'#FFF5AA', Icon: SvgIconRadiation },
];

function L3ConnectionZone({ animType, phase }) {
  const isAnimating = phase === 'animating';
  return (
    <div style={{
      position:'relative',height:72,borderRadius:20,overflow:'hidden',
      background:'rgba(45,27,69,.06)',margin:'0 0',
      display:'flex',alignItems:'center',justifyContent:'center',
    }}>
      {/* Static arrow */}
      {!isAnimating && (
        <div style={{fontSize:28,color:'var(--ak-ink-3)',opacity:.45}}>↓</div>
      )}

      {/* Conduction: glowing bar flows left→right */}
      {isAnimating && animType === 'conduction' && (
        <div style={{position:'relative',width:'90%',height:18,borderRadius:999,background:'rgba(255,100,50,.15)',overflow:'hidden'}}>
          <div className="heat-anim-bar"/>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontFamily:'var(--ak-display)',color:'#D9523F',fontWeight:700,zIndex:2}}>
            теплопроводность →
          </div>
        </div>
      )}

      {/* Convection: 3 upward arrows */}
      {isAnimating && animType === 'convection' && (
        <div style={{display:'flex',gap:20,alignItems:'center',justifyContent:'center',width:'100%',height:'100%'}}>
          {[0,1,2].map(i=>(
            <div key={i} className="rise-arrow"
              style={{fontSize:26,color:'#60B8E8',fontWeight:900,animationDelay:`${i*0.22}s`}}>↑</div>
          ))}
        </div>
      )}

      {/* Radiation: expanding rings */}
      {isAnimating && animType === 'radiation' && (
        <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%'}}>
          {[0,1].map(i=>(
            <div key={i} className="radiate-ring"
              style={{animationDelay:`${i*0.35}s`,borderColor:'#FFD262'}}/>
          ))}
          <div style={{fontSize:18,zIndex:2}}>☀️</div>
        </div>
      )}
    </div>
  );
}

function Level3Heat({ onDone }) {
  const [scIdx, setScIdx] = React.useState(0);
  const [phase, setPhase] = React.useState('question'); // question | animating | success
  const [shakingType, setShakingType] = React.useState(null);
  const [done, setDone] = React.useState(false);

  const sc = L3_SCENARIOS[scIdx];
  const total = L3_SCENARIOS.length;

  const handlePathBtn = (type) => {
    if(phase !== 'question') return;
    if(type === sc.type) {
      // Correct!
      setPhase('animating');
      setTimeout(() => setPhase('success'), 1500);
    } else {
      // Wrong — shake that button only
      setShakingType(type);
      setTimeout(() => setShakingType(null), 500);
    }
  };

  const handleNext = () => {
    if(scIdx >= total - 1) {
      setDone(true);
    } else {
      setScIdx(i => i+1);
      setPhase('question');
    }
  };

  if(done) {
    return(
      <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
        <AKSuccessCard stars={3} title="Мастер тепла!" fact="Теплопроводность, конвекция, излучение — ты знаешь все три способа передачи тепла!" onNext={onDone} ctaLabel="На главную 🏠"/>
      </div>
    );
  }

  return(
    <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'16px 16px 32px',maxWidth:390,margin:'0 auto',boxSizing:'border-box'}}>
      <AKLessonHeader progress={scIdx/total} stars={scIdx} onClose={onDone}/>
      <div style={{height:18}}/>

      <div style={{display:'flex',justifyContent:'center',marginBottom:14}}>
        <AKTaskBadge tone="phys">Как передаётся тепло?</AKTaskBadge>
      </div>

      {/* Source card */}
      <div style={{
        background:'#fff',borderRadius:22,padding:'18px 16px',
        textAlign:'center',
        boxShadow:'0 6px 0 rgba(45,27,69,.08),0 14px 28px -8px rgba(45,27,69,.14)',
        marginBottom:10,
      }}>
        <div style={{fontSize:48,lineHeight:1,marginBottom:6}}>{sc.srcEmoji}</div>
        <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:16,color:'var(--ak-ink)'}}>{sc.srcLabel}</div>
      </div>

      {/* Connection zone */}
      <L3ConnectionZone animType={sc.type} phase={phase}/>

      {/* Target card */}
      <div style={{
        background:'#fff',borderRadius:22,padding:'18px 16px',
        textAlign:'center',
        boxShadow:'0 6px 0 rgba(45,27,69,.08),0 14px 28px -8px rgba(45,27,69,.14)',
        marginTop:10,marginBottom:16,
      }}>
        <div style={{fontSize:48,lineHeight:1,marginBottom:6}}>{sc.tgtEmoji}</div>
        <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:16,color:'var(--ak-ink)'}}>{sc.tgtLabel}</div>
      </div>

      {/* Path buttons */}
      {phase === 'question' && (
        <div style={{display:'flex',gap:10,marginBottom:14}}>
          {L3_PATH_BUTTONS.map(btn=>(
            <button key={btn.type}
              onClick={() => handlePathBtn(btn.type)}
              className={shakingType === btn.type ? 'ak-shake' : ''}
              style={{
                flex:1,minHeight:100,
                background:btn.bg,
                border:`2.5px solid ${btn.color}`,
                borderRadius:18,
                padding:'12px 8px',
                cursor:'pointer',
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,
                boxShadow:`0 5px 0 ${btn.color}88,0 10px 18px -6px ${btn.color}44`,
                transition:'transform .1s',
              }}
              onMouseDown={e=>e.currentTarget.style.transform='translateY(3px)'}
              onMouseUp={e=>e.currentTarget.style.transform=''}
              onTouchStart={e=>e.currentTarget.style.transform='translateY(3px)'}
              onTouchEnd={e=>e.currentTarget.style.transform=''}
            >
              <btn.Icon/>
              <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:14,color:btn.color,lineHeight:1.1,textAlign:'center'}}>{btn.label}</div>
              <div style={{fontFamily:'var(--ak-body)',fontWeight:600,fontSize:10,color:'var(--ak-ink-2)',lineHeight:1.1,textAlign:'center'}}>{btn.sublabel}</div>
            </button>
          ))}
        </div>
      )}

      {/* Animating phase placeholder */}
      {phase === 'animating' && (
        <div style={{display:'flex',justifyContent:'center',marginBottom:14}}>
          <div className="ak-pulse" style={{display:'inline-flex',alignItems:'center',gap:10,padding:'14px 24px',borderRadius:999,background:'#fff',boxShadow:'0 4px 0 rgba(45,27,69,.08)',fontFamily:'var(--ak-display)',fontWeight:600,fontSize:16,color:'var(--ak-ink)'}}>
            🌡️ Тепло передаётся…
          </div>
        </div>
      )}

      {/* Success phase */}
      {phase === 'success' && (
        <div style={{marginBottom:14}}>
          <div style={{
            background:'#C8F2DD',
            borderRadius:18,padding:'16px 18px',
            fontFamily:'var(--ak-body)',fontWeight:600,fontSize:14,
            color:'var(--ak-ink)',lineHeight:1.55,
            boxShadow:'0 4px 0 rgba(43,168,115,.2)',
            marginBottom:12,
          }}>
            {sc.fact}
          </div>
          <button className="ak-btn ak-btn--phys" style={{width:'100%'}} onClick={handleNext}>
            {scIdx >= total-1 ? 'Завершить! 🎉' : 'Дальше →'}
          </button>
        </div>
      )}

      <div style={{textAlign:'center',fontSize:13,color:'var(--ak-ink-3)',fontWeight:600}}>
        Сценарий {scIdx+1} из {total}
      </div>
    </div>
  );
}

/* ============================================================
   LEVEL SELECT
   ============================================================ */
const LEVELS = [
  { n:1, title:'Поймай луч!',    sub:'Свет · Зеркала · Отражение', emoji:'🔦', desc:'Открой закон отражения света' },
  { n:2, title:'Собери цепь!',   sub:'Ток · Батарейка · Лампочка', emoji:'💡', desc:'Как работает электрическая цепь' },
  { n:3, title:'Проведи тепло!', sub:'Проводность · Конвекция · Излучение', emoji:'🌡️', desc:'Три способа передачи тепла' },
];

function LevelSelect({ onStart, completed }) {
  return(
    <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'32px 16px 40px',boxSizing:'border-box'}}>
      <div style={{maxWidth:390,margin:'0 auto'}}>
        {/* Header */}
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:64,marginBottom:8,lineHeight:1}}>⚛️</div>
          <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:34,color:'var(--ak-ink)',letterSpacing:'-.5px',marginBottom:6}}>Физика</div>
          <div style={{fontSize:15,color:'var(--ak-ink-2)',fontWeight:600,lineHeight:1.4}}>Свет, электричество и тепло</div>
          <div style={{fontSize:13,color:'var(--ak-ink-3)',fontWeight:500,marginTop:4}}>5–6 класс · ФГОС</div>
        </div>

        {/* Level cards */}
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {LEVELS.map((lv)=>{
            const isDone=completed.has(lv.n);
            const isLocked=lv.n>1&&!completed.has(lv.n-1);
            return(
              <div key={lv.n}
                className={!isLocked?'ak-tap':''}
                onClick={!isLocked?()=>onStart(lv.n):undefined}
                style={{
                  background:isDone
                    ?'linear-gradient(135deg,#E5DCFF,#D0C4FF)'
                    :isLocked?'rgba(255,255,255,.55)'
                    :'linear-gradient(135deg,#fff 0%,#F5F0FF 100%)',
                  borderRadius:24,padding:'20px 22px',
                  boxShadow:isLocked
                    ?'0 4px 0 rgba(45,27,69,.06),0 8px 18px -6px rgba(45,27,69,.08)'
                    :'0 8px 0 rgba(124,95,224,.18),0 16px 32px -10px rgba(124,95,224,.22),inset 0 2px 0 rgba(255,255,255,.9)',
                  cursor:isLocked?'not-allowed':'pointer',
                  opacity:isLocked?.6:1,
                  display:'flex',alignItems:'center',gap:18,
                  border:`2px solid ${isDone?'#B5A1FF':isLocked?'rgba(45,27,69,.06)':'rgba(124,95,224,.14)'}`,
                }}>
                <div style={{
                  width:64,height:64,borderRadius:18,flexShrink:0,
                  background:isDone?'linear-gradient(135deg,#B5A1FF,#7C5FE0)':isLocked?'rgba(45,27,69,.06)':'linear-gradient(135deg,#E5DCFF,#B5A1FF)',
                  display:'flex',alignItems:'center',justifyContent:'center',fontSize:30,
                  boxShadow:isDone?'0 4px 0 #7C5FE0,inset 0 2px 0 rgba(255,255,255,.4)':'none',
                }}>
                  {isLocked?'🔒':lv.emoji}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:19,color:'var(--ak-ink)',marginBottom:3}}>{lv.title}</div>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--ak-ink-3)',marginBottom:5,textTransform:'uppercase',letterSpacing:.6}}>{lv.sub}</div>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--ak-ink-2)',lineHeight:1.3}}>{lv.desc}</div>
                  {isDone&&(
                    <div style={{display:'flex',gap:2,marginTop:6,alignItems:'center'}}>
                      {[0,1,2].map(s=><AKStarSmall key={s} filled/>)}
                      <span style={{fontFamily:'var(--ak-body)',fontWeight:700,fontSize:12,color:'var(--ak-phys-3)',marginLeft:4}}>Пройдено!</span>
                    </div>
                  )}
                </div>
                {!isLocked&&!isDone&&(
                  <button className="ak-btn ak-btn--phys ak-btn--sm" style={{flexShrink:0}}
                    onClick={(e)=>{e.stopPropagation();onStart(lv.n);}}>
                    СТАРТ →
                  </button>
                )}
              </div>
            );
          })}
        </div>

        <div style={{textAlign:'center',marginTop:32,display:'flex',flexDirection:'column',gap:8,alignItems:'center'}}>
          <div style={{fontSize:13,color:'var(--ak-ink-3)',fontWeight:600}}>КосмоБаза · Физика ⚛️</div>
          <a href="index.html" style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:14,color:'var(--ak-phys-3)',textDecoration:'none'}}>
            ← Все предметы
          </a>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   APP ROOT
   ============================================================ */
function App(){
  const [screen,setScreen] = React.useState('select');
  const [completed,setCompleted] = React.useState(new Set());

  const done=(n)=>{ setCompleted(s=>new Set([...s,n])); setScreen('select'); };

  if(screen==='select') return <LevelSelect onStart={n=>setScreen('l'+n)} completed={completed}/>;
  if(screen==='l1') return <Level1Light onDone={()=>done(1)}/>;
  if(screen==='l2') return <Level2Circuit onDone={()=>done(2)}/>;
  if(screen==='l3') return <Level3Heat onDone={()=>done(3)}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
