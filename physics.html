<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>КвантУм — Физика</title>
<style>
@import url('https://fonts.bunny.net/css?family=fredoka-one:400|nunito:500,700,800');
:root{
  --ink:#2D1B45;--ink2:#6B5680;--ink3:#A797B8;
  --phys1:#E5DCFF;--phys2:#B5A1FF;--phys3:#7C5FE0;
  --gold:#FFD262;--goldd:#D4A22B;
  --ok:#5DD9A0;--okd:#2BA873;
  --warn:#FF8B7A;--warnd:#D9523F;
  --surf:#FFFDF7;
  --ff:'Fredoka One','Nunito',system-ui,sans-serif;
  --fb:'Nunito',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;overflow:hidden;height:100%;background:#FFF3E2;}
#root{height:100vh;overflow:hidden;}
body{font-family:var(--fb);color:var(--ink);}
.f{font-family:var(--ff);}
/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--ff);font-size:16px;border:none;cursor:pointer;
  border-radius:999px;padding:13px 22px;line-height:1;transition:transform .08s,box-shadow .08s;
  user-select:none;white-space:nowrap;}
.btn:active{transform:translateY(3px);}
.btn-phys{color:#fff;background:linear-gradient(180deg,#C4B5FF,#B5A1FF 55%,#9C83FF);
  box-shadow:0 5px 0 var(--phys3),0 10px 20px -6px rgba(124,95,224,.45),inset 0 2px 0 rgba(255,255,255,.5);}
.btn-phys:active{box-shadow:0 1px 0 var(--phys3);}
.btn-cta{color:var(--ink);background:linear-gradient(180deg,#FFEDA8,#FFD262 55%,#FFC03A);
  box-shadow:0 5px 0 var(--goldd),0 10px 20px -6px rgba(212,162,43,.5),inset 0 2px 0 rgba(255,255,255,.8);}
.btn-cta:active{box-shadow:0 1px 0 var(--goldd);}
.btn-soft{color:var(--ink);background:linear-gradient(180deg,#fff,#FFF7E8);
  box-shadow:0 4px 0 rgba(45,27,69,.1),0 8px 18px -6px rgba(45,27,69,.12),inset 0 2px 0 #fff,inset 0 0 0 1px rgba(45,27,69,.06);}
.btn-soft:active{box-shadow:0 1px 0 rgba(45,27,69,.1),inset 0 0 0 1px rgba(45,27,69,.06);}
.btn-sq{border-radius:14px;padding:10px 16px;font-size:20px;min-width:48px;}
.btn:disabled{opacity:.45;pointer-events:none;}
/* card */
.card{background:var(--surf);border-radius:26px;
  box-shadow:0 10px 24px -8px rgba(45,27,69,.22),0 4px 10px -4px rgba(45,27,69,.10),
  inset 0 2px 0 rgba(255,255,255,.9),inset 0 -3px 0 rgba(45,27,69,.06);}
/* slider */
input[type=range]{-webkit-appearance:none;width:100%;height:22px;border-radius:999px;
  background:transparent;cursor:pointer;outline:none;}
input[type=range]::-webkit-slider-runnable-track{height:22px;border-radius:999px;
  background:linear-gradient(180deg,var(--phys1),var(--phys2));}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:40px;height:40px;
  border-radius:50%;margin-top:-9px;cursor:pointer;
  background:linear-gradient(180deg,#fff,#FFF7E8);
  box-shadow:0 4px 0 rgba(45,27,69,.15),0 8px 16px -6px rgba(45,27,69,.2);}
/* animations */
@keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-5px) rotate(1deg);}}
@keyframes pop{0%{transform:scale(.6);opacity:0;}65%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}
@keyframes eq-flash{0%,100%{background:rgba(124,95,224,.12);}50%{background:rgba(93,217,160,.35);}}
.bob{animation:bob 3s ease-in-out infinite;}
.pop{animation:pop .38s cubic-bezier(.2,.8,.3,1) forwards;}
.pulse-anim{animation:pulse 1.2s ease-in-out infinite;}
.eq-flash{animation:eq-flash .5s ease-in-out 3;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const G=0.27;

/* ── canvas helpers ──────────────────────────────────────── */
function arrow(ctx,x1,y1,x2,y2,col,w=2.5){
  const a=Math.atan2(y2-y1,x2-x1), hw=w*3;
  ctx.save();ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=w;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hw*Math.cos(a-.45),y2-hw*Math.sin(a-.45));
  ctx.lineTo(x2-hw*Math.cos(a+.45),y2-hw*Math.sin(a+.45));
  ctx.closePath();ctx.fill();ctx.restore();
}
function ball(ctx,x,y,r,c1,c2){
  const g=ctx.createRadialGradient(x-r*.3,y-r*.35,0,x,y,r);
  g.addColorStop(0,'#fff');g.addColorStop(.25,c1);g.addColorStop(1,c2);
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='rgba(45,27,69,.22)';ctx.lineWidth=1.5;ctx.stroke();
}
function evXY(e,canvas){
  const r=canvas.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
  return{x:(t.clientX-r.left)*(canvas.width/r.width),y:(t.clientY-r.top)*(canvas.height/r.height)};
}

/* ── shared UI ───────────────────────────────────────────── */
function Hdr({title,onHome}){
  return(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
      padding:'10px 16px 4px',flexShrink:0}}>
      <button className="btn btn-soft" style={{padding:'8px 14px',fontSize:13}} onClick={onHome}>← Назад</button>
      <div className="f" style={{fontSize:14,color:'var(--ink2)'}}>{title}</div>
    </div>
  );
}

function WinCard({emoji,title,law,fact,cta,onNext,onHome}){
  return(
    <div style={{position:'absolute',inset:0,background:'rgba(45,27,69,.54)',
      backdropFilter:'blur(10px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300}}>
      <div className="card pop" style={{margin:20,padding:28,textAlign:'center',maxWidth:320}}>
        <div style={{fontSize:52,marginBottom:6}}>{emoji}</div>
        <div className="f" style={{fontSize:22,fontWeight:700,color:'var(--ink)',marginBottom:10}}>{title}</div>
        <div style={{background:'var(--phys1)',borderRadius:18,padding:'12px 16px',marginBottom:18}}>
          <div className="f" style={{fontSize:13,color:'var(--phys3)',fontWeight:700,marginBottom:4}}>⚡ {law}</div>
          <div style={{fontSize:13,color:'var(--ink)',lineHeight:1.5}}>{fact}</div>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          <button className="btn btn-soft" style={{padding:'10px 14px'}} onClick={onHome}>🏠</button>
          <button className="btn btn-cta" onClick={onNext}>{cta}</button>
        </div>
      </div>
    </div>
  );
}

function FailCard({tip,onRetry}){
  return(
    <div style={{position:'absolute',inset:0,background:'rgba(45,27,69,.54)',
      backdropFilter:'blur(10px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300}}>
      <div className="card pop" style={{margin:20,padding:28,textAlign:'center',maxWidth:300}}>
        <div style={{fontSize:46,marginBottom:8}}>🤔</div>
        <div className="f" style={{fontSize:20,fontWeight:700,color:'var(--ink)',marginBottom:10}}>Попробуй ещё раз!</div>
        <div style={{fontSize:14,color:'var(--ink2)',lineHeight:1.55,marginBottom:20}}>💡 {tip}</div>
        <button className="btn btn-phys" onClick={onRetry}>Ещё раз 🔄</button>
      </div>
    </div>
  );
}

/* ── Level intro with mini textbook page ─────────────────── */
function IntroPage({num,onStart}){
  const pages=[
    {
      emoji:'💥',color:'#E5DCFF',
      title:'Траектория полёта',
      subtitle:'Уровень 1 · Физика движения',
      diagram: drawDiag1,
      law:'Горизонтальная скорость — постоянная.\nГравитация тянет вниз всё сильнее.\nВместе они дают дугу — параболу!',
      goal:'Выстрели из пушки и попади в цели. Смотри на стрелки скорости во время полёта!',
      badge:'При угле 45° — максимальная дальность',
    },
    {
      emoji:'⚖️',color:'#FFE5C2',
      title:'Закон рычага',
      subtitle:'Уровень 2 · Архимед',
      diagram: drawDiag2,
      law:'Сила × Расстояние = Сила × Расстояние\n\nЛёгкий предмет ДАЛЕКО\nравен тяжёлому БЛИЗКО к опоре!',
      goal:'Перетащи гирю по рычагу чтобы найти равновесие. Уравнение меняется вживую!',
      badge:'«Дайте мне точку опоры и я переверну Землю» — Архимед',
    },
    {
      emoji:'🔦',color:'#C8F2DD',
      title:'Закон отражения',
      subtitle:'Уровень 3 · Свет и зеркала',
      diagram: drawDiag3,
      law:'Угол падения = Угол отражения\n\nЛуч ударяет в зеркало под 30° —\nи улетает тоже под 30°!',
      goal:'Поворачивай зеркало так чтобы луч попал в звезду. Углы показаны вживую!',
      badge:'Именно так работают все зеркала и перископы!',
    },
  ];
  const p=pages[num-1];

  return(
    <div style={{position:'absolute',inset:0,background:`linear-gradient(160deg,${p.color} 0%,#FFF3E2 100%)`,
      display:'flex',flexDirection:'column',alignItems:'center',padding:'28px 24px 24px',
      overflowY:'auto',zIndex:60}}>
      <div className="f" style={{fontSize:12,color:'var(--ink3)',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>{p.subtitle}</div>
      <div className="f" style={{fontSize:26,fontWeight:700,color:'var(--ink)',marginBottom:14}}>{p.title}</div>

      {/* mini diagram */}
      <div style={{width:'100%',maxWidth:320,marginBottom:16}}>
        <canvas id={`diag${num}`} width={320} height={140}
          style={{width:'100%',borderRadius:18,background:'rgba(255,255,255,.7)',display:'block'}}/>
      </div>

      {/* law box */}
      <div style={{width:'100%',maxWidth:320,background:'rgba(255,255,255,.75)',borderRadius:18,
        padding:'14px 18px',marginBottom:12,border:'2px solid rgba(124,95,224,.2)'}}>
        <div className="f" style={{fontSize:13,color:'var(--phys3)',marginBottom:6}}>📐 Закон физики:</div>
        <div style={{fontSize:14,color:'var(--ink)',lineHeight:1.6,whiteSpace:'pre-line'}}>{p.law}</div>
      </div>

      {/* goal */}
      <div style={{width:'100%',maxWidth:320,background:'rgba(255,255,255,.55)',borderRadius:14,
        padding:'10px 16px',marginBottom:12,fontSize:13,color:'var(--ink2)',lineHeight:1.5}}>
        🎮 {p.goal}
      </div>

      {/* badge */}
      <div style={{width:'100%',maxWidth:320,background:'rgba(255,210,98,.25)',borderRadius:14,
        padding:'8px 14px',marginBottom:22,fontFamily:'var(--ff)',fontSize:13,color:'var(--goldd)',textAlign:'center'}}>
        ⭐ {p.badge}
      </div>

      <button className="btn btn-phys" style={{minWidth:200,fontSize:17}} onClick={onStart}>
        Начать! ⚡
      </button>
    </div>
  );
}
/* diagram draw functions — called after mount */
function drawDiag1(canvas){
  const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  // trajectory arc
  ctx.strokeStyle='rgba(124,95,224,.4)';ctx.lineWidth=2;ctx.setLineDash([5,5]);
  ctx.beginPath();
  for(let t=0;t<=50;t++){
    const x=30+t*5.2, y=H-30 - Math.max(0, -(0.28*t*t - 14*t))*0.7;
    t===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();ctx.setLineDash([]);
  // three ball positions with vectors
  [[30,H-30],[100,H-50],[200,H-55],[290,H-30]].forEach(([bx,by],i)=>{
    ball(ctx,bx,by,10,'#C4B5FF','#7C5FE0');
    const vxLen=28, vyLen=8+i*10;
    if(i<3){
      arrow(ctx,bx,by,bx+vxLen,by,'#FF6B35',2);
      if(i>0) arrow(ctx,bx,by,bx,by+vyLen,'#4A9EFF',2);
    }
  });
  // labels
  ctx.font='bold 12px Nunito,sans-serif';
  ctx.fillStyle='#FF6B35';ctx.fillText('→ vx (постоянная)',50,H-12);
  ctx.fillStyle='#4A9EFF';ctx.fillText('↓ g (растёт)',200,28);
}
function drawDiag2(canvas){
  const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2+10;
  // beam
  ctx.strokeStyle='#8B5E3C';ctx.lineWidth=8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-130,cy);ctx.lineTo(cx+130,cy);ctx.stroke();
  // fulcrum
  ctx.fillStyle='#6B5680';ctx.beginPath();ctx.moveTo(cx-16,cy+2);ctx.lineTo(cx+16,cy+2);ctx.lineTo(cx,cy+30);ctx.closePath();ctx.fill();
  // elephant (heavy, close)
  ctx.font='28px serif';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText('🐘',cx-50,cy);
  ctx.fillStyle='#2D1B45';ctx.font='bold 11px Nunito,sans-serif';
  ctx.fillText('тяжёлый\nблизко',cx-50,cy+28);
  // mouse (light, far)
  ctx.font='22px serif';ctx.fillText('🐭',cx+100,cy);
  ctx.fillStyle='#2D1B45';ctx.font='bold 11px Nunito,sans-serif';
  ctx.fillText('лёгкий\nдалеко',cx+100,cy+28);
  // distance arrows
  arrow(ctx,cx,cy-18,cx-50,cy-18,'#FF6B35',1.5);
  arrow(ctx,cx,cy-18,cx+100,cy-18,'#4A9EFF',1.5);
  ctx.font='bold 11px Nunito,sans-serif';
  ctx.fillStyle='#FF6B35';ctx.textAlign='center';ctx.fillText('d₁',cx-25,cy-22);
  ctx.fillStyle='#4A9EFF';ctx.fillText('d₂',cx+50,cy-22);
  ctx.textAlign='left';
}
function drawDiag3(canvas){
  const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const mx=W/2,my=H/2;
  // mirror
  ctx.save();ctx.translate(mx,my);ctx.rotate(-Math.PI/4);
  ctx.fillStyle='#B5A1FF';ctx.fillRect(-4,-50,8,100);
  ctx.restore();
  // normal line (dashed)
  ctx.strokeStyle='rgba(45,27,69,.25)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(mx,my-55);ctx.lineTo(mx,my+55);ctx.stroke();ctx.setLineDash([]);
  // incident ray
  arrow(ctx,60,my-60,mx-4,my+4,'#FF6B35',2.5);
  ctx.fillStyle='#FF6B35';ctx.font='bold 12px Nunito,sans-serif';
  ctx.fillText('45°',75,my-20);
  // reflected ray
  arrow(ctx,mx+4,my-4,250,my-60,'#7C5FE0',2.5);
  ctx.fillStyle='#7C5FE0';ctx.fillText('45°',200,my-20);
  // label
  ctx.fillStyle='#3CA876';ctx.font='bold 13px Nunito,sans-serif';ctx.textAlign='center';
  ctx.fillText('угол падения = угол отражения',W/2,H-10);
  ctx.textAlign='left';
}

/* run diagram draw after DOM ready */
function IntroPageWithDiagram({num,onStart}){
  useEffect(()=>{
    const canvas=document.getElementById(`diag${num}`);
    if(!canvas) return;
    [drawDiag1,drawDiag2,drawDiag3][num-1](canvas);
  },[num]);
  return <IntroPage num={num} onStart={onStart}/>;
}

/* ══════════════════════════════════════════════════════════════
   LEVEL 1 — ТРАЕКТОРИЯ
   Cannon + angle slider → fire → see vx/vy vectors on ball → hit targets
   ══════════════════════════════════════════════════════════════ */
function Level1({onWin,onHome}){
  const [phase,setPhase]=useState('intro'); // intro | play | win | fail
  const [ang,setAng]=useState(45);
  const [fired,setFired]=useState(false);
  const canRef=useRef(null);
  const raf=useRef(null);
  const angRef=useRef(45);
  const gs=useRef(null);

  function buildGs(W,H){
    return{
      W,H,
      cannon:{x:48,y:H-80},
      SPEED:8.5,
      ball:null,
      targets:[
        {x:W*.58,y:H*.42,r:26,alive:true,hit:false},
        {x:W*.78,y:H*.62,r:26,alive:true,hit:false},
        {x:W*.68,y:H*.25,r:26,alive:true,hit:false},
      ],
      done:false,shots:0,maxShots:6,
    };
  }

  useEffect(()=>{
    if(phase!=='play') return;
    const canvas=canRef.current;
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    gs.current=buildGs(W,H);
    const g=gs.current;

    function drawCannon(a){
      const ar=a*Math.PI/180;
      const cx=g.cannon.x,cy=g.cannon.y;
      ctx.save();ctx.translate(cx,cy);ctx.rotate(-ar);
      const gr=ctx.createLinearGradient(0,-11,65,-11);
      gr.addColorStop(0,'#C4B5FF');gr.addColorStop(1,'#7C5FE0');
      ctx.fillStyle=gr;ctx.beginPath();ctx.rect(0,-11,65,22);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.rect(5,-7,55,9);ctx.fill();
      ctx.restore();
      ctx.save();ctx.translate(cx,cy);
      const pg=ctx.createRadialGradient(-4,-4,0,0,0,20);
      pg.addColorStop(0,'#C4B5FF');pg.addColorStop(1,'#7C5FE0');
      ctx.fillStyle=pg;ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }

    function drawTarget(t){
      if(!t.alive) return;
      ctx.beginPath();ctx.arc(t.x,t.y,t.r+6,0,Math.PI*2);
      ctx.fillStyle='rgba(255,210,98,.15)';ctx.fill();
      ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);
      ctx.fillStyle='#FFE49E';ctx.fill();
      ctx.strokeStyle='#D4972B';ctx.lineWidth=2.5;ctx.stroke();
      ctx.font=`${t.r*1.5}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⭐',t.x,t.y);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';
    }

    function simPreview(ar){
      const cx=g.cannon.x,cy=g.cannon.y;
      const vx0=Math.cos(ar)*g.SPEED, vy0=-Math.sin(ar)*g.SPEED;
      const pts=[];let x=cx,y=cy,vx=vx0,vy=vy0;
      for(let i=0;i<200;i++){
        x+=vx;y+=vy;vy+=G;
        if(y>H||x>W+20||x<-20) break;
        pts.push({x,y});
      }
      return pts;
    }

    function loop(){
      const a=angRef.current;
      const ar=a*Math.PI/180;
      ctx.clearRect(0,0,W,H);
      // sky
      const sky=ctx.createLinearGradient(0,0,0,H);
      sky.addColorStop(0,'#D8CCFF');sky.addColorStop(1,'#FFF3E2');
      ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
      // ground
      ctx.fillStyle='#DCF7E7';ctx.fillRect(0,H-46,W,46);
      ctx.fillStyle='#3CA876';ctx.fillRect(0,H-46,W,5);
      // targets
      g.targets.forEach(drawTarget);
      // cannon
      drawCannon(a);
      ctx.font='28px serif';ctx.textBaseline='alphabetic';
      ctx.fillText('🧑‍🔬',g.cannon.x-50,g.cannon.y+44);

      // preview trajectory (dotted) when no ball
      if(!g.ball){
        const pts=simPreview(ar);
        pts.forEach((p,i)=>{
          if(i%5!==0) return;
          ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
          ctx.fillStyle=`rgba(124,95,224,${(1-i/pts.length)*.45})`;ctx.fill();
        });
        // angle indicator at cannon
        ctx.save();ctx.translate(g.cannon.x,g.cannon.y);
        ctx.strokeStyle='rgba(124,95,224,.35)';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(0,0,42,-ar-.05,0,false);ctx.stroke();
        ctx.restore();
        ctx.fillStyle='var(--phys3)';ctx.font='bold 14px Nunito,sans-serif';
        const lx=g.cannon.x+46,ly=g.cannon.y-36;
        ctx.fillText(`${a}°`,lx,ly);
        if(Math.abs(a-45)<6){
          ctx.fillStyle='#D4A22B';ctx.font='bold 12px Nunito,sans-serif';
          ctx.fillText('⭐ ИДЕАЛЬНЫЙ УГОЛ!',lx-30,ly-18);
        }
      }

      // ball in flight
      if(g.ball){
        const b=g.ball;
        b.frame=(b.frame||0)+1;
        b.trail.push({x:b.x,y:b.y});
        if(b.trail.length>16) b.trail.shift();
        b.x+=b.vx;b.y+=b.vy;b.vy+=G;
        // trail
        b.trail.forEach((p,i)=>{
          ctx.beginPath();ctx.arc(p.x,p.y,9*(i/b.trail.length),0,Math.PI*2);
          ctx.fillStyle=`rgba(124,95,224,${(i/b.trail.length)*.25})`;ctx.fill();
        });
        ball(ctx,b.x,b.y,11,'#C4B5FF','#7C5FE0');
        // VELOCITY VECTORS — THIS IS THE EDUCATIONAL PART
        const vxLen=38; // constant
        const vyLen=Math.min(Math.abs(b.vy)*5,55); // grows with gravity
        // horizontal (red) — always same
        arrow(ctx,b.x,b.y,b.x+vxLen,b.y,'#FF6B35',2.5);
        ctx.fillStyle='#FF6B35';ctx.font='bold 11px Nunito,sans-serif';
        ctx.fillText('vx',b.x+vxLen+4,b.y-2);
        // vertical (blue) — grows
        arrow(ctx,b.x,b.y,b.x,b.y+vyLen,'#4A9EFF',2.5);
        ctx.fillStyle='#4A9EFF';ctx.font='bold 11px Nunito,sans-serif';
        ctx.fillText('g↓',b.x+5,b.y+vyLen+13);
        // annotation bubble
        if(b.frame===20){
          ctx.save();
          ctx.fillStyle='rgba(255,255,255,.92)';
          ctx.beginPath();ctx.roundRect(b.x-90,b.y-50,120,36,10);ctx.fill();
          ctx.fillStyle='var(--ink)';ctx.font='bold 11px Nunito,sans-serif';
          ctx.fillText('vx — не меняется!',b.x-82,b.y-30);
          ctx.fillText('g — нарастает!',b.x-82,b.y-14);
          ctx.restore();
        }
        // hit check
        g.targets.forEach(t=>{
          if(!t.alive) return;
          if(Math.hypot(b.x-t.x,b.y-t.y)<11+t.r){
            t.alive=false;t.hit=true;
            // star burst
            t.burst=Array.from({length:8},(_,i)=>({a:(i/8)*Math.PI*2,d:0}));
          }
        });
        if(b.y>H+20||b.x>W+20) g.ball=null;
      }

      // hit bursts
      g.targets.filter(t=>t.burst).forEach(t=>{
        t.burst.forEach(pt=>{
          pt.d+=3;
          ctx.beginPath();ctx.arc(t.x+Math.cos(pt.a)*pt.d,t.y+Math.sin(pt.a)*pt.d,4-pt.d/16,0,Math.PI*2);
          ctx.fillStyle=`rgba(255,210,98,${Math.max(0,1-pt.d/40)})`;ctx.fill();
        });
        if(t.burst[0].d>40) delete t.burst;
      });

      // HUD
      const alive=g.targets.filter(t=>t.alive).length;
      ctx.fillStyle='var(--ink2)';ctx.font='bold 13px Nunito,sans-serif';ctx.textAlign='right';
      ctx.fillText(`⭐ ${3-alive}/3  ·  🔴 ${g.maxShots-g.shots} выстрелов`,W-12,24);
      ctx.textAlign='left';

      if(!g.done){
        if(alive===0){g.done=true;setTimeout(()=>setPhase('win'),500);}
        else if(g.shots>=g.maxShots&&!g.ball&&alive>0){g.done=true;setTimeout(()=>setPhase('fail'),500);}
      }
      raf.current=requestAnimationFrame(loop);
    }
    raf.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(raf.current);
  },[phase]);

  function fire(){
    const g=gs.current;
    if(!g||g.ball||g.done||g.shots>=g.maxShots) return;
    const ar=angRef.current*Math.PI/180;
    g.ball={x:g.cannon.x,y:g.cannon.y,vx:Math.cos(ar)*g.SPEED,vy:-Math.sin(ar)*g.SPEED,trail:[],frame:0};
    g.shots++;setFired(true);
  }
  function retry(){
    if(canRef.current) gs.current=buildGs(canRef.current.width,canRef.current.height);
    setFired(false);setPhase('play');
  }

  return(
    <div style={{position:'relative',width:'100%',height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',
      background:'linear-gradient(180deg,#D8CCFF 0%,#FFF3E2 100%)'}}>
      <Hdr title="Уровень 1 · Траектория полёта" onHome={onHome}/>
      <canvas ref={canRef} width={360} height={490}
        style={{width:'100%',flex:1,display:'block'}}/>
      {/* controls */}
      <div style={{padding:'10px 20px 16px',background:'rgba(255,255,255,.7)',backdropFilter:'blur(8px)',flexShrink:0}}>
        <div className="f" style={{fontSize:13,color:'var(--ink2)',textAlign:'center',marginBottom:6}}>
          Угол выстрела: <strong style={{color:'var(--phys3)'}}>{ang}°</strong>
          {Math.abs(ang-45)<6?<span style={{color:'var(--goldd)'}}> ⭐ идеальный!</span>:null}
        </div>
        <input type="range" min="5" max="80" value={ang}
          onChange={e=>{const v=+e.target.value;setAng(v);angRef.current=v;}}
          style={{width:'100%',marginBottom:8}}/>
        <div style={{display:'flex',justifyContent:'center',gap:12}}>
          <button className="btn btn-phys" onClick={fire} disabled={!!(gs.current?.ball)||phase==='play'&&!!(gs.current?.done)}>
            💥 Выстрел!
          </button>
        </div>
      </div>
      {phase==='intro' && <IntroPageWithDiagram num={1} onStart={()=>setPhase('play')}/>}
      {phase==='win' && <WinCard emoji="🎯" title="Все звёзды сбиты!"
        law="Закон движения тел" fact="Горизонтальная скорость постоянна, гравитация нарастает вниз — вместе они дают дугу (параболу). При угле 45° дальность максимальна!"
        cta="Уровень 2 →" onNext={onWin} onHome={onHome}/>}
      {phase==='fail' && <FailCard tip="Видел стрелки на шаре? Красная (→) не меняется, синяя (↓) растёт — попробуй угол 45°!" onRetry={retry}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   LEVEL 2 — РЫЧАГ
   Drag the counterweight along a lever — live equation F×d = F×d
   ══════════════════════════════════════════════════════════════ */
function Level2({onWin,onHome}){
  const [phase,setPhase]=useState('intro');
  const [puzzle,setPuzzle]=useState(0);
  const [eqFlash,setEqFlash]=useState(false);
  const canRef=useRef(null);
  const raf=useRef(null);
  const gs=useRef(null);
  const dragging=useRef(false);

  const puzzles=[
    {leftMass:80,leftDist:50,rightMass:20,emoji1:'🐘',emoji2:'🐭',solution:200},
    {leftMass:60,leftDist:70,rightMass:30,emoji1:'🦒',emoji2:'🐱',solution:140},
    {leftMass:100,leftDist:40,rightMass:25,emoji1:'🦏',emoji2:'🐇',solution:160},
  ];

  function buildGs(W,H,pz){
    return{
      W,H,
      cx:W/2,cy:H*0.44,
      armLen:140,
      pz,
      rightPos:50, // px from center (draggable)
      beamAngle:0,
      balanced:false,
      done:false,
    };
  }

  useEffect(()=>{
    if(phase!=='play') return;
    const canvas=canRef.current;
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    const pz=puzzles[puzzle];
    gs.current=buildGs(W,H,pz);
    const g=gs.current;

    function onDown(e){
      e.preventDefault();
      dragging.current=true;
    }
    function onMove(e){
      e.preventDefault();
      if(!dragging.current) return;
      const pos=evXY(e,canvas);
      const dx=pos.x-g.cx;
      g.rightPos=Math.max(10,Math.min(g.armLen-10,dx));
    }
    function onUp(e){e.preventDefault();dragging.current=false;}
    canvas.addEventListener('pointerdown',onDown,{passive:false});
    canvas.addEventListener('pointermove',onMove,{passive:false});
    canvas.addEventListener('pointerup',onUp,{passive:false});

    function loop(){
      const pz=g.pz;
      const torqueL=pz.leftMass*pz.leftDist;
      const torqueR=pz.rightMass*g.rightPos;
      const net=torqueL-torqueR;
      g.beamAngle=Math.max(-.45,Math.min(.45,net/3000));
      g.balanced=Math.abs(net)<pz.rightMass*8;

      ctx.clearRect(0,0,W,H);
      // BG
      const bg=ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0,'#FFE5C2');bg.addColorStop(1,'#FFF3E2');
      ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
      // ground
      ctx.fillStyle='#DCF7E7';ctx.fillRect(0,H-46,W,46);
      ctx.fillStyle='#3CA876';ctx.fillRect(0,H-46,W,5);

      // draw beam
      const BA=g.beamAngle;
      const cx=g.cx,cy=g.cy,arm=g.armLen;
      // beam line
      ctx.save();ctx.translate(cx,cy);ctx.rotate(BA);
      const beamGr=ctx.createLinearGradient(-arm,-6,arm,-6);
      beamGr.addColorStop(0,'#8B5E3C');beamGr.addColorStop(.5,'#A0722A');beamGr.addColorStop(1,'#8B5E3C');
      ctx.fillStyle=beamGr;ctx.beginPath();ctx.rect(-arm,-7,arm*2,14);ctx.fill();
      // tick marks
      ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.5;
      for(let d=-arm;d<=arm;d+=20){ctx.beginPath();ctx.moveTo(d,-4);ctx.lineTo(d,4);ctx.stroke();}
      ctx.restore();

      // fulcrum triangle
      ctx.save();ctx.translate(cx,cy);
      ctx.fillStyle='#6B5680';
      ctx.beginPath();ctx.moveTo(-20,2);ctx.lineTo(20,2);ctx.lineTo(0,36);ctx.closePath();ctx.fill();
      ctx.fillStyle='#8B7095';
      ctx.beginPath();ctx.moveTo(-18,2);ctx.lineTo(18,2);ctx.lineTo(0,32);ctx.closePath();ctx.fill();
      ctx.restore();

      // left weight position (fixed)
      const lx=cx+(-pz.leftDist)*Math.cos(BA)-6*Math.sin(BA);
      const ly=cy+(-pz.leftDist)*Math.sin(BA)+6*Math.cos(BA);
      // left emoji
      ctx.font='36px serif';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(pz.emoji1,lx,ly-2);
      // left distance arrow
      const midLX=(cx+lx)/2,midLY=(cy+ly)/2-20;
      arrow(ctx,cx+(BA<.05?-2:0),cy-20,lx-2,ly-20,'#FF6B35',2);
      ctx.fillStyle='#FF6B35';ctx.font='bold 12px Nunito,sans-serif';
      ctx.fillText(`d₁=${pz.leftDist}`,midLX-16,midLY-4);

      // right weight — draggable
      const rx=cx+g.rightPos*Math.cos(BA)-6*Math.sin(BA);
      const ry=cy+g.rightPos*Math.sin(BA)+6*Math.cos(BA);
      ctx.font='30px serif';ctx.textBaseline='bottom';ctx.textAlign='center';
      ctx.fillText(pz.emoji2,rx,ry-2);
      // drag handle ring
      ctx.beginPath();ctx.arc(rx,ry-18,18,0,Math.PI*2);
      ctx.strokeStyle=g.balanced?'#5DD9A0':'#B5A1FF';ctx.lineWidth=2.5;ctx.stroke();
      ctx.fillStyle=g.balanced?'rgba(93,217,160,.18)':'rgba(124,95,224,.1)';ctx.fill();
      // right distance arrow
      const midRX=(cx+rx)/2,midRY=(cy+ry)/2-20;
      arrow(ctx,cx,cy-20,rx,ry-20,'#4A9EFF',2);
      ctx.fillStyle='#4A9EFF';ctx.font='bold 12px Nunito,sans-serif';
      ctx.fillText(`d₂=${Math.round(g.rightPos)}`,midRX+10,midRY-4);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';

      // LIVE EQUATION BOX — educational centrepiece
      const eqY=H-100;
      const tL=pz.leftMass*pz.leftDist, tR=Math.round(pz.rightMass*g.rightPos);
      const balanced=g.balanced;
      ctx.fillStyle=balanced?'rgba(93,217,160,.25)':'rgba(229,220,255,.5)';
      ctx.strokeStyle=balanced?'#2BA873':'#B5A1FF';ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(20,eqY,W-40,52,14);ctx.fill();ctx.stroke();
      ctx.textAlign='center';ctx.font='bold 15px Nunito,sans-serif';
      ctx.fillStyle=balanced?'#2BA873':'var(--phys3)';
      ctx.fillText(`${pz.leftMass} × ${pz.leftDist}`,W/2-60,eqY+20);
      ctx.fillStyle='var(--ink)';ctx.font='bold 18px Nunito,sans-serif';
      ctx.fillText('=',W/2,eqY+20);
      ctx.fillStyle=balanced?'#2BA873':'#4A9EFF';ctx.font='bold 15px Nunito,sans-serif';
      ctx.fillText(`${pz.rightMass} × ${Math.round(g.rightPos)}`,W/2+56,eqY+20);
      // second row: numbers
      ctx.fillStyle=balanced?'#2BA873':'var(--ink)';ctx.font='bold 17px Nunito,sans-serif';
      ctx.fillText(`${tL}`,W/2-60,eqY+42);
      ctx.fillStyle='var(--ink2)';ctx.font='bold 13px Nunito,sans-serif';
      ctx.fillText('Н·м',W/2-28,eqY+42);
      ctx.fillStyle='var(--ink)';ctx.font='bold 18px Nunito,sans-serif';
      ctx.fillText(balanced?'=':'≠',W/2,eqY+42);
      ctx.fillStyle=balanced?'#2BA873':tR>tL?'#D9523F':'var(--ink)';
      ctx.font='bold 17px Nunito,sans-serif';
      ctx.fillText(`${tR}`,W/2+56,eqY+42);
      ctx.fillStyle='var(--ink2)';ctx.font='bold 13px Nunito,sans-serif';
      ctx.fillText('Н·м',W/2+78,eqY+42);
      ctx.textAlign='left';

      // balanced sparkle
      if(g.balanced&&!g.done){
        g.done=true;
        setTimeout(()=>{
          if(puzzle<puzzles.length-1){setPuzzle(p=>p+1);setPhase('between');}
          else setPhase('win');
        },800);
      }

      // hint
      if(!g.balanced){
        ctx.fillStyle='var(--ink3)';ctx.font='13px Nunito,sans-serif';ctx.textAlign='center';
        ctx.fillText('← тяни гирю по рычагу →',W/2,H-108);ctx.textAlign='left';
      }
      raf.current=requestAnimationFrame(loop);
    }
    raf.current=requestAnimationFrame(loop);
    return()=>{
      cancelAnimationFrame(raf.current);
      canvas.removeEventListener('pointerdown',onDown);
      canvas.removeEventListener('pointermove',onMove);
      canvas.removeEventListener('pointerup',onUp);
    };
  },[phase,puzzle]);

  // between puzzles
  useEffect(()=>{
    if(phase==='between'){setTimeout(()=>setPhase('play'),400);}
  },[phase]);

  return(
    <div style={{position:'relative',width:'100%',height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',
      background:'linear-gradient(180deg,#FFE5C2 0%,#FFF3E2 100%)'}}>
      <Hdr title="Уровень 2 · Закон рычага" onHome={onHome}/>
      <div style={{display:'flex',justifyContent:'center',gap:6,padding:'4px 0',flexShrink:0}}>
        {puzzles.map((_,i)=>(
          <div key={i} style={{width:28,height:8,borderRadius:4,
            background:i<puzzle?'#5DD9A0':i===puzzle?'#B5A1FF':'rgba(45,27,69,.12)'}}/>
        ))}
      </div>
      <canvas ref={canRef} width={360} height={520} style={{width:'100%',flex:1,display:'block',touchAction:'none'}}/>
      {phase==='intro' && <IntroPageWithDiagram num={2} onStart={()=>setPhase('play')}/>}
      {phase==='win' && <WinCard emoji="⚖️" title="Идеальное равновесие!"
        law="Закон рычага Архимеда" fact="Сила × расстояние = Сила × расстояние. Маленькая сила далеко от точки опоры уравновешивает большую силу близко — именно так работают весы, качели и краны!"
        cta="Уровень 3 →" onNext={onWin} onHome={onHome}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   LEVEL 3 — ЗЕРКАЛО И ОТРАЖЕНИЕ
   Rotate a mirror → laser beam reflects → show angles live → hit star
   ══════════════════════════════════════════════════════════════ */
function Level3({onWin,onHome}){
  const [phase,setPhase]=useState('intro');
  const [puzzle,setPuzzle]=useState(0);
  const [mirrorAng,setMirrorAng]=useState(45);
  const canRef=useRef(null);
  const raf=useRef(null);
  const mRef=useRef(45);

  const puzzles=[
    {src:{x:30,y:200},srcDir:0,   target:{x:320,y:100,r:26},solution:68},
    {src:{x:30,y:300},srcDir:0,   target:{x:300,y:160,r:26},solution:76},
    {src:{x:30,y:160},srcDir:-15, target:{x:310,y:340,r:26},solution:35},
  ];

  function reflect(dx,dy,nx,ny){
    const dot=dx*nx+dy*ny;
    return{rx:dx-2*dot*nx, ry:dy-2*dot*ny};
  }

  function trace(pz,ma){
    const W=360,H=520;
    const mx=W/2,my=H/2;
    const sd=(pz.srcDir||0)*Math.PI/180;
    const idx=Math.cos(sd),idy=Math.sin(sd);
    // incident ray from src to mirror centre
    const{x:sx,y:sy}=pz.src;
    // mirror: line through (mx,my) at angle ma
    const mar=ma*Math.PI/180;
    // mirror normal (perpendicular)
    const nx=Math.sin(mar),ny=-Math.cos(mar);
    const{rx,ry}=reflect(idx,idy,nx,ny);
    // intersect incident ray with mirror line
    // parametric: P = src + t*(id)
    // mirror: Q = center + s*(cos(mar),sin(mar))
    // find t where ray hits the infinite mirror line
    const denom=idx*ny-idy*nx;
    let hitX=mx,hitY=my;
    if(Math.abs(denom)>0.001){
      const t=((mx-sx)*ny-(my-sy)*nx)/denom;
      hitX=sx+idx*t; hitY=sy+idy*t;
    }
    return{hitX,hitY,rx,ry,mx,my,mar,nx,ny};
  }

  function angBetween(dx,dy,nx,ny){
    const dot=Math.abs(dx*nx+dy*ny);
    return Math.round(Math.acos(Math.min(1,dot))*180/Math.PI);
  }

  useEffect(()=>{
    if(phase!=='play') return;
    const canvas=canRef.current;
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    const pz=puzzles[puzzle];

    function loop(){
      const ma=mRef.current;
      const{hitX,hitY,rx,ry,mx,my,mar,nx,ny}=trace(pz,ma);
      const sd=(pz.srcDir||0)*Math.PI/180;
      const idx=Math.cos(sd),idy=Math.sin(sd);
      const incAngle=angBetween(idx,idy,nx,ny);
      const refAngle=angBetween(rx,ry,nx,ny);
      const equal=Math.abs(incAngle-refAngle)<3;
      const t=pz.target;
      // where does reflected ray go?
      const refEndX=hitX+rx*320, refEndY=hitY+ry*320;
      const hitsTarget=Math.hypot(hitX+rx*((t.x-hitX)/rx||0)-t.x, hitY+ry*((t.x-hitX)/rx||0)-t.y)<t.r+6;
      // check if reflected ray passes close to target
      // parametric distance from target to line (hitX,hitY)+t*(rx,ry)
      const tvx=t.x-hitX, tvy=t.y-hitY;
      const proj=tvx*rx+tvy*ry;
      const perpX=tvx-proj*rx, perpY=tvy-proj*ry;
      const dist=Math.hypot(perpX,perpY);
      const hit=proj>0&&dist<t.r+8;

      ctx.clearRect(0,0,W,H);
      // BG dark-ish for laser effect
      ctx.fillStyle='#1A1035';ctx.fillRect(0,0,W,H);
      // subtle grid
      ctx.strokeStyle='rgba(124,95,224,.07)';ctx.lineWidth=1;
      for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

      // target star
      ctx.beginPath();ctx.arc(t.x,t.y,t.r+8,0,Math.PI*2);
      ctx.fillStyle=hit?'rgba(93,217,160,.3)':'rgba(255,210,98,.1)';ctx.fill();
      ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);
      ctx.fillStyle=hit?'rgba(93,217,160,.4)':'rgba(255,210,98,.15)';ctx.fill();
      ctx.strokeStyle=hit?'#5DD9A0':'#FFD262';ctx.lineWidth=2.5;ctx.stroke();
      ctx.font='28px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⭐',t.x,t.y);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';

      // laser source
      ctx.fillStyle='#FF6B35';ctx.beginPath();ctx.arc(pz.src.x,pz.src.y,10,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,107,53,.3)';ctx.beginPath();ctx.arc(pz.src.x,pz.src.y,18,0,Math.PI*2);ctx.fill();
      ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🔦',pz.src.x,pz.src.y);ctx.textAlign='left';ctx.textBaseline='alphabetic';

      // INCIDENT RAY
      ctx.save();ctx.strokeStyle='#FF6B35';ctx.lineWidth=2.5;
      ctx.shadowColor='#FF6B35';ctx.shadowBlur=8;
      ctx.beginPath();ctx.moveTo(pz.src.x,pz.src.y);ctx.lineTo(hitX,hitY);ctx.stroke();
      ctx.restore();

      // MIRROR
      ctx.save();ctx.translate(mx,my);ctx.rotate(mar);
      const mirGr=ctx.createLinearGradient(0,-52,0,52);
      mirGr.addColorStop(0,'rgba(181,161,255,.2)');
      mirGr.addColorStop(.5,'rgba(181,161,255,.85)');
      mirGr.addColorStop(1,'rgba(181,161,255,.2)');
      ctx.fillStyle=mirGr;ctx.fillRect(-5,-52,10,104);
      ctx.strokeStyle='#B5A1FF';ctx.lineWidth=2;ctx.strokeRect(-5,-52,10,104);
      // shine
      ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillRect(-1,-52,4,104);
      ctx.restore();

      // NORMAL LINE (dashed)
      ctx.save();ctx.strokeStyle='rgba(181,161,255,.35)';ctx.lineWidth=1.5;ctx.setLineDash([5,5]);
      ctx.beginPath();
      ctx.moveTo(hitX-nx*55,hitY-ny*55);
      ctx.lineTo(hitX+nx*55,hitY+ny*55);
      ctx.stroke();ctx.setLineDash([]);ctx.restore();

      // REFLECTED RAY
      ctx.save();ctx.strokeStyle=hit?'#5DD9A0':'#B5A1FF';ctx.lineWidth=2.5;
      ctx.shadowColor=hit?'#5DD9A0':'#B5A1FF';ctx.shadowBlur=8;
      ctx.beginPath();ctx.moveTo(hitX,hitY);ctx.lineTo(hitX+rx*350,hitY+ry*350);ctx.stroke();
      ctx.restore();

      // ANGLE LABELS — THE EDUCATIONAL HEART
      const labelR=46;
      // incident angle arc
      const incDir=Math.atan2(idy,idx)+Math.PI; // pointing toward hit
      const normDir=Math.atan2(-ny,-nx);
      ctx.save();ctx.strokeStyle='#FF6B35';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(hitX,hitY,labelR,incDir,normDir,incDir<normDir);ctx.stroke();
      ctx.fillStyle='#FF6B35';ctx.font='bold 13px Nunito,sans-serif';ctx.textAlign='center';
      const iLX=hitX+Math.cos((incDir+normDir)/2)*60;
      const iLY=hitY+Math.sin((incDir+normDir)/2)*60;
      ctx.fillText(`${incAngle}°`,iLX,iLY);
      // reflected angle arc
      const refDir=Math.atan2(ry,rx);
      const normDir2=Math.atan2(ny,nx);
      ctx.strokeStyle=hit?'#5DD9A0':'#B5A1FF';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(hitX,hitY,labelR,normDir2,refDir,normDir2>refDir);ctx.stroke();
      ctx.fillStyle=hit?'#5DD9A0':'#B5A1FF';
      const rLX=hitX+Math.cos((normDir2+refDir)/2)*60;
      const rLY=hitY+Math.sin((normDir2+refDir)/2)*60;
      ctx.fillText(`${refAngle}°`,rLX,rLY);
      ctx.textAlign='left';ctx.restore();

      // EQUATION BOX
      const eqBg=hit?'rgba(93,217,160,.2)':'rgba(229,220,255,.12)';
      ctx.fillStyle=eqBg;
      ctx.beginPath();ctx.roundRect(16,H-76,W-32,52,14);ctx.fill();
      ctx.strokeStyle=hit?'#5DD9A0':'rgba(181,161,255,.5)';ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(16,H-76,W-32,52,14);ctx.stroke();
      ctx.textAlign='center';ctx.font='bold 14px Nunito,sans-serif';
      ctx.fillStyle='#FF6B35';ctx.fillText(`угол падения: ${incAngle}°`,W/2-70,H-56);
      ctx.fillStyle=hit?'#5DD9A0':'var(--ink3)';ctx.fillText(hit?'=':'≠',W/2,H-56);
      ctx.fillStyle=hit?'#5DD9A0':'#B5A1FF';ctx.fillText(`угол отражения: ${refAngle}°`,W/2+72,H-56);
      ctx.fillStyle=hit?'#5DD9A0':'rgba(181,161,255,.7)';ctx.font='bold 13px Nunito,sans-serif';
      ctx.fillText(hit?'✓ Закон отражения работает! ✓':'вращай зеркало пока углы не совпадут',W/2,H-32);
      ctx.textAlign='left';

      if(hit&&!gs.current?.done){
        if(!gs.current) gs.current={};
        gs.current.done=true;
        setTimeout(()=>{
          if(puzzle<puzzles.length-1){setPuzzle(p=>p+1);setPhase('between');}
          else setPhase('win');
        },900);
      }
      raf.current=requestAnimationFrame(loop);
    }
    if(!gs.current) gs.current={};
    gs.current.done=false;
    raf.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(raf.current);
  },[phase,puzzle]);

  useEffect(()=>{
    if(phase==='between') setTimeout(()=>{gs.current={};setPhase('play');},300);
  },[phase]);

  return(
    <div style={{position:'relative',width:'100%',height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',
      background:'#1A1035'}}>
      <Hdr title="Уровень 3 · Закон отражения" onHome={onHome}/>
      <div style={{display:'flex',justifyContent:'center',gap:6,padding:'4px 0',flexShrink:0}}>
        {puzzles.map((_,i)=>(
          <div key={i} style={{width:28,height:8,borderRadius:4,
            background:i<puzzle?'#5DD9A0':i===puzzle?'#B5A1FF':'rgba(255,255,255,.12)'}}/>
        ))}
      </div>
      <canvas ref={canRef} width={360} height={520} style={{width:'100%',flex:1,display:'block'}}/>
      {/* mirror controls */}
      <div style={{padding:'10px 20px 16px',background:'rgba(26,16,53,.9)',backdropFilter:'blur(8px)',flexShrink:0}}>
        <div className="f" style={{fontSize:13,color:'#B5A1FF',textAlign:'center',marginBottom:6}}>
          Зеркало: <strong style={{color:'#fff'}}>{mirrorAng}°</strong> — вращай пока углы совпадут
        </div>
        <input type="range" min="10" max="170" value={mirrorAng}
          onChange={e=>{const v=+e.target.value;setMirrorAng(v);mRef.current=v;}}
          style={{width:'100%'}}/>
      </div>
      {phase==='intro' && <IntroPageWithDiagram num={3} onStart={()=>setPhase('play')}/>}
      {phase==='win' && <WinCard emoji="🔦" title="Мастер зеркал!"
        law="Закон отражения света" fact="Угол падения всегда равен углу отражения. Именно так работают зеркала, перископы подводных лодок и телескопы!"
        cta="Все уровни пройдены 🎉" onNext={onWin} onHome={onHome}/>}
    </div>
  );
}

            border:'none',cursor:'pointer',textAlign:'left',
            boxShadow:'0 6px 0 rgba(45,27,69,.08),0 12px 24px -8px rgba(45,27,69,.12),inset 0 2px 0 #fff',
            transition:'transform .1s',
          }}>
            <div style={{width:54,height:54,borderRadius:'50%',flexShrink:0,

              <div className="f" style={{fontSize:18,fontWeight:700,color:'var(--ink)'}}>

/* ══════════════════════════════════════════════════════════════ APP */
function App(){
  const [screen,setScreen]=useState('home');
  return(
    <div style={{width:'100%',height:'100vh',maxWidth:480,margin:'0 auto',position:'relative',overflow:'hidden'}}>
      {screen==='home'&&<HomeScreen onSelect={n=>setScreen(`l${n}`)}/>}
      {screen==='l1'&&<Level1 onWin={()=>setScreen('l2')} onHome={()=>setScreen('home')}/>}
      {screen==='l2'&&<Level2 onWin={()=>setScreen('l3')} onHome={()=>setScreen('home')}/>}
      {screen==='l3'&&<Level3 onWin={()=>setScreen('home')} onHome={()=>setScreen('home')}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
