<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Физика — КосмоБаза</title>
<link href="https://fonts.bunny.net/css?family=space-grotesk:400,700,800" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Space Grotesk',sans-serif;background:#1a237e;}

/* ===== INTRO ===== */
#intro{position:fixed;inset:0;z-index:200;background:#1a237e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#intro-canvas{position:absolute;inset:0;pointer-events:none;}
#intro-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;}
.intro-icon{font-size:100px;line-height:1;animation:floatIcon 2s ease-in-out infinite;}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.intro-title{font-size:42px;font-weight:800;color:#fff;letter-spacing:-1px;}
.intro-sub{font-size:18px;color:#90CAF9;font-weight:700;}
.intro-btn{background:#FFE141;color:#111;border:none;padding:18px 56px;border-radius:40px;font-size:22px;font-weight:800;cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 8px 24px rgba(255,225,65,.35);transition:transform .15s cubic-bezier(.34,1.56,.64,1);}
.intro-btn:active{transform:scale(.95);}

/* ===== LEVEL SELECT ===== */
#level-select{position:fixed;inset:0;z-index:190;background:linear-gradient(160deg,#1a237e 0%,#0d47a1 100%);display:none;flex-direction:column;overflow-y:auto;}
.ls-header{padding:24px 20px 12px;text-align:center;}
.ls-title{font-size:28px;font-weight:800;color:#fff;}
.ls-sub{font-size:14px;color:#90CAF9;margin-top:4px;}
.ls-cards{display:flex;flex-direction:column;gap:14px;padding:12px 20px 32px;}
.ls-card{height:110px;border-radius:24px;display:flex;align-items:center;gap:16px;padding:0 24px;cursor:pointer;border:none;font-family:'Space Grotesk',sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:transform .15s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;}
.ls-card:active{transform:scale(.97);}
.ls-card-1{background:linear-gradient(135deg,#FF6B6B,#FF8E53);}
.ls-card-2{background:linear-gradient(135deg,#4FACFE,#00F2FE);}
.ls-card-3{background:linear-gradient(135deg,#A8EDEA,#FED6E3);}
.ls-emoji{font-size:60px;line-height:1;flex-shrink:0;}
.ls-info{text-align:left;}
.ls-name{font-size:22px;font-weight:800;color:#fff;}
.ls-card-3 .ls-name{color:#333;}
.ls-desc{font-size:13px;color:rgba(255,255,255,.85);margin-top:2px;font-weight:700;}
.ls-card-3 .ls-desc{color:rgba(0,0,0,.6);}
.ls-badge{position:absolute;right:18px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.25);border-radius:12px;padding:6px 14px;font-size:13px;font-weight:800;color:#fff;}
.ls-card-3 .ls-badge{color:#333;background:rgba(0,0,0,.12);}

/* ===== GAME SCREEN ===== */
#game{position:fixed;inset:0;z-index:180;display:none;flex-direction:column;background:#87CEEB;}
.game-topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,.2);backdrop-filter:blur(8px);}
.game-level-title{font-size:15px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.3);}
.game-back{background:none;border:2px solid rgba(255,255,255,.6);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;cursor:pointer;}
.game-counter{font-size:15px;font-weight:800;color:#FFE141;text-shadow:0 1px 4px rgba(0,0,0,.3);}
#canvas-wrap{position:relative;flex:1;overflow:hidden;min-height:0;}
#canvas-wrap canvas{display:block;}
.canvas-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.45);color:#fff;font-size:14px;font-weight:700;padding:6px 18px;border-radius:20px;pointer-events:none;white-space:nowrap;font-family:'Space Grotesk',sans-serif;z-index:5;}

/* ===== LEVEL 2 TOOLBAR ===== */
#toolbar{display:none;gap:10px;padding:12px 16px;background:#F8FAFC;border-top:2px solid #E2E8F0;overflow-x:auto;flex-shrink:0;}
.tool-btn{min-width:80px;height:80px;border-radius:16px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;box-shadow:0 4px 12px rgba(0,0,0,.12);transition:transform .15s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;}
.tool-btn.selected{transform:scale(1.12);box-shadow:0 6px 20px rgba(59,130,246,.4);outline:3px solid #3B82F6;}
.tool-icon{font-size:28px;}
#l2-launch-btn{display:none;background:linear-gradient(90deg,#3B82F6,#6366F1);color:#fff;border:none;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:20px;padding:0 20px;height:56px;cursor:pointer;flex-shrink:0;width:100%;transition:opacity .2s;}
#l2-launch-btn:active{opacity:.8;}
.l2-scenarios{display:none;gap:8px;padding:10px 16px;background:#F0F4FF;overflow-x:auto;flex-shrink:0;}
.scen-btn{flex-shrink:0;background:#fff;border:2px solid #CBD5E1;border-radius:14px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;padding:8px 16px;cursor:pointer;color:#334155;transition:all .15s;}
.scen-btn.active{background:#3B82F6;border-color:#3B82F6;color:#fff;}

/* ===== SUCCESS OVERLAY ===== */
.success-ov{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.success-ov.show{opacity:1;pointer-events:all;}
.ov-bg{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);}
.ov-card{position:relative;background:#fff;border-radius:28px;padding:36px 40px;text-align:center;max-width:380px;width:92%;border:3px solid #3B82F6;animation:cardPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes cardPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.ov-scientist{font-size:72px;display:block;margin-bottom:8px;animation:pop .5s cubic-bezier(.34,1.56,.64,1) .15s both;}
@keyframes pop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.ov-title{font-size:24px;font-weight:800;color:#1a1a2e;margin-bottom:10px;line-height:1.2;}
.ov-fact{font-size:14px;color:#555;line-height:1.65;margin-bottom:24px;}
.ov-btn{background:#FFE141;color:#111;border:none;padding:16px;border-radius:40px;font-size:18px;font-weight:800;cursor:pointer;width:100%;font-family:'Space Grotesk',sans-serif;transition:transform .15s;}
.ov-btn:active{transform:scale(.96);}

/* ===== FAIL BADGE ===== */
.fail-badge{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid #FF6B6B;border-radius:20px;padding:14px 24px;text-align:center;z-index:250;opacity:0;pointer-events:none;transition:opacity .3s;font-family:'Space Grotesk',sans-serif;max-width:320px;width:90%;}
.fail-badge.show{opacity:1;pointer-events:all;}
.fail-text{font-size:15px;font-weight:700;color:#FF4444;margin-bottom:10px;}
.fail-retry{background:#3B82F6;color:#fff;border:none;border-radius:14px;padding:10px 24px;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:15px;cursor:pointer;}

/* PENDULUM panel */
#pendulum-panel{display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.93);border-radius:16px;padding:12px 14px;box-shadow:0 4px 16px rgba(0,0,0,.15);text-align:center;z-index:20;}
.slider-label{font-size:12px;font-weight:700;color:#334155;margin-bottom:8px;}
#pendulum-slider{writing-mode:vertical-lr;direction:rtl;height:130px;cursor:pointer;accent-color:#3B82F6;}
.slider-val{font-size:14px;font-weight:800;color:#3B82F6;margin-top:8px;}

#l3-launch-btn{display:none;background:#FFE141;color:#111;border:none;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:20px;height:60px;cursor:pointer;flex-shrink:0;width:100%;transition:opacity .2s;border-top:2px solid #E2E8F0;}
#l3-launch-btn:active{opacity:.8;}

/* CONFETTI */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:299;}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <canvas id="intro-canvas"></canvas>
  <div id="intro-content">
    <div class="intro-icon">⚡</div>
    <div class="intro-title">КосмоБаза</div>
    <div class="intro-sub">Физика — это магия!</div>
    <button class="intro-btn" onclick="showLevelSelect()">Начать ▶</button>
  </div>
</div>

<!-- LEVEL SELECT -->
<div id="level-select">
  <div class="ls-header">
    <div class="ls-title">Выбери уровень</div>
    <div class="ls-sub">Все открыты — начни с любого!</div>
  </div>
  <div class="ls-cards">
    <button class="ls-card ls-card-1" onclick="startLevel(1)">
      <span class="ls-emoji">🍎</span>
      <div class="ls-info">
        <div class="ls-name">Всё падает!</div>
        <div class="ls-desc">Гравитация и Галилей</div>
      </div>
      <span class="ls-badge">Ур. 1</span>
    </button>
    <button class="ls-card ls-card-2" onclick="startLevel(2)">
      <span class="ls-emoji">⚙️</span>
      <div class="ls-info">
        <div class="ls-name">Машина Голдберга</div>
        <div class="ls-desc">Передача энергии</div>
      </div>
      <span class="ls-badge">Ур. 2</span>
    </button>
    <button class="ls-card ls-card-3" onclick="startLevel(3)">
      <span class="ls-emoji">🕰️</span>
      <div class="ls-info">
        <div class="ls-name">Маятник Галилея</div>
        <div class="ls-desc">Период и длина</div>
      </div>
      <span class="ls-badge">Ур. 3</span>
    </button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game">
  <div class="game-topbar">
    <button class="game-back" onclick="backToMenu()">← Меню</button>
    <div class="game-level-title" id="game-title">Уровень 1</div>
    <div class="game-counter" id="game-counter"></div>
  </div>
  <div id="l2-scenarios" class="l2-scenarios">
    <button class="scen-btn active" data-s="0" onclick="setScenario(0)">🐱 Разбуди кота</button>
    <button class="scen-btn" data-s="1" onclick="setScenario(1)">🌸 Полей цветок</button>
    <button class="scen-btn" data-s="2" onclick="setScenario(2)">🔔 Звони в колокол</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="main-canvas"></canvas>
    <div class="canvas-hint" id="canvas-hint"></div>
    <div id="pendulum-panel">
      <div class="slider-label">Длина нитки</div>
      <input type="range" id="pendulum-slider" min="50" max="250" value="140" oninput="updateCustomPendulum()">
      <div class="slider-val" id="slider-val">140px</div>
    </div>
  </div>
  <div id="toolbar">
    <button class="tool-btn selected" data-type="ramp" onclick="selectTool('ramp')" style="background:linear-gradient(135deg,#FEF3C7,#FCD34D)"><span class="tool-icon">📐</span><span>Горка</span></button>
    <button class="tool-btn" data-type="domino" onclick="selectTool('domino')" style="background:linear-gradient(135deg,#FDE8D8,#F97316)"><span class="tool-icon">🁣</span><span>Домино</span></button>
    <button class="tool-btn" data-type="lever" onclick="selectTool('lever')" style="background:linear-gradient(135deg,#D1FAE5,#34D399)"><span class="tool-icon">⚖️</span><span>Рычаг</span></button>
    <button class="tool-btn" data-type="spring" onclick="selectTool('spring')" style="background:linear-gradient(135deg,#EDE9FE,#8B5CF6)"><span class="tool-icon">🌀</span><span>Пружина</span></button>
    <button class="tool-btn" data-type="wall" onclick="selectTool('wall')" style="background:linear-gradient(135deg,#F1F5F9,#94A3B8)"><span class="tool-icon">🧱</span><span>Стена</span></button>
  </div>
  <button id="l2-launch-btn" onclick="launchLevel2()">▶ ПУСК</button>
  <button id="l3-launch-btn" onclick="launchAllPendulums()">Запустить все 🚀</button>
</div>

<!-- SUCCESS OVERLAY -->
<div class="success-ov" id="success-ov">
  <div class="ov-bg" onclick="closeSuccess()"></div>
  <div class="ov-card">
    <span class="ov-scientist" id="ov-scientist">🧑‍🔬</span>
    <div class="ov-title" id="ov-title">Молодец!</div>
    <div class="ov-fact" id="ov-fact"></div>
    <button class="ov-btn" id="ov-btn" onclick="closeSuccess()">Следующий уровень ▶</button>
  </div>
</div>

<!-- FAIL BADGE -->
<div class="fail-badge" id="fail-badge">
  <div class="fail-text" id="fail-text">Почти! Попробуй переставить элементы 🔧</div>
  <button class="fail-retry" onclick="retryLevel2()">Попробовать снова</button>
</div>

<!-- CONFETTI -->
<canvas id="confetti-canvas"></canvas>

<script>
'use strict';

// ==================== UTILS ====================
function $(id){ return document.getElementById(id); }

function burst(x,y,syms){
  syms.forEach((s,i)=>{
    const p=document.createElement('div');
    const angle=(i/syms.length)*Math.PI*2;
    const dist=55+Math.random()*55;
    p.style.cssText=`position:fixed;left:${x}px;top:${y}px;font-size:${20+Math.random()*18}px;pointer-events:none;z-index:999;transition:all .8s cubic-bezier(.2,0,.8,1);`;
    p.textContent=s;
    document.body.appendChild(p);
    requestAnimationFrame(()=>{
      p.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist-55}px) rotate(${Math.random()*360}deg)`;
      p.style.opacity='0';
    });
    setTimeout(()=>p.remove(),900);
  });
}

// Confetti
const confCanvas=$('confetti-canvas');
const confCtx=confCanvas.getContext('2d');
let confParticles=[];
function resizeConf(){ confCanvas.width=window.innerWidth; confCanvas.height=window.innerHeight; }
resizeConf();
window.addEventListener('resize',resizeConf);

function launchConfetti(){
  confParticles=[];
  for(let i=0;i<200;i++){
    confParticles.push({
      x:Math.random()*confCanvas.width, y:-20-Math.random()*100,
      vx:(Math.random()-.5)*5, vy:3+Math.random()*4,
      color:`hsl(${Math.random()*360},90%,60%)`,
      w:8+Math.random()*8, h:4+Math.random()*4,
      rot:Math.random()*360, rotV:(Math.random()-.5)*8
    });
  }
  animConf();
}
function animConf(){
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  confParticles=confParticles.filter(p=>p.y<confCanvas.height+20);
  confParticles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV; p.vy+=0.07;
    confCtx.save();
    confCtx.translate(p.x,p.y);
    confCtx.rotate(p.rot*Math.PI/180);
    confCtx.fillStyle=p.color;
    confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    confCtx.restore();
  });
  if(confParticles.length) requestAnimationFrame(animConf);
}

function showSuccess(sci,title,fact,btnLabel,nextFn){
  $('ov-scientist').textContent=sci;
  $('ov-title').textContent=title;
  $('ov-fact').textContent=fact;
  const btn=$('ov-btn');
  btn.textContent=btnLabel||'К выбору уровней ▶';
  btn.onclick=()=>{ closeSuccess(); if(nextFn) nextFn(); else showLevelSelect(); };
  $('success-ov').classList.add('show');
  launchConfetti();
}
function closeSuccess(){ $('success-ov').classList.remove('show'); }

// ==================== SCREENS ====================
function showLevelSelect(){
  $('intro').style.display='none';
  $('level-select').style.display='flex';
  $('game').style.display='none';
  stopAll();
}
function backToMenu(){ showLevelSelect(); }

// ==================== INTRO STARS ====================
(function(){
  const ic=$('intro-canvas');
  ic.width=window.innerWidth; ic.height=window.innerHeight;
  const ctx2=ic.getContext('2d');
  const stars=Array.from({length:100},()=>({x:Math.random()*ic.width,y:Math.random()*ic.height,r:.5+Math.random()*2,a:Math.random()}));
  function draw(){
    ctx2.clearRect(0,0,ic.width,ic.height);
    const t=Date.now()/1000;
    stars.forEach(s=>{
      ctx2.beginPath(); ctx2.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx2.fillStyle=`rgba(255,255,255,${.3+.5*Math.abs(Math.sin(t+s.a*10))})`;
      ctx2.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ==================== CANVAS ====================
const canvas=$('main-canvas');
const ctx=canvas.getContext('2d');
let W=0,H=0;

function resizeCanvas(){
  const wrap=$('canvas-wrap');
  W=canvas.width=wrap.clientWidth;
  H=canvas.height=wrap.clientHeight;
}

let currentLevel=0;
let rafId=null;

function stopAll(){
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  l1Stop(); l2Stop(); l3Stop();
}

function startLevel(n){
  stopAll();
  currentLevel=n;
  $('level-select').style.display='none';
  $('game').style.display='flex';
  $('game').style.flexDirection='column';
  $('toolbar').style.display='none';
  $('l2-launch-btn').style.display='none';
  $('l2-scenarios').style.display='none';
  $('pendulum-panel').style.display='none';
  $('l3-launch-btn').style.display='none';
  $('canvas-hint').textContent='';
  $('fail-badge').classList.remove('show');
  resizeCanvas();
  if(n===1) initLevel1();
  else if(n===2) initLevel2();
  else if(n===3) initLevel3();
}

// ==================== LEVEL 1 — GRAVITY ====================
const GRAV=0.45;
const GND_RATIO=0.87;
let l1Items=[], l1Running=false, l1FirstTap=false;
let l1LandedCount=0, l1Squash=[], l1Dust=[];

function l1Stop(){ l1Running=false; canvas.onclick=null; canvas.ontouchstart=null; }

function makeItems(){
  return [
    {emoji:'🍎', x:W*.22, y:H*.30, vx:0,vy:0, falling:false,landed:false, r:30, slow:false, angle:0, trail:[]},
    {emoji:'🪨', x:W*.55, y:H*.22, vx:0,vy:0, falling:false,landed:false, r:28, slow:false, angle:0, trail:[]},
    {emoji:'🪶', x:W*.36, y:H*.14, vx:0,vy:0, falling:false,landed:false, r:25, slow:true,  angle:0, trail:[]},
    {emoji:'🏀', x:W*.72, y:H*.32, vx:0,vy:0, falling:false,landed:false, r:30, slow:false, angle:0, trail:[]},
    {emoji:'📦', x:W*.13, y:H*.44, vx:0,vy:0, falling:false,landed:false, r:28, slow:false, angle:0, trail:[]},
    {emoji:'🌸', x:W*.84, y:H*.18, vx:0,vy:0, falling:false,landed:false, r:26, slow:false, angle:0, trail:[]},
  ];
}

function initLevel1(){
  $('game-title').textContent='🍎 Всё падает!';
  $('game-counter').textContent='';
  $('canvas-hint').textContent='🍎 Тапни — и всё упадёт!';
  l1Items=makeItems();
  l1LandedCount=0; l1FirstTap=false; l1Squash=[]; l1Dust=[];
  l1Running=true;
  canvas.addEventListener('click',l1Tap);
  canvas.addEventListener('touchstart',l1Touch,{passive:false});
  rafId=requestAnimationFrame(loop1);
}

function l1Touch(e){
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  l1HandleTap(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top);
}
function l1Tap(e){
  const r=canvas.getBoundingClientRect();
  l1HandleTap(e.clientX-r.left, e.clientY-r.top);
}
function l1HandleTap(tx,ty){
  let hit=false;
  l1Items.forEach(item=>{
    if(item.falling||item.landed) return;
    const dx=tx-item.x, dy=ty-item.y;
    if(Math.sqrt(dx*dx+dy*dy)<item.r+22){
      item.falling=true;
      item.vx=(Math.random()-.5)*2;
      hit=true;
    }
  });
  if(hit&&!l1FirstTap){ l1FirstTap=true; $('canvas-hint').textContent=''; }
}

function loop1(){
  if(!l1Running) return;
  rafId=requestAnimationFrame(loop1);
  const gY=H*GND_RATIO;

  l1Items.forEach(item=>{
    if(!item.falling||item.landed) return;
    item.trail.unshift({x:item.x,y:item.y});
    if(item.trail.length>4) item.trail.pop();
    item.vy += item.slow ? GRAV*.28 : GRAV;
    item.x+=item.vx; item.y+=item.vy;
    item.angle += item.slow ? 1.5 : 4;
    if(item.x<item.r){ item.x=item.r; item.vx=Math.abs(item.vx)*.5; }
    if(item.x>W-item.r){ item.x=W-item.r; item.vx=-Math.abs(item.vx)*.5; }
    if(item.y+item.r>=gY){
      item.y=gY-item.r; item.vy*=-.35; item.vx*=.7;
      if(Math.abs(item.vy)<1.2&&!item.landed){
        item.landed=true; item.vy=0; item.vx=0;
        l1OnLanded(item,gY);
      }
    }
  });

  l1Squash=l1Squash.filter(s=>{ s.t+=16; return s.t<300; });
  l1Dust=l1Dust.filter(d=>{ d.x+=d.vx; d.y+=d.vy; d.vy+=.1; d.life--; return d.life>0; });

  draw1(gY);
}

function l1OnLanded(item,gY){
  l1LandedCount++;
  $('game-counter').textContent=`${l1LandedCount} / 6 упало`;
  l1Squash.push({item,t:0});
  for(let i=0;i<5;i++){
    l1Dust.push({x:item.x,y:gY,vx:(Math.random()-.5)*4,vy:-2-Math.random()*2,r:3+Math.random()*4,life:25});
  }
  const rect=canvas.getBoundingClientRect();
  burst(rect.left+item.x, rect.top+item.y, ['💨','⭐','✨','💛']);
  if(l1LandedCount===6){
    setTimeout(()=>showSuccess(
      '🧑‍🔬','⚡ Открытие Галилея!',
      'В 1589 году Галилей доказал: тяжёлые и лёгкие предметы падают с одинаковым ускорением! Только воздух замедляет лёгкие вещи — как перо 🪶',
      'Следующий уровень ▶', ()=>startLevel(2)
    ),600);
  }
}

function draw1(gY){
  // Sky
  const sk=ctx.createLinearGradient(0,0,0,H);
  sk.addColorStop(0,'#87CEEB'); sk.addColorStop(1,'#E0F4FF');
  ctx.fillStyle=sk; ctx.fillRect(0,0,W,H);

  // Sun
  const sp=1+.05*Math.sin(Date.now()/600);
  ctx.save(); ctx.translate(W-70,65); ctx.scale(sp,sp);
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=3;
  for(let i=0;i<8;i++){ const a=i*Math.PI/4; ctx.beginPath(); ctx.moveTo(Math.cos(a)*38,Math.sin(a)*38); ctx.lineTo(Math.cos(a)*52,Math.sin(a)*52); ctx.stroke(); }
  const sg=ctx.createRadialGradient(0,0,0,0,0,32);
  sg.addColorStop(0,'#FFF176'); sg.addColorStop(1,'#FFB300');
  ctx.beginPath(); ctx.arc(0,0,32,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
  ctx.restore();

  // Clouds
  const t=Date.now()/9000;
  [[.1+t%1,55,1.0],[.42+t%1,40,.85],[.73+t%1,68,.9]].forEach(([cx,cy,sc])=>{
    drawCloud(((cx%1)*W*1.3-90), cy, sc);
  });

  // Tree
  const tx=W*.17, ty=gY;
  const tg=ctx.createLinearGradient(tx-15,ty-130,tx+15,ty);
  tg.addColorStop(0,'#8D6E63'); tg.addColorStop(1,'#5D4037');
  ctx.fillStyle=tg; ctx.fillRect(tx-15,ty-130,30,130);
  const cg=ctx.createRadialGradient(tx,ty-165,8,tx,ty-155,78);
  cg.addColorStop(0,'#81C784'); cg.addColorStop(1,'#388E3C');
  ctx.beginPath(); ctx.arc(tx,ty-160,78,0,Math.PI*2); ctx.fillStyle=cg; ctx.fill();
  // Small apple on tree
  ctx.font='28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🍃',tx+30,ty-190);

  // Ground
  const gg=ctx.createLinearGradient(0,gY,0,H);
  gg.addColorStop(0,'#5D8A3C'); gg.addColorStop(1,'#4a6e2f');
  ctx.fillStyle=gg; ctx.fillRect(0,gY,W,H-gY);
  ctx.fillStyle='rgba(0,0,0,.07)';
  for(let i=0;i<10;i++){
    const px=(i*143)%W, py=gY+12+(i*57)%(H-gY-22);
    ctx.beginPath(); ctx.ellipse(px,py,20,9,0,0,Math.PI*2); ctx.fill();
  }
  // Grass
  ctx.fillStyle='#7CB343';
  for(let i=0;i<Math.floor(W/16);i++){
    const gx=i*16+3;
    ctx.beginPath(); ctx.moveTo(gx,gY); ctx.lineTo(gx+5,gY-12); ctx.lineTo(gx+10,gY); ctx.fill();
  }

  // Dust
  l1Dust.forEach(d=>{
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,160,120,${d.life/25})`; ctx.fill();
  });

  // Items
  ctx.textAlign='center'; ctx.textBaseline='middle';
  l1Items.forEach(item=>{
    // trail
    item.trail.forEach((pt,i)=>{
      ctx.globalAlpha=.12*(1-i/4);
      ctx.font=`${item.r*2*.9}px serif`;
      ctx.fillText(item.emoji,pt.x,pt.y);
    });
    ctx.globalAlpha=1;

    // squash
    let sy=1,sx=1;
    const sq=l1Squash.find(s=>s.item===item);
    if(sq){
      const p=sq.t/300;
      if(p<.33){ sy=1-.3*(p/.33); sx=1+.15*(p/.33); }
      else{ sy=.7+.3*((p-.33)/.67); sx=1.15-.15*((p-.33)/.67); }
    }

    ctx.save();
    ctx.translate(item.x,item.y);
    ctx.rotate(item.angle*Math.PI/180);
    ctx.scale(sx,sy);
    ctx.font=`${item.r*2}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(item.emoji,0,0);
    ctx.restore();
  });

  // Hint hand
  if(!l1FirstTap){
    const target=l1Items.find(it=>!it.falling&&!it.landed);
    if(target){
      const alpha=.35+.65*((Math.sin(Date.now()/800)+1)/2);
      ctx.globalAlpha=alpha;
      ctx.font='38px serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('👆',target.x,target.y+55);
      ctx.globalAlpha=1;
    }
  }

  // Counter pill
  if(l1LandedCount>0){
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.beginPath(); ctx.roundRect(W/2-68,H-34,136,26,13); ctx.fill();
    ctx.fillStyle='#FFE141';
    ctx.font='bold 15px Space Grotesk';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`${l1LandedCount} / 6 упало`,W/2,H-21);
  }
}

function drawCloud(x,y,sc){
  ctx.save(); ctx.translate(x,y); ctx.scale(sc,sc);
  ctx.fillStyle='rgba(255,255,255,.88)';
  [[-22,0,36],[12,0,30],[28,-6,24],[2,-13,28]].forEach(([cx,cy,r])=>{
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

// ==================== LEVEL 2 — GOLDBERG ====================
let l2Running=false, l2Elements=[], l2SimRunning=false;
let l2CurrentScenario=0, l2SelectedTool='ramp';
let l2Ball={x:0,y:0,vx:0,vy:0,active:false,r:24,age:0};
let l2DragEl=null, l2DragOff={x:0,y:0}, l2TapStart=null, l2LPTimer=null;

const SCENARIOS=[
  {goal:'🐱', gx:.85, gy:.85, label:'Разбуди кота'},
  {goal:'🌸', gx:.72, gy:.78, label:'Полей цветок'},
  {goal:'🔔', gx:.88, gy:.14, label:'Звони в колокол'},
];

function l2Stop(){
  l2Running=false;
  ['mousedown','mousemove','mouseup','touchstart','touchmove','touchend','contextmenu'].forEach(ev=>{
    canvas.removeEventListener(ev,null);
  });
}

function selectTool(t){
  l2SelectedTool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector(`.tool-btn[data-type="${t}"]`).classList.add('selected');
}
function setScenario(idx){
  l2CurrentScenario=idx;
  document.querySelectorAll('.scen-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.scen-btn[data-s="${idx}"]`).classList.add('active');
  l2Elements=[]; l2SimRunning=false; l2Ball.active=false;
  $('fail-badge').classList.remove('show');
}

function initLevel2(){
  $('game-title').textContent='⚙️ Машина Голдберга';
  $('game-counter').textContent='';
  $('canvas-hint').textContent='Размести элементы и нажми ПУСК';
  $('toolbar').style.display='flex';
  $('l2-launch-btn').style.display='block';
  $('l2-scenarios').style.display='flex';
  l2Elements=[]; l2SimRunning=false; l2CurrentScenario=0; l2SelectedTool='ramp';
  l2Ball.active=false;
  l2Running=true;
  document.querySelectorAll('.scen-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector('.tool-btn[data-type="ramp"]').classList.add('selected');

  canvas.addEventListener('mousedown',l2MD);
  canvas.addEventListener('mousemove',l2MM);
  canvas.addEventListener('mouseup',l2MU);
  canvas.addEventListener('touchstart',l2TS,{passive:false});
  canvas.addEventListener('touchmove',l2TM,{passive:false});
  canvas.addEventListener('touchend',l2TE);
  canvas.addEventListener('contextmenu',l2CM);
  rafId=requestAnimationFrame(loop2);
}

function l2Pos(e){
  const r=canvas.getBoundingClientRect();
  if(e.touches) return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}
function l2Find(x,y){ return l2Elements.find(el=>{ const dx=x-el.x,dy=y-el.y; return Math.sqrt(dx*dx+dy*dy)<55; }); }

function l2MD(e){ if(l2SimRunning) return; const p=l2Pos(e); const el=l2Find(p.x,p.y); if(el){ l2DragEl=el; l2DragOff={x:p.x-el.x,y:p.y-el.y}; } else l2TapStart=p; }
function l2MM(e){ if(!l2DragEl) return; const p=l2Pos(e); l2DragEl.x=p.x-l2DragOff.x; l2DragEl.y=p.y-l2DragOff.y; }
function l2MU(e){ if(l2DragEl){ l2DragEl=null; return; } if(l2TapStart){ const p=l2Pos(e); const dx=p.x-l2TapStart.x,dy=p.y-l2TapStart.y; if(Math.sqrt(dx*dx+dy*dy)<10) l2Place(l2TapStart.x,l2TapStart.y); l2TapStart=null; } }
function l2TS(e){ e.preventDefault(); if(l2SimRunning) return; const p=l2Pos(e); const el=l2Find(p.x,p.y); if(el){ l2DragEl=el; l2DragOff={x:p.x-el.x,y:p.y-el.y}; l2LPTimer=setTimeout(()=>{ l2Elements=l2Elements.filter(x=>x!==el); l2DragEl=null; },600); } else l2TapStart=p; }
function l2TM(e){ e.preventDefault(); clearTimeout(l2LPTimer); if(!l2DragEl) return; const p=l2Pos(e); l2DragEl.x=p.x-l2DragOff.x; l2DragEl.y=p.y-l2DragOff.y; }
function l2TE(e){ clearTimeout(l2LPTimer); if(l2DragEl){ l2DragEl=null; return; } if(l2TapStart){ const r=canvas.getBoundingClientRect(); const lx=e.changedTouches[0].clientX-r.left,ly=e.changedTouches[0].clientY-r.top; const dx=lx-l2TapStart.x,dy=ly-l2TapStart.y; if(Math.sqrt(dx*dx+dy*dy)<14) l2Place(l2TapStart.x,l2TapStart.y); l2TapStart=null; } }
function l2CM(e){ e.preventDefault(); const p=l2Pos(e); const el=l2Find(p.x,p.y); if(el) l2Elements=l2Elements.filter(x=>x!==el); }
function l2Place(x,y){ if(l2Elements.length>=12) return; l2Elements.push({type:l2SelectedTool,x,y,state:0}); }

function launchLevel2(){
  if(l2SimRunning) return;
  l2SimRunning=true;
  l2Ball={x:44,y:H*.12,vx:3.2,vy:0,active:true,r:24,age:0};
  l2Elements.forEach(el=>{ el.state=0; });
  $('canvas-hint').textContent=''; $('fail-badge').classList.remove('show');
}
function retryLevel2(){
  $('fail-badge').classList.remove('show');
  l2SimRunning=false; l2Ball.active=false;
  l2Elements.forEach(el=>{ el.state=0; });
}

function loop2(){
  if(!l2Running) return;
  rafId=requestAnimationFrame(loop2);
  const gY=H*GND_RATIO;
  const sc=SCENARIOS[l2CurrentScenario];

  if(l2SimRunning&&l2Ball.active){
    l2Ball.vy+=0.38;
    l2Ball.x+=l2Ball.vx; l2Ball.y+=l2Ball.vy;
    l2Ball.age++;

    // Element collisions
    l2Elements.forEach(el=>{
      const dx=l2Ball.x-el.x, dy=l2Ball.y-el.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<65){
        if(el.type==='ramp'){
          const nx=Math.sin(-.5), ny=-Math.cos(-.5);
          const dot=l2Ball.vx*nx+l2Ball.vy*ny;
          if(dot<0){ l2Ball.vx-=2*dot*nx*.6; l2Ball.vy-=2*dot*ny*.6; }
          l2Ball.vy+=.4;
        }
        if(el.type==='domino'&&el.state===0){
          el.state=1;
          l2Ball.vx*=.5; l2Ball.vy=-3;
          setTimeout(()=>{
            l2Elements.forEach(e2=>{ if(e2!==el&&e2.type==='domino'&&e2.state===0&&Math.sqrt((e2.x-el.x)**2+(e2.y-el.y)**2)<90) { e2.state=1; } });
          },250);
        }
        if(el.type==='lever'&&el.state===0){ el.state=1; l2Ball.vy=-9; l2Ball.vx+=2; }
        if(el.type==='spring'&&el.state<2){ el.state++; l2Ball.vy=-11; l2Ball.vx+=3; }
        if(el.type==='wall'&&dist<50){ l2Ball.vx*=-.75; l2Ball.x=el.x+(l2Ball.x<el.x?-1:1)*52; }
      }
    });

    // Ground
    if(l2Ball.y+l2Ball.r>gY){ l2Ball.y=gY-l2Ball.r; l2Ball.vy*=-.4; l2Ball.vx*=.78; }
    // Walls
    if(l2Ball.x<l2Ball.r){ l2Ball.x=l2Ball.r; l2Ball.vx=Math.abs(l2Ball.vx)*.75; }
    if(l2Ball.x>W-l2Ball.r){ l2Ball.x=W-l2Ball.r; l2Ball.vx=-Math.abs(l2Ball.vx)*.75; }

    // Goal check
    const gx=sc.gx*W, gy=sc.gy*H;
    if(Math.sqrt((l2Ball.x-gx)**2+(l2Ball.y-gy)**2)<65){
      l2SimRunning=false; l2Ball.active=false;
      const rect=canvas.getBoundingClientRect();
      burst(rect.left+gx,rect.top+gy,['🎉','⭐','🌟','💥','✨','🎊','💛']);
      setTimeout(()=>showSuccess('🧠','Энергия передана!',
        'Машина Голдберга превращает одно движение в цепочку действий. Каждый элемент передаёт энергию следующему — закон сохранения энергии в действии!',
        'Следующий уровень ▶', ()=>startLevel(3)), 400);
    }
    // Fail: ball below screen
    if(l2Ball.y>H+30){ l2SimRunning=false; l2Ball.active=false; $('fail-badge').classList.add('show'); }
    // Timeout
    if(l2Ball.age>800){ l2SimRunning=false; l2Ball.active=false; $('fail-badge').classList.add('show'); }
  }

  draw2(gY,sc);
}

function draw2(gY,sc){
  const sk=ctx.createLinearGradient(0,0,0,H);
  sk.addColorStop(0,'#87CEEB'); sk.addColorStop(1,'#E0F4FF');
  ctx.fillStyle=sk; ctx.fillRect(0,0,W,H);

  // Ground
  ctx.fillStyle='#5D8A3C'; ctx.fillRect(0,gY,W,H-gY);
  ctx.fillStyle='#7CB343';
  for(let i=0;i<Math.floor(W/14);i++){
    const gx=i*14+2;
    ctx.beginPath(); ctx.moveTo(gx,gY); ctx.lineTo(gx+5,gY-10); ctx.lineTo(gx+10,gY); ctx.fill();
  }

  // START
  ctx.fillStyle='rgba(255,255,255,.7)'; ctx.beginPath(); ctx.roundRect(20,H*.12-34,70,24,12); ctx.fill();
  ctx.fillStyle='#3B82F6'; ctx.font='bold 13px Space Grotesk'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('СТАРТ',55,H*.12-22);

  // Goal
  const gx=sc.gx*W, gy=sc.gy*H;
  ctx.font='52px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(sc.goal,gx,gy);
  const p=.5+.5*Math.sin(Date.now()/600);
  ctx.strokeStyle=`rgba(59,130,246,${.4+.3*p})`; ctx.lineWidth=3;
  ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.arc(gx,gy,46+p*4,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  // Elements
  l2Elements.forEach(el=>drawEl(el));

  // Ball
  {
    const bx=l2Ball.active?l2Ball.x:44;
    const by=l2Ball.active?l2Ball.y:H*.12;
    const bg=ctx.createRadialGradient(bx-8,by-8,2,bx,by,l2Ball.r);
    bg.addColorStop(0,'#93C5FD'); bg.addColorStop(1,'#1D4ED8');
    ctx.beginPath(); ctx.arc(bx,by,l2Ball.r,0,Math.PI*2);
    ctx.fillStyle=bg; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=2; ctx.stroke();
    // shine
    ctx.beginPath(); ctx.arc(bx-7,by-7,7,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fill();
  }

  // Hint
  if(l2Elements.length===0&&!l2SimRunning){
    ctx.fillStyle='rgba(0,0,0,.45)';
    ctx.beginPath(); ctx.roundRect(W/2-145,H/2-22,290,44,22); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 14px Space Grotesk'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('👆 Тапни экран, чтобы разместить элемент',W/2,H/2);
  }
}

function drawEl(el){
  ctx.save(); ctx.translate(el.x,el.y);
  switch(el.type){
    case 'ramp':
      const rg=ctx.createLinearGradient(-52,22,52,-22);
      rg.addColorStop(0,'#92400E'); rg.addColorStop(1,'#D97706');
      ctx.fillStyle=rg;
      ctx.beginPath(); ctx.moveTo(-52,22); ctx.lineTo(52,-22); ctx.lineTo(52,28); ctx.lineTo(-52,28); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#78350F'; ctx.lineWidth=3; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-52,22); ctx.lineTo(52,-22); ctx.stroke();
      break;
    case 'domino':
      ctx.rotate(el.state===1?Math.PI/2:0);
      ctx.fillStyle='#4E342E';
      ctx.beginPath(); ctx.roundRect(-10,-32,20,64,5); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(10,0); ctx.stroke();
      ctx.fillStyle='#fff';
      [[-4,-20],[4,-20],[0,-10],[-4,10],[4,10],[0,22]].forEach(([dx,dy])=>{ ctx.beginPath(); ctx.arc(dx,dy,3,0,Math.PI*2); ctx.fill(); });
      break;
    case 'lever':
      ctx.rotate(el.state===1?-.45:.1);
      ctx.strokeStyle='#065F46'; ctx.lineWidth=8; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-42,0); ctx.lineTo(42,0); ctx.stroke();
      ctx.fillStyle='#059669';
      ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(8,0); ctx.lineTo(0,30); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#6EE7B7'; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
      break;
    case 'spring':
      const comp=el.state>0?.65:1;
      ctx.strokeStyle='#7C3AED'; ctx.lineWidth=4; ctx.lineCap='round';
      ctx.beginPath();
      for(let i=0;i<=8;i++){
        const yy=-28*comp+i*7*comp, xx=i%2===0?-14:14;
        if(i===0) ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy);
      }
      ctx.stroke();
      ctx.strokeStyle='#C4B5FD'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-14,-28*comp); ctx.lineTo(14,-28*comp); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-14,28*comp); ctx.lineTo(14,28*comp); ctx.stroke();
      break;
    case 'wall':
      ctx.fillStyle='#6B7280'; ctx.beginPath(); ctx.roundRect(-9,-42,18,84,5); ctx.fill();
      ctx.fillStyle='#9CA3AF';
      for(let r=0;r<4;r++){ ctx.fillRect(-7,-40+r*21,14,1.5); if(r%2===0) ctx.fillRect(-7,-30+r*21,7,1); }
      break;
  }
  // drag handle
  ctx.fillStyle='rgba(255,255,255,.45)'; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ==================== LEVEL 3 — PENDULUM ====================
let l3Running=false, l3Launched=false, l3StartTime=0;
let l3RevealDone=false, l3CustomDone=false;
let l3CustomLen=140;
let l3Pends=[], l3Custom={}, l3Metro={};

function l3Stop(){ l3Running=false; canvas.removeEventListener('click',l3Tap); canvas.removeEventListener('touchstart',l3Touch); }

function initLevel3(){
  $('game-title').textContent='🕰️ Маятник Галилея';
  $('game-counter').textContent='';
  $('canvas-hint').textContent='Тапни на шар чтобы раскачать';
  $('pendulum-panel').style.display='block';
  $('l3-launch-btn').style.display='block';
  l3Running=true; l3Launched=false; l3RevealDone=false; l3CustomDone=false;
  l3CustomLen=140; $('pendulum-slider').value=140; $('slider-val').textContent='140px';

  // Scale lengths to screen
  const lS=Math.min(H*0.32, 125);
  const lL=Math.min(H*0.50, 210);

  l3Pends=[
    {x:W*.22,L:lS,mass:16,color:'#FF5038',emoji:'🔴',label:'Лёгкий\nкороткий',angle:0,omega:0,active:false},
    {x:W*.5, L:lL,mass:28,color:'#3B82F6',emoji:'🔵',label:'Тяжёлый\nдлинный', angle:0,omega:0,active:false},
    {x:W*.78,L:lS,mass:28,color:'#00C27C',emoji:'🟢',label:'Тяжёлый\nкороткий',angle:0,omega:0,active:false},
  ];
  l3Custom={x:W*.5,L:l3CustomLen,mass:20,color:'#FF9800',emoji:'🟡',angle:.4,omega:0,active:false,visible:false};
  l3Metro={angle:.4,omega:0,L:lS,active:false};

  canvas.addEventListener('click',l3Tap);
  canvas.addEventListener('touchstart',l3Touch,{passive:false});
  rafId=requestAnimationFrame(loop3);
}

function updateCustomPendulum(){
  l3CustomLen=parseInt($('pendulum-slider').value);
  $('slider-val').textContent=l3CustomLen+'px';
  l3Custom.L=l3CustomLen; l3Custom.angle=.4; l3Custom.omega=0;
}

function l3Touch(e){ e.preventDefault(); const r=canvas.getBoundingClientRect(); l3Hit(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top); }
function l3Tap(e){ const r=canvas.getBoundingClientRect(); l3Hit(e.clientX-r.left,e.clientY-r.top); }
function l3Hit(tx,ty){
  const beamY=24;
  [...l3Pends, l3Custom.visible?l3Custom:null].filter(Boolean).forEach(p=>{
    const bx=p.x+Math.sin(p.angle)*p.L, by=beamY+Math.cos(p.angle)*p.L;
    const dx=tx-bx, dy=ty-by;
    if(Math.sqrt(dx*dx+dy*dy)<p.mass+22){ p.angle=.45; p.omega=0; p.active=true; }
  });
}

function launchAllPendulums(){
  l3Pends.forEach(p=>{ p.angle=.4; p.omega=0; p.active=true; });
  l3Custom.visible=true; l3Custom.active=true; l3Custom.angle=.4; l3Custom.omega=0;
  l3Metro.active=true; l3Metro.angle=.4; l3Metro.omega=0;
  l3Launched=true; l3StartTime=Date.now(); l3RevealDone=false;
  $('canvas-hint').textContent='';
}

const G_SIM=9800;
function pendStep(p){
  if(!p.active) return;
  const L=Math.max(p.L,30);
  const alpha=-(G_SIM/L)*Math.sin(p.angle)*.00000256;
  p.omega=(p.omega+alpha)*.9994;
  p.angle+=p.omega;
}

function loop3(){
  if(!l3Running) return;
  rafId=requestAnimationFrame(loop3);
  l3Pends.forEach(pendStep);
  pendStep(l3Custom);
  if(l3Metro.active){ pendStep(l3Metro); if(Math.abs(l3Metro.angle)<.02&&Math.abs(l3Metro.omega)<.001) l3Metro.omega=.12; }

  if(l3Launched&&!l3RevealDone&&Date.now()-l3StartTime>4000){
    l3RevealDone=true; showPendReveal();
  }

  // Match check — target length = same as l3Pends[0].L
  if(l3Custom.active&&l3Custom.visible&&!l3CustomDone){
    if(Math.abs(l3Custom.L-l3Pends[0].L)<22){
      l3CustomDone=true;
      const rect=canvas.getBoundingClientRect();
      burst(rect.left+l3Custom.x, rect.top+24+l3Custom.L*.5, ['✨','⭐','🎉','💛','🌟']);
      setTimeout(()=>showSuccess('🕰️','Галилей был прав!',
        'Период маятника зависит только от длины нити! В 1583 году Галилей заметил это, наблюдая за люстрой в соборе Пизы. Масса груза — не важна!',
        'К выбору уровней ▶', null), 600);
    }
  }
  draw3();
}

function showPendReveal(){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;inset:0;z-index:250;display:flex;align-items:center;justify-content:center;pointer-events:none;';
  d.innerHTML=`<div style="background:rgba(10,15,40,.85);backdrop-filter:blur(10px);border-radius:28px;padding:28px 32px;text-align:center;max-width:310px;width:88%;animation:cardPop .4s cubic-bezier(.34,1.56,.64,1);">
    <div style="font-size:48px;margin-bottom:10px;">⚡</div>
    <div style="font-size:20px;font-weight:800;color:#FFE141;margin-bottom:12px;">Открытие Галилея!</div>
    <div style="font-size:14px;color:#E2E8F0;line-height:1.7;">
      🔴 Красный = 🟢 Зелёный<br><span style="color:#A5B4FC;">(одинаковая длина → одинаковый ритм!)</span><br><br>
      🔵 Синий медленнее — он длиннее!<br><br>
      <strong style="color:#FFE141;font-size:16px;">Масса не важна!</strong>
    </div>
  </div>`;
  document.body.appendChild(d);
  setTimeout(()=>{ d.style.transition='opacity .5s'; d.style.opacity='0'; setTimeout(()=>d.remove(),600); }, 3500);
}

function draw3(){
  ctx.fillStyle='#FFF8F0'; ctx.fillRect(0,0,W,H);

  // Decorative edge
  ctx.strokeStyle='rgba(180,130,80,.18)'; ctx.lineWidth=2; ctx.setLineDash([8,6]);
  ctx.strokeRect(8,8,W-16,H-16); ctx.setLineDash([]);

  // Beam
  const bg2=ctx.createLinearGradient(0,0,0,24);
  bg2.addColorStop(0,'#6D4C41'); bg2.addColorStop(1,'#4E342E');
  ctx.fillStyle=bg2; ctx.fillRect(0,0,W,24);
  ctx.strokeStyle='rgba(255,255,255,.1)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=36){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+18,24); ctx.stroke(); }

  // Footer label
  ctx.fillStyle='rgba(140,90,50,.45)'; ctx.font='bold 12px Space Grotesk'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Пиза, 1583 год', W/2, H-14);

  // Main pendulums
  l3Pends.forEach(p=>{
    const bx=p.x+Math.sin(p.angle)*p.L, by=24+Math.cos(p.angle)*p.L;
    // shadow
    ctx.save(); ctx.globalAlpha=.12;
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(bx,H*GND_RATIO,p.mass*.9,7,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // string
    ctx.strokeStyle='rgba(100,70,50,.8)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(p.x,24); ctx.lineTo(bx,by); ctx.stroke();
    // nail
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(p.x,24,5,0,Math.PI*2); ctx.fill();
    // ball
    const bg=ctx.createRadialGradient(bx-p.mass*.35,by-p.mass*.35,2,bx,by,p.mass);
    bg.addColorStop(0,'rgba(255,255,255,.8)'); bg.addColorStop(.4,p.color); bg.addColorStop(1,p.color+'88');
    ctx.beginPath(); ctx.arc(bx,by,p.mass,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=2; ctx.stroke();
    // label
    ctx.fillStyle='rgba(80,50,30,.7)'; ctx.font='bold 11px Space Grotesk'; ctx.textAlign='center'; ctx.textBaseline='top';
    p.label.split('\n').forEach((line,li)=>ctx.fillText(line,p.x,H-58+li*15));
    ctx.font='22px serif'; ctx.textBaseline='middle'; ctx.fillText(p.emoji,p.x,H-28);
  });

  // Custom pendulum
  if(l3Custom.visible){
    const cp=l3Custom;
    const bx=cp.x+Math.sin(cp.angle)*cp.L, by=24+Math.cos(cp.angle)*cp.L;
    ctx.strokeStyle='#FF9800'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cp.x,24); ctx.lineTo(bx,by); ctx.stroke();
    ctx.fillStyle='#FF9800'; ctx.beginPath(); ctx.arc(cp.x,24,5,0,Math.PI*2); ctx.fill();
    const cbg=ctx.createRadialGradient(bx-6,by-6,2,bx,by,20);
    cbg.addColorStop(0,'#FFF9C4'); cbg.addColorStop(1,'#FF9800');
    ctx.beginPath(); ctx.arc(bx,by,20,0,Math.PI*2); ctx.fillStyle=cbg; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=2; ctx.stroke();
    // guide line
    ctx.setLineDash([4,4]); ctx.strokeStyle='rgba(255,152,0,.4)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cp.x+28,24); ctx.lineTo(cp.x+28,24+cp.L); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#E65100'; ctx.font='bold 11px Space Grotesk'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('Твой маятник',cp.x,H-58);
  }

  // Metronome reference
  if(l3Metro.active){
    const mx=W-52, my=24;
    const mbx=mx+Math.sin(l3Metro.angle)*l3Metro.L*.45, mby=my+Math.cos(l3Metro.angle)*l3Metro.L*.45;
    ctx.strokeStyle='rgba(100,80,60,.55)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(mx,my); ctx.lineTo(mbx,mby); ctx.stroke();
    ctx.fillStyle='#A0522D'; ctx.beginPath(); ctx.arc(mbx,mby,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(100,70,40,.65)'; ctx.font='bold 10px Space Grotesk'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('Цель',mx,my+l3Metro.L*.45+10);
  }

  // Match hint
  if(l3Custom.visible&&!l3CustomDone){
    const matched=Math.abs(l3Custom.L-l3Pends[0].L)<22;
    ctx.fillStyle=matched?'rgba(0,194,124,.85)':'rgba(0,0,0,.45)';
    ctx.beginPath(); ctx.roundRect(W/2-132,H*.48-18,264,36,18); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 13px Space Grotesk'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(matched?'✅ Почти! Запусти всех!':'Настрой длину нитки → совпади с Целью!',W/2,H*.48);
  }

  // Not launched hint
  if(!l3Launched){
    ctx.fillStyle='rgba(0,0,0,.42)';
    ctx.beginPath(); ctx.roundRect(W/2-145,H/2-22,290,44,22); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 14px Space Grotesk'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('👆 Тапни на шар или нажми кнопку',W/2,H/2);
  }
}
</script>
