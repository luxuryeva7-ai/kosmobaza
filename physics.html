<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Физика — КосмоБаза</title>
<style>
@import url('https://fonts.bunny.net/css?family=fredoka-one:400|nunito:500,700,800');
:root {
  --ak-bg:#FFF3E2; --ak-bg-2:#FFE8CC; --ak-surface:#FFFDF7;
  --ak-ink:#2D1B45; --ak-ink-2:#6B5680; --ak-ink-3:#A797B8;
  --ak-chem-1:#DCF7E7; --ak-chem-2:#7BD9A8; --ak-chem-3:#3CA876;
  --ak-phys-1:#E5DCFF; --ak-phys-2:#B5A1FF; --ak-phys-3:#7C5FE0;
  --ak-bio-1:#FFE0CB; --ak-bio-2:#FFA17A; --ak-bio-3:#D96D49;
  --ak-geo-1:#D6ECFA; --ak-geo-2:#8FCAF0; --ak-geo-3:#4A93C9;
  --ak-cta-1:#FFEDA8; --ak-cta-2:#FFD262; --ak-cta-3:#D4A22B;
  --ak-ok-1:#C8F2DD; --ak-ok-2:#5DD9A0; --ak-ok-3:#2BA873;
  --ak-warn-1:#FFD2C8; --ak-warn-2:#FF8B7A; --ak-warn-3:#D9523F;
  --ak-star-1:#FFE49E; --ak-star-2:#FFC857; --ak-star-3:#D4972B;
  --ak-r-sm:10px; --ak-r-md:18px; --ak-r-lg:28px; --ak-r-xl:36px;
  --ak-display:'Fredoka One','Nunito',system-ui,sans-serif;
  --ak-body:'Nunito',system-ui,sans-serif;
}
html,body{background:#FFF3E2;margin:0;}
#root{min-height:100vh;}
body{margin:0;font-family:var(--ak-body);color:var(--ak-ink);}
.ak{font-family:var(--ak-body);color:var(--ak-ink);-webkit-font-smoothing:antialiased;}
.ak-btn{font-family:var(--ak-display);font-weight:600;font-size:17px;border:none;cursor:pointer;position:relative;transition:transform .08s ease,box-shadow .08s ease,filter .15s ease;user-select:none;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;padding:16px 26px;border-radius:999px;color:var(--ak-ink);}
.ak-btn:disabled{cursor:not-allowed;filter:grayscale(.25) opacity(.6);}
.ak-btn--phys{color:#fff;background:linear-gradient(180deg,#C4B5FF 0%,#B5A1FF 55%,#9C83FF 100%);box-shadow:0 6px 0 var(--ak-phys-3),0 12px 24px -6px rgba(124,95,224,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(124,95,224,.25);}
.ak-btn--phys:active{transform:translateY(4px);box-shadow:0 2px 0 var(--ak-phys-3),0 6px 12px -4px rgba(124,95,224,.4),inset 0 2px 0 rgba(255,255,255,.55);}
.ak-btn--cta{color:var(--ak-ink);background:linear-gradient(180deg,#FFEDA8 0%,#FFD262 55%,#FFC03A 100%);box-shadow:0 6px 0 var(--ak-cta-3),0 12px 24px -6px rgba(212,162,43,.55),inset 0 2px 0 rgba(255,255,255,.85),inset 0 -2px 0 rgba(212,162,43,.25);}
.ak-btn--cta:active{transform:translateY(4px);}
.ak-btn--ok{color:#fff;background:linear-gradient(180deg,#7CECB5 0%,#5DD9A0 55%,#3FC685 100%);box-shadow:0 6px 0 var(--ak-ok-3),0 12px 24px -6px rgba(43,168,115,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(43,168,115,.25);}
.ak-btn--ok:active{transform:translateY(4px);}
.ak-btn--soft{color:var(--ak-ink);background:linear-gradient(180deg,#FFFFFF 0%,#FFF7E8 100%);box-shadow:0 4px 0 rgba(45,27,69,.10),0 8px 18px -6px rgba(45,27,69,.12),inset 0 2px 0 rgba(255,255,255,.95),inset 0 -2px 0 rgba(45,27,69,.05),inset 0 0 0 1px rgba(45,27,69,.06);}
.ak-btn--soft:active{transform:translateY(3px);}
.ak-btn--sm{padding:11px 18px;font-size:14px;}
.ak-btn--lg{padding:20px 32px;font-size:19px;}
.ak-btn--icon{width:56px;height:56px;padding:0;border-radius:50%;}
.ak-btn--icon.ak-btn--sm{width:42px;height:42px;}
@keyframes ak-bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-4px) rotate(1deg);}}
@keyframes ak-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
@keyframes ak-shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px) rotate(-1deg);}40%{transform:translateX(7px) rotate(1deg);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
@keyframes ak-pop{0%{transform:scale(.7);opacity:0;}60%{transform:scale(1.06);opacity:1;}100%{transform:scale(1);}}
@keyframes ak-twinkle{0%,100%{opacity:.35;transform:scale(.85);}50%{opacity:1;transform:scale(1.05);}}
@keyframes ak-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.ak-bob{animation:ak-bob 3.2s ease-in-out infinite;}
.ak-pulse{animation:ak-pulse 2.4s ease-in-out infinite;}
.ak-shake{animation:ak-shake .45s ease-in-out;}
.ak-pop{animation:ak-pop .42s cubic-bezier(.2,.7,.3,1) forwards;}
.ak-twinkle{animation:ak-twinkle 2.4s ease-in-out infinite;}
.ak-float{animation:ak-float 3s ease-in-out infinite;}
.ak-num{font-variant-numeric:tabular-nums;font-family:var(--ak-display);}
.ak-tap{cursor:pointer;transition:transform .12s cubic-bezier(.2,.7,.3,1),filter .12s;}
.ak-tap:hover{transform:translateY(-3px);filter:brightness(1.03);}
.ak-tap:active{transform:translateY(0);}
.ak ::-webkit-scrollbar{display:none;}
.ak{scrollbar-width:none;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script type="text/babel">
/* ============================================================
   AK DESIGN SYSTEM — ICONS & COMPONENTS
   ============================================================ */
const AK_TONES = {
  chem: ['#DCF7E7','#7BD9A8','#3CA876'],
  phys: ['#E5DCFF','#B5A1FF','#7C5FE0'],
  bio:  ['#FFE0CB','#FFA17A','#D96D49'],
  geo:  ['#D6ECFA','#8FCAF0','#4A93C9'],
  ok:   ['#C8F2DD','#5DD9A0','#2BA873'],
  cta:  ['#FFEDA8','#FFD262','#D4A22B'],
  star: ['#FFE49E','#FFC857','#D4972B'],
  warn: ['#FFD2C8','#FF8B7A','#D9523F'],
  ink:  ['#E5DCEE','#6B5680','#2D1B45'],
};

function AKAtom({ size=80, tone='phys' }) {
  const [l,m,d] = AK_TONES[tone];
  const id = React.useId().replace(/:/g,'');
  return (
    <svg width={size} height={size} viewBox="0 0 80 80" style={{display:'block'}}>
      <defs>
        <radialGradient id={'at-'+id} cx="38%" cy="32%" r="70%">
          <stop offset="0%" stopColor="#fff"/>
          <stop offset="30%" stopColor={l}/>
          <stop offset="100%" stopColor={d}/>
        </radialGradient>
      </defs>
      <ellipse cx="40" cy="74" rx="20" ry="3" fill="rgba(45,27,69,.18)"/>
      <ellipse cx="40" cy="40" rx="36" ry="14" fill="none" stroke={d} strokeWidth="2" opacity=".35" transform="rotate(-35 40 40)"/>
      <ellipse cx="40" cy="40" rx="36" ry="14" fill="none" stroke={d} strokeWidth="2" opacity=".35" transform="rotate(35 40 40)"/>
      <ellipse cx="40" cy="40" rx="36" ry="14" fill="none" stroke={d} strokeWidth="2" opacity=".35"/>
      <circle cx="40" cy="40" r="11" fill={'url(#at-'+id+')'} stroke={d} strokeWidth="2"/>
      <ellipse cx="36" cy="35" rx="4" ry="6" fill="#fff" opacity=".6" transform="rotate(-20 36 35)"/>
    </svg>
  );
}

function AKBlob({ size=80, kind='sphere', tone='phys' }) {
  const [l,m,d] = AK_TONES[tone];
  const id = React.useId().replace(/:/g,'');
  let shape;
  if (kind === 'sphere') {
    shape = <circle cx="40" cy="40" r="28" fill={'url(#bgb-'+id+')'} stroke={d} strokeWidth="2"/>;
  } else if (kind === 'cube') {
    shape = (
      <g>
        <polygon points="40,14 64,26 64,54 40,66 16,54 16,26" fill={'url(#bgb-'+id+')'} stroke={d} strokeWidth="2"/>
        <polygon points="40,14 64,26 40,38 16,26" fill="rgba(255,255,255,.28)"/>
        <line x1="40" y1="38" x2="40" y2="66" stroke={d} strokeWidth="1.5" opacity=".4"/>
        <line x1="40" y1="38" x2="64" y2="26" stroke="rgba(255,255,255,.38)" strokeWidth="1.5"/>
        <line x1="40" y1="38" x2="16" y2="26" stroke="rgba(255,255,255,.28)" strokeWidth="1.5"/>
      </g>
    );
  } else if (kind === 'gear') {
    const teeth = 8, ir = 16, or = 24, cx = 40, cy = 40;
    let pts = '';
    for (let i = 0; i < teeth * 2; i++) {
      const angle = (i / (teeth * 2)) * Math.PI * 2 - Math.PI / 2;
      const r = i % 2 === 0 ? or : ir;
      pts += (cx + r * Math.cos(angle)) + ',' + (cy + r * Math.sin(angle)) + ' ';
    }
    shape = (
      <g>
        <polygon points={pts} fill={'url(#bgb-'+id+')'} stroke={d} strokeWidth="1.5"/>
        <circle cx="40" cy="40" r="8" fill={l} stroke={d} strokeWidth="1.5"/>
        <circle cx="40" cy="40" r="4" fill="#fff" opacity=".7"/>
      </g>
    );
  } else if (kind === 'cylinder') {
    shape = (
      <g>
        <rect x="18" y="28" width="44" height="36" rx="4" fill={'url(#bgb-'+id+')'} stroke={d} strokeWidth="2"/>
        <ellipse cx="40" cy="28" rx="22" ry="7" fill={m} stroke={d} strokeWidth="2"/>
        <ellipse cx="40" cy="27" rx="18" ry="4.5" fill="#fff" opacity=".42"/>
        <ellipse cx="40" cy="64" rx="22" ry="7" fill={d} opacity=".32"/>
        <rect x="24" y="30" width="8" height="30" rx="4" fill="#fff" opacity=".32"/>
      </g>
    );
  } else {
    shape = <circle cx="40" cy="40" r="28" fill={'url(#bgb-'+id+')'} stroke={d} strokeWidth="2"/>;
  }
  return (
    <svg width={size} height={size} viewBox="0 0 80 80" style={{display:'block'}}>
      <defs>
        <radialGradient id={'bgb-'+id} cx="40%" cy="32%" r="75%">
          <stop offset="0%" stopColor="#fff"/>
          <stop offset="28%" stopColor={l}/>
          <stop offset="100%" stopColor={d}/>
        </radialGradient>
      </defs>
      <ellipse cx="40" cy="74" rx="22" ry="3" fill="rgba(45,27,69,.2)"/>
      {shape}
      {kind === 'sphere' && <ellipse cx="30" cy="26" rx="6" ry="10" fill="#fff" opacity=".6" transform="rotate(-20 30 26)"/>}
    </svg>
  );
}

function AKStar({ size=56, filled=true }) {
  const id = React.useId().replace(/:/g,'');
  return (
    <svg width={size} height={size} viewBox="0 0 56 56">
      <defs><radialGradient id={'st-'+id} cx="40%" cy="32%" r="70%"><stop offset="0%" stopColor="#fff"/><stop offset="35%" stopColor="#FFE49E"/><stop offset="100%" stopColor="#D4972B"/></radialGradient></defs>
      <ellipse cx="28" cy="52" rx="14" ry="2.5" fill="rgba(45,27,69,.18)"/>
      <path d="M28 5 L34.5 19 L50 21 L38.5 31.5 L42 47 L28 39.5 L14 47 L17.5 31.5 L6 21 L21.5 19 Z"
        fill={filled?'url(#st-'+id+')':'#E8DCEE'} stroke={filled?'#C99B3B':'#B0A0C2'} strokeWidth="2.2" strokeLinejoin="round"/>
      {filled&&<><ellipse cx="20" cy="18" rx="3.5" ry="5" fill="#fff" opacity=".7" transform="rotate(-30 20 18)"/><circle cx="36" cy="14" r="1.6" fill="#fff" opacity=".7"/></>}
    </svg>
  );
}

function AKStarSmall({ filled=true }) {
  const id = React.useId().replace(/:/g,'');
  return (
    <svg width="14" height="14" viewBox="0 0 14 14">
      <defs><linearGradient id={'ss-'+id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#FFE49E"/><stop offset="100%" stopColor="#FFC857"/></linearGradient></defs>
      <path d="M7 1.2 L8.7 5 L13 5.4 L9.7 8.2 L10.7 12.3 L7 10.2 L3.3 12.3 L4.3 8.2 L1 5.4 L5.3 5 Z"
        fill={filled?'url(#ss-'+id+')':'#E8DCEE'} stroke={filled?'#D4972B':'#B0A0C2'} strokeWidth="1.2" strokeLinejoin="round"/>
    </svg>
  );
}

function AKPlanet({ size=80, tone='phys', ring=true }) {
  const [l,m,d] = AK_TONES[tone];
  const id = React.useId().replace(/:/g,'');
  return (
    <svg width={size} height={size*0.78} viewBox="0 0 100 78">
      <defs><radialGradient id={'pl-'+id} cx="38%" cy="32%" r="70%"><stop offset="0%" stopColor="#fff"/><stop offset="30%" stopColor={l}/><stop offset="100%" stopColor={d}/></radialGradient></defs>
      {ring&&<ellipse cx="50" cy="40" rx="48" ry="11" fill="none" stroke={d} strokeWidth="3" opacity=".4"/>}
      <circle cx="50" cy="38" r="26" fill={'url(#pl-'+id+')'} stroke={d} strokeWidth="2"/>
      <ellipse cx="42" cy="28" rx="6" ry="9" fill="#fff" opacity=".55" transform="rotate(-22 42 28)"/>
      {ring&&<path d="M 16 47 Q 50 60 84 47" fill="none" stroke={d} strokeWidth="3" opacity=".7" strokeLinecap="round"/>}
    </svg>
  );
}

function AKProgress({ value=0.5, tone='phys', height=18, label }) {
  const [l,m,d] = AK_TONES[tone];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {label&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
        <span style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:13,color:'var(--ak-ink-2)'}}>{label}</span>
        <span className="ak-num" style={{fontWeight:700,fontSize:14,color:'var(--ak-ink)'}}>{Math.round(value*100)}%</span>
      </div>}
      <div style={{height,borderRadius:999,background:'rgba(45,27,69,.08)',boxShadow:'inset 0 2px 4px rgba(45,27,69,.18),inset 0 -1px 0 rgba(255,255,255,.6)',overflow:'hidden',position:'relative'}}>
        <div style={{width:Math.max(0,Math.min(1,value))*100+'%',height:'100%',background:'linear-gradient(180deg,'+l+' 0%,'+m+' 50%,'+d+' 100%)',boxShadow:'inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 '+d,borderRadius:999,transition:'width .4s cubic-bezier(.2,.7,.3,1)',position:'relative'}}>
          <div style={{position:'absolute',top:3,left:8,right:8,height:3,background:'rgba(255,255,255,.55)',borderRadius:999}}/>
        </div>
      </div>
    </div>
  );
}

function AKStatChip({ icon, value, tone='cta' }) {
  const [l,m,d] = AK_TONES[tone];
  return (
    <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'6px 14px 6px 6px',borderRadius:999,background:'#fff',boxShadow:'0 3px 0 rgba(45,27,69,.08),0 6px 14px -4px rgba(45,27,69,.12),inset 0 1px 0 rgba(255,255,255,1)',fontFamily:'var(--ak-display)',fontWeight:700,fontSize:15,color:'var(--ak-ink)'}}>
      <div style={{width:28,height:28,borderRadius:'50%',background:'radial-gradient(circle at 35% 30%,#fff,'+l+' 25%,'+m+' 75%,'+d+' 100%)',boxShadow:'inset 0 -2px 0 '+d,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14}}>{icon}</div>
      <span className="ak-num">{value}</span>
    </div>
  );
}

function AKTaskBadge({ children, tone='phys' }) {
  const [l,m,d] = AK_TONES[tone];
  return (
    <div className="ak-pulse" style={{display:'inline-flex',alignItems:'center',gap:10,padding:'12px 20px 12px 14px',borderRadius:999,background:'#fff',boxShadow:'0 4px 0 rgba(45,27,69,.08),0 10px 22px -6px rgba(45,27,69,.14),inset 0 1px 0 rgba(255,255,255,1)',fontFamily:'var(--ak-display)',fontWeight:600,fontSize:14.5,color:'var(--ak-ink)'}}>
      <div style={{width:10,height:10,borderRadius:'50%',background:m,boxShadow:'0 0 0 4px '+m+'33,inset 0 -1px 0 '+d}}/>
      <span>{children}</span>
    </div>
  );
}

function AKSuccessCard({ stars=3, title='Отлично!', fact, onNext, ctaLabel='Дальше' }) {
  return (
    <div className="ak-pop" style={{width:340,background:'#fff',borderRadius:32,padding:'28px 24px 24px',textAlign:'center',boxShadow:'0 12px 0 rgba(124,95,224,.18),0 24px 48px -12px rgba(45,27,69,.25),inset 0 2px 0 rgba(255,255,255,1),inset 0 -3px 0 rgba(45,27,69,.05)',fontFamily:'var(--ak-body)',position:'relative'}}>
      <div aria-hidden style={{position:'absolute',top:-10,left:-10,right:-10,height:30,pointerEvents:'none'}}>
        {[{l:8,c:'#FFC857',s:8},{l:60,c:'#B5A1FF',s:6},{l:120,c:'#5DD9A0',s:7},{l:200,c:'#FFA17A',s:6},{l:260,c:'#8FCAF0',s:8},{l:310,c:'#E5DCFF',s:6}].map((p,i)=>(
          <div key={i} className="ak-twinkle" style={{position:'absolute',left:p.l,top:4+(i%2)*8,width:p.s,height:p.s,borderRadius:2,background:p.c,transform:'rotate('+(i*25)+'deg)',animationDelay:(i*.15)+'s'}}/>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:14,marginTop:8}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{transform:'translateY('+(i===1?-6:0)+'px) rotate('+((i-1)*12)+'deg)'}}>
            <AKStar size={i===1?70:56} filled={i<stars}/>
          </div>
        ))}
      </div>
      <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:26,letterSpacing:-.4,color:'var(--ak-ink)',marginBottom:8}}>{title}</div>
      {fact&&<div style={{fontSize:14,lineHeight:1.5,color:'var(--ak-ink-2)',marginBottom:20,fontWeight:500}}>{fact}</div>}
      {onNext&&<button className="ak-btn ak-btn--phys" style={{width:'100%'}} onClick={onNext}>{ctaLabel}</button>}
    </div>
  );
}

function AKLessonHeader({ progress=0.4, stars=240, onClose }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <button onClick={onClose} className="ak-btn ak-btn--soft ak-btn--icon ak-btn--sm" aria-label="Закрыть">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 2 L12 12 M12 2 L2 12" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
      </button>
      <div style={{flex:1,paddingTop:2}}>
        <AKProgress value={progress} tone="phys" height={14}/>
      </div>
      <AKStatChip icon="★" value={stars} tone="star"/>
    </div>
  );
}

/* ============================================================
   LEVEL 1 — ГРАВИТАЦИЯ: Что упадёт первым?
   ============================================================ */
const L1_TASKS = [
  {left:{e:'🪨',label:'Камень',mass:10}, right:{e:'🪶',label:'Перо',mass:.01}, answer:'same', fact:'В вакууме всё падает одинаково! Галилей доказал это, бросая шары с Пизанской башни.'},
  {left:{e:'⚽',label:'Мяч',mass:.4}, right:{e:'🎈',label:'Шарик',mass:.003}, answer:'left', fact:'Шарик очень лёгкий — воздух сильно тормозит его. В вакууме они упали бы вместе!'},
  {left:{e:'🍎',label:'Яблоко',mass:.18}, right:{e:'📚',label:'Книга',mass:.5}, answer:'same', fact:'Масса не важна для скорости падения. Земля сильнее тянет тяжёлый предмет, но и сдвинуть его сложнее!'},
  {left:{e:'🔨',label:'Молоток',mass:.5}, right:{e:'🏓',label:'Мячик',mass:.03}, answer:'left', fact:'Молоток компактный — у него меньше площадь и меньше сопротивление воздуха.'},
  {left:{e:'🪨',label:'Камень 1кг',mass:1}, right:{e:'🪨',label:'Камень 2кг',mass:2}, answer:'same', fact:'Один из законов Галилея: тела падают с одинаковым ускорением 9.8 м/с² независимо от массы!'},
];

function Level1Falling({ onDone=()=>{} }) {
  const [taskIdx, setTaskIdx] = React.useState(0);
  const [falling, setFalling] = React.useState(false);
  const [answered, setAnswered] = React.useState(null);
  const [showFact, setShowFact] = React.useState(false);
  const [allDone, setAllDone] = React.useState(false);
  const [score, setScore] = React.useState(0);
  const [leftY, setLeftY] = React.useState(0);
  const [rightY, setRightY] = React.useState(0);
  const task = L1_TASKS[taskIdx];
  const rafRef = React.useRef(null);

  const doAnswer = (choice) => {
    if (falling || showFact) return;
    setFalling(true);
    const correct = choice === task.answer;
    if (correct) setScore(s => s + 1);
    setAnswered(correct ? 'correct' : 'wrong');
    const startTime = performance.now();
    const duration = 1400;
    const groundMax = 200;
    const animFall = (now) => {
      const elapsed = now - startTime;
      const p = Math.min(elapsed / duration, 1);
      const eased = p * p;
      let lY = eased * groundMax;
      let rY = eased * groundMax;
      if (task.answer === 'left') { rY = eased * groundMax * 0.55; }
      else if (task.answer === 'right') { lY = eased * groundMax * 0.55; }
      setLeftY(lY);
      setRightY(rY);
      if (p < 1) { rafRef.current = requestAnimationFrame(animFall); }
      else setTimeout(() => setShowFact(true), 250);
    };
    rafRef.current = requestAnimationFrame(animFall);
  };

  React.useEffect(() => { return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); }; }, []);

  const nextTask = () => {
    const next = taskIdx + 1;
    if (next >= L1_TASKS.length) { setAllDone(true); return; }
    setTaskIdx(next);
    setFalling(false); setAnswered(null); setShowFact(false);
    setLeftY(0); setRightY(0);
  };

  if (allDone) {

function PendulumCanvas({ highlightPos }) {
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const tRef = React.useRef(0);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const pivotX = W / 2, pivotY = 26;
    const L = highlightPos === 'swing' ? 75 : 115;
    const amplitude = highlightPos === 'symmetry' ? (30 * Math.PI / 180) : (38 * Math.PI / 180);
    const omega = Math.sqrt(9.8 / (L / 80));

    const loop = () => {
      tRef.current += 0.018;
      const t = tRef.current;
      ctx.clearRect(0, 0, W, H);

      // Background gradient (AK cream)
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#EDE4FF');
      grad.addColorStop(1, '#FFF3E2');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      const theta = amplitude * Math.cos(omega * t);
      const bobX = pivotX + L * Math.sin(theta);
      const bobY = pivotY + L * Math.cos(theta);

      // Arc trace
      ctx.beginPath();
      ctx.arc(pivotX, pivotY, L, -Math.PI/2 - amplitude - 0.05, -Math.PI/2 + amplitude + 0.05);
      ctx.strokeStyle = 'rgba(181,161,255,.3)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Symmetry markers
      if (highlightPos === 'symmetry') {
        const lx = pivotX + L * Math.sin(-amplitude), ly = pivotY + L * Math.cos(-amplitude);
        const rx = pivotX + L * Math.sin(amplitude), ry = pivotY + L * Math.cos(amplitude);
        ctx.beginPath(); ctx.arc(lx, ly, 7, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(124,95,224,.28)'; ctx.fill();
        ctx.beginPath(); ctx.arc(rx, ry, 7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(lx - 10, ly); ctx.lineTo(rx + 10, ry);
        ctx.strokeStyle = 'rgba(124,95,224,.4)'; ctx.lineWidth = 1.5;
        ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
      }

      // Velocity arrow at bottom
      const speed = Math.abs(-amplitude * omega * Math.sin(omega * t));
      if (Math.abs(theta) < 0.12 && speed > 0.4) {
        const dir = theta > 0 ? -1 : 1;
        ctx.beginPath(); ctx.moveTo(bobX + dir*18, bobY); ctx.lineTo(bobX + dir*30, bobY);
        ctx.strokeStyle = '#5DD9A0'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bobX + dir*30, bobY - 5);
        ctx.lineTo(bobX + dir*36, bobY);
        ctx.lineTo(bobX + dir*30, bobY + 5);
        ctx.fillStyle = '#5DD9A0'; ctx.fill();
      }

      // Pivot bracket
      ctx.fillStyle = '#7C5FE0';
      ctx.fillRect(pivotX - 18, pivotY - 10, 36, 14);
      ctx.beginPath(); ctx.arc(pivotX, pivotY, 6, 0, Math.PI*2);
      ctx.fillStyle = '#9C83FF'; ctx.fill();
      ctx.beginPath(); ctx.arc(pivotX-2, pivotY-2, 2.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,.7)'; ctx.fill();

      // String
      ctx.beginPath(); ctx.moveTo(pivotX, pivotY + 4); ctx.lineTo(bobX, bobY - 17);
      ctx.strokeStyle = '#6B5680'; ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.stroke();

      // Bob clay circle
      const bobGrad = ctx.createRadialGradient(bobX-6, bobY-6, 1, bobX, bobY, 17);
      bobGrad.addColorStop(0, '#fff');
      bobGrad.addColorStop(0.22, '#E5DCFF');
      bobGrad.addColorStop(1, '#7C5FE0');
      ctx.beginPath(); ctx.arc(bobX, bobY, 17, 0, Math.PI*2);
      ctx.fillStyle = bobGrad; ctx.fill();
      ctx.strokeStyle = '#7C5FE0'; ctx.lineWidth = 2; ctx.stroke();
      // Bob highlight
      ctx.beginPath();
      ctx.ellipse(bobX-5, bobY-5, 4.5, 7, -0.4, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,.58)'; ctx.fill();

      // Shadow
      ctx.beginPath();
      ctx.ellipse(bobX, H - 14, 20 + 8 * (bobY / H), 3.5, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(45,27,69,.1)'; ctx.fill();

      rafRef.current = requestAnimationFrame(loop);
    };
    rafRef.current = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(rafRef.current);
  }, [highlightPos]);

  return (
    <canvas ref={canvasRef} width={300} height={210}
      style={{borderRadius:20,display:'block',margin:'0 auto',boxShadow:'0 8px 0 rgba(124,95,224,.15),0 16px 32px -8px rgba(124,95,224,.2)'}}/>
  );
}

function Level2Pendulum({ onDone=()=>{} }) {

  const handleChoice = (i) => {
    if (chosen !== null) return;
    setChosen(i);
    if (i === q.answer) setScore(s => s + 1);
    setShowFact(true);

  const nextQ = () => {
    const next = qIdx + 1;
    if (next >= L2_QUESTIONS.length) { setAllDone(true); return; }

  };

  if (allDone) {
    return (
      <div className="ak" style={{width:'100%',minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:24,boxSizing:'border-box'}}>
        <AKSuccessCard stars={score >= 3 ? 3 : score >= 2 ? 2 : 1} title="Мастер маятника!" fact="Период маятника T = 2π√(L/g). Только длина нити влияет на период — масса и угол (при малых углах) не важны!" onNext={onDone} ctaLabel="В меню →"/>

    );

    <div className="ak" style={{width:'100%',minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',display:'flex',flexDirection:'column',padding:'16px 18px 22px',boxSizing:'border-box',position:'relative',overflowY:'auto'}}>
      <AKLessonHeader progress={qIdx / L2_QUESTIONS.length} stars={190 + score * 35} onClose={onDone}/>

      <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:14,marginBottom:12}}>

        ))}
      </div>

      <div style={{textAlign:'center',marginBottom:14,fontFamily:'var(--ak-display)',fontWeight:700,fontSize:17,color:'var(--ak-ink)',lineHeight:1.3,padding:'0 6px'}}>
        {q.question}
      </div>

      <div style={{marginBottom:16}}>
        <PendulumCanvas highlightPos={q.highlightPos}/>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:10}}>
        {q.options.map((opt, i) => {
          let cardStyle;
          if (chosen === null) {
            cardStyle = {
              background:'linear-gradient(160deg,#E5DCFF 0%,#fff 100%)',
              boxShadow:'0 5px 0 rgba(124,95,224,.22),0 10px 20px -6px rgba(124,95,224,.12),inset 0 2px 0 rgba(255,255,255,.8)',
              color:'var(--ak-ink)',
            };
          } else if (i === q.answer) {
            cardStyle = {
              background:'linear-gradient(160deg,#C8F2DD 0%,#5DD9A0 100%)',
              boxShadow:'0 5px 0 #2BA873,0 10px 20px -6px rgba(43,168,115,.3)',
              color:'#fff',
            };
          } else if (i === chosen) {
            cardStyle = {
              background:'linear-gradient(160deg,#FFD2C8 0%,#FF8B7A 100%)',
              boxShadow:'0 5px 0 #D9523F,0 10px 20px -6px rgba(217,82,63,.3)',
              color:'#fff',
            };
          } else {
            cardStyle = {
              background:'rgba(255,255,255,.45)',
              boxShadow:'0 2px 0 rgba(45,27,69,.06)',
              color:'var(--ak-ink-3)',
            };
          }
          return (
            <button key={i} onClick={() => handleChoice(i)} disabled={chosen !== null}
              style={{width:'100%',padding:'13px 16px',borderRadius:17,border:'none',cursor:chosen !== null ? 'default' : 'pointer',fontFamily:'var(--ak-display)',fontWeight:600,fontSize:15,textAlign:'left',transition:'all .2s',display:'flex',alignItems:'center',gap:12,...cardStyle}}>
              <span style={{width:27,height:27,borderRadius:'50%',background:'rgba(255,255,255,.45)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:12,flexShrink:0}}>{String.fromCharCode(65+i)}</span>
              <span style={{flex:1}}>{opt}</span>
              {chosen !== null && i === q.answer && <span>✅</span>}
              {chosen !== null && i === chosen && i !== q.answer && <span>❌</span>}
            </button>
          );
        })}
      </div>

      {showFact && (
        <div className="ak-pop" style={{background:'rgba(255,255,255,.92)',borderRadius:20,padding:'14px 16px',backdropFilter:'blur(8px)',boxShadow:'0 4px 0 rgba(124,95,224,.1),0 8px 20px -6px rgba(45,27,69,.12)'}}>

          <button className="ak-btn ak-btn--phys" style={{width:'100%',padding:'12px 18px'}} onClick={nextQ}>

function ScaleSVG({ leftWeights, rightWeights, beamAngle }) {
  const W = 320, H = 195;
  const pivotX = W / 2, pivotY = 78;
  const armLen = 118;
  const rad = (beamAngle * Math.PI) / 180;
  const leftEndX = pivotX - armLen * Math.cos(rad);
  const leftEndY = pivotY - armLen * Math.sin(rad);
  const rightEndX = pivotX + armLen * Math.cos(rad);
  const rightEndY = pivotY + armLen * Math.sin(rad);
  const panR = 34;
  const panOffY = 42;
  const leftPanX = leftEndX, leftPanY = leftEndY + panOffY;
  const rightPanX = rightEndX, rightPanY = rightEndY + panOffY;
  const isBalanced = Math.abs(beamAngle) < 1.5;

  return (
    <svg width={W} height={H} viewBox={'0 0 '+W+' '+H} style={{display:'block',margin:'0 auto',transition:'all .4s'}}>
      <defs>
        <radialGradient id="sg-l" cx="38%" cy="32%" r="70%">
          <stop offset="0%" stopColor="#fff"/>
          <stop offset="35%" stopColor="#E5DCFF"/>
          <stop offset="100%" stopColor="#7C5FE0"/>
        </radialGradient>
        <radialGradient id="sg-r" cx="38%" cy="32%" r="70%">
          <stop offset="0%" stopColor="#fff"/>
          <stop offset="35%" stopColor="#E5DCFF"/>
          <stop offset="100%" stopColor="#7C5FE0"/>
        </radialGradient>
      </defs>
      {/* Base stand */}
      <polygon points={pivotX+','+( pivotY+6)+' '+(pivotX-16)+','+(H-10)+' '+(pivotX+16)+','+(H-10)} fill="#B5A1FF" stroke="#7C5FE0" strokeWidth="2"/>
      <rect x={pivotX-28} y={H-14} width={56} height={10} rx={5} fill="#7C5FE0"/>
      {/* Beam */}
      <line x1={leftEndX} y1={leftEndY} x2={rightEndX} y2={rightEndY}
        stroke={isBalanced ? '#5DD9A0' : '#7C5FE0'} strokeWidth={isBalanced ? 9 : 7.5} strokeLinecap="round"
        style={{filter:isBalanced ? 'drop-shadow(0 0 8px rgba(93,217,160,.65))' : 'none'}}/>
      <line x1={leftEndX+3} y1={leftEndY+2} x2={rightEndX-3} y2={rightEndY+2}
        stroke="rgba(255,255,255,.45)" strokeWidth="3" strokeLinecap="round"/>
      {/* Pivot */}
      <circle cx={pivotX} cy={pivotY} r={10} fill="#7C5FE0" stroke="#fff" strokeWidth="2.5"/>
      <circle cx={pivotX-2.5} cy={pivotY-2.5} r={3} fill="rgba(255,255,255,.65)"/>
      {/* Strings */}
      <line x1={leftEndX} y1={leftEndY} x2={leftPanX} y2={leftPanY-panR} stroke="#6B5680" strokeWidth="2" strokeDasharray="3,2"/>
      <line x1={rightEndX} y1={rightEndY} x2={rightPanX} y2={rightPanY-panR} stroke="#6B5680" strokeWidth="2" strokeDasharray="3,2"/>
      {/* Left pan */}
      <circle cx={leftPanX} cy={leftPanY} r={panR} fill="url(#sg-l)" stroke="#7C5FE0" strokeWidth="2.5"
        style={{filter:isBalanced ? 'drop-shadow(0 0 5px rgba(93,217,160,.45))' : 'none'}}/>
      <ellipse cx={leftPanX-7} cy={leftPanY-9} rx={7} ry={11} fill="rgba(255,255,255,.48)" transform={'rotate(-18 '+(leftPanX-7)+' '+(leftPanY-9)+')'}/>
      {/* Right pan */}
      <circle cx={rightPanX} cy={rightPanY} r={panR} fill="url(#sg-r)" stroke="#7C5FE0" strokeWidth="2.5"
        style={{filter:isBalanced ? 'drop-shadow(0 0 5px rgba(93,217,160,.45))' : 'none'}}/>
      <ellipse cx={rightPanX-7} cy={rightPanY-9} rx={7} ry={11} fill="rgba(255,255,255,.48)" transform={'rotate(-18 '+(rightPanX-7)+' '+(rightPanY-9)+')'}/>
      {/* Left weights */}
      {leftWeights.map((w, i) => {
        const [cl,cm,cd] = WEIGHT_COLORS[w] || WEIGHT_COLORS[1];
        const wx = leftPanX + (i - (leftWeights.length - 1) / 2) * 22;
        const wy = leftPanY - 10 - i * 2;
        return (
          <g key={i}>
            <circle cx={wx} cy={wy} r={12} fill={cm} stroke={cd} strokeWidth="2"/>
            <circle cx={wx-3} cy={wy-3} r={4} fill="rgba(255,255,255,.6)"/>
            <text x={wx} y={wy+5} textAnchor="middle" fontFamily="Fredoka One" fontSize="10" fill="#fff" fontWeight="700">{w}</text>
          </g>
        );
      })}
      {/* Right weights */}
      {rightWeights.map((w, i) => {
        const [cl,cm,cd] = WEIGHT_COLORS[w] || WEIGHT_COLORS[1];
        const wx = rightPanX + (i - (rightWeights.length - 1) / 2) * 22;
        const wy = rightPanY - 10 - i * 2;
        return (
          <g key={i}>
            <circle cx={wx} cy={wy} r={12} fill={cm} stroke={cd} strokeWidth="2"/>
            <circle cx={wx-3} cy={wy-3} r={4} fill="rgba(255,255,255,.6)"/>
            <text x={wx} y={wy+5} textAnchor="middle" fontFamily="Fredoka One" fontSize="10" fill="#fff" fontWeight="700">{w}</text>
          </g>
        );
      })}
      {isBalanced && (
        <text x={pivotX} y={pivotY-18} textAnchor="middle" fontFamily="Fredoka One" fontSize="13" fill="#2BA873">⚖️ Баланс!</text>
      )}
    </svg>
  );
}

function Level3Lever({ onDone=()=>{} }) {
  const [chIdx, setChIdx] = React.useState(0);
  const [leftAdded, setLeftAdded] = React.useState([]);
  const [rightAdded, setRightAdded] = React.useState([]);
  const [selectedW, setSelectedW] = React.useState(null);
  const [checked, setChecked] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [allDone, setAllDone] = React.useState(false);
  const [score, setScore] = React.useState(0);

  const ch = L3_CHALLENGES[chIdx];
  const leftFixed = ch.leftFixed.map(w => w.mass);
  const rightFixed = ch.rightFixed.map(w => w.mass);
  const allLeft = [...leftFixed, ...leftAdded];
  const allRight = [...rightFixed, ...rightAdded];
  const leftT = allLeft.reduce((a, m) => a + m, 0);
  const rightT = allRight.reduce((a, m) => a + m, 0);
  const diff = leftT - rightT;
  const beamAngle = Math.max(-34, Math.min(34, (-diff / 8) * 34));

  const getState = () => leftT > rightT ? 'left' : rightT > leftT ? 'right' : 'balance';

  const handlePlaceSide = (side) => {
    if (selectedW === null || checked) return;
    if (side === 'left') setLeftAdded(a => [...a, selectedW]);
    else setRightAdded(a => [...a, selectedW]);
    setSelectedW(null);
  };

  const handleCheck = () => {
    setChecked(true);
    const state = getState();
    if (state === ch.target) { setResult('correct'); setScore(s => s + 1); }
    else setResult('wrong');
  };

  const handleClear = () => {
    setLeftAdded([]); setRightAdded([]);
    setSelectedW(null); setChecked(false); setResult(null);
  };

  const nextCh = () => {
    const next = chIdx + 1;
    if (next >= L3_CHALLENGES.length) { setAllDone(true); return; }
    setChIdx(next);
    setLeftAdded([]); setRightAdded([]);
    setSelectedW(null); setChecked(false); setResult(null);
  };

  if (allDone) {
    return (
      <div className="ak" style={{width:'100%',minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:24,boxSizing:'border-box'}}>
        <AKSuccessCard stars={score >= 4 ? 3 : score >= 2 ? 2 : 1} title="Мастер рычага!" fact="Закон рычага: F₁ × d₁ = F₂ × d₂. С помощью рычага Архимед мог поднять Землю, имея точку опоры!" onNext={onDone} ctaLabel="В меню →"/>
      </div>
    );
  }

  const targetLabel = ch.target === 'balance' ? '⚖️ Уравновесить' : ch.target === 'left' ? '⬅️ Перевесить влево' : '➡️ Перевесить вправо';

  return (
    <div className="ak" style={{width:'100%',minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',display:'flex',flexDirection:'column',padding:'16px 18px 22px',boxSizing:'border-box',overflowY:'auto'}}>
      <AKLessonHeader progress={chIdx / L3_CHALLENGES.length} stars={180 + score * 40} onClose={onDone}/>

      <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:14,marginBottom:12}}>
        {L3_CHALLENGES.map((_,i) => (
          <div key={i} style={{width:10,height:10,borderRadius:'50%',background:i < chIdx ? '#B5A1FF' : i === chIdx ? '#7C5FE0' : 'rgba(45,27,69,.14)',transition:'all .3s',boxShadow:i === chIdx ? '0 0 0 3px rgba(124,95,224,.3)' : 'none'}}/>
        ))}
      </div>

      <div style={{textAlign:'center',marginBottom:8}}>
        <AKTaskBadge tone="phys">{ch.goal}</AKTaskBadge>
      </div>
      <div style={{textAlign:'center',marginBottom:12,fontFamily:'var(--ak-display)',fontSize:13,color:'var(--ak-ink-2)',fontWeight:700}}>{targetLabel}</div>

      {/* Scale */}
      <div style={{marginBottom:12,background:'linear-gradient(180deg,#EDE4FF 0%,#FFF3E2 100%)',borderRadius:20,padding:'10px 0 6px',boxShadow:'0 4px 0 rgba(124,95,224,.12),0 8px 20px -6px rgba(124,95,224,.1)'}}>
        <ScaleSVG leftWeights={allLeft} rightWeights={allRight} beamAngle={beamAngle}/>
        <div style={{display:'flex',justifyContent:'space-between',padding:'4px 40px 0',}}>
          <div style={{fontFamily:'var(--ak-display)',fontSize:13,color:'#7C5FE0',fontWeight:700}}>Лево: {leftT}кг</div>
          <div style={{fontFamily:'var(--ak-display)',fontSize:13,color:'#7C5FE0',fontWeight:700}}>Право: {rightT}кг</div>
        </div>
      </div>

      {/* Place side buttons (when weight selected) */}
      {selectedW !== null && !checked && (
        <div className="ak-pop" style={{display:'flex',gap:10,marginBottom:12,padding:'10px 12px',borderRadius:16,background:'rgba(229,220,255,.55)',backdropFilter:'blur(8px)',alignItems:'center'}}>
          <div style={{flex:1,fontFamily:'var(--ak-display)',fontSize:13,color:'var(--ak-ink)',fontWeight:700}}>Гиря {selectedW}кг — куда?</div>
          <button className="ak-btn ak-btn--phys" style={{padding:'9px 14px',fontSize:13}} onClick={() => handlePlaceSide('left')}>← Влево</button>
          <button className="ak-btn ak-btn--phys" style={{padding:'9px 14px',fontSize:13}} onClick={() => handlePlaceSide('right')}>Вправо →</button>
        </div>
      )}

      {/* Available weights */}
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:'var(--ak-display)',fontSize:11,color:'var(--ak-ink-3)',fontWeight:700,textTransform:'uppercase',letterSpacing:.9,marginBottom:8}}>Доступные гири:</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
          {ch.availableWeights.map((w, i) => {
            const [cl,cm,cd] = WEIGHT_COLORS[w] || WEIGHT_COLORS[1];
            const isSel = selectedW === w;
            return (
              <button key={i} onClick={() => !checked && setSelectedW(w)}
                style={{width:56,height:56,borderRadius:'50%',background:isSel ? 'linear-gradient(180deg,'+cl+' 0%,'+cm+' 100%)' : '#fff',border:'3px solid '+(isSel ? cd : cm),boxShadow:isSel ? '0 5px 0 '+cd+',0 10px 18px -5px '+cd+'66' : '0 4px 0 '+cm+'77,0 8px 16px -4px rgba(45,27,69,.09)',cursor:checked?'not-allowed':'pointer',fontFamily:'var(--ak-display)',fontWeight:800,fontSize:17,color:isSel ? cd : cm,transition:'all .14s',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:1}}>
                {w}
                <span style={{fontSize:8,fontWeight:600,opacity:.7,lineHeight:1}}>кг</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Actions */}
      {!checked ? (
        <div style={{display:'flex',gap:10,marginBottom:8}}>
          <button className="ak-btn ak-btn--soft" style={{flex:1,padding:'12px 14px',fontSize:14}} onClick={handleClear}>🔄 Сброс</button>
          <button className="ak-btn ak-btn--phys" style={{flex:2,padding:'12px 14px',fontSize:14}} onClick={handleCheck} disabled={allLeft.length === 0 && allRight.length === 0}>Проверить! ⚖️</button>
        </div>
      ) : (
        <div className="ak-pop" style={{background:'rgba(255,255,255,.92)',borderRadius:20,padding:'16px 16px',backdropFilter:'blur(8px)',boxShadow:'0 4px 0 rgba(124,95,224,.1)'}}>
          <div style={{fontSize:34,textAlign:'center',marginBottom:8}}>{result === 'correct' ? '✅' : '❌'}</div>
          <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:18,textAlign:'center',color:'var(--ak-ink)',marginBottom:8}}>
            {result === 'correct' ? 'Правильно!' : 'Не совсем...'}
          </div>
          <div style={{fontSize:13,lineHeight:1.6,color:'var(--ak-ink-2)',fontWeight:500,marginBottom:14,textAlign:'center'}}>{ch.fact}</div>
          <div style={{display:'flex',gap:10}}>
            {result === 'wrong' && <button className="ak-btn ak-btn--soft" style={{flex:1,fontSize:13}} onClick={handleClear}>Попробовать снова</button>}
            <button className="ak-btn ak-btn--phys" style={{flex:2,fontSize:14}} onClick={nextCh}>
              {chIdx + 1 >= L3_CHALLENGES.length ? 'Завершить! 🎉' : 'Дальше →'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   LEVEL SELECT SCREEN
   ============================================================ */
function LevelSelect({ onStart, completed }) {
  const LEVELS = [
    { n:1, title:'Гравитация', sub:'Что упадёт первым?', icon:<AKBlob size={72} kind="sphere" tone="phys"/>, emoji:'🍎' },
    { n:2, title:'Маятник',    sub:'Энергия в движении', icon:<AKBlob size={72} kind="gear" tone="phys"/>, emoji:'⏱' },
    { n:3, title:'Рычаг',      sub:'Баланс сил',          icon:<AKBlob size={72} kind="cube" tone="phys"/>, emoji:'⚖️' },
  ];

  return (
    <div className="ak" style={{width:'100%',minHeight:'100vh',background:'radial-gradient(70% 50% at 50% 100%,#E5DCFF 0%,transparent 70%),linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'0 18px 36px',boxSizing:'border-box',position:'relative',overflow:'hidden'}}>

      {/* Decorative planet top right */}
      <div style={{position:'absolute',top:-22,right:-18,opacity:.58,pointerEvents:'none'}}>
        <AKPlanet size={110} tone="phys" ring={true}/>
      </div>
      {/* Decorative star bottom left */}
      <div className="ak-float" style={{position:'absolute',bottom:88,left:6,opacity:.36,pointerEvents:'none',transform:'rotate(-18deg)'}}>
        <AKStar size={42} filled={true}/>
      </div>
      {/* Floating dots */}
      {[[22,14,'#E5DCFF',10],[298,52,'#B5A1FF',7],[38,118,'#FFC857',6],[328,138,'#7BD9A8',8]].map(([x,y,c,s],i) => (
        <div key={i} style={{position:'absolute',left:x,top:y,width:s,height:s,borderRadius:'50%',background:c,opacity:.48,pointerEvents:'none'}}/>
      ))}

      {/* Header section */}
      <div style={{paddingTop:52,paddingBottom:6,textAlign:'center'}}>
        <div style={{display:'flex',justifyContent:'center',marginBottom:10}}>
          <div className="ak-bob"><AKAtom size={70} tone="phys"/></div>
        </div>
        <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:32,letterSpacing:-.5,color:'var(--ak-ink)',lineHeight:1.05,marginBottom:6}}>
          Физика
        </div>
        <div style={{fontFamily:'var(--ak-body)',fontWeight:600,fontSize:14,color:'var(--ak-ink-2)',lineHeight:1.5,maxWidth:270,margin:'0 auto'}}>
          Узнай как работает гравитация, маятник и рычаг!
        </div>
      </div>

      {/* Level cards */}
      <div style={{maxWidth:390,margin:'22px auto 0'}}>
        {LEVELS.map((lv, idx) => {
          const isLocked = idx > 0 && !completed.has(idx);
          const isDone = completed.has(lv.n);
          return (
            <button key={lv.n} onClick={isLocked ? undefined : () => onStart(lv.n)}
              className={isLocked ? '' : 'ak-tap'}
              style={{width:'100%',padding:'18px 20px',borderRadius:28,background:'linear-gradient(160deg,#E5DCFF 0%,#B5A1FF 100%)',boxShadow:'0 8px 0 #7C5FE0,0 18px 30px -8px rgba(181,161,255,.6),inset 0 2px 0 rgba(255,255,255,.6)',position:'relative',overflow:'hidden',border:'none',cursor:isLocked?'not-allowed':'pointer',opacity:isLocked?.55:1,filter:isLocked?'grayscale(.42)':'none',textAlign:'left',boxSizing:'border-box',marginBottom:20}}>
              {/* Card globs */}
              <div style={{position:'absolute',top:-28,right:-10,width:100,height:100,borderRadius:'50%',background:'rgba(255,255,255,.2)',filter:'blur(2px)',pointerEvents:'none'}}/>
              <div style={{position:'absolute',bottom:-28,left:-18,width:78,height:78,borderRadius:'50%',background:'rgba(255,255,255,.12)',pointerEvents:'none'}}/>
              {/* Card content */}
              <div style={{position:'relative',display:'flex',alignItems:'center',gap:16}}>
                <div style={{filter:'drop-shadow(0 4px 10px rgba(45,27,69,.2))',flexShrink:0}}>
                  {lv.icon}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:11,color:'rgba(45,27,69,.58)',textTransform:'uppercase',letterSpacing:1.2,marginBottom:3}}>{lv.sub}</div>
                  <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:23,color:'var(--ak-ink)',letterSpacing:-.3,lineHeight:1.1,marginBottom:8}}>{lv.title}</div>
                  {isDone ? (
                    <div style={{display:'inline-flex',alignItems:'center',gap:8}}>
                      <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(43,168,115,.16)',borderRadius:999,padding:'5px 12px'}}>
                        <span style={{color:'#2BA873',fontSize:15}}>✓</span>
                        <span style={{fontFamily:'var(--ak-display)',fontSize:12,color:'#2BA873',fontWeight:700}}>Пройден</span>
                      </div>
                      <div style={{display:'flex',gap:2}}>
                        {[0,1,2].map(i => <AKStarSmall key={i} filled={true}/>)}
                      </div>
                    </div>
                  ) : isLocked ? (
                    <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(45,27,69,.1)',borderRadius:999,padding:'5px 12px'}}>
                      <span style={{fontSize:13}}>🔒</span>
                      <span style={{fontFamily:'var(--ak-display)',fontSize:12,color:'var(--ak-ink-2)',fontWeight:700}}>Заблокирован</span>
                    </div>
                  ) : (
                    <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(124,95,224,.2)',borderRadius:999,padding:'5px 16px',boxShadow:'inset 0 1px 0 rgba(255,255,255,.5)'}}>
                      <span style={{fontFamily:'var(--ak-display)',fontSize:12,color:'#7C5FE0',fontWeight:800,letterSpacing:.5}}>СТАРТ</span>
                      <span style={{color:'#7C5FE0',fontWeight:700}}>→</span>
                    </div>
                  )}
                </div>
                <div style={{fontSize:38,flexShrink:0,opacity:.82}}>{lv.emoji}</div>
              </div>
            </button>
          );
        })}
      </div>

      {/* Footer */}
      <div style={{textAlign:'center',marginTop:4,fontFamily:'var(--ak-display)',fontSize:12,color:'var(--ak-ink-3)',fontWeight:600}}>
        КосмоБаза · Физика
      </div>
    </div>
  );
}

/* ============================================================
   APP ROOT
   ============================================================ */
function App() {
  const [screen, setScreen] = React.useState('select');
  const [completed, setCompleted] = React.useState(new Set());

  const done = (n) => {
    setCompleted(s => new Set([...s, n]));
    setScreen('select');
  };

  if (screen === 'select') return <LevelSelect onStart={n => setScreen('l' + n)} completed={completed}/>;
  if (screen === 'l1') return <Level1Falling onDone={() => done(1)}/>;
  if (screen === 'l2') return <Level2Pendulum onDone={() => done(2)}/>;
  if (screen === 'l3') return <Level3Lever onDone={() => done(3)}/>;
  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
