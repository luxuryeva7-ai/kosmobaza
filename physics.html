<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<title>КвантУм — Физика</title>
<style>
@import url('https://fonts.bunny.net/css?family=fredoka-one:400|nunito:500,700,800');
:root{
  --ak-bg:#FFF3E2;--ak-surface:#FFFDF7;--ak-ink:#2D1B45;--ak-ink-2:#6B5680;--ak-ink-3:#A797B8;
  --ak-phys-1:#E5DCFF;--ak-phys-2:#B5A1FF;--ak-phys-3:#7C5FE0;
  --ak-cta-2:#FFD262;--ak-cta-3:#D4A22B;
  --ak-ok-2:#5DD9A0;--ak-ok-3:#2BA873;
  --ak-display:'Fredoka One','Nunito',system-ui,sans-serif;
  --ak-body:'Nunito',system-ui,sans-serif;
}
html,body{background:#FFF3E2;margin:0;overflow:hidden;}
#root{height:100vh;overflow:hidden;}
body{margin:0;font-family:var(--ak-body);color:var(--ak-ink);}
.ak{font-family:var(--ak-body);color:var(--ak-ink);-webkit-font-smoothing:antialiased;}
.ak-clay{background:var(--ak-surface);border-radius:28px;box-shadow:0 10px 22px -8px rgba(45,27,69,.22),0 4px 10px -4px rgba(45,27,69,.10),inset 0 2px 0 rgba(255,255,255,.9),inset 0 -3px 0 rgba(45,27,69,.06);}
.ak-btn{font-family:var(--ak-display);font-weight:600;font-size:17px;border:none;cursor:pointer;transition:transform .08s ease,box-shadow .08s ease;user-select:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;padding:16px 26px;border-radius:999px;color:var(--ak-ink);}
.ak-btn:disabled{opacity:.5;pointer-events:none;}
.ak-btn--phys{color:#fff;background:linear-gradient(180deg,#C4B5FF 0%,#B5A1FF 55%,#9C83FF 100%);box-shadow:0 6px 0 var(--ak-phys-3),0 12px 24px -6px rgba(124,95,224,.5),inset 0 2px 0 rgba(255,255,255,.55);}
.ak-btn--phys:active{transform:translateY(4px);box-shadow:0 2px 0 var(--ak-phys-3);}
.ak-btn--cta{color:var(--ak-ink);background:linear-gradient(180deg,#FFEDA8 0%,#FFD262 55%,#FFC03A 100%);box-shadow:0 6px 0 var(--ak-cta-3),0 12px 24px -6px rgba(212,162,43,.55),inset 0 2px 0 rgba(255,255,255,.85);}
.ak-btn--cta:active{transform:translateY(4px);}
.ak-btn--soft{color:var(--ak-ink);background:linear-gradient(180deg,#FFFFFF 0%,#FFF7E8 100%);box-shadow:0 4px 0 rgba(45,27,69,.10),0 8px 18px -6px rgba(45,27,69,.12),inset 0 2px 0 rgba(255,255,255,.95),inset 0 0 0 1px rgba(45,27,69,.06);}
.ak-btn--soft:active{transform:translateY(3px);}
.ak-btn--sm{padding:10px 16px;font-size:14px;}
@keyframes ak-bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-5px) rotate(1deg);}}
@keyframes ak-pop{0%{transform:scale(.7);opacity:0;}60%{transform:scale(1.07);opacity:1;}100%{transform:scale(1);}}
@keyframes ak-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.ak-bob{animation:ak-bob 3s ease-in-out infinite;}
.ak-pop{animation:ak-pop .4s cubic-bezier(.2,.7,.3,1) forwards;}
.ak-pulse{animation:ak-pulse 1.6s ease-in-out infinite;}
input[type=range]{-webkit-appearance:none;width:100%;height:20px;border-radius:999px;outline:none;cursor:pointer;background:transparent;}
input[type=range]::-webkit-slider-runnable-track{height:20px;border-radius:999px;background:linear-gradient(180deg,#E5DCFF,#B5A1FF);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:38px;height:38px;border-radius:50%;background:linear-gradient(180deg,#fff 0%,#FFF7E8 100%);box-shadow:0 4px 0 rgba(45,27,69,.15),0 8px 18px -6px rgba(45,27,69,.2);margin-top:-9px;cursor:pointer;}
</style>

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const G = 0.27;

/* ── helpers ─────────────────────────────────────────────── */
function radialBall(ctx, x, y, r, c1, c2) {
  const g = ctx.createRadialGradient(x - r*.3, y - r*.35, 0, x, y, r);
  g.addColorStop(0, '#fff'); g.addColorStop(.25, c1); g.addColorStop(1, c2);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = 'rgba(45,27,69,.25)'; ctx.lineWidth = 2; ctx.stroke();
}
function xy(e, canvas) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x:(t.clientX-r.left)*(canvas.width/r.width), y:(t.clientY-r.top)*(canvas.height/r.height) };
}

/* ── Shared: IntroCard ───────────────────────────────────── */
function IntroCard({ emoji, title, desc, law, onStart }) {
  return (
    <div style={{
      position:'absolute',inset:0,
      background:'linear-gradient(180deg,#E5DCFF 0%,#FFF3E2 100%)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      padding:32,zIndex:60,
    }}>
      <div style={{fontSize:72,marginBottom:10}} className="ak-bob">{emoji}</div>
      <div style={{fontFamily:'var(--ak-display)',fontSize:24,fontWeight:700,color:'#2D1B45',textAlign:'center',marginBottom:8}}>{title}</div>
      <div style={{fontSize:15,color:'#6B5680',textAlign:'center',lineHeight:1.5,marginBottom:18}}>{desc}</div>
      <div style={{background:'rgba(124,95,224,.12)',borderRadius:16,padding:'10px 18px',marginBottom:28,fontFamily:'var(--ak-display)',fontSize:14,color:'#7C5FE0',textAlign:'center'}}>
        📚 {law}
      </div>
      <button className="ak-btn ak-btn--phys" onClick={onStart}>Играть! ⚡</button>
    </div>
  );
}

/* ── Shared: WinOverlay ──────────────────────────────────── */
function WinOverlay({ title, law, fact, cta, onNext, onHome }) {
  return (
    <div style={{position:'absolute',inset:0,background:'rgba(45,27,69,.52)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200}}>
      <div className="ak-clay ak-pop" style={{margin:20,padding:28,textAlign:'center',maxWidth:320}}>
        <div style={{fontSize:54,marginBottom:6}}>🎉</div>
        <div style={{fontFamily:'var(--ak-display)',fontSize:22,fontWeight:700,color:'#2D1B45',marginBottom:10}}>{title}</div>
        <div style={{background:'#E5DCFF',borderRadius:16,padding:'12px 16px',marginBottom:18}}>
          <div style={{fontFamily:'var(--ak-display)',fontSize:13,color:'#7C5FE0',fontWeight:700,marginBottom:4}}>⚡ {law}</div>
          <div style={{fontSize:13,color:'#2D1B45',lineHeight:1.45}}>{fact}</div>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          <button className="ak-btn ak-btn--soft ak-btn--sm" onClick={onHome}>🏠</button>
          <button className="ak-btn ak-btn--cta" onClick={onNext}>{cta}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Shared: FailOverlay ─────────────────────────────────── */
function FailOverlay({ tip, onRetry }) {
  return (
    <div style={{position:'absolute',inset:0,background:'rgba(45,27,69,.52)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200}}>
      <div className="ak-clay ak-pop" style={{margin:20,padding:28,textAlign:'center',maxWidth:300}}>
        <div style={{fontSize:44,marginBottom:8}}>😅</div>
        <div style={{fontFamily:'var(--ak-display)',fontSize:20,fontWeight:700,color:'#2D1B45',marginBottom:10}}>Не попал!</div>
        <div style={{fontSize:14,color:'#6B5680',lineHeight:1.5,marginBottom:20}}>💡 {tip}</div>
        <button className="ak-btn ak-btn--phys" onClick={onRetry}>Ещё раз 🔄</button>
      </div>

}

/* ── HomeScreen ──────────────────────────────────────────── */
function HomeScreen({ onSelect }) {
  const levels = [
    {n:1, emoji:'🐱', title:'Рогатка',    sub:'Траектория и угол полёта',  bg:'#E5DCFF'},
    {n:2, emoji:'🦁', title:'Рикошет',    sub:'Угол падения = отражения',  bg:'#FFE5C2'},
    {n:3, emoji:'🐘', title:'Катапульта', sub:'Рычаг и бросок',            bg:'#C8F2DD'},
  ];
  return (
    <div className="ak" style={{
      minHeight:'100vh',height:'100vh',
      background:'linear-gradient(180deg,#E5DCFF 0%,#FFF3E2 100%)',
      display:'flex',flexDirection:'column',alignItems:'center',
      padding:'50px 20px 40px',boxSizing:'border-box',overflowY:'auto',
    }}>
      <div style={{fontSize:52,marginBottom:6}}>⚡</div>
      <div style={{fontFamily:'var(--ak-display)',fontSize:30,fontWeight:700,color:'#2D1B45',marginBottom:2}}>КвантУм</div>
      <div style={{fontFamily:'var(--ak-display)',fontSize:15,color:'#6B5680',marginBottom:36}}>Физика — 3 уровня</div>
      <div style={{display:'flex',flexDirection:'column',gap:14,width:'100%',maxWidth:340}}>
        {levels.map(l=>(
          <button key={l.n} onClick={()=>onSelect(l.n)} style={{
            display:'flex',alignItems:'center',gap:16,
            background:'rgba(255,255,255,.85)',borderRadius:22,padding:'16px 20px',
            border:'none',cursor:'pointer',textAlign:'left',
            boxShadow:'0 6px 0 rgba(45,27,69,.08),0 12px 24px -8px rgba(45,27,69,.12),inset 0 2px 0 #fff',
          }}>
            <div style={{
              width:54,height:54,borderRadius:'50%',flexShrink:0,
              background:`radial-gradient(circle at 35% 30%,#fff,${l.bg} 60%)`,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,
              boxShadow:'0 4px 0 rgba(45,27,69,.1)',
            }}>{l.emoji}</div>
            <div>
              <div style={{fontFamily:'var(--ak-display)',fontSize:18,fontWeight:700,color:'#2D1B45'}}>
                Уровень {l.n}: {l.title}
              </div>
              <div style={{fontFamily:'var(--ak-display)',fontSize:13,color:'#6B5680',marginTop:2}}>{l.sub}</div>
            </div>
            <div style={{marginLeft:'auto',fontSize:18,color:'#A797B8'}}>→</div>
          </button>
        ))}
      </div>

}

/* ══════════════════════════════════════════════════════════
   LEVEL 1 — РОГАТКА
   Drag slingshot → launch → hit alien targets
   Teach: projectile motion, 45° = max range
   ══════════════════════════════════════════════════════════ */
function Level1({ onWin, onHome }) {
  const [intro, setIntro] = useState(true);
  const [status, setStatus] = useState('play');
  const canRef = useRef(null);
  const raf = useRef(null);
  const gs = useRef(null);

  function buildState(W, H) {
    return {
      W, H,
      sling: { x:80, y:H-100 },
      maxPull: 75, ballR: 13, speed: 0.155,
      balls: [],
      targets: [
        {x:262,y:195,r:26,alive:true,burst:0},
        {x:305,y:295,r:26,alive:true,burst:0},
        {x:258,y:380,r:26,alive:true,burst:0},
      ],
      drag: null, dragging: false,
      shotsLeft: 6, done: false,
    };
  }

  useEffect(() => {
    if (intro) return;
    const canvas = canRef.current;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    gs.current = buildState(W, H);
    const g = gs.current;

    function clamp(pos) {
      const dx=pos.x-g.sling.x, dy=pos.y-g.sling.y, d=Math.hypot(dx,dy);
      if(d>g.maxPull) return {x:g.sling.x+dx/d*g.maxPull, y:g.sling.y+dy/d*g.maxPull};
      return pos;
    }
    function simPath(sx,sy,vx,vy,steps=90) {
      const pts=[]; let x=sx,y=sy,dx=vx,dy=vy;
      for(let i=0;i<steps;i++){x+=dx;y+=dy;dy+=G;if(y>H||x<0||x>W)break;pts.push({x,y});}
      return pts;
    }
    function drawSling() {
      const {x,y}=g.sling;
      ctx.save(); ctx.strokeStyle='#7A4E28'; ctx.lineWidth=8; ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x,y+68);ctx.lineTo(x-22,y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y+68);ctx.lineTo(x+22,y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y+68);ctx.lineTo(x,y+110);ctx.stroke();
      ctx.fillStyle='#5A3010';
      ctx.beginPath();ctx.arc(x-22,y,6,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+22,y,6,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    function drawBand(tx,ty) {
      ctx.save(); ctx.strokeStyle='#A0622A'; ctx.lineWidth=4; ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(g.sling.x-22,g.sling.y);ctx.lineTo(tx,ty);ctx.stroke();
      ctx.beginPath();ctx.moveTo(g.sling.x+22,g.sling.y);ctx.lineTo(tx,ty);ctx.stroke();
      ctx.restore();
    }

    const onDown = e => {
      e.preventDefault();
      if(g.done||g.shotsLeft<=0) return;
      const pos=xy(e,canvas);
      if(Math.hypot(pos.x-g.sling.x,pos.y-g.sling.y)<52){
        g.dragging=true; g.drag=clamp(pos);
      }
    };
    const onMove = e => {
      e.preventDefault();
      if(!g.dragging) return;
      g.drag=clamp(xy(e,canvas));
    };
    const onUp = e => {
      e.preventDefault();
      if(!g.dragging) return;
      g.dragging=false;
      const dr=g.drag; if(!dr) return;
      const vx=(g.sling.x-dr.x)*g.speed, vy=(g.sling.y-dr.y)*g.speed;
      g.balls.push({x:g.sling.x,y:g.sling.y,vx,vy,r:g.ballR,trail:[]});
      g.shotsLeft--; g.drag=null;
    };
    canvas.addEventListener('pointerdown',onDown,{passive:false});
    canvas.addEventListener('pointermove',onMove,{passive:false});
    canvas.addEventListener('pointerup',onUp,{passive:false});

    function loop() {
      ctx.clearRect(0,0,W,H);
      // sky
      const sky=ctx.createLinearGradient(0,0,0,H);
      sky.addColorStop(0,'#D0C4FF'); sky.addColorStop(1,'#FFF3E2');
      ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
      // stars
      [[28,55],[140,35],[215,72],[310,28],[338,105]].forEach(([sx,sy])=>{
        ctx.fillStyle='rgba(124,95,224,.35)';
        ctx.beginPath();ctx.arc(sx,sy,2.5,0,Math.PI*2);ctx.fill();
      });
      // ground
      ctx.fillStyle='#DCF7E7'; ctx.fillRect(0,H-48,W,48);
      ctx.fillStyle='#3CA876'; ctx.fillRect(0,H-48,W,5);

      drawSling();
      ctx.font='34px serif'; ctx.textBaseline='alphabetic';
      ctx.fillText('🐱',g.sling.x-58,g.sling.y+108);

      // targets
      g.targets.forEach(t=>{
        if(!t.alive){
          if(t.burst>0){
            for(let i=0;i<8;i++){
              const a=(i/8)*Math.PI*2, prog=1-t.burst/16, rd=prog*38;
              ctx.beginPath();ctx.arc(t.x+Math.cos(a)*rd,t.y+Math.sin(a)*rd,4*(1-prog),0,Math.PI*2);
              ctx.fillStyle=`rgba(255,210,98,${1-prog})`;ctx.fill();
            }
            t.burst--;
          }
          return;
        }
        ctx.beginPath();ctx.arc(t.x,t.y,t.r+6,0,Math.PI*2);
        ctx.fillStyle='rgba(124,95,224,.12)';ctx.fill();
        ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);
        ctx.fillStyle='#E5DCFF';ctx.fill();
        ctx.strokeStyle='#7C5FE0';ctx.lineWidth=2.5;ctx.stroke();
        ctx.font=`${t.r*1.5}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('👾',t.x,t.y);
        ctx.textAlign='left';ctx.textBaseline='alphabetic';
      });

      // drag preview
      if(g.dragging&&g.drag){
        const dr=g.drag;
        const pvx=(g.sling.x-dr.x)*g.speed, pvy=(g.sling.y-dr.y)*g.speed;
        const pts=simPath(g.sling.x,g.sling.y,pvx,pvy);
        pts.forEach((p,i)=>{
          if(i%4!==0) return;
          ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);
          ctx.fillStyle=`rgba(124,95,224,${(1-i/pts.length)*.6})`;ctx.fill();
        });
        const ang=Math.atan2(g.sling.y-dr.y,g.sling.x-dr.x)*180/Math.PI;
        ctx.fillStyle='#7C5FE0';ctx.font='bold 14px Nunito,sans-serif';
        ctx.textAlign='left';ctx.textBaseline='alphabetic';
        ctx.fillText(`${Math.round(ang)}°`,dr.x+10,dr.y-8);
        if(Math.abs(ang-45)<7){
          ctx.fillStyle='#FFD262';ctx.font='bold 13px Nunito,sans-serif';
          ctx.fillText('⭐ 45° — ИДЕАЛЬНО!',dr.x+10,dr.y-26);
        }
        drawBand(dr.x,dr.y);
        radialBall(ctx,dr.x,dr.y,g.ballR,'#C4B5FF','#7C5FE0');
      } else if(g.shotsLeft>0&&!g.done) {
        drawBand(g.sling.x,g.sling.y);
        radialBall(ctx,g.sling.x,g.sling.y,g.ballR,'#C4B5FF','#7C5FE0');
      }

      // flying balls
      g.balls = g.balls.filter(b=>{
        b.trail.push({x:b.x,y:b.y});
        if(b.trail.length>14) b.trail.shift();
        b.x+=b.vx; b.y+=b.vy; b.vy+=G;
        b.trail.forEach((p,i)=>{
          ctx.beginPath();ctx.arc(p.x,p.y,b.r*(i/b.trail.length)*.6,0,Math.PI*2);
          ctx.fillStyle=`rgba(124,95,224,${(i/b.trail.length)*.35})`;ctx.fill();
        });
        radialBall(ctx,b.x,b.y,b.r,'#C4B5FF','#7C5FE0');
        g.targets.forEach(t=>{
          if(!t.alive) return;
          if(Math.hypot(b.x-t.x,b.y-t.y)<b.r+t.r){t.alive=false;t.burst=16;}
        });
        return b.y<H+30&&b.x>-30&&b.x<W+30;
      });

      // HUD
      ctx.textAlign='right';ctx.font='bold 13px Nunito,sans-serif';ctx.fillStyle='#6B5680';
      ctx.fillText(`🎯 Целей: ${g.targets.filter(t=>t.alive).length}  ⚡ Выстрелов: ${g.shotsLeft}`,W-12,26);
      ctx.textAlign='left';

      if(!g.done){
        const alive=g.targets.filter(t=>t.alive).length;
        if(alive===0){g.done=true;setTimeout(()=>setStatus('won'),450);}
        else if(g.shotsLeft===0&&g.balls.length===0){g.done=true;setTimeout(()=>setStatus('failed'),450);}
      }
      raf.current=requestAnimationFrame(loop);
    }
    raf.current=requestAnimationFrame(loop);
    return ()=>{
      cancelAnimationFrame(raf.current);
      canvas.removeEventListener('pointerdown',onDown);
      canvas.removeEventListener('pointermove',onMove);
      canvas.removeEventListener('pointerup',onUp);
    };
  },[intro]);

  function retry(){
    setStatus('play');
    if(canRef.current) gs.current=buildState(canRef.current.width,canRef.current.height);
  }

  return (
    <div className="ak" style={{position:'relative',width:'100%',height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',background:'linear-gradient(180deg,#D8CCFF 0%,#FFF3E2 100%)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px 4px',flexShrink:0}}>
        <button className="ak-btn ak-btn--soft ak-btn--sm" onClick={onHome}>← Назад</button>
        <div style={{fontFamily:'var(--ak-display)',fontSize:14,color:'#6B5680'}}>Уровень 1 · Рогатка</div>
      </div>
      <canvas ref={canRef} width={360} height={540} style={{width:'100%',flex:1,touchAction:'none',display:'block',cursor:'crosshair'}}/>
      <div style={{textAlign:'center',padding:'6px 0 10px',fontFamily:'var(--ak-display)',fontSize:13,color:'#6B5680',flexShrink:0}}>
        Потяни за шарик и отпусти — целься в 👾
      </div>
      {intro && <IntroCard emoji="🐱" title="Кот-снайпер!" desc="Пришельцы атакуют! Потяни рогатку назад, прицелься и сбей всех захватчиков." law="При угле 45° снаряд летит дальше всего" onStart={()=>setIntro(false)}/>}
      {status==='won' && <WinOverlay title="Всех сбил! 🎯" law="Закон бросания тела" fact="Угол 45° — максимальная дальность! Горизонтальная и вертикальная скорости равны и полёт получается самым длинным." cta="Уровень 2 →" onNext={onWin} onHome={onHome}/>}
      {status==='failed' && <FailOverlay tip="Попробуй угол около 45° — это даст максимальную дальность полёта!" onRetry={retry}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   LEVEL 2 — РИКОШЕТ
   Set angle → fire → ball bounces off ceiling → hit target
   Teach: angle of incidence = angle of reflection
   ══════════════════════════════════════════════════════════ */
function Level2({ onWin, onHome }) {
  const [intro, setIntro] = useState(true);
  const [status, setStatus] = useState('play');
  const [ang, setAng] = useState(55);
  const canRef = useRef(null);
  const raf = useRef(null);
  const gs = useRef(null);
  const angRef = useRef(55);

  function resetBall(){if(gs.current){gs.current.ball=null;gs.current.done=false;}}

  useEffect(()=>{
    if(intro) return;
    const canvas=canRef.current;
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    const CEIL=65, SPD=7.5, BALL_G=0.22;
    const TARGET={x:W*.74,y:H*.48,r:28};
    const CANNON={x:48,y:H-85};

    gs.current={W,H,ball:null,done:false,TARGET,CANNON,CEIL,SPD,BALL_G};

    function simulate(a){
      const ar=a*Math.PI/180;
      let x=CANNON.x,y=CANNON.y,vx=Math.cos(ar)*SPD,vy=-Math.sin(ar)*SPD;
      const pts=[{x,y,b:false}]; let bounced=false;
      for(let i=0;i<400;i++){
        x+=vx;y+=vy;vy+=BALL_G;
        if(y<CEIL&&vy<0){vy=-vy;bounced=true;}
        pts.push({x,y,b:bounced});
        if(y>H||x>W+20||x<-20) break;
      }
      return pts;
    }

    function drawCannon(a){
      const ar=a*Math.PI/180;
      ctx.save();ctx.translate(CANNON.x,CANNON.y);ctx.rotate(-ar);
      const gr=ctx.createLinearGradient(0,-10,62,-10);
      gr.addColorStop(0,'#C4B5FF');gr.addColorStop(1,'#7C5FE0');
      ctx.fillStyle=gr;
      ctx.beginPath();ctx.rect(0,-10,62,20);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.rect(4,-6,54,8);ctx.fill();
      ctx.restore();
      ctx.save();ctx.translate(CANNON.x,CANNON.y);
      ctx.fillStyle='#5A3D8A';ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#7C5FE0';ctx.beginPath();ctx.arc(0,0,13,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }

    function loop(){
      const g=gs.current, a=angRef.current;
      ctx.clearRect(0,0,W,H);
      const sky=ctx.createLinearGradient(0,0,0,H);
      sky.addColorStop(0,'#FFE5C2');sky.addColorStop(1,'#FFF3E2');
      ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

      // ceiling (reflection surface)
      const cg=ctx.createLinearGradient(0,0,0,CEIL);
      cg.addColorStop(0,'rgba(124,95,224,.3)');cg.addColorStop(1,'rgba(124,95,224,.05)');
      ctx.fillStyle=cg;ctx.fillRect(0,0,W,CEIL);
      ctx.fillStyle='#7C5FE0';ctx.fillRect(0,CEIL-3,W,3);
      ctx.fillStyle='#A797B8';ctx.font='11px Nunito,sans-serif';ctx.textAlign='center';
      ctx.fillText('— зеркальная поверхность —',W/2,CEIL-8);

      // ground
      ctx.fillStyle='#DCF7E7';ctx.fillRect(0,H-48,W,48);
      ctx.fillStyle='#3CA876';ctx.fillRect(0,H-48,W,5);

      // target
      const t=g.TARGET;
      ctx.beginPath();ctx.arc(t.x,t.y,t.r+8,0,Math.PI*2);
      ctx.fillStyle='rgba(255,210,98,.18)';ctx.fill();
      ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);
      ctx.fillStyle='#FFE49E';ctx.fill();
      ctx.strokeStyle='#D4972B';ctx.lineWidth=3;ctx.stroke();
      ctx.font='26px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🎯',t.x,t.y);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';

      // trajectory preview (no ball in flight)
      if(!g.ball){
        const pts=simulate(a);
        let bounceDrawn=false;
        pts.forEach((p,i)=>{
          if(i%5!==0) return;
          const alpha=(1-i/pts.length)*.55;
          ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);
          ctx.fillStyle=p.b?`rgba(255,185,60,${alpha})`:`rgba(124,95,224,${alpha})`;
          ctx.fill();
        });
        const bi=pts.findIndex(p=>p.b);
        if(bi>0){
          const bp=pts[bi];
          ctx.beginPath();ctx.arc(bp.x,bp.y,7,0,Math.PI*2);
          ctx.fillStyle='#FFD262';ctx.fill();
          // angle annotation
          ctx.fillStyle='#D4A22B';ctx.font='bold 12px Nunito,sans-serif';
          ctx.textAlign='center';
          ctx.fillText(`↗${a}° = ↘${a}°`,bp.x,bp.y-12);
          ctx.textAlign='left';
        }
      }

      // cannon
      drawCannon(a);
      ctx.font='30px serif';ctx.textBaseline='alphabetic';ctx.fillText('🦁',CANNON.x-56,CANNON.y+46);

      // angle arc
      ctx.save();ctx.translate(CANNON.x,CANNON.y);
      ctx.strokeStyle='rgba(124,95,224,.35)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,44,-a*Math.PI/180,0);ctx.stroke();
      ctx.restore();
      ctx.fillStyle='#7C5FE0';ctx.font='bold 13px Nunito,sans-serif';
      ctx.fillText(`${a}°`,CANNON.x+50,CANNON.y-32);

      // ball in flight
      if(g.ball){
        const b=g.ball;
        b.trail.push({x:b.x,y:b.y});
        if(b.trail.length>16) b.trail.shift();
        b.x+=b.vx;b.y+=b.vy;b.vy+=g.BALL_G;
        if(b.y<g.CEIL&&b.vy<0) b.vy=-b.vy;
        b.trail.forEach((p,i)=>{
          ctx.beginPath();ctx.arc(p.x,p.y,b.r*(i/b.trail.length)*.5,0,Math.PI*2);
          ctx.fillStyle=`rgba(124,95,224,${(i/b.trail.length)*.3})`;ctx.fill();
        });
        radialBall(ctx,b.x,b.y,b.r,'#C4B5FF','#7C5FE0');
        if(Math.hypot(b.x-t.x,b.y-t.y)<b.r+t.r){
          g.done=true;g.ball=null;setTimeout(()=>setStatus('won'),400);
        } else if(b.y>H+20||b.x>W+20||b.x<-20){
          g.ball=null;
        }
      }

      raf.current=requestAnimationFrame(loop);
    }
    raf.current=requestAnimationFrame(loop);
    return ()=>cancelAnimationFrame(raf.current);
  },[intro]);

  function fire(){
    const g=gs.current; if(!g||g.ball||g.done) return;
    const ar=angRef.current*Math.PI/180;
    g.ball={x:g.CANNON.x,y:g.CANNON.y,vx:Math.cos(ar)*g.SPD,vy:-Math.sin(ar)*g.SPD,r:11,trail:[]};
  }

  return (
    <div className="ak" style={{position:'relative',width:'100%',height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',background:'linear-gradient(180deg,#FFE5C2 0%,#FFF3E2 100%)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px 4px',flexShrink:0}}>
        <button className="ak-btn ak-btn--soft ak-btn--sm" onClick={onHome}>← Назад</button>
        <div style={{fontFamily:'var(--ak-display)',fontSize:14,color:'#6B5680'}}>Уровень 2 · Рикошет</div>
      </div>
      <canvas ref={canRef} width={360} height={460} style={{width:'100%',flex:1,display:'block'}}/>
      <div style={{padding:'8px 20px 12px',background:'rgba(255,255,255,.65)',backdropFilter:'blur(6px)',flexShrink:0}}>
        <div style={{fontFamily:'var(--ak-display)',fontSize:13,color:'#6B5680',marginBottom:6,textAlign:'center'}}>
          Угол: <strong style={{color:'#7C5FE0'}}>{ang}°</strong> — настрой так чтобы рикошет попал в 🎯
        </div>
        <input type="range" min="20" max="78" value={ang} onChange={e=>{const v=+e.target.value;setAng(v);angRef.current=v;}} style={{width:'100%',accentColor:'#7C5FE0'}}/>
        <div style={{display:'flex',justifyContent:'center',marginTop:10}}>
          <button className="ak-btn ak-btn--phys" style={{minWidth:160}} onClick={fire} disabled={!!(gs.current?.ball)}>
            💥 Выстрел!
          </button>
        </div>
      </div>
      {intro && <IntroCard emoji="🦁" title="Рикошетный снайпер!" desc="Лев не может стрелять напрямую — мешает потолок! Отрикошеть от потолка и попади в цель." law="Угол падения = угол отражения" onStart={()=>setIntro(false)}/>}
      {status==='won' && <WinOverlay title="Рикошет! 💥" law="Закон отражения" fact="Угол падения всегда равен углу отражения — как свет от зеркала! Это работает для звука, света и мячей." cta="Уровень 3 →" onNext={onWin} onHome={onHome}/>}
      {status==='failed' && <FailOverlay tip="Смотри на точку отскока. Измени угол и выстрели снова!" onRetry={()=>{resetBall();setStatus('play');}}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   LEVEL 3 — КАТАПУЛЬТА
   Rotating arm — tap at right moment to launch ball at target
   Teach: lever mechanics, force × distance
   ══════════════════════════════════════════════════════════ */
function Level3({ onWin, onHome }) {
  const [intro, setIntro] = useState(true);
  const [status, setStatus] = useState('play');
  const canRef = useRef(null);
  const raf = useRef(null);
  const gs = useRef(null);

  function buildGs(W, H) {
    return {
      W, H,
      base: {x:W/2,y:H-90},
      armLen: 88, armAngle: -Math.PI*.8, armSpd: 0.036,
      spinning: true, launched: false,
      ball: null,
      target: {x:W*.8,y:H-68,w:52,h:44},
      attempts: 0, maxAttempts: 4, done: false,
    };
  }

  useEffect(()=>{
    if(intro) return;
    const canvas=canRef.current;
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    gs.current=buildGs(W,H);

    function tipPos(){
      const g=gs.current;
      return {x:g.base.x+Math.cos(g.armAngle)*g.armLen, y:g.base.y+Math.sin(g.armAngle)*g.armLen};
    }

    function launch(){
      const g=gs.current;
      if(!g.spinning||g.done) return;
      const tip=tipPos();
      const OMEGA=g.armSpd;
      const vx=-Math.sin(g.armAngle)*OMEGA*g.armLen*1.9;
      const vy= Math.cos(g.armAngle)*OMEGA*g.armLen*1.9;
      g.ball={x:tip.x,y:tip.y,vx,vy,r:12,trail:[]};
      g.spinning=false;g.launched=true;g.attempts++;
    }

    const onClick=e=>{e.preventDefault();launch();};
    canvas.addEventListener('pointerdown',onClick,{passive:false});

    function drawArm(){
      const g=gs.current;
      const tip=tipPos();
      const shortLen=34;
      const wx=g.base.x+Math.cos(g.armAngle+Math.PI)*shortLen;
      const wy=g.base.y+Math.sin(g.armAngle+Math.PI)*shortLen;
      // arm
      ctx.save();ctx.strokeStyle='#7A4E28';ctx.lineWidth=9;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(g.base.x,g.base.y);ctx.lineTo(tip.x,tip.y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(g.base.x,g.base.y);ctx.lineTo(wx,wy);ctx.stroke();
      ctx.restore();
      // counterweight
      const cg=ctx.createRadialGradient(wx,wy,0,wx,wy,14);
      cg.addColorStop(0,'#9881F0');cg.addColorStop(1,'#4A2D7A');
      ctx.beginPath();ctx.arc(wx,wy,14,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
      // pivot
      ctx.save();ctx.translate(g.base.x,g.base.y);
      // base frame
      ctx.fillStyle='#6B5680';ctx.fillRect(-28,-4,56,12);
      ctx.beginPath();ctx.moveTo(-32,8);ctx.lineTo(32,8);ctx.lineTo(0,-22);ctx.closePath();
      ctx.fillStyle='#8B7095';ctx.fill();
      ctx.restore();
      // pivot circle
      const pg=ctx.createRadialGradient(g.base.x-4,g.base.y-4,0,g.base.x,g.base.y,12);
      pg.addColorStop(0,'#C4B5FF');pg.addColorStop(1,'#7C5FE0');
      ctx.beginPath();ctx.arc(g.base.x,g.base.y,12,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();
      // ball on tip (if not launched)
      if(!g.launched){
        radialBall(ctx,tip.x,tip.y,12,'#A1FFD0','#3CA876');
      }
    }

    function loop(){
      const g=gs.current;
      ctx.clearRect(0,0,W,H);
      const sky=ctx.createLinearGradient(0,0,0,H);
      sky.addColorStop(0,'#C8F2DD');sky.addColorStop(1,'#FFF3E2');
      ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
      // clouds
      [[50,45],[190,28],[310,55]].forEach(([cx,cy])=>{
        ctx.fillStyle='rgba(255,255,255,.72)';
        ctx.beginPath();ctx.arc(cx,cy,22,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx+22,cy+5,16,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx-16,cy+8,14,0,Math.PI*2);ctx.fill();
      });
      // ground
      ctx.fillStyle='#DCF7E7';ctx.fillRect(0,H-48,W,48);
      ctx.fillStyle='#3CA876';ctx.fillRect(0,H-48,W,5);

      // target basket
      const t=g.target;
      ctx.fillStyle='#FFD262';ctx.fillRect(t.x-t.w/2,t.y-t.h,t.w,t.h);
      ctx.strokeStyle='#D4972B';ctx.lineWidth=2.5;ctx.strokeRect(t.x-t.w/2,t.y-t.h,t.w,t.h);
      // basket weave lines
      ctx.strokeStyle='rgba(212,162,43,.4)';ctx.lineWidth=1.5;
      for(let lx=t.x-t.w/2+8;lx<t.x+t.w/2;lx+=12){
        ctx.beginPath();ctx.moveTo(lx,t.y-t.h);ctx.lineTo(lx,t.y);ctx.stroke();
      }
      ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🍌',t.x,t.y-t.h/2);
      // monkey
      ctx.font='32px serif';ctx.textBaseline='alphabetic';ctx.textAlign='left';
      ctx.fillText('🐒',t.x+t.w/2-6,t.y-2);

      // elephant
      ctx.font='32px serif';ctx.fillText('🐘',g.base.x-100,H-44);

      drawArm();

      // rotate arm
      if(g.spinning){
        g.armAngle+=g.armSpd;
        if(g.armAngle>Math.PI*.55) g.armAngle=-Math.PI*.8;
      }

      // tap hint
      if(g.spinning){
        const alpha=.5+.5*Math.sin(Date.now()/380);
        ctx.globalAlpha=alpha;
        ctx.fillStyle='#2D1B45';ctx.font='bold 15px Nunito,sans-serif';ctx.textAlign='center';
        ctx.fillText('👆 Нажми когда рычаг смотрит вверх!',W/2,38);
        ctx.globalAlpha=1;ctx.textAlign='left';
      }

      // ball in flight
      if(g.ball){
        const b=g.ball;
        b.trail.push({x:b.x,y:b.y});
        if(b.trail.length>18) b.trail.shift();
        b.x+=b.vx;b.y+=b.vy;b.vy+=G;
        b.trail.forEach((p,i)=>{
          ctx.beginPath();ctx.arc(p.x,p.y,b.r*(i/b.trail.length)*.55,0,Math.PI*2);
          ctx.fillStyle=`rgba(60,168,118,${(i/b.trail.length)*.35})`;ctx.fill();
        });
        radialBall(ctx,b.x,b.y,b.r,'#A1FFD0','#3CA876');
        // hit check
        if(b.x>t.x-t.w/2-b.r&&b.x<t.x+t.w/2+b.r&&b.y>t.y-t.h-b.r&&b.y<t.y+b.r){
          g.done=true;g.ball=null;setTimeout(()=>setStatus('won'),400);
        } else if(b.y>H+20||b.x>W+20||b.x<-20){
          g.ball=null;
          if(g.attempts>=g.maxAttempts){g.done=true;setTimeout(()=>setStatus('failed'),300);}
          else{g.spinning=true;g.launched=false;}
        }
      }

      // attempts counter
      ctx.fillStyle='#6B5680';ctx.font='bold 13px Nunito,sans-serif';
      ctx.textAlign='right';ctx.fillText(`Попытки: ${g.attempts}/${g.maxAttempts}`,W-12,H-56);ctx.textAlign='left';

      raf.current=requestAnimationFrame(loop);
    }
    raf.current=requestAnimationFrame(loop);
    return ()=>{
      cancelAnimationFrame(raf.current);
      canvas.removeEventListener('pointerdown',onClick);
    };
  },[intro]);

  function retry(){
    setStatus('play');
    if(canRef.current) gs.current=buildGs(canRef.current.width,canRef.current.height);
  }

  return (
    <div className="ak" style={{position:'relative',width:'100%',height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',background:'linear-gradient(180deg,#C8F2DD 0%,#FFF3E2 100%)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px 4px',flexShrink:0}}>
        <button className="ak-btn ak-btn--soft ak-btn--sm" onClick={onHome}>← Назад</button>
        <div style={{fontFamily:'var(--ak-display)',fontSize:14,color:'#6B5680'}}>Уровень 3 · Катапульта</div>
      </div>
      <canvas ref={canRef} width={360} height={540} style={{width:'100%',flex:1,display:'block',touchAction:'none',cursor:'pointer'}}/>
      <div style={{textAlign:'center',padding:'6px 0 10px',fontFamily:'var(--ak-display)',fontSize:13,color:'#6B5680',flexShrink:0}}>
        Нажми на экран в нужный момент! 🎯
      </div>
      {intro && <IntroCard emoji="🐘" title="Слон и катапульта!" desc="Слон крутит рычаг катапульты. Нажми в нужный момент — пусть мяч летит прямо в корзину с бананами!" law="Чем длиннее рычаг — тем дальше бросок" onStart={()=>setIntro(false)}/>}
      {status==='won' && <WinOverlay title="Попал в корзину! 🍌" law="Закон рычага" fact="Сила × длина рычага = момент силы. Катапульта использует этот принцип — длинное плечо бросает дальше!" cta="Все уровни пройдены! 🎉" onNext={onWin} onHome={onHome}/>}
      {status==='failed' && <FailOverlay tip="Нажми когда рычаг смотрит чуть правее вверх — тогда мяч полетит прямо к корзине!" onRetry={retry}/>}
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = useState('home');
  return (
    <div style={{width:'100%',height:'100vh',maxWidth:480,margin:'0 auto',position:'relative',overflow:'hidden'}}>
      {screen==='home'   && <HomeScreen onSelect={n=>setScreen(`l${n}`)}/>}
      {screen==='l1'     && <Level1 onWin={()=>setScreen('l2')} onHome={()=>setScreen('home')}/>}
      {screen==='l2'     && <Level2 onWin={()=>setScreen('l3')} onHome={()=>setScreen('home')}/>}
      {screen==='l3'     && <Level3 onWin={()=>setScreen('home')} onHome={()=>setScreen('home')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
