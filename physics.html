<html lang="ru">
<head>

<title>Физика — КосмоБаза</title>
<style>
@import url('https://fonts.bunny.net/css?family=fredoka-one:400|nunito:500,700,800');
:root {
  --ak-bg:#FFF3E2; --ak-bg-2:#FFE8CC; --ak-surface:#FFFDF7;
  --ak-ink:#2D1B45; --ak-ink-2:#6B5680; --ak-ink-3:#A797B8;
  --ak-phys-1:#E5DCFF; --ak-phys-2:#B5A1FF; --ak-phys-3:#7C5FE0;
  --ak-cta-1:#FFEDA8; --ak-cta-2:#FFD262; --ak-cta-3:#D4A22B;
  --ak-ok-1:#C8F2DD; --ak-ok-2:#5DD9A0; --ak-ok-3:#2BA873;
  --ak-warn-1:#FFD2C8; --ak-warn-2:#FF8B7A; --ak-warn-3:#D9523F;
  --ak-star-1:#FFE49E; --ak-star-2:#FFC857; --ak-star-3:#D4972B;
  --ak-r-sm:10px; --ak-r-md:18px; --ak-r-lg:28px; --ak-r-xl:36px;
  --ak-display:'Fredoka One','Nunito',system-ui,sans-serif;
  --ak-body:'Nunito',system-ui,sans-serif;
}
html,body{background:#FFF3E2;margin:0;}
#root{min-height:100vh;}
body{margin:0;font-family:var(--ak-body);color:var(--ak-ink);}
.ak{font-family:var(--ak-body);color:var(--ak-ink);-webkit-font-smoothing:antialiased;}
.ak-clay{background:var(--ak-surface);border-radius:var(--ak-r-lg);box-shadow:0 10px 22px -8px rgba(45,27,69,.22),0 4px 10px -4px rgba(45,27,69,.10),inset 0 2px 0 rgba(255,255,255,.9),inset 0 -3px 0 rgba(45,27,69,.06);}
.ak-btn{font-family:var(--ak-display);font-weight:600;font-size:17px;border:none;cursor:pointer;position:relative;transition:transform .08s ease,box-shadow .08s ease,filter .15s ease;user-select:none;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;padding:16px 26px;border-radius:999px;color:var(--ak-ink);}
.ak-btn:disabled{cursor:not-allowed;filter:grayscale(.25) opacity(.6);}
.ak-btn--phys{color:#fff;background:linear-gradient(180deg,#C4B5FF 0%,#B5A1FF 55%,#9C83FF 100%);box-shadow:0 6px 0 var(--ak-phys-3),0 12px 24px -6px rgba(124,95,224,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(124,95,224,.25);text-shadow:0 1px 0 rgba(124,95,224,.4);}
.ak-btn--phys:active{transform:translateY(4px);}
.ak-btn--cta{color:var(--ak-ink);background:linear-gradient(180deg,#FFEDA8 0%,#FFD262 55%,#FFC03A 100%);box-shadow:0 6px 0 var(--ak-cta-3),0 12px 24px -6px rgba(212,162,43,.55),inset 0 2px 0 rgba(255,255,255,.85),inset 0 -2px 0 rgba(212,162,43,.25);}
.ak-btn--cta:active{transform:translateY(4px);}
.ak-btn--ok{color:#fff;background:linear-gradient(180deg,#7CECB5 0%,#5DD9A0 55%,#3FC685 100%);box-shadow:0 6px 0 var(--ak-ok-3),0 12px 24px -6px rgba(43,168,115,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(43,168,115,.25);}
.ak-btn--ok:active{transform:translateY(4px);}
.ak-btn--soft{color:var(--ak-ink);background:linear-gradient(180deg,#FFFFFF 0%,#FFF7E8 100%);box-shadow:0 4px 0 rgba(45,27,69,.10),0 8px 18px -6px rgba(45,27,69,.12),inset 0 2px 0 rgba(255,255,255,.95),inset 0 -2px 0 rgba(45,27,69,.05),inset 0 0 0 1px rgba(45,27,69,.06);}
.ak-btn--soft:active{transform:translateY(3px);}

@keyframes ak-bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-4px) rotate(1deg);}}
@keyframes ak-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
@keyframes ak-shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px) rotate(-1deg);}40%{transform:translateX(7px) rotate(1deg);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
@keyframes ak-pop{0%{transform:scale(.7);opacity:0;}60%{transform:scale(1.06);opacity:1;}100%{transform:scale(1);}}
@keyframes ak-twinkle{0%,100%{opacity:.35;transform:scale(.85);}50%{opacity:1;transform:scale(1.05);}}
@keyframes ak-glow{0%,100%{box-shadow:0 0 8px #FFD26088;}50%{box-shadow:0 0 24px #FFD260cc,0 0 48px #FFD26044;}}

@keyframes ak-rise-up{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-44px);opacity:0;}}
@keyframes ak-radiate{0%{transform:scale(0);opacity:.9;}100%{transform:scale(2.2);opacity:0;}}

@keyframes heat-flow{0%{left:-100%;}100%{left:100%;}}

/* ============================================================
   AK DESIGN TOKENS

      </defs>
      <ellipse cx="28" cy="52" rx="14" ry="2.5" fill="rgba(45,27,69,.18)"/>
      <path d="M28 5 L34.5 19 L50 21 L38.5 31.5 L42 47 L28 39.5 L14 47 L17.5 31.5 L6 21 L21.5 19 Z"

function AKStatChip({ icon, value, tone='cta' }) {

      <div style={{width:28,height:28,borderRadius:'50%',background:`radial-gradient(circle at 35% 30%,#fff,${l} 25%,${m} 75%,${d} 100%)`,boxShadow:`inset 0 -2px 0 ${d}`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14}}>{icon}</div>

function AKTaskBadge({ children, tone='phys' }) {

function AKSuccessCard({ stars=3, title='Отлично!', fact, onNext, ctaLabel='Дальше' }) {
  return (
    <div className="ak-pop" style={{width:320,background:'#fff',borderRadius:32,padding:'28px 24px 24px',textAlign:'center',boxShadow:'0 12px 0 rgba(43,168,115,.18),0 24px 48px -12px rgba(45,27,69,.25),inset 0 2px 0 rgba(255,255,255,1)',fontFamily:'var(--ak-body)',position:'relative',margin:'0 auto'}}>
      <div aria-hidden style={{position:'absolute',top:-10,left:-10,right:-10,height:30,pointerEvents:'none'}}>
        {[{l:8,c:'#FFC857',s:8},{l:60,c:'#5DD9A0',s:6},{l:120,c:'#B5A1FF',s:7},{l:200,c:'#FFA17A',s:6},{l:260,c:'#8FCAF0',s:8},{l:310,c:'#FFC857',s:6}].map((p,i)=>(
          <div key={i} className="ak-twinkle" style={{position:'absolute',left:p.l,top:4+(i%2)*8,width:p.s,height:p.s,borderRadius:2,background:p.c,transform:`rotate(${i*25}deg)`,animationDelay:`${i*.15}s`}}/>
        ))}

          <div key={i} style={{transform:`translateY(${i===1?-6:0}px) rotate(${(i-1)*12}deg)`}}>
            <AKStar size={i===1?70:56} filled={i<stars}/>

      <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:26,letterSpacing:'-.4px',color:'var(--ak-ink)',marginBottom:8}}>{title}</div>

/* ============================================================
   LEVEL 1 — "Лазерный Лабиринт" (Laser Maze)
   Teaching: закон отражения, угол падения = углу отражения
   ============================================================ */
const L1_PUZZLES = [
  {mirrors:[{cx:100,cy:130,len:70,angle:45},{cx:200,cy:70,len:65,angle:135},{cx:250,cy:190,len:60,angle:45}],target:{x:310,y:70},hint:'Угол падения = угол отражения!'},
  {mirrors:[{cx:90,cy:60,len:70,angle:135},{cx:190,cy:160,len:65,angle:45},{cx:270,cy:80,len:60,angle:90}],target:{x:310,y:160},hint:'Каждое зеркало меняет направление луча'},
  {mirrors:[{cx:100,cy:200,len:70,angle:45},{cx:220,cy:100,len:65,angle:135},{cx:150,cy:60,len:60,angle:90}],target:{x:50,y:60},hint:'Луч можно отправить назад!'},
  {mirrors:[{cx:120,cy:80,len:70,angle:60},{cx:240,cy:180,len:65,angle:120},{cx:170,cy:130,len:60,angle:45}],target:{x:310,y:240},hint:'Три отражения — ты настоящий физик!'},
  {mirrors:[{cx:90,cy:180,len:75,angle:45},{cx:200,cy:60,len:70,angle:135},{cx:280,cy:170,len:65,angle:90}],target:{x:50,y:240},hint:'Последняя задача — самая интересная!'},
];

const L1_FACTS = [
  'Закон отражения открыл Евклид 2300 лет назад — угол падения = углу отражения!',
  'Зеркала в телескопе Хаббла использовали этот закон для съёмки галактик!',
  'Перископ подводной лодки работает на двух зеркалах под 45°',
  'Лазер в супермаркете сканирует штрих-код — используя отражение!',
  'Кошки видят в темноте — за их сетчаткой есть зеркальный слой!',
];

function traceRay(x0,y0,dx0,dy0, mirrors, W, H, maxBounce=8) {
  const pts=[{x:x0,y:y0}];
  let x=x0,y=y0,dx=dx0,dy=dy0;
  const L=Math.sqrt(dx*dx+dy*dy); dx/=L; dy/=L;
  for(let b=0;b<maxBounce;b++){
    let tMin=Infinity,hx=0,hy=0,bestMirror=null;
    for(const m of mirrors){
      const ang=m.angle*Math.PI/180, ml=m.len/2;
      const mx1=m.cx-Math.cos(ang)*ml, my1=m.cy-Math.sin(ang)*ml;
      const mx2=m.cx+Math.cos(ang)*ml, my2=m.cy+Math.sin(ang)*ml;
      const mdx=mx2-mx1, mdy=my2-my1;
      const denom=dx*mdy-dy*mdx;
      if(Math.abs(denom)>0.001){
        const t=((mx1-x)*mdy-(my1-y)*mdx)/denom;
        const u=((mx1-x)*dy-(my1-y)*dx)/denom;
        if(t>1&&u>=0&&u<=1&&t<tMin){tMin=t;hx=x+dx*t;hy=y+dy*t;bestMirror=m;}
      }
    }
    const walls=[{nx:1,ny:0,d:0},{nx:-1,ny:0,d:-W},{nx:0,ny:1,d:0},{nx:0,ny:-1,d:-H}];
    let tWall=Infinity,wnx=0,wny=0;
    for(const w of walls){
      const d2=dx*w.nx+dy*w.ny;
      if(Math.abs(d2)<0.001) continue;
      const t=(-(x*w.nx+y*w.ny+w.d))/d2;
      if(t>0.5&&t<tWall){tWall=t;wnx=w.nx;wny=w.ny;}
    }
    if(bestMirror&&tMin<tWall){
      pts.push({x:hx,y:hy});
      const ang=bestMirror.angle*Math.PI/180;
      const nRawX=-Math.sin(ang), nRawY=Math.cos(ang);
      const dot=dx*nRawX+dy*nRawY;
      dx=dx-2*dot*nRawX; dy=dy-2*dot*nRawY;
      x=hx;y=hy;
    } else {
      pts.push({x:x+dx*tWall,y:y+dy*tWall}); break;
    }
  }
  return pts;
}

function Level1Light({ onDone }) {
  const [puzzleIdx, setPuzzleIdx] = React.useState(0);
  const [starsEarned, setStarsEarned] = React.useState(0);
  const [celebrating, setCelebrating] = React.useState(false);
  const [done, setDone] = React.useState(false);

  const puz = L1_PUZZLES[puzzleIdx];
  const initAngles = puz.mirrors.map(m => m.angle);
  const [angles, setAngles] = React.useState(initAngles);
  const mirrorAnglesRef = React.useRef([...initAngles]);
  const [displayAngles, setDisplayAngles] = React.useState([...initAngles]);
  const canvasRef = React.useRef(null);
  const animRef = React.useRef(null);
  const hitRef = React.useRef(false);
  const celebRef = React.useRef(false);
  const pendingRef = React.useRef(false);

  const W=340, H=260;

  // Reset on puzzle change
  React.useEffect(()=>{
    const p = L1_PUZZLES[puzzleIdx];
    const a = p.mirrors.map(m=>m.angle);
    mirrorAnglesRef.current = [...a];
    setDisplayAngles([...a]);
    hitRef.current = false;
    celebRef.current = false;
  },[puzzleIdx]);

  React.useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const p = L1_PUZZLES[puzzleIdx];

    const draw = ()=>{
      ctx.clearRect(0,0,W,H);

      // Background
      const bg = ctx.createRadialGradient(W/2,H/2,20,W/2,H/2,Math.max(W,H));
      bg.addColorStop(0,'#16104A');
      bg.addColorStop(1,'#050316');
      ctx.fillStyle=bg;
      ctx.fillRect(0,0,W,H);

      // Grid dots (subtle)
      ctx.fillStyle='rgba(255,255,255,.04)';
      for(let gx=20;gx<W;gx+=40) for(let gy=20;gy<H;gy+=40){
        ctx.beginPath(); ctx.arc(gx,gy,1.5,0,Math.PI*2); ctx.fill();
      }

      // Build mirror array from current angles
      const mirrors = p.mirrors.map((m,i)=>({...m, angle: mirrorAnglesRef.current[i]}));

      // Laser source at x=10, y=130
      const srcX=10, srcY=130;
      ctx.save();
      ctx.shadowColor='#00FF88'; ctx.shadowBlur=14;
      ctx.fillStyle='#00FF88';
      ctx.fillRect(0, srcY-6, 8, 12);
      ctx.restore();

      // Trace ray
      const pts = traceRay(srcX+8, srcY, 1, 0, mirrors, W, H, 8);
      const last = pts[pts.length-1];

      // Hit check radius 28
      const ddx=last.x-p.target.x, ddy=last.y-p.target.y;
      const dist=Math.sqrt(ddx*ddx+ddy*ddy);
      const hit = dist < 28;

      // Draw laser beam
      ctx.save();
      ctx.shadowColor='#00FF88'; ctx.shadowBlur=18;
      ctx.strokeStyle='#00FF88'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath();
      pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));
      ctx.stroke();
      // Inner bright core
      ctx.shadowBlur=6;
      ctx.strokeStyle='rgba(220,255,240,.9)'; ctx.lineWidth=1.2;
      ctx.beginPath();
      pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));
      ctx.stroke();
      ctx.restore();

      // Draw mirrors
      mirrors.forEach((m,i)=>{
        const mAng = m.angle*Math.PI/180;
        const ml = m.len/2;
        const mx1=m.cx-Math.cos(mAng)*ml, my1=m.cy-Math.sin(mAng)*ml;
        const mx2=m.cx+Math.cos(mAng)*ml, my2=m.cy+Math.sin(mAng)*ml;
        ctx.save();
        ctx.shadowColor='rgba(180,160,255,.6)'; ctx.shadowBlur=8;
        const mGrad=ctx.createLinearGradient(mx1,my1,mx2,my2);
        mGrad.addColorStop(0,'rgba(255,255,255,.5)');
        mGrad.addColorStop(0.5,'#ffffff');
        mGrad.addColorStop(1,'rgba(255,255,255,.5)');
        ctx.strokeStyle=mGrad; ctx.lineWidth=5; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(mx1,my1); ctx.lineTo(mx2,my2); ctx.stroke();
        // Pivot
        ctx.shadowColor='#B5A1FF'; ctx.shadowBlur=10;
        ctx.fillStyle='#B5A1FF';
        ctx.beginPath(); ctx.arc(m.cx,m.cy,6,0,Math.PI*2); ctx.fill();
        // Number label
        ctx.shadowBlur=0;
        ctx.fillStyle='rgba(255,255,255,.7)';
        ctx.font='bold 11px Nunito,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(i+1, m.cx, m.cy);
        ctx.restore();
      });

      // Target bullseye
      const tx=p.target.x, ty=p.target.y;
      ctx.save();
      if(hit){ ctx.shadowColor='gold'; ctx.shadowBlur=30; }
      ctx.translate(tx,ty);
      // outer ring r=20
      ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2);
      ctx.fillStyle=hit?'rgba(255,215,0,.25)':'rgba(220,60,40,0.20)'; ctx.fill();
      ctx.strokeStyle=hit?'gold':'rgba(220,60,40,0.8)'; ctx.lineWidth=2; ctx.stroke();
      // mid ring r=12
      ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2);
      ctx.fillStyle=hit?'rgba(255,200,0,.4)':'rgba(255,100,20,.35)'; ctx.fill();
      ctx.strokeStyle=hit?'gold':'rgba(255,100,20,.7)'; ctx.lineWidth=1.5; ctx.stroke();
      // inner r=6
      ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2);
      ctx.fillStyle=hit?'gold':'rgba(255,140,0,.8)'; ctx.fill();
      ctx.restore();

      if(hit && !hitRef.current){ hitRef.current=true; }
      animRef.current=requestAnimationFrame(draw);
    };

    draw();
    return()=>cancelAnimationFrame(animRef.current);
  },[puzzleIdx]);

  // Poll for hit
  React.useEffect(()=>{
    if(celebrating||done) return;
    const iv=setInterval(()=>{
      if(hitRef.current && !celebRef.current){
        celebRef.current=true;
        setCelebrating(true);
      }
    },150);
    return()=>clearInterval(iv);
  },[celebrating,done]);

  const rotMirror = React.useCallback((idx, delta)=>{
    mirrorAnglesRef.current = mirrorAnglesRef.current.map((a,i)=>i===idx?(a+delta+360)%360:a);
    hitRef.current = false;
    if(!pendingRef.current){
      pendingRef.current=true;
      requestAnimationFrame(()=>{
        setDisplayAngles([...mirrorAnglesRef.current]);
        pendingRef.current=false;
      });
    }
  },[]);

  const handleNext = ()=>{
    setCelebrating(false);
    celebRef.current=false;
    hitRef.current=false;
    if(puzzleIdx>=L1_PUZZLES.length-1){
      setDone(true);
    } else {
      setStarsEarned(s=>s+1);
      setPuzzleIdx(i=>i+1);
    }
  };

  if(done){
    return(
      <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
        <AKSuccessCard stars={3} title="Закон отражения!" fact="Угол падения всегда равен углу отражения. Евклид открыл это 2300 лет назад!" onNext={onDone} ctaLabel="На главную 🏠"/>
      </div>
    );
  }

  const p=L1_PUZZLES[puzzleIdx];

  return(
    <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'16px 16px 32px',maxWidth:390,margin:'0 auto',boxSizing:'border-box',position:'relative'}}>
      <AKLessonHeader progress={puzzleIdx/L1_PUZZLES.length} stars={starsEarned} onClose={onDone}/>
      <div style={{height:16}}/>
      <AKTaskBadge tone="phys">{p.hint}</AKTaskBadge>
      <div style={{height:14}}/>

      <div style={{borderRadius:18,overflow:'hidden',boxShadow:'0 8px 0 rgba(45,27,69,.12),0 18px 36px -12px rgba(45,27,69,.22)'}}>
        <canvas ref={canvasRef} width={W} height={H} style={{display:'block',width:'100%',height:'auto'}}/>
      </div>

      <div style={{height:16}}/>

      {/* Mirror controls */}
      <div style={{background:'#fff',borderRadius:20,padding:'14px 18px',boxShadow:'0 4px 0 rgba(45,27,69,.08),0 10px 22px -8px rgba(45,27,69,.14)'}}>
        <div style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:13,color:'var(--ak-ink-3)',marginBottom:10}}>🪞 Управление зеркалами</div>
        {[0,1,2].map(i=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:i<2?'1px solid rgba(45,27,69,.06)':'none'}}>
            <button className="mirror-btn" onClick={()=>rotMirror(i,-5)}>◀</button>
            <span style={{flex:1,fontFamily:'var(--ak-display)',fontWeight:600,fontSize:14,color:'var(--ak-ink)',textAlign:'center'}}>
              🪞 Зеркало {i+1}: {Math.round(displayAngles[i])}°
            </span>
            <button className="mirror-btn" onClick={()=>rotMirror(i,+5)}>▶</button>
          </div>
        ))}
      </div>

      <div style={{height:10}}/>
      <div style={{textAlign:'center',fontSize:13,color:'var(--ak-ink-3)',fontWeight:600}}>
        Задача {puzzleIdx+1} из {L1_PUZZLES.length}
      </div>

      {celebrating&&(
        <div style={{position:'fixed',inset:0,background:'rgba(5,3,22,.82)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:24}}>
          <div className="ak-pop" style={{background:'#fff',borderRadius:28,padding:'28px 24px',textAlign:'center',maxWidth:320,width:'100%',boxShadow:'0 16px 0 rgba(45,27,69,.12),0 32px 64px -16px rgba(45,27,69,.3)'}}>
            <div style={{fontSize:52,marginBottom:10}}>🎯</div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:24,color:'var(--ak-ink)',marginBottom:10}}>Попал!</div>
            <div style={{fontSize:14,lineHeight:1.5,color:'var(--ak-ink-2)',marginBottom:20,fontWeight:500}}>{L1_FACTS[puzzleIdx]}</div>
            <button className="ak-btn ak-btn--phys" style={{width:'100%'}} onClick={handleNext}>
              {puzzleIdx>=L1_PUZZLES.length-1?'Завершить! 🎉':'Дальше →'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   LEVEL 2 — "Рычаг Архимеда"
   Teaching: закон рычага, F×d = F×d
   ============================================================ */
const L2_CHALLENGES = [
  {leftWeights:[{mass:30,dist:80,color:'#B5A1FF'}], rightMass:30, startPos:40, hint:'Поставь такой же груз на такое же расстояние!', fact:'Рычаг уравновешен! F×d слева = F×d справа — открытие Архимеда!'},
  {leftWeights:[{mass:60,dist:60,color:'#FF8B7A'}], rightMass:30, startPos:30, hint:'Груз вдвое легче — поставь его вдвое дальше!', fact:'Архимед сказал: "Дайте мне точку опоры — и я переверну Землю!"'},
  {leftWeights:[{mass:30,dist:50,color:'#5DD9A0'},{mass:30,dist:90,color:'#FFD262'}], rightMass:60, startPos:40, hint:'Два груза слева суммируются. Один тяжёлый справа.', fact:'Несколько сил заменяются одной равнодействующей — это суперпозиция!'},
  {leftWeights:[{mass:50,dist:70,color:'#60B8E8'}], rightMass:70, startPos:80, hint:'Тяжёлый груз — ближе к центру!', fact:'Тяжёлые грузы требуют меньшего расстояния от точки опоры!'},
  {leftWeights:[{mass:40,dist:90,color:'#FFA17A'}], rightMass:20, startPos:50, hint:'Лёгкий груз — дальше от центра!', fact:'Простые машины (рычаг, блок, колесо) используют этот закон — они меняют силу или расстояние!'},
];

function Level2Lever({ onDone }) {
  const [chalIdx, setChalIdx] = React.useState(0);
  const [starsEarned, setStarsEarned] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [celebrating, setCelebrating] = React.useState(false);

  const chal = L2_CHALLENGES[chalIdx];
  const [rightPos, setRightPos] = React.useState(chal.startPos);
  const rightPosRef = React.useRef(chal.startPos);
  const draggingRef = React.useRef(false);
  const canvasRef = React.useRef(null);
  const animRef = React.useRef(null);
  const balancedFrames = React.useRef(0);
  const celebRef = React.useRef(false);

  const W=340, H=280;
  const pivotX=170, pivotY=200;
  const beamHalfW=150;

  React.useEffect(()=>{
    const c = L2_CHALLENGES[chalIdx];
    rightPosRef.current = c.startPos;
    setRightPos(c.startPos);
    balancedFrames.current = 0;
    celebRef.current = false;
    setCelebrating(false);
  },[chalIdx]);

  // Display state (throttled from ref)
  const [displayTorque, setDisplayTorque] = React.useState({left:0,right:0});

  React.useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const c = L2_CHALLENGES[chalIdx];

    const draw = ()=>{
      const rp = rightPosRef.current;
      const leftTorque = c.leftWeights.reduce((s,w)=>s+w.mass*w.dist,0);
      const rightTorque = c.rightMass * rp;
      const netTorque = leftTorque - rightTorque;
      const beamAngle = Math.max(-0.45,Math.min(0.45,netTorque/500));
      const isBalanced = Math.abs(netTorque) < 20;

      ctx.clearRect(0,0,W,H);

      // Warm cream background
      ctx.fillStyle='#FFF8EA';
      ctx.fillRect(0,0,W,H);

      // Ground shadow
      ctx.fillStyle='rgba(45,27,69,.06)';
      ctx.fillRect(0,H-20,W,20);

      // Pivot triangle
      ctx.save();
      ctx.fillStyle='#8B7355';
      ctx.shadowColor='rgba(45,27,69,.2)'; ctx.shadowBlur=6;
      ctx.beginPath();
      ctx.moveTo(pivotX, pivotY-18);
      ctx.lineTo(pivotX-18, pivotY+4);
      ctx.lineTo(pivotX+18, pivotY+4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Beam (rotated around pivot)
      ctx.save();
      ctx.translate(pivotX, pivotY-14);
      ctx.rotate(beamAngle);

      // Beam body
      const beamGrad = ctx.createLinearGradient(0,-7,0,7);
      beamGrad.addColorStop(0,'#D4A46A');
      beamGrad.addColorStop(0.3,'#C4914A');
      beamGrad.addColorStop(1,'#A07030');
      ctx.fillStyle = beamGrad;
      ctx.shadowColor='rgba(45,27,69,.18)'; ctx.shadowBlur=8;
      ctx.fillRect(-beamHalfW,-7,beamHalfW*2,14);
      // Beam highlight
      ctx.fillStyle='rgba(255,255,255,.35)';
      ctx.fillRect(-beamHalfW,-7,beamHalfW*2,3);

      // Draw left weights
      c.leftWeights.forEach(w=>{
        const wx = -w.dist;
        ctx.save();
        ctx.shadowColor='rgba(45,27,69,.25)'; ctx.shadowBlur=8;
        ctx.fillStyle = w.color;
        ctx.beginPath();
        ctx.arc(wx,-14-16,14,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.35)';
        ctx.beginPath();
        ctx.ellipse(wx-4,-14-22,5,6,Math.PI*0.3,0,Math.PI*2);
        ctx.fill();
        // Mass label
        ctx.fillStyle='#fff';
        ctx.font='bold 10px Nunito,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(w.mass+'г', wx, -14-16);
        ctx.restore();
      });

      // Draw right weight (draggable)
      const rwx = rp;
      ctx.save();
      ctx.shadowColor='rgba(45,27,69,.3)'; ctx.shadowBlur=10;
      ctx.fillStyle='#FFD262';
      ctx.beginPath();
      ctx.arc(rwx,-14-16,16,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.4)';
      ctx.beginPath();
      ctx.ellipse(rwx-5,-14-22,6,7,Math.PI*0.3,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='#2D1B45';
      ctx.font='bold 10px Nunito,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(c.rightMass+'г', rwx, -14-16);
      // Drag indicator
      ctx.fillStyle='rgba(45,27,69,.3)';
      ctx.font='9px sans-serif';
      ctx.fillText('↔', rwx, -14-16+22);
      ctx.restore();

      // End markers
      [-beamHalfW+4, beamHalfW-4].forEach(ex=>{
        ctx.save();
        ctx.fillStyle='rgba(139,115,85,.5)';
        ctx.fillRect(ex-3,-12,6,24);
        ctx.restore();
      });

      ctx.restore(); // end beam rotation

      // Balance indicator glow
      if(isBalanced){
        ctx.save();
        ctx.strokeStyle='#5DD9A0'; ctx.lineWidth=3;
        ctx.shadowColor='#5DD9A0'; ctx.shadowBlur=16;
        ctx.strokeRect(4,4,W-8,H-8);
        ctx.restore();
        balancedFrames.current++;
        if(balancedFrames.current>60 && !celebRef.current){
          celebRef.current=true;
          setCelebrating(true);
        }
      } else {
        balancedFrames.current=0;
      }

      setDisplayTorque({left:leftTorque,right:Math.round(c.rightMass*rp)});
      animRef.current=requestAnimationFrame(draw);
    };
    draw();
    return()=>cancelAnimationFrame(animRef.current);
  },[chalIdx]);

  // Pointer events for dragging the right weight
  const getCanvasPos = (canvas, e)=>{
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return (clientX - rect.left) * (W / rect.width);
  };

  const handlePointerDown = React.useCallback(e=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const cx = getCanvasPos(canvas, e);
    // Convert canvas x to beam local x: cx - pivotX ≈ rightPosRef.current
    const bx = cx - pivotX;
    const rp = rightPosRef.current;
    if(Math.abs(bx - rp) < 28){ draggingRef.current=true; e.preventDefault(); }
  },[]);

  const handlePointerMove = React.useCallback(e=>{
    if(!draggingRef.current) return;
    const canvas = canvasRef.current;
    if(!canvas) return;
    const cx = getCanvasPos(canvas, e);
    const bx = cx - pivotX;
    rightPosRef.current = Math.max(10, Math.min(155, bx));
    e.preventDefault();
  },[]);

  const handlePointerUp = React.useCallback(e=>{
    if(!draggingRef.current) return;
    draggingRef.current=false;
    setRightPos(rightPosRef.current);
  },[]);

  React.useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    canvas.addEventListener('mousedown', handlePointerDown);
    canvas.addEventListener('mousemove', handlePointerMove);
    canvas.addEventListener('mouseup', handlePointerUp);
    canvas.addEventListener('touchstart', handlePointerDown, {passive:false});
    canvas.addEventListener('touchmove', handlePointerMove, {passive:false});
    canvas.addEventListener('touchend', handlePointerUp);
    return()=>{
      canvas.removeEventListener('mousedown', handlePointerDown);
      canvas.removeEventListener('mousemove', handlePointerMove);
      canvas.removeEventListener('mouseup', handlePointerUp);
      canvas.removeEventListener('touchstart', handlePointerDown);
      canvas.removeEventListener('touchmove', handlePointerMove);
      canvas.removeEventListener('touchend', handlePointerUp);
    };
  },[handlePointerDown,handlePointerMove,handlePointerUp]);

  const handleNext = ()=>{
    setCelebrating(false);
    celebRef.current=false;
    balancedFrames.current=0;
    if(chalIdx>=L2_CHALLENGES.length-1){
      setDone(true);
    } else {
      setStarsEarned(s=>s+1);
      setChalIdx(i=>i+1);
    }
  };

  if(done){
    return(
      <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
        <AKSuccessCard stars={3} title="Рычаг Архимеда!" fact="F×d слева = F×d справа — вот закон рычага! Архимед обещал перевернуть Землю, имея точку опоры." onNext={onDone} ctaLabel="На главную 🏠"/>
      </div>
    );
  }

  const c = L2_CHALLENGES[chalIdx];
  const leftTorque = c.leftWeights.reduce((s,w)=>s+w.mass*w.dist,0);

  return(
    <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'16px 16px 32px',maxWidth:390,margin:'0 auto',boxSizing:'border-box',position:'relative'}}>
      <AKLessonHeader progress={chalIdx/L2_CHALLENGES.length} stars={starsEarned} onClose={onDone}/>
      <div style={{height:16}}/>
      <AKTaskBadge tone="phys">{c.hint}</AKTaskBadge>
      <div style={{height:14}}/>

      <div style={{borderRadius:18,overflow:'hidden',boxShadow:'0 8px 0 rgba(45,27,69,.12),0 18px 36px -12px rgba(45,27,69,.22)',cursor:'grab'}}>
        <canvas ref={canvasRef} width={W} height={H} style={{display:'block',width:'100%',height:'auto'}}/>
      </div>

      <div style={{height:16}}/>

      {/* Torque display */}
      <div style={{background:'#fff',borderRadius:20,padding:'14px 18px',boxShadow:'0 4px 0 rgba(45,27,69,.08),0 10px 22px -8px rgba(45,27,69,.14)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:15,color:'#B5A1FF'}}>← {leftTorque} Н·см</div>
          <div style={{fontSize:12,color:'var(--ak-ink-3)',fontWeight:600}}>Момент силы</div>
          <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:15,color:'#FFD262'}}>{displayTorque.right} Н·см →</div>
        </div>
        {/* Balance bar */}
        <div style={{height:12,borderRadius:999,background:'rgba(45,27,69,.08)',overflow:'hidden',position:'relative'}}>
          {(()=>{
            const rp2 = rightPosRef.current;
            const rt = c.rightMass * rp2;
            const ratio = leftTorque===0 ? 0.5 : Math.min(1,Math.max(0, rt / (leftTorque*2)));
            const balanced = Math.abs(leftTorque - rt) < 20;
            return <div style={{position:'absolute',left:`${ratio*100}%`,top:0,width:4,height:'100%',background:balanced?'#5DD9A0':'#FF8B7A',borderRadius:999,transform:'translateX(-50%)',boxShadow:`0 0 8px ${balanced?'#5DD9A0':'#FF8B7A'}`}}/>;
          })()}
          <div style={{position:'absolute',left:'50%',top:0,width:2,height:'100%',background:'rgba(45,27,69,.2)',borderRadius:999,transform:'translateX(-50%)'}}/>
        </div>
        <div style={{textAlign:'center',marginTop:8,fontSize:12,color:'var(--ak-ink-3)',fontWeight:600}}>
          Перетащи жёлтый груз для баланса ← →
        </div>
      </div>

      <div style={{height:10}}/>
      <div style={{textAlign:'center',fontSize:13,color:'var(--ak-ink-3)',fontWeight:600}}>
        Задача {chalIdx+1} из {L2_CHALLENGES.length}
      </div>

      {celebrating&&(
        <div style={{position:'fixed',inset:0,background:'rgba(26,16,64,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:24}}>
          <div className="ak-pop" style={{background:'#fff',borderRadius:28,padding:'28px 24px',textAlign:'center',maxWidth:320,width:'100%',boxShadow:'0 16px 0 rgba(45,27,69,.12),0 32px 64px -16px rgba(45,27,69,.3)'}}>
            <div style={{fontSize:52,marginBottom:10}}>⚖️</div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:24,color:'var(--ak-ink)',marginBottom:10}}>Равновесие!</div>
            <div style={{fontSize:14,lineHeight:1.5,color:'var(--ak-ink-2)',marginBottom:20,fontWeight:500}}>{c.fact}</div>
            <button className="ak-btn ak-btn--phys" style={{width:'100%'}} onClick={handleNext}>
              {chalIdx>=L2_CHALLENGES.length-1?'Завершить! 🎉':'Дальше →'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   LEVEL 3 — "Пушка Галилея"
   Teaching: траектория тела, угол бросания, гравитация
   ============================================================ */
const L3_TARGETS = [
  {x:180, hint:'Постарайся попасть! Попробуй угол около 45°', fact:'Гравитация тянет мяч вниз — поэтому траектория изогнута!'},
  {x:240, hint:'Цель дальше — попробуй угол побольше!', fact:'Угол 45° даёт максимальную дальность. Открытие Галилея — 1590 год!'},
  {x:130, hint:'Цель ближе — какой угол нужен?', fact:'Угол 30° и угол 60° дают ОДИНАКОВУЮ дальность — красивая симметрия!'},
  {x:290, hint:'Очень далеко! Ближе к 45°', fact:'Горизонтальная скорость постоянна, вертикальная замедляется гравитацией!'},
  {x:100, hint:'Совсем рядом — малый угол', fact:'На Луне бросок в 6 раз дальше — гравитация там в 6 раз меньше!'},
];

const GRAVITY = 0.12;
const SPEED = 7;

function Level3Cannon({ onDone }) {
  const [targetIdx, setTargetIdx] = React.useState(0);
  const [starsEarned, setStarsEarned] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [angle, setAngle] = React.useState(45);
  const [attempts, setAttempts] = React.useState(0);
  const [celebrating, setCelebrating] = React.useState(false);
  const [showFact, setShowFact] = React.useState(false);
  const [fired, setFired] = React.useState(false);
  const [trailPoints, setTrailPoints] = React.useState([]);

  const canvasRef = React.useRef(null);
  const animRef = React.useRef(null);
  const ballRef = React.useRef(null); // {x,y,vx,vy} or null
  const trailRef = React.useRef([]);
  const angleRef = React.useRef(45);
  const firedRef = React.useRef(false);
  const hitRef = React.useRef(false);

  const W=340, H=280;
  const GROUND_Y = H-30;
  const CANNON_X = 30;
  const CANNON_Y = GROUND_Y;

  React.useEffect(()=>{
    setAttempts(0);
    setFired(false);
    setTrailPoints([]);
    trailRef.current=[];
    ballRef.current=null;
    hitRef.current=false;
    setCelebrating(false);
    setShowFact(false);
    firedRef.current=false;
  },[targetIdx]);

  React.useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const tgt = L3_TARGETS[targetIdx];

    const draw = ()=>{
      ctx.clearRect(0,0,W,H);

      // Sky gradient
      const sky = ctx.createLinearGradient(0,0,0,GROUND_Y);
      sky.addColorStop(0,'#87CEEB');
      sky.addColorStop(1,'#C8E8F5');
      ctx.fillStyle=sky;
      ctx.fillRect(0,0,W,GROUND_Y);

      // Sun
      ctx.save();
      ctx.fillStyle='#FFE066';
      ctx.shadowColor='#FFD262'; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.arc(W-30,28,16,0,Math.PI*2); ctx.fill();
      ctx.restore();

      // Clouds
      [[60,30,0.5],[180,20,0.35],[280,40,0.4]].forEach(([cx,cy,op])=>{
        ctx.save(); ctx.globalAlpha=op;
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2);
        ctx.arc(cx+16,cy-4,14,0,Math.PI*2);
        ctx.arc(cx-14,cy-2,12,0,Math.PI*2);
        ctx.fill(); ctx.restore();
      });

      // Ground
      ctx.fillStyle='#5AAF4F';
      ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
      ctx.fillStyle='#6CC460';
      ctx.fillRect(0,GROUND_Y,W,6);

      // Distance markers on ground
      for(let mx=50;mx<W-10;mx+=50){
        ctx.fillStyle='rgba(45,80,30,.25)';
        ctx.fillRect(mx,GROUND_Y,1,8);
        ctx.fillStyle='rgba(45,80,30,.4)';
        ctx.font='9px sans-serif';
        ctx.textAlign='center';
        ctx.fillText(mx+'px',mx,GROUND_Y+18);
      }

      // Trail (dotted arc from previous shot)
      if(trailRef.current.length>1){
        ctx.save();
        ctx.setLineDash([4,6]);
        ctx.strokeStyle='rgba(100,60,200,.25)'; ctx.lineWidth=2;
        ctx.beginPath();
        trailRef.current.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      // Target bucket
      const tx = tgt.x;
      const ty = GROUND_Y-2;
      ctx.save();
      ctx.fillStyle='#FF8B7A';
      ctx.shadowColor='rgba(220,80,60,.4)'; ctx.shadowBlur=8;
      // Trapezoid bucket
      ctx.beginPath();
      ctx.moveTo(tx-16,ty-24);
      ctx.lineTo(tx+16,ty-24);
      ctx.lineTo(tx+12,ty);
      ctx.lineTo(tx-12,ty);
      ctx.closePath();
      ctx.fill();
      // Rim
      ctx.fillStyle='#D9523F';
      ctx.fillRect(tx-18,ty-28,36,6);
      ctx.restore();

      // Cannon wheel
      ctx.save();
      ctx.shadowColor='rgba(45,27,69,.3)'; ctx.shadowBlur=8;
      ctx.fillStyle='#4A3A2A';
      ctx.beginPath(); ctx.arc(CANNON_X,CANNON_Y,14,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#6A5A4A';
      ctx.beginPath(); ctx.arc(CANNON_X,CANNON_Y,9,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#3A2A1A'; ctx.lineWidth=2;
      [0,60,120].forEach(a=>{
        const ar=a*Math.PI/180;
        ctx.beginPath();
        ctx.moveTo(CANNON_X+Math.cos(ar)*4,CANNON_Y+Math.sin(ar)*4);
        ctx.lineTo(CANNON_X+Math.cos(ar)*12,CANNON_Y+Math.sin(ar)*12);
        ctx.stroke();
      });
      ctx.restore();

      // Cannon barrel
      const aRad = angleRef.current * Math.PI / 180;
      ctx.save();
      ctx.translate(CANNON_X, CANNON_Y);
      ctx.rotate(-aRad);
      const barrelGrad = ctx.createLinearGradient(0,-10,0,10);
      barrelGrad.addColorStop(0,'#6A5A4A');
      barrelGrad.addColorStop(0.5,'#4A3A2A');
      barrelGrad.addColorStop(1,'#2A1A0A');
      ctx.fillStyle=barrelGrad;
      ctx.shadowColor='rgba(45,27,69,.3)'; ctx.shadowBlur=6;
      ctx.fillRect(0,-10,50,20);
      // Barrel tip
      ctx.fillStyle='#3A2A1A';
      ctx.fillRect(46,-11,6,22);
      ctx.restore();

      // Angle label near cannon
      ctx.save();
      ctx.fillStyle='#2D1B45';
      ctx.font='bold 13px Fredoka One,sans-serif';
      ctx.textAlign='left';
      ctx.fillText(`${Math.round(angleRef.current)}°`, CANNON_X+20, CANNON_Y-20);
      ctx.restore();

      // Ball idle position at barrel tip (when not fired)
      if(!firedRef.current || (!ballRef.current && trailRef.current.length===0)){
        const bx = CANNON_X + Math.cos(aRad)*52;
        const by = CANNON_Y - Math.sin(aRad)*52;
        ctx.save();
        const ballGrad = ctx.createRadialGradient(bx-4,by-4,2,bx,by,8);
        ballGrad.addColorStop(0,'#FF9A6A');
        ballGrad.addColorStop(1,'#C84820');
        ctx.fillStyle=ballGrad;
        ctx.shadowColor='rgba(200,72,32,.5)'; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(bx,by,8,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }

      // Flying ball
      if(ballRef.current){
        const {x,y,vx,vy} = ballRef.current;
        // Physics step
        const nvx = vx;
        const nvy = vy + GRAVITY;
        const nx = x + nvx;
        const ny = y + nvy;

        trailRef.current.push({x,y});

        // Check hit bucket
        if(Math.abs(x - tgt.x) < 28 && y >= GROUND_Y - 55 && y <= GROUND_Y){
          hitRef.current = true;
          ballRef.current = null;
          firedRef.current = false;
          setFired(false);
          return;
        }

        // Check ground
        if(ny >= GROUND_Y){
          ballRef.current = null;
          firedRef.current = false;
          setFired(false);
          setAttempts(prev=>{
            const na = prev+1;
            if(na>=3){ setShowFact(true); }
            return na;
          });
          animRef.current = requestAnimationFrame(draw);
          return;
        }

        // Check walls
        if(nx > W || nx < 0){
          ballRef.current = null;
          firedRef.current = false;
          setFired(false);
          setAttempts(prev=>{
            const na = prev+1;
            if(na>=3){ setShowFact(true); }
            return na;
          });
          animRef.current = requestAnimationFrame(draw);
          return;
        }

        ballRef.current = {x:nx, y:ny, vx:nvx, vy:nvy};

        // Draw ball
        ctx.save();
        const ballGrad2 = ctx.createRadialGradient(nx-3,ny-3,2,nx,ny,8);
        ballGrad2.addColorStop(0,'#FF9A6A');
        ballGrad2.addColorStop(1,'#C84820');
        ctx.fillStyle=ballGrad2;
        ctx.shadowColor='rgba(200,72,32,.6)'; ctx.shadowBlur=10;
        ctx.beginPath(); ctx.arc(nx,ny,8,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }

      if(hitRef.current){
        // Show hit celebration
        ctx.save();
        ctx.fillStyle='rgba(93,217,160,.15)';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#2BA873';
        ctx.font='bold 22px Fredoka One,sans-serif';
        ctx.textAlign='center';
        ctx.shadowColor='#5DD9A0'; ctx.shadowBlur=16;
        ctx.fillText('🎯 Попал!', W/2, H/2-10);
        ctx.restore();
        // Show success after brief pause
        setTimeout(()=>{
          hitRef.current=false;
          setCelebrating(true);
        },800);
        return; // stop RAF
      }

      animRef.current = requestAnimationFrame(draw);
    };

    draw();
    return()=>cancelAnimationFrame(animRef.current);
  },[targetIdx,fired]);

  const handleFire = ()=>{
    if(firedRef.current || celebrating || showFact) return;
    if(attempts>=3) return;
    trailRef.current=[];
    hitRef.current=false;
    const aRad = angleRef.current * Math.PI / 180;
    const bx = CANNON_X + Math.cos(aRad)*52;
    const by = CANNON_Y - Math.sin(aRad)*52;
    ballRef.current = {
      x: bx, y: by,
      vx: SPEED * Math.cos(aRad),
      vy: -SPEED * Math.sin(aRad),
    };
    firedRef.current = true;
    setFired(true);
  };

  const handleReset = ()=>{
    cancelAnimationFrame(animRef.current);
    ballRef.current=null;
    firedRef.current=false;
    hitRef.current=false;
    trailRef.current=[];
    setFired(false);
  };

  const handleNext = ()=>{
    setCelebrating(false);
    setShowFact(false);
    if(targetIdx>=L3_TARGETS.length-1){
      setDone(true);
    } else {
      setStarsEarned(s=>s+1);
      setTargetIdx(i=>i+1);
    }
  };

  if(done){
    return(
      <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
        <AKSuccessCard stars={3} title="Пушка Галилея!" fact="Угол 45° даёт максимальную дальность. Галилей открыл законы баллистики в 1590 году!" onNext={onDone} ctaLabel="На главную 🏠"/>
      </div>
    );
  }

  const tgt = L3_TARGETS[targetIdx];

  return(
    <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'16px 16px 32px',maxWidth:390,margin:'0 auto',boxSizing:'border-box',position:'relative'}}>
      <AKLessonHeader progress={targetIdx/L3_TARGETS.length} stars={starsEarned} onClose={onDone}/>
      <div style={{height:16}}/>
      <AKTaskBadge tone="phys">{tgt.hint}</AKTaskBadge>
      <div style={{height:14}}/>

      <div style={{borderRadius:18,overflow:'hidden',boxShadow:'0 8px 0 rgba(45,27,69,.12),0 18px 36px -12px rgba(45,27,69,.22)'}}>
        <canvas ref={canvasRef} width={W} height={H} style={{display:'block',width:'100%',height:'auto'}}/>
      </div>

      <div style={{height:16}}/>

      {/* Controls */}
      <div style={{background:'#fff',borderRadius:20,padding:'16px 18px',boxShadow:'0 4px 0 rgba(45,27,69,.08),0 10px 22px -8px rgba(45,27,69,.14)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:14,color:'var(--ak-ink-2)'}}>Угол выстрела</span>
          <span className="ak-num" style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:20,color:'#7C5FE0'}}>{angle}°</span>
        </div>
        <div style={{position:'relative',height:18}}>
          <div style={{position:'absolute',inset:0,borderRadius:999,background:'linear-gradient(90deg,#E5DCFF,#B5A1FF,#7C5FE0)',boxShadow:'inset 0 2px 4px rgba(45,27,69,.18)'}}/>
          <input type="range" min={10} max={80} step={1}
            value={angle}
            onChange={e=>{
              const v=Number(e.target.value);
              setAngle(v);
              angleRef.current=v;
              handleReset();
            }}
            style={{position:'absolute',inset:0,opacity:0,cursor:'pointer',zIndex:3,margin:0,width:'100%',height:'100%'}}
          />
          <div style={{
            position:'absolute',top:'50%',
            left:`calc(${((angle-10)/70)*100}% - 18px)`,
            transform:'translateY(-50%)',
            width:36,height:36,borderRadius:'50%',
            background:'linear-gradient(180deg,#fff 0%,#FFF7E8 100%)',
            boxShadow:'0 4px 0 rgba(45,27,69,.15),0 8px 18px -6px rgba(45,27,69,.2),inset 0 2px 0 rgba(255,255,255,.95)',
            pointerEvents:'none',zIndex:1,
          }}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:12,color:'var(--ak-ink-3)',fontWeight:600}}>
          <span>10°</span><span>45°</span><span>80°</span>
        </div>

        <div style={{height:14}}/>
        <div style={{display:'flex',gap:12}}>
          <button className="ak-btn ak-btn--cta" style={{flex:1,fontSize:16}}
            onClick={handleFire}
            disabled={fired||attempts>=3||celebrating||showFact}>
            💥 Огонь!
          </button>
          <button className="ak-btn ak-btn--soft ak-btn--sm"
            onClick={handleReset}
            disabled={!fired}>
            Сброс
          </button>
        </div>

        <div style={{textAlign:'center',marginTop:10,fontSize:13,color:'var(--ak-ink-3)',fontWeight:600}}>
          Попытка {Math.min(attempts+1,3)} из 3 · Задача {targetIdx+1}/{L3_TARGETS.length}
        </div>
      </div>

      {/* Fact overlay after all attempts */}
      {showFact&&!celebrating&&(
        <div style={{position:'fixed',inset:0,background:'rgba(26,16,64,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:24}}>
          <div className="ak-pop" style={{background:'#fff',borderRadius:28,padding:'28px 24px',textAlign:'center',maxWidth:320,width:'100%',boxShadow:'0 16px 0 rgba(45,27,69,.12),0 32px 64px -16px rgba(45,27,69,.3)'}}>
            <div style={{fontSize:48,marginBottom:10}}>💥</div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:22,color:'var(--ak-ink)',marginBottom:10}}>Попробуй ещё!</div>
            <div style={{fontSize:14,lineHeight:1.5,color:'var(--ak-ink-2)',marginBottom:20,fontWeight:500}}>{tgt.fact}</div>
            <button className="ak-btn ak-btn--phys" style={{width:'100%'}} onClick={handleNext}>
              {targetIdx>=L3_TARGETS.length-1?'Завершить! 🎉':'Следующая цель →'}
            </button>
          </div>
        </div>
      )}

      {/* Hit celebration */}
      {celebrating&&(
        <div style={{position:'fixed',inset:0,background:'rgba(26,16,64,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:24}}>
          <div className="ak-pop" style={{background:'#fff',borderRadius:28,padding:'28px 24px',textAlign:'center',maxWidth:320,width:'100%',boxShadow:'0 16px 0 rgba(45,27,69,.12),0 32px 64px -16px rgba(45,27,69,.3)'}}>
            <div style={{fontSize:52,marginBottom:10}}>🎯</div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:24,color:'var(--ak-ink)',marginBottom:10}}>Попал!</div>
            <div style={{fontSize:14,lineHeight:1.5,color:'var(--ak-ink-2)',marginBottom:20,fontWeight:500}}>{tgt.fact}</div>
            <button className="ak-btn ak-btn--ok" style={{width:'100%'}} onClick={handleNext}>
              {targetIdx>=L3_TARGETS.length-1?'Завершить! 🎉':'Следующая цель →'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   LEVEL SELECT
   ============================================================ */
const LEVELS = [
  {n:1, title:'Лазерный лабиринт', sub:'Свет · Зеркала · Отражение', emoji:'🔦', desc:'Направь лазер через зеркала к цели'},
  {n:2, title:'Рычаг Архимеда',    sub:'Силы · Рычаг · Равновесие',  emoji:'⚖️', desc:'Найди равновесие перетаскивая груз'},
  {n:3, title:'Пушка Галилея',     sub:'Траектория · Угол · Гравитация', emoji:'💥', desc:'Выбери угол и попади в цель'},
];

function LevelSelect({ onSelect }) {
  return (
    <div className="ak" style={{minHeight:'100vh',background:'linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'32px 20px 40px',maxWidth:390,margin:'0 auto',boxSizing:'border-box'}}>
      {/* Header */}
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{fontSize:52,marginBottom:8}} className="ak-bob">⚛️</div>
        <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:30,letterSpacing:'-.5px',color:'var(--ak-ink)',marginBottom:6}}>Физика</div>
        <div style={{fontSize:15,color:'var(--ak-ink-2)',fontWeight:600}}>Открой законы природы через игру</div>
      </div>

      {/* Level cards */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        {LEVELS.map(lv=>(
          <button key={lv.n} onClick={()=>onSelect(lv.n)}
            style={{width:'100%',textAlign:'left',background:'#fff',border:'none',cursor:'pointer',borderRadius:24,padding:'20px 22px',boxShadow:'0 6px 0 rgba(45,27,69,.10),0 14px 28px -8px rgba(45,27,69,.16),inset 0 2px 0 rgba(255,255,255,1)',transition:'transform .12s,box-shadow .12s',fontFamily:'var(--ak-body)',color:'var(--ak-ink)',display:'flex',alignItems:'center',gap:18}}
            onMouseEnter={e=>{ e.currentTarget.style.transform='translateY(-3px)'; e.currentTarget.style.boxShadow='0 9px 0 rgba(45,27,69,.10),0 18px 36px -8px rgba(45,27,69,.22),inset 0 2px 0 rgba(255,255,255,1)'; }}
            onMouseLeave={e=>{ e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow='0 6px 0 rgba(45,27,69,.10),0 14px 28px -8px rgba(45,27,69,.16),inset 0 2px 0 rgba(255,255,255,1)'; }}
          >
            <div style={{width:60,height:60,borderRadius:20,background:'linear-gradient(135deg,#E5DCFF,#B5A1FF)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:30,flexShrink:0,boxShadow:'0 4px 0 #7C5FE044,inset 0 2px 0 rgba(255,255,255,.6)'}}>{lv.emoji}</div>
            <div style={{flex:1}}>
              <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:18,color:'var(--ak-ink)',marginBottom:3}}>{lv.title}</div>
              <div style={{fontSize:12,fontWeight:700,color:'var(--ak-phys-3)',letterSpacing:'.5px',marginBottom:4,textTransform:'uppercase'}}>{lv.sub}</div>
              <div style={{fontSize:13,color:'var(--ak-ink-2)',fontWeight:500}}>{lv.desc}</div>
            </div>
            <div style={{color:'var(--ak-ink-3)',fontSize:20}}>›</div>
          </button>
        ))}
      </div>

      {/* Footer */}
      <div style={{textAlign:'center',marginTop:32,fontSize:13,color:'var(--ak-ink-3)',fontWeight:600}}>
        КосмоБаза · Физика · возраст 6–14 лет
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [screen, setScreen] = React.useState('select'); // 'select' | 'l1' | 'l2' | 'l3'

  const handleSelect = (n) => setScreen(`l${n}`);
  const handleDone = () => setScreen('select');

  if(screen==='l1') return <Level1Light onDone={handleDone}/>;
  if(screen==='l2') return <Level2Lever onDone={handleDone}/>;
  if(screen==='l3') return <Level3Cannon onDone={handleDone}/>;
  return <LevelSelect onSelect={handleSelect}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
