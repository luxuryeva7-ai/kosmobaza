<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Хемо Лаб — КосмоБаза</title>
<style>
@import url('https://fonts.bunny.net/css?family=fredoka-one:400|nunito:500,700,800');
:root {
  --ak-bg:#FFF3E2; --ak-bg-2:#FFE8CC; --ak-surface:#FFFDF7;
  --ak-ink:#2D1B45; --ak-ink-2:#6B5680; --ak-ink-3:#A797B8;
  --ak-chem-1:#DCF7E7; --ak-chem-2:#7BD9A8; --ak-chem-3:#3CA876;
  --ak-phys-1:#E5DCFF; --ak-phys-2:#B5A1FF; --ak-phys-3:#7C5FE0;
  --ak-bio-1:#FFE0CB; --ak-bio-2:#FFA17A; --ak-bio-3:#D96D49;
  --ak-geo-1:#D6ECFA; --ak-geo-2:#8FCAF0; --ak-geo-3:#4A93C9;
  --ak-cta-1:#FFEDA8; --ak-cta-2:#FFD262; --ak-cta-3:#D4A22B;
  --ak-ok-1:#C8F2DD; --ak-ok-2:#5DD9A0; --ak-ok-3:#2BA873;
  --ak-warn-1:#FFD2C8; --ak-warn-2:#FF8B7A; --ak-warn-3:#D9523F;
  --ak-star-1:#FFE49E; --ak-star-2:#FFC857; --ak-star-3:#D4972B;
  --ak-r-sm:10px; --ak-r-md:18px; --ak-r-lg:28px; --ak-r-xl:36px;
  --ak-display:'Fredoka One','Nunito',system-ui,sans-serif;
  --ak-body:'Nunito',system-ui,sans-serif;
}
html,body{background:#FFF3E2;margin:0;}
#root{min-height:100vh;}
body{margin:0;font-family:var(--ak-body);color:var(--ak-ink);}
.ak{font-family:var(--ak-body);color:var(--ak-ink);-webkit-font-smoothing:antialiased;}
.ak-btn{font-family:var(--ak-display);font-weight:600;font-size:17px;border:none;cursor:pointer;position:relative;transition:transform .08s ease,box-shadow .08s ease,filter .15s ease;user-select:none;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;padding:16px 26px;border-radius:999px;color:var(--ak-ink);}
.ak-btn:disabled{cursor:not-allowed;filter:grayscale(.25) opacity(.6);}
.ak-btn--cta{color:var(--ak-ink);background:linear-gradient(180deg,#FFEDA8 0%,#FFD262 55%,#FFC03A 100%);box-shadow:0 6px 0 var(--ak-cta-3),0 12px 24px -6px rgba(212,162,43,.55),inset 0 2px 0 rgba(255,255,255,.85),inset 0 -2px 0 rgba(212,162,43,.25);}
.ak-btn--cta:active{transform:translateY(4px);}
.ak-btn--ok{color:#fff;background:linear-gradient(180deg,#7CECB5 0%,#5DD9A0 55%,#3FC685 100%);box-shadow:0 6px 0 var(--ak-ok-3),0 12px 24px -6px rgba(43,168,115,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(43,168,115,.25);}
.ak-btn--ok:active{transform:translateY(4px);}
.ak-btn--soft{color:var(--ak-ink);background:linear-gradient(180deg,#FFFFFF 0%,#FFF7E8 100%);box-shadow:0 4px 0 rgba(45,27,69,.10),0 8px 18px -6px rgba(45,27,69,.12),inset 0 2px 0 rgba(255,255,255,.95),inset 0 -2px 0 rgba(45,27,69,.05),inset 0 0 0 1px rgba(45,27,69,.06);}
.ak-btn--soft:active{transform:translateY(3px);}
.ak-btn--chem{color:var(--ak-ink);background:linear-gradient(180deg,#A8F0CC 0%,#7BD9A8 55%,#5CC890 100%);box-shadow:0 6px 0 var(--ak-chem-3),0 12px 24px -6px rgba(60,168,118,.5),inset 0 2px 0 rgba(255,255,255,.55),inset 0 -2px 0 rgba(60,168,118,.25);}
.ak-btn--chem:active{transform:translateY(4px);}
.ak-btn--sm{padding:11px 18px;font-size:14px;}
.ak-btn--lg{padding:20px 32px;font-size:19px;}
.ak-btn--icon{width:56px;height:56px;padding:0;border-radius:50%;}
.ak-btn--icon.ak-btn--sm{width:42px;height:42px;}
@keyframes ak-bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-4px) rotate(1deg);}}
@keyframes ak-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
@keyframes ak-shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px) rotate(-1deg);}40%{transform:translateX(7px) rotate(1deg);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
@keyframes ak-pop{0%{transform:scale(.7);opacity:0;}60%{transform:scale(1.06);opacity:1;}100%{transform:scale(1);}}
@keyframes ak-pour{0%{transform:scaleY(0);opacity:0;}100%{transform:scaleY(1);opacity:1;}}
@keyframes ak-twinkle{0%,100%{opacity:.35;transform:scale(.85);}50%{opacity:1;transform:scale(1.05);}}
@keyframes ak-fly-in{0%{transform:scale(.5) translateY(30px);opacity:0;}70%{transform:scale(1.08) translateY(-4px);opacity:1;}100%{transform:scale(1) translateY(0);opacity:1;}}
@keyframes ak-fly-out{0%{transform:scale(1);opacity:1;}100%{transform:scale(.3) translateY(60px);opacity:0;}}
.ak-bob{animation:ak-bob 3.2s ease-in-out infinite;}
.ak-pulse{animation:ak-pulse 2.4s ease-in-out infinite;}
.ak-shake{animation:ak-shake .45s ease-in-out;}
.ak-pop{animation:ak-pop .42s cubic-bezier(.2,.7,.3,1) forwards;}
.ak-pour{transform-origin:bottom;animation:ak-pour .55s cubic-bezier(.2,.7,.3,1) forwards;}
.ak-twinkle{animation:ak-twinkle 2.4s ease-in-out infinite;}
.ak-fly-in{animation:ak-fly-in .4s cubic-bezier(.2,.7,.3,1) forwards;}
.ak-fly-out{animation:ak-fly-out .35s ease-in forwards;}
.ak-num{font-variant-numeric:tabular-nums;font-family:var(--ak-display);}
.ak-tap{cursor:pointer;transition:transform .12s cubic-bezier(.2,.7,.3,1),filter .12s;}
.ak-tap:hover{transform:translateY(-3px);filter:brightness(1.03);}
.ak-tap:active{transform:translateY(0);}
.ak ::-webkit-scrollbar{display:none;}
.ak{scrollbar-width:none;}
input[type=range]{-webkit-appearance:none;width:100%;height:14px;border-radius:999px;outline:none;cursor:pointer;background:transparent;}
input[type=range]::-webkit-slider-runnable-track{height:14px;border-radius:999px;background:transparent;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;border-radius:50%;background:linear-gradient(180deg,#fff 0%,#FFF7E8 100%);box-shadow:0 4px 0 rgba(45,27,69,.12),0 8px 18px -6px rgba(45,27,69,.2),inset 0 2px 0 rgba(255,255,255,.95);margin-top:-9px;cursor:pointer;transition:transform .1s;}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.15);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script type="text/babel">
/* ============================================================
   AK DESIGN TOKENS
   ============================================================ */
const AK_TONES = {
  chem: ['#DCF7E7','#7BD9A8','#3CA876'],
  phys: ['#E5DCFF','#B5A1FF','#7C5FE0'],
  bio:  ['#FFE0CB','#FFA17A','#D96D49'],
  geo:  ['#D6ECFA','#8FCAF0','#4A93C9'],
  ok:   ['#C8F2DD','#5DD9A0','#2BA873'],
  cta:  ['#FFEDA8','#FFD262','#D4A22B'],
  star: ['#FFE49E','#FFC857','#D4972B'],
  warn: ['#FFD2C8','#FF8B7A','#D9523F'],
  ink:  ['#E5DCEE','#6B5680','#2D1B45'],
};

/* ============================================================
   AK ICONS / SVG COMPONENTS
   ============================================================ */
function AKFlask({ size=120, tone='chem', fillLevel=0.6, bubbles=true }) {
  const [l,m,d] = AK_TONES[tone];
  const id = React.useId().replace(/:/g,'');
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" style={{display:'block'}}>
      <defs>
        <linearGradient id={`fg-${id}`} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor="#fff" stopOpacity="0.95"/>
          <stop offset="100%" stopColor="#fff" stopOpacity="0.55"/>
        </linearGradient>
        <linearGradient id={`fl-${id}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={l}/>
          <stop offset="60%" stopColor={m}/>
          <stop offset="100%" stopColor={d}/>
        </linearGradient>
        <linearGradient id={`fc-${id}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#fff" stopOpacity="0.6"/>
          <stop offset="100%" stopColor="#fff" stopOpacity="0"/>
        </linearGradient>
        <clipPath id={`fcp-${id}`}>
          <path d="M50 22 L50 48 L24 96 Q22 108 34 108 L86 108 Q98 108 96 96 L70 48 L70 22 Z"/>
        </clipPath>
      </defs>
      <ellipse cx="60" cy="112" rx="34" ry="4" fill="rgba(45,27,69,.22)"/>
      <path d="M50 22 L50 48 L24 96 Q22 108 34 108 L86 108 Q98 108 96 96 L70 48 L70 22 Z"
        fill={`url(#fg-${id})`} stroke="rgba(45,27,69,.18)" strokeWidth="2.2"/>
      <g clipPath={`url(#fcp-${id})`}>
        <rect x="20" y={48+(60*(1-fillLevel))} width="80" height="80" fill={`url(#fl-${id})`}/>
        <ellipse cx="60" cy={48+(60*(1-fillLevel))} rx="26" ry="3" fill={m}/>
        <ellipse cx="60" cy={48+(60*(1-fillLevel))} rx="22" ry="1.4" fill="#fff" opacity=".5"/>
        {bubbles&&<g><circle cx="46" cy="86" r="3" fill="#fff" opacity=".5"/><circle cx="72" cy="92" r="2.4" fill="#fff" opacity=".4"/><circle cx="58" cy="98" r="2" fill="#fff" opacity=".35"/></g>}
      </g>
      <path d="M54 30 L54 52 L34 90" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" opacity=".75" fill="none"/>
      <ellipse cx="60" cy="22" rx="11" ry="3.5" fill="rgba(45,27,69,.18)"/>
      <ellipse cx="60" cy="21" rx="11" ry="2.5" fill="#fff" opacity=".85"/>
      <rect x="46" y="10" width="28" height="14" rx="5" fill={d}/>
      <rect x="48" y="11" width="24" height="4" rx="2" fill={`url(#fc-${id})`}/>
    </svg>
  );
}

function AKStarSmall({ filled=true }) {
  const id = React.useId().replace(/:/g,'');
  return (
    <svg width="14" height="14" viewBox="0 0 14 14">
      <defs><linearGradient id={`ss-${id}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#FFE49E"/><stop offset="100%" stopColor="#FFC857"/></linearGradient></defs>
      <path d="M7 1.2 L8.7 5 L13 5.4 L9.7 8.2 L10.7 12.3 L7 10.2 L3.3 12.3 L4.3 8.2 L1 5.4 L5.3 5 Z"
        fill={filled?`url(#ss-${id})`:'#E8DCEE'} stroke={filled?'#D4972B':'#B0A0C2'} strokeWidth="1.2" strokeLinejoin="round"/>
    </svg>
  );
}

function AKStar({ size=56, filled=true }) {
  const id = React.useId().replace(/:/g,'');
  return (
    <svg width={size} height={size} viewBox="0 0 56 56">
      <defs><radialGradient id={`st-${id}`} cx="40%" cy="32%" r="70%"><stop offset="0%" stopColor="#fff"/><stop offset="35%" stopColor="#FFE49E"/><stop offset="100%" stopColor="#D4972B"/></radialGradient></defs>
      <ellipse cx="28" cy="52" rx="14" ry="2.5" fill="rgba(45,27,69,.18)"/>
      <path d="M28 5 L34.5 19 L50 21 L38.5 31.5 L42 47 L28 39.5 L14 47 L17.5 31.5 L6 21 L21.5 19 Z"
        fill={filled?`url(#st-${id})`:'#E8DCEE'} stroke={filled?'#C99B3B':'#B0A0C2'} strokeWidth="2.2" strokeLinejoin="round"/>
      {filled&&<><ellipse cx="20" cy="18" rx="3.5" ry="5" fill="#fff" opacity=".7" transform="rotate(-30 20 18)"/><circle cx="36" cy="14" r="1.6" fill="#fff" opacity=".7"/></>}
    </svg>
  );
}

function AKPlanet({ size=80, tone='phys', ring=true }) {
  const [l,m,d] = AK_TONES[tone];
  const id = React.useId().replace(/:/g,'');
  return (
    <svg width={size} height={size*0.78} viewBox="0 0 100 78">
      <defs><radialGradient id={`pl-${id}`} cx="38%" cy="32%" r="70%"><stop offset="0%" stopColor="#fff"/><stop offset="30%" stopColor={l}/><stop offset="100%" stopColor={d}/></radialGradient></defs>
      {ring&&<ellipse cx="50" cy="40" rx="48" ry="11" fill="none" stroke={d} strokeWidth="3" opacity=".4"/>}
      <circle cx="50" cy="38" r="26" fill={`url(#pl-${id})`} stroke={d} strokeWidth="2"/>
      <ellipse cx="42" cy="28" rx="6" ry="9" fill="#fff" opacity=".55" transform="rotate(-22 42 28)"/>
      {ring&&<path d="M 16 47 Q 50 60 84 47" fill="none" stroke={d} strokeWidth="3" opacity=".7" strokeLinecap="round"/>}
    </svg>
  );
}

function AKBlob({ size=80, kind='sphere', tone='cta' }) {
  const [l,m,d] = AK_TONES[tone];
  const id = React.useId().replace(/:/g,'');
  const grad = <defs><radialGradient id={`g-${id}`} cx="40%" cy="32%" r="75%"><stop offset="0%" stopColor="#fff"/><stop offset="28%" stopColor={l}/><stop offset="100%" stopColor={d}/></radialGradient></defs>;
  const shadow = <ellipse cx="40" cy="74" rx="22" ry="3" fill="rgba(45,27,69,.2)"/>;
  const shine = <ellipse cx="30" cy="26" rx="6" ry="10" fill="#fff" opacity=".6" transform="rotate(-20 30 26)"/>;
  let shape;
  if (kind==='sphere') shape = <circle cx="40" cy="40" r="28" fill={`url(#g-${id})`} stroke={d} strokeWidth="2"/>;
  else if (kind==='cube') shape = <g><rect x="14" y="14" width="52" height="52" rx="12" fill={`url(#g-${id})`} stroke={d} strokeWidth="2"/><rect x="18" y="18" width="44" height="6" rx="3" fill="#fff" opacity=".5"/></g>;
  else if (kind==='droplet') shape = <path d="M40 8 C24 30 18 44 22 56 C26 70 54 70 58 56 C62 44 56 30 40 8 Z" fill={`url(#g-${id})`} stroke={d} strokeWidth="2"/>;
  else if (kind==='cloud') shape = <g><ellipse cx="40" cy="48" rx="24" ry="14" fill={`url(#g-${id})`} stroke={d} strokeWidth="1.5"/><ellipse cx="28" cy="44" rx="14" ry="12" fill={`url(#g-${id})`} stroke={d} strokeWidth="1.5"/><ellipse cx="52" cy="44" rx="12" ry="10" fill={`url(#g-${id})`} stroke={d} strokeWidth="1.5"/></g>;
  else shape = <circle cx="40" cy="40" r="28" fill={`url(#g-${id})`} stroke={d} strokeWidth="2"/>;
  return <svg width={size} height={size} viewBox="0 0 80 80" style={{display:'block'}}>{grad}{shadow}{shape}{kind!=='cloud'&&shine}</svg>;
}

function AKCylinder({ layers=[], capacity=4, width=160, height=360 }) {
  const id = React.useId().replace(/:/g,'');
  const layerH = (height-70)/capacity;
  const top=40, bottom=height-30, inL=18, inR=width-18;
  const bodyPath = `M ${inL} ${top} Q ${inL} ${top-10} ${inL+14} ${top-10} L ${inR-14} ${top-10} Q ${inR} ${top-10} ${inR} ${top} L ${inR} ${bottom-16} Q ${inR} ${bottom} ${inR-16} ${bottom} L ${inL+16} ${bottom} Q ${inL} ${bottom} ${inL} ${bottom-16} Z`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <defs>
        <linearGradient id={`cg-${id}`} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#fff" stopOpacity="0.9"/><stop offset="20%" stopColor="#fff" stopOpacity="0.2"/>
          <stop offset="80%" stopColor="#fff" stopOpacity="0.05"/><stop offset="100%" stopColor="#fff" stopOpacity="0.45"/>
        </linearGradient>
        <clipPath id={`cc-${id}`}><path d={bodyPath}/></clipPath>
      </defs>
      <ellipse cx={width/2} cy={bottom+12} rx={width/2-18} ry="5" fill="rgba(45,27,69,.2)"/>
      <path d={`M ${inL} ${top+4} L ${inR} ${top+4} L ${inR} ${bottom-12} Q ${inR} ${bottom+4} ${inR-16} ${bottom+4} L ${inL+16} ${bottom+4} Q ${inL} ${bottom+4} ${inL} ${bottom-12} Z`} fill="rgba(45,27,69,.18)"/>
      <path d={bodyPath} fill="rgba(255,255,255,.8)" stroke="rgba(45,27,69,.18)" strokeWidth="2.5"/>
      <g clipPath={`url(#cc-${id})`}>
        {layers.map((L,i)=>{
          const y=bottom-(i+1)*layerH;
          const isTop=i===layers.length-1;
          return (
            <g key={i} className={L.fresh?'ak-pour':''} style={{transformOrigin:`0px ${bottom}px`}}>
              <defs><linearGradient id={`cl-${id}-${i}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={L.color} stopOpacity=".75"/><stop offset="100%" stopColor={L.color} stopOpacity="1"/></linearGradient></defs>
              <rect x={inL} y={y} width={inR-inL} height={layerH+1} fill={`url(#cl-${id}-${i})`}/>
              <rect x={inL} y={y+4} width={inR-inL} height="6" fill="#fff" opacity=".28"/>
              <rect x={inL} y={y+layerH-8} width={inR-inL} height="6" fill="#000" opacity=".10"/>
              {isTop&&<><ellipse cx={width/2} cy={y} rx={(inR-inL)/2} ry="4" fill={L.color}/><ellipse cx={width/2} cy={y} rx={(inR-inL)/2-4} ry="2" fill="#fff" opacity=".4"/></>}
            </g>
          );
        })}
      </g>
      <ellipse cx={width/2} cy={top-10} rx={(inR-inL)/2} ry="6" fill="rgba(45,27,69,.16)"/>
      <ellipse cx={width/2} cy={top-11} rx={(inR-inL)/2-2} ry="4" fill="#fff" opacity=".9"/>
      <path d={`M ${inL+8} ${top+14} L ${inL+8} ${bottom-22}`} stroke="#fff" strokeWidth="5" strokeLinecap="round" opacity=".8"/>
      <path d={`M ${inR-6} ${top+30} L ${inR-6} ${bottom-50}`} stroke="#fff" strokeWidth="2.5" strokeLinecap="round" opacity=".45"/>
      <path d={`M ${inL} ${top} L ${inR} ${top} L ${inR} ${bottom-16} Q ${inR} ${bottom} ${inR-16} ${bottom} L ${inL+16} ${bottom} Q ${inL} ${bottom} ${inL} ${bottom-16} Z`} fill={`url(#cg-${id})`} pointerEvents="none"/>
      {[...Array(capacity)].map((_,i)=>(
        <g key={i}><line x1={inR+4} y1={bottom-(i+1)*layerH} x2={inR+12} y2={bottom-(i+1)*layerH} stroke="rgba(45,27,69,.3)" strokeWidth="2" strokeLinecap="round"/></g>
      ))}
    </svg>
  );
}

function AKBottle({ size=90, color='#7BD9A8', label, densityLabel, used=false, onClick }) {
  const id = React.useId().replace(/:/g,'');
  return (
    <button type="button" onClick={used?undefined:onClick} className="ak-tap" aria-label={label}
      style={{background:'none',border:'none',padding:0,cursor:used?'not-allowed':'pointer',opacity:used?.4:1,filter:used?'grayscale(.4)':'none',display:'inline-flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <svg width={size} height={size*1.55} viewBox="0 0 90 140">
        <defs>
          <linearGradient id={`bl-${id}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".75"/><stop offset="100%" stopColor={color} stopOpacity="1"/></linearGradient>
          <linearGradient id={`bg2-${id}`} x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#fff" stopOpacity=".7"/><stop offset="35%" stopColor="#fff" stopOpacity=".05"/><stop offset="100%" stopColor="#fff" stopOpacity=".3"/></linearGradient>
          <clipPath id={`bc-${id}`}><path d="M22 44 Q22 34 30 32 L30 20 Q30 14 36 14 L54 14 Q60 14 60 20 L60 32 Q68 34 68 44 L68 118 Q68 132 54 132 L36 132 Q22 132 22 118 Z"/></clipPath>
        </defs>
        <ellipse cx="45" cy="135" rx="22" ry="3" fill="rgba(45,27,69,.22)"/>
        <rect x="32" y="4" width="26" height="14" rx="4" fill="#2D1B45"/>
        <rect x="34" y="5" width="22" height="4" rx="2" fill="#fff" opacity=".3"/>
        <path d="M22 44 Q22 34 30 32 L30 20 Q30 14 36 14 L54 14 Q60 14 60 20 L60 32 Q68 34 68 44 L68 118 Q68 132 54 132 L36 132 Q22 132 22 118 Z" fill="rgba(255,255,255,.6)" stroke="rgba(45,27,69,.2)" strokeWidth="2.2"/>
        <g clipPath={`url(#bc-${id})`}>
          <rect x="20" y="56" width="50" height="80" fill={`url(#bl-${id})`}/>
          <ellipse cx="45" cy="56" rx="22" ry="3" fill={color}/>
          <ellipse cx="45" cy="56" rx="18" ry="1.6" fill="#fff" opacity=".4"/>
        </g>
        <path d="M30 48 Q30 38 36 36 L36 120" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" opacity=".75" fill="none"/>
        <path d="M22 44 Q22 34 30 32 L30 20 Q30 14 36 14 L54 14 Q60 14 60 20 L60 32 Q68 34 68 44 L68 118 Q68 132 54 132 L36 132 Q22 132 22 118 Z" fill={`url(#bg2-${id})`} pointerEvents="none"/>
      </svg>
      {label&&<div style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:11,color:'var(--ak-ink-2)',textTransform:'uppercase',letterSpacing:.7}}>{label}</div>}
      {densityLabel&&<div style={{fontFamily:'var(--ak-body)',fontWeight:700,fontSize:10,color:'var(--ak-ink-3)'}}>{densityLabel}</div>}
    </button>
  );
}

/* ============================================================
   AK UI COMPONENTS
   ============================================================ */
function AKProgress({ value=0.5, tone='cta', height=18, label }) {
  const [l,m,d] = AK_TONES[tone];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {label&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
        <span style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:13,color:'var(--ak-ink-2)'}}>{label}</span>
        <span className="ak-num" style={{fontWeight:700,fontSize:14,color:'var(--ak-ink)'}}>{Math.round(value*100)}%</span>
      </div>}
      <div style={{height,borderRadius:999,background:'rgba(45,27,69,.08)',boxShadow:'inset 0 2px 4px rgba(45,27,69,.18),inset 0 -1px 0 rgba(255,255,255,.6)',overflow:'hidden',position:'relative'}}>

}

/* ============================================================
   LEVEL 1 — ТРИ СОСТОЯНИЯ (States of Matter)
   ============================================================ */
const L1_ITEMS = [
  {e:'🧊', label:'Лёд',      state:'solid',   fact:'Молекулы льда плотно упакованы и почти не движутся'},
  {e:'💧', label:'Вода',     state:'liquid',  fact:'Молекулы воды движутся и скользят мимо друг друга'},
  {e:'💨', label:'Пар',      state:'gas',     fact:'Молекулы пара летают свободно во все стороны'},
  {e:'🪨', label:'Камень',   state:'solid',   fact:'Твёрдые тела сохраняют форму — молекулы держатся вместе'},
  {e:'🥛', label:'Молоко',   state:'liquid',  fact:'Жидкости принимают форму сосуда'},
  {e:'🌬️', label:'Воздух',   state:'gas',     fact:'Воздух — смесь газов: азот, кислород, углекислый газ'},
  {e:'🍫', label:'Шоколад',  state:'solid',   fact:'Твёрдый, пока не нагреется — потом становится жидким!'},
  {e:'🧃', label:'Сок',      state:'liquid',  fact:'Сок занимает форму стакана — это признак жидкости'},
  {e:'🫁', label:'Кислород', state:'gas',     fact:'Кислород — газ без цвета и запаха, мы им дышим'},
];

const L1_BINS = [
  { key:'solid',  label:'ТВЁРДОЕ', emoji:'🧱', bg:'linear-gradient(180deg,#C4B5FF 0%,#B5A1FF 100%)', shadow:'0 6px 0 #7C5FE0,0 12px 24px -6px rgba(124,95,224,.4),inset 0 2px 0 rgba(255,255,255,.55)' },
  { key:'liquid', label:'ЖИДКОЕ',  emoji:'💧', bg:'linear-gradient(180deg,#B8DCFA 0%,#8FCAF0 100%)', shadow:'0 6px 0 #4A93C9,0 12px 24px -6px rgba(74,147,201,.4),inset 0 2px 0 rgba(255,255,255,.55)' },
  { key:'gas',    label:'ГАЗ',     emoji:'☁️', bg:'linear-gradient(180deg,#FFEDA8 0%,#FFD262 100%)', shadow:'0 6px 0 #D4A22B,0 12px 24px -6px rgba(212,162,43,.4),inset 0 2px 0 rgba(255,255,255,.55)' },
];

function Level1States({ onDone }) {
  const [idx, setIdx]         = React.useState(0);
  const [counts, setCounts]   = React.useState({solid:0,liquid:0,gas:0});
  const [selected, setSelected] = React.useState(null); // which item card is picked
  const [shakeBin, setShakeBin] = React.useState(null);
  const [factPopup, setFactPopup] = React.useState(null); // {text}
  const [animOut, setAnimOut] = React.useState(false);
  const [done, setDone]       = React.useState(false);

  const item = L1_ITEMS[idx];
  const total = L1_ITEMS.length;
  const sorted = idx; // how many already sorted

  const handleCardTap = () => {
    if (factPopup) return;
    setSelected(s => s === idx ? null : idx);
  };

  const handleBin = (binKey) => {
    if (factPopup || selected === null) return;
    if (item.state === binKey) {
      // correct
      setAnimOut(true);
      setTimeout(() => {
        setCounts(c => ({...c, [binKey]: c[binKey]+1}));
        setFactPopup({ text: item.fact });
        setAnimOut(false);
      }, 350);
    } else {
      setShakeBin(binKey);
      setTimeout(() => setShakeBin(null), 450);
    }
  };

  const handleFactClose = () => {
    setFactPopup(null);
    setSelected(null);
    const nextIdx = idx + 1;
    if (nextIdx >= total) {
      setTimeout(() => setDone(true), 200);
    } else {
      setIdx(nextIdx);
    }
  };

  return (
    <div className="ak" style={{width:'100%',minHeight:'100vh',background:'radial-gradient(80% 50% at 50% 100%,#DCF7E7 0%,transparent 70%),linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'60px 18px 22px',boxSizing:'border-box',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      <AKLessonHeader progress={sorted/total} stars={sorted*30} onClose={onDone}/>
      <div style={{textAlign:'center',marginTop:18,marginBottom:6}}>
        <AKTaskBadge tone="chem">Отсортировано: {sorted} / {total}</AKTaskBadge>
      </div>

      {/* Current item card */}
      {!done && item && (
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',paddingBottom:8}}>
          <div
            onClick={handleCardTap}
            className={`ak-tap${animOut?' ak-fly-out':' ak-fly-in'}`}
            style={{
              background: selected !== null ? 'linear-gradient(160deg,#DCF7E7,#A8F0CC)' : '#fff',
              borderRadius: 28,
              padding: '28px 36px',
              boxShadow: selected !== null
                ? '0 8px 0 #3CA876,0 18px 30px -8px rgba(60,168,118,.4),inset 0 2px 0 rgba(255,255,255,.7)'
                : '0 8px 0 rgba(45,27,69,.10),0 18px 30px -8px rgba(45,27,69,.14),inset 0 2px 0 rgba(255,255,255,1)',
              textAlign: 'center',
              cursor: 'pointer',
              transition: 'background .15s, box-shadow .15s',
              minWidth: 180,
            }}
          >
            <div style={{fontSize: 72, lineHeight: 1, marginBottom: 12}}>{item.e}</div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:22,color:'var(--ak-ink)'}}>{item.label}</div>
            {selected !== null && <div style={{marginTop:8,fontSize:12,color:'var(--ak-chem-3)',fontFamily:'var(--ak-display)',fontWeight:600}}>Теперь нажми на корзину ↓</div>}
          </div>
        </div>
      )}

      {/* Bins */}
      <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:8,paddingBottom:8}}>
        {L1_BINS.map(bin => (
          <div key={bin.key}
            className={`ak-tap${shakeBin===bin.key?' ak-shake':''}`}
            onClick={() => handleBin(bin.key)}
            style={{
              flex:1,
              maxWidth: 110,
              padding: '14px 6px 12px',
              borderRadius: 20,
              background: bin.bg,
              boxShadow: bin.shadow,
              textAlign: 'center',
              cursor: selected !== null ? 'pointer' : 'default',
              opacity: selected !== null ? 1 : 0.65,
              transition: 'opacity .2s',
            }}
          >
            <div style={{fontSize:28,marginBottom:4}}>{bin.emoji}</div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:11,color:'var(--ak-ink)',letterSpacing:.5}}>{bin.label}</div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:13,color:'var(--ak-ink)',marginTop:4,opacity:.7}}>{counts[bin.key]}/3</div>
          </div>
        ))}
      </div>

      {/* Fact popup */}
      {factPopup && (
        <div style={{position:'fixed',inset:0,background:'rgba(45,27,69,.45)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:'0 24px'}}>
          <div className="ak-pop" style={{background:'#fff',borderRadius:28,padding:'24px 20px',textAlign:'center',boxShadow:'0 12px 0 rgba(60,168,118,.18),0 24px 48px -12px rgba(45,27,69,.25)',maxWidth:320,width:'100%'}}>
            <div style={{fontSize:40,marginBottom:12}}>✅</div>
            <div style={{fontFamily:'var(--ak-display)',fontSize:17,fontWeight:700,color:'var(--ak-ink)',marginBottom:10}}>Верно!</div>
            <div style={{fontSize:14,lineHeight:1.55,color:'var(--ak-ink-2)',fontWeight:500,marginBottom:20}}>{factPopup.text}</div>
            <button className="ak-btn ak-btn--ok" style={{width:'100%'}} onClick={handleFactClose}>Дальше →</button>
          </div>
        </div>
      )}

      {/* Success */}
      {done && (
        <div style={{position:'fixed',inset:0,background:'rgba(45,27,69,.45)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
          <AKSuccessCard stars={3} title="Все разложено!" fact="Молекулы в твёрдых телах стоят на месте, в жидкостях — скользят, в газах — летают. Это и есть три состояния!" onNext={onDone} ctaLabel="Следующий уровень →"/>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   LEVEL 2 — БАШНЯ ПЛОТНОСТЕЙ
   ============================================================ */
const AK_LIQUIDS = {
  honey:   { color:'#E8A23C', label:'МЁД',   density:'1.4 г/мл' },
  water:   { color:'#5A9EE3', label:'ВОДА',  density:'1.0 г/мл' },
  oil:     { color:'#F2D147', label:'МАСЛО', density:'0.9 г/мл' },
  alcohol: { color:'#A981E6', label:'СПИРТ', density:'0.8 г/мл' },
};
const AK_ORDER = ['honey','water','oil','alcohol'];

function Level2Tower({ onDone }) {
  const [poured, setPoured] = React.useState([]);
  const [shake, setShake]   = React.useState(false);
  const [won, setWon]       = React.useState(false);
  const used = new Set(poured);
  const expected = AK_ORDER[poured.length];

  const handlePour = (k) => {
    if (won) return;
    if (k === expected) {
      const next = [...poured, k];
      setPoured(next);
      if (next.length === AK_ORDER.length) setTimeout(() => setWon(true), 600);
    } else {
      setShake(true);
      setTimeout(() => setShake(false), 450);
    }
  };

  const reset = () => { setPoured([]); setWon(false); };
  const layers = poured.map((k,i) => ({color:AK_LIQUIDS[k].color, fresh:i===poured.length-1}));

  return (
    <div className="ak" style={{width:'100%',minHeight:'100vh',background:'radial-gradient(80% 50% at 50% 100%,#DCF7E7 0%,transparent 70%),linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 60%,#F4E9D8 100%)',padding:'60px 18px 22px',boxSizing:'border-box',position:'relative',overflow:'hidden',display:'flex',flexDirection:'column'}}>
      <AKLessonHeader progress={poured.length/AK_ORDER.length} stars={240} onClose={onDone}/>

      <div style={{display:'flex',justifyContent:'center',marginTop:18,marginBottom:6}}>
        <AKTaskBadge tone="chem">Нажимай от самого тяжёлого к лёгкому!</AKTaskBadge>
      </div>

      <div style={{display:'flex',justifyContent:'center',gap:6,marginBottom:10}}>
        {AK_ORDER.map((k,i) => (
          <React.Fragment key={k}>
            <div style={{width:22,height:22,borderRadius:'50%',background:`radial-gradient(circle at 35% 30%,#fff,${AK_LIQUIDS[k].color} 30%,${AK_LIQUIDS[k].color} 100%)`,boxShadow:'inset 0 -2px 0 rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.6)',opacity:i<poured.length?1:.35,filter:i<poured.length?'none':'grayscale(.5)',transition:'all .3s'}}/>
            {i<AK_ORDER.length-1&&<span style={{color:'var(--ak-ink-3)',alignSelf:'center',fontSize:12,fontWeight:700}}>→</span>}
          </React.Fragment>
        ))}
      </div>

      <div className={shake?'ak-shake':''} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',position:'relative',minHeight:380}}>
        <div style={{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',width:220,height:24,borderRadius:'50%',background:'radial-gradient(ellipse at center,rgba(45,27,69,.22) 0%,rgba(45,27,69,0) 70%)'}}/>
        <AKCylinder layers={layers} capacity={4} width={160} height={360}/>
      </div>

      <div style={{marginTop:8,padding:'12px 8px 10px',borderRadius:28,background:'rgba(255,255,255,.55)',boxShadow:'inset 0 2px 6px rgba(45,27,69,.06),0 1px 0 rgba(255,255,255,.9)',display:'flex',justifyContent:'space-around',alignItems:'flex-end',backdropFilter:'blur(8px)'}}>
        {AK_ORDER.map(k => (
          <AKBottle key={k} color={AK_LIQUIDS[k].color} label={AK_LIQUIDS[k].label} densityLabel={AK_LIQUIDS[k].density} used={used.has(k)} onClick={() => handlePour(k)} size={72}/>
        ))}
      </div>

      {won && (
        <div style={{position:'absolute',inset:0,background:'rgba(45,27,69,.45)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
          <AKSuccessCard stars={3} title="Идеальная башня!" fact="Самая плотная жидкость опускается на дно. Мёд тяжелее воды, а спирт легче масла — поэтому слои не смешиваются." onNext={() => { reset(); onDone(); }} ctaLabel="Следующий уровень →"/>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   LEVEL 3 — ФИЗИЧЕСКОЕ ИЛИ ХИМИЧЕСКОЕ?
   ============================================================ */
const L3_SITUATIONS = [
  {emoji:'🧊', label:'Лёд тает',        answer:'physical', fact:'Таяние — физическое: вода и лёд это одно вещество H₂O, просто в разных состояниях. Можно снова заморозить!'},
  {emoji:'📄', label:'Бумага горит',     answer:'chemical', fact:'Горение — химическое: бумага превращается в углекислый газ и пепел. Назад не вернуть!'},
  {emoji:'🍋', label:'Лимон в молоко',  answer:'chemical', fact:'Кислота лимона реагирует с молоком — оно сворачивается. Это химическая реакция!'},
  {emoji:'✂️', label:'Бумагу режут',    answer:'physical', fact:'Резать — физическое изменение. Вещество то же самое, просто меньший размер.'},
  {emoji:'🦀', label:'Железо ржавеет',  answer:'chemical', fact:'Ржавчина — это оксид железа, новое вещество. Химическая реакция железа с кислородом!'},
  {emoji:'🥚', label:'Яйцо жарится',   answer:'chemical', fact:'Белок яйца необратимо меняется при нагреве. Уже готовое яйцо нельзя сделать сырым!'},
  {emoji:'🪨', label:'Камень дробят',   answer:'physical', fact:'Дробление — физическое. Камень стал меньше, но это всё равно тот же минерал.'},
];

function Level3Changes({ onDone }) {
  const [idx, setIdx]         = React.useState(0);
  const [score, setScore]     = React.useState(0);
  const [shakeBtn, setShakeBtn] = React.useState(null);
  const [reveal, setReveal]   = React.useState(null); // {correct: bool, fact: str}
  const [done, setDone]       = React.useState(false);

  const total = L3_SITUATIONS.length;
  const situation = L3_SITUATIONS[idx];

  const handleAnswer = (choice) => {
    if (reveal) return;
    const correct = choice === situation.answer;
    if (correct) {
      setScore(s => s + 1);
      setReveal({ correct: true, fact: situation.fact });
    } else {
      setShakeBtn(choice);
      setTimeout(() => setShakeBtn(null), 450);
      setReveal({ correct: false, fact: situation.fact });
    }
  };

  const handleNext = () => {
    setReveal(null);
    const nextIdx = idx + 1;
    if (nextIdx >= total) {
      setDone(true);
    } else {
      setIdx(nextIdx);
    }
  };

  const stars = score >= total ? 3 : score >= Math.ceil(total*0.7) ? 2 : score >= Math.ceil(total*0.4) ? 1 : 0;

  return (
    <div className="ak" style={{width:'100%',minHeight:'100vh',background:'radial-gradient(80% 50% at 50% 100%,#DCF7E7 0%,transparent 60%),linear-gradient(180deg,#FFF8EA 0%,#FFF3E2 100%)',padding:'60px 18px 32px',boxSizing:'border-box',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      <AKLessonHeader progress={idx/total} stars={score*35} onClose={onDone}/>

      {/* Progress dots */}
      <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:16,marginBottom:18}}>
        {L3_SITUATIONS.map((_,i) => (
          <div key={i} style={{
            width: 10, height: 10, borderRadius: '50%',
            background: i < idx ? '#5DD9A0' : i === idx ? '#7BD9A8' : 'rgba(45,27,69,.12)',
            boxShadow: i === idx ? '0 0 0 3px rgba(123,217,168,.4)' : 'none',
            transition: 'all .3s',
          }}/>
        ))}
      </div>

      {/* Situation card */}
      {!done && situation && (
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20}}>
          <div className="ak-fly-in" style={{
            background:'#fff',
            borderRadius:28,
            padding:'32px 28px 28px',
            boxShadow:'0 8px 0 rgba(45,27,69,.10),0 18px 30px -8px rgba(45,27,69,.14),inset 0 2px 0 rgba(255,255,255,1)',
            textAlign:'center',
            maxWidth:300,
            width:'100%',
          }}>
            <div style={{fontSize:80,lineHeight:1,marginBottom:14}}>{situation.emoji}</div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:20,color:'var(--ak-ink)',marginBottom:6}}>{situation.label}</div>
            <div style={{fontFamily:'var(--ak-body)',fontSize:13,color:'var(--ak-ink-3)',fontWeight:600}}>обратимое или нет?</div>
          </div>

          {/* Answer buttons */}
          <div style={{display:'flex',gap:12,width:'100%',maxWidth:300}}>
            <button
              className={`ak-btn ak-btn--soft${shakeBtn==='physical'?' ak-shake':''}`}
              style={{flex:1,fontSize:14}}
              onClick={() => handleAnswer('physical')}
            >
              ⟲ Физическое
            </button>
            <button
              className={`ak-btn ak-btn--chem${shakeBtn==='chemical'?' ak-shake':''}`}
              style={{flex:1,fontSize:14}}
              onClick={() => handleAnswer('chemical')}
            >
              ⚗ Химическое
            </button>
          </div>
        </div>
      )}

      {/* Reveal overlay */}
      {reveal && !done && (
        <div style={{position:'fixed',inset:0,background:'rgba(45,27,69,.45)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:'0 24px'}}>
          <div className="ak-pop" style={{background:'#fff',borderRadius:28,padding:'28px 22px',textAlign:'center',boxShadow:'0 12px 0 rgba(60,168,118,.18),0 24px 48px -12px rgba(45,27,69,.25)',maxWidth:320,width:'100%'}}>
            <div style={{fontSize:48,marginBottom:10}}>{reveal.correct?'✅':'❌'}</div>
            <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:20,color:'var(--ak-ink)',marginBottom:12}}>
              {reveal.correct?'Правильно!':'Не совсем!'}
            </div>
            <div style={{fontSize:14,lineHeight:1.55,color:'var(--ak-ink-2)',fontWeight:500,marginBottom:20}}>{reveal.fact}</div>
            <button className="ak-btn ak-btn--ok" style={{width:'100%'}} onClick={handleNext}>Дальше →</button>
          </div>
        </div>
      )}

      {/* Done */}
      {done && (
        <div style={{position:'fixed',inset:0,background:'rgba(45,27,69,.5)',backdropFilter:'blur(10px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
          <AKSuccessCard
            stars={stars}
            title={score >= 6 ? 'Химик-детектив! 🕵️' : score >= 4 ? 'Хорошая работа!' : 'Учись дальше!'}
            fact={`Правильных ответов: ${score} из ${total}. Химическое изменение создаёт новое вещество, физическое — нет!`}
            onNext={onDone}
            ctaLabel="На главную →"
          />
        </div>
      )}
    </div>
  );
}

/* ============================================================
   LEVEL SELECT
   ============================================================ */
function LevelSelect({ onStart, completed }) {
  const levels = [
    {
      n: 1,
      title: 'Три состояния',
      sub: 'Твёрдое · Жидкое · Газ',
      tone: 'chem',
      icon: <AKFlask size={72} tone="chem" fillLevel={0.55}/>,
      locked: false,
    },
    {
      n: 2,
      title: 'Башня плотностей',
      sub: 'Налей по порядку!',
      tone: 'chem',
      icon: <AKFlask size={72} tone="chem" fillLevel={0.7}/>,
      locked: false,
    },
    {
      n: 3,
      title: 'Физ. или хим.?',
      sub: 'Найди отличие',
      tone: 'ok',
      icon: <AKFlask size={72} tone="ok" fillLevel={0.4}/>,
      locked: !completed.has(2),
    },
  ];

  return (
    <div className="ak" style={{width:'100%',minHeight:'100vh',background:'radial-gradient(80% 50% at 50% 0%,#DCF7E7 0%,transparent 60%),linear-gradient(180deg,#FFF8EA,#FFF3E2)',padding:'60px 18px 40px',boxSizing:'border-box'}}>
      <div aria-hidden style={{position:'fixed',top:60,right:-16,opacity:.6,transform:'rotate(12deg)',pointerEvents:'none'}}><AKPlanet size={80} tone="chem" ring/></div>
      <div aria-hidden style={{position:'fixed',bottom:120,left:-12,opacity:.4,transform:'rotate(-8deg)',pointerEvents:'none'}}><AKPlanet size={56} tone="phys" ring={false}/></div>

      <div style={{textAlign:'center',marginBottom:36}}>
        <div className="ak-bob" style={{display:'inline-block',filter:'drop-shadow(0 8px 16px rgba(60,168,118,.3))'}}>
          <AKFlask size={100} tone="chem" fillLevel={0.65}/>
        </div>
        <div style={{fontFamily:'var(--ak-display)',fontSize:30,fontWeight:700,color:'var(--ak-ink)',marginTop:12,letterSpacing:-.5}}>Хемо Лаб</div>
        <div style={{fontSize:14,color:'var(--ak-ink-2)',marginTop:4,fontFamily:'var(--ak-display)'}}>Химия · КосмоБаза</div>
        <div style={{maxWidth:260,margin:'16px auto 0'}}>
          <AKProgress value={completed.size/3} tone="ok" height={14} label="Прогресс"/>
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:16,maxWidth:400,margin:'0 auto'}}>
        {levels.map(lv => {
          const [l,m,d] = AK_TONES[lv.tone];
          const isDone = completed.has(lv.n);
          return (
            <button
              key={lv.n}
              onClick={lv.locked ? undefined : () => onStart(lv.n)}
              className="ak-tap"
              style={{
                width:'100%',
                padding:18,
                borderRadius:28,
                background:`linear-gradient(160deg,${l} 0%,${m} 100%)`,
                boxShadow:`0 8px 0 ${d},0 18px 30px -8px ${m}aa,inset 0 2px 0 rgba(255,255,255,.6),inset 0 -2px 0 ${d}`,
                border:'none',
                cursor:lv.locked?'not-allowed':'pointer',
                opacity:lv.locked?.55:1,
                filter:lv.locked?'grayscale(.4)':'none',
                textAlign:'left',
                boxSizing:'border-box',
                position:'relative',
                overflow:'hidden',
              }}
            >
              <div style={{position:'absolute',top:-28,right:-10,width:100,height:100,borderRadius:'50%',background:'rgba(255,255,255,.22)',filter:'blur(2px)'}}/>
              <div style={{display:'flex',alignItems:'center',gap:16,position:'relative'}}>
                <div style={{filter:'drop-shadow(0 4px 8px rgba(45,27,69,.2))'}}>{lv.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:'var(--ak-display)',fontWeight:600,fontSize:12,color:'rgba(45,27,69,.6)',textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>
                    {lv.locked ? '🔒 Заблокировано' : lv.sub}
                  </div>
                  <div style={{fontFamily:'var(--ak-display)',fontWeight:700,fontSize:20,color:'var(--ak-ink)',letterSpacing:-.3,lineHeight:1.15}}>
                    {lv.title}
                  </div>
                  {isDone && <div style={{marginTop:6,fontSize:12,color:'#2BA873',fontFamily:'var(--ak-display)',fontWeight:700}}>✅ Пройдено</div>}
                </div>
              </div>
            </button>
          );
        })}
      </div>

      <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:28}}>
        <AKStatChip icon="⭐" value="3 урока" tone="star"/>
        <AKStatChip icon="🧪" value="Химия" tone="chem"/>
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [screen, setScreen]       = React.useState('select');
  const [completed, setCompleted] = React.useState(new Set());

  const done = (n) => {
    setCompleted(s => new Set([...s, n]));
    setScreen('select');
  };

  if (screen === 'select') return <LevelSelect onStart={n => setScreen('l'+n)} completed={completed}/>;
  if (screen === 'l1')     return <Level1States onDone={() => done(1)}/>;
  if (screen === 'l2')     return <Level2Tower  onDone={() => done(2)}/>;
  if (screen === 'l3')     return <Level3Changes onDone={() => done(3)}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
